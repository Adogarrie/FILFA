      )}

      {tab === 'clasificacion' && (
        <>
          {/* Sub-tabs: General / Local / Visitante */}
          <div className="card" style={{paddingBottom:'.6rem'}}>
            <div style={{display:'flex', gap:'.4rem', flexWrap:'wrap'}}>
              {[['general','General'],['local','Local'],['visitante','Visitante'],
                ...((federacion?.h2h_pts_local_v1 === 0 || federacion?.h2h_pts_local_v2 === 0) ? [['neutro','Neutro']] : []),
                ['historial','Por jornada']].map(([k,l]) => (
                <button key={k} onClick={() => setSubTabClasif(k)}
                        style={{padding:'.28rem .85rem', borderRadius:20, fontSize:'.82rem',
                                cursor:'pointer', fontWeight: subTabClasif===k ? 700 : 400,
                                border: '1.5px solid ' + (subTabClasif===k ? 'var(--verde)' : 'var(--borde)'),
                                background: subTabClasif===k ? 'var(--verde)' : 'var(--fondo)',
                                color: subTabClasif===k ? '#fff' : 'var(--texto)'}}>
                  {l}
                </button>
              ))}
            </div>
          </div>

          {subTabClasif === 'historial'
            ? (() => {
                const jornadasJugadas = [...new Set(
                  partidos.filter(m => m.pts_local !== null && m.pts_visitante !== null).map(m => m.jornada)
                )].sort((a, b) => a - b);
                const jSel = jornadasJugadas.includes(jornadaHistorial)
                  ? jornadaHistorial
                  : (jornadasJugadas[jornadasJugadas.length - 1] ?? 1);
                return (
                  <>
                    <div className="card" style={{paddingBottom:'.6rem'}}>
                      <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.5rem'}}>
                        Clasificación acumulada hasta la jornada seleccionada:
                      </div>
                      <div style={{display:'flex', gap:'.25rem', flexWrap:'wrap'}}>
                        {jornadasJugadas.map(j => (
                          <button key={j} onClick={() => setJornadaHistorial(j)}
                                  style={{padding:'.22rem .5rem', borderRadius:6, fontSize:'.75rem',
                                          cursor:'pointer', border:'1.5px solid var(--borde)',
                                          background: jSel===j ? 'var(--verde)' : 'var(--fondo)',
                                          color:      jSel===j ? '#fff'         : 'var(--texto)',
                                          fontWeight: jSel===j ? 700            : 400}}>
                            J{j}
                          </button>
                        ))}
                      </div>
                    </div>
                    {jornadasJugadas.length === 0
                      ? <div className="card"><p style={{color:'var(--texto2)'}}>Aún no hay resultados introducidos.</p></div>
                      : hasDivs
                        ? divIds.map(divId => {
                            const nombre = divisiones.find(d => d.id === divId)?.nombre || 'División';
                            return (
                              <div key={divId} className="card" style={{marginBottom:'.75rem'}}>
                                <h2 style={{marginBottom:'.75rem'}}>{nombre} — hasta J{jSel}</h2>
                                <ClasifTable rows={computeClasif(divId, jSel)} />
                              </div>
                            );
                          })
                        : <div className="card">
                            <h2 style={{marginBottom:'.75rem'}}>Hasta J{jSel}</h2>
                            <ClasifTable rows={computeClasif(null, jSel)} />
                          </div>
                    }
                  </>
                );
              })()
            : (hasDivs
                ? divIds.map(divId => {
                    const nombre = divisiones.find(d => d.id === divId)?.nombre || 'División';
                    const rows = subTabClasif === 'general'   ? computeClasif(divId)
                               : subTabClasif === 'neutro'    ? computeClasifNeutro(divId)
                               : computeClasifSide(divId, subTabClasif);
                    return (
                      <div key={divId} className="card" style={{marginBottom:'.75rem'}}>
                        <h2 style={{marginBottom:'.75rem'}}>{nombre}</h2>
                        <ClasifTable rows={rows} />
                      </div>
                    );
                  })
                : (() => {
                    const rows = subTabClasif === 'general'   ? computeClasif(null)
                               : subTabClasif === 'neutro'    ? computeClasifNeutro(null)
                               : computeClasifSide(null, subTabClasif);
                    return <div className="card"><ClasifTable rows={rows} /></div>;
                  })()
              )
          }
        </>
      )}
    </div>
  );
}


// ── ADMIN — LIGA H2H ───────────────────────────────────────────
const BAREMO_DEFAULT = [[0,35,0],[36,44,1],[45,53,2],[54,62,3],[63,71,4],[72,80,5],[81,89,6],[90,98,7],[99,107,8]];

function ptsToGoles(pts, baremo) {
  for (let i = 0; i < baremo.length; i++) {
    const [min, max, g] = baremo[i];
    if (pts >= min && (pts <= max || i === baremo.length - 1)) return g;
  }
  return 0;
}

// Determina a qué vuelta pertenece una jornada y sus puntos de local.
// jornadasBase: total de jornadas del calendario base (sin extras).
// vueltasExtra: array de { vuelta_num, basada_en, pts_local, jornada_inicio }.
function getVueltaInfo(jornada, jornadasBase, ptsV1, ptsV2, vueltasExtra) {
  const base = jornadasBase || 0;
  if (base > 0) {
    const porVuelta = Math.round(base / 2);
    if (jornada <= porVuelta) return { vuelta: 1, ptsLocal: ptsV1 ?? 5 };
    if (jornada <= base)      return { vuelta: 2, ptsLocal: ptsV2 ?? 5 };
  }
  // Vueltas extra: busca la de jornada_inicio más alta que sea ≤ jornada
  const sorted = [...(vueltasExtra || [])].sort((a, b) => b.jornada_inicio - a.jornada_inicio);
  const v = sorted.find(ve => jornada >= ve.jornada_inicio);
  if (v) return { vuelta: v.vuelta_num, ptsLocal: v.pts_local };
  // Fallback: si jornadasBase no está definido, usar v1/v2 dividiendo por la mitad
  const maxFallback = Math.max(...(vueltasExtra?.map(v => v.jornada_inicio) || [0]), jornada);
  return jornada <= maxFallback / 2
    ? { vuelta: 1, ptsLocal: ptsV1 ?? 5 }
    : { vuelta: 2, ptsLocal: ptsV2 ?? 5 };
}

function AdminLigaH2H({ federacion, participantes, onFederacionUpdate, isModerador, actorNombre }) {
  const [h2hOn,      setH2hOn]      = useState(!!federacion?.h2h_habilitado);
  const [partidos,   setPartidos]   = useState([]);
  const [resultados, setResultados] = useState({});
  const [generando,  setGenerando]  = useState(false);
  const [guardando,  setGuardando]  = useState(false);
  const [msg,        setMsg]        = useState('');
  // Sorteo físico
  const [modoSorteo,   setModoSorteo]   = useState(false);
  const [asignaciones, setAsignaciones] = useState({}); // { divKey: [participante_id, ...] }
  // Criterios de desempate
  const CRITERIOS_H2H = { h2h: 'Gol average particular', gf: 'Goles a favor', dif: 'Diferencia de goles' };
  const parsarOrden = (val) => { try { return JSON.parse(val || '["h2h","gf","dif"]'); } catch { return ['h2h','gf','dif']; } };
  const [desempateOrden, setDesempateOrden] = useState(() => parsarOrden(federacion?.h2h_desempate_orden));
  // Fantasy ↔ H2H
  const parsarBaremo = (val) => { try { return JSON.parse(val || 'null') || BAREMO_DEFAULT; } catch { return BAREMO_DEFAULT; } };
  const [jornadaConfig, setJornadaConfig] = useState({});  // { jornada_h2h: jornada_fantasy|null }
  const [baremo,        setBaremo]        = useState(() => parsarBaremo(federacion?.h2h_baremo));
  const [ptsLocalV1,    setPtsLocalV1]    = useState(federacion?.h2h_pts_local_v1 ?? 5);
  const [ptsLocalV2,    setPtsLocalV2]    = useState(federacion?.h2h_pts_local_v2 ?? 5);
  const [calculando,    setCalculando]    = useState(null);
  const [msgCfg,        setMsgCfg]        = useState('');
  // Vueltas extra
  const [vueltasExtra,  setVueltasExtra]  = useState([]);
  const [nuevaBase,     setNuevaBase]     = useState(1);   // 1 o 2
  const [nuevaPtsLocal, setNuevaPtsLocal] = useState(5);

  // Agrupar participantes por división (calculado una sola vez en render)
  const grupos = React.useMemo(() => {
    const g = {};
    participantes.forEach(p => {
      const k = p.division_id != null ? String(p.division_id) : '__';
      if (!g[k]) g[k] = [];
      g[k].push(p);
    });
    return g;
  }, [participantes]);

  const hasDivs = Object.keys(grupos).some(k => k !== '__');

  const cargar = async () => {
    if (!federacion?.id) return;
    const { data } = await sb.from('h2h_partidos')
      .select('id, jornada, division_id, local_id, visitante_id, pts_local, pts_visitante, fantasy_local, fantasy_visitante')
      .eq('federacion_id', federacion.id)
      .order('jornada');
    const p = data || [];
    setPartidos(p);
    const res = {};
    p.forEach(m => { res[m.id] = { gl: m.pts_local ?? '', gv: m.pts_visitante ?? '' }; });
    setResultados(res);
  };

  useEffect(() => { if (federacion?.id) { cargar(); cargarConfig(); } }, [federacion?.id]);

  const cargarConfig = async () => {
    const [{ data: jcData }, { data: veData }] = await Promise.all([
      sb.from('h2h_jornada_config').select('jornada_h2h, jornada_fantasy').eq('federacion_id', federacion.id),
      sb.from('h2h_vueltas_extra').select('*').eq('federacion_id', federacion.id).order('vuelta_num'),
    ]);
    const cfg = {};
    (jcData || []).forEach(r => { cfg[r.jornada_h2h] = r.jornada_fantasy; });
    setJornadaConfig(cfg);
    setVueltasExtra(veData || []);
  };

  const añadirVueltaExtra = async () => {
    const jornadasBase  = federacion?.h2h_jornadas_base;
    if (!jornadasBase) { setMsgCfg('Genera el calendario base primero.'); return; }
    const porVuelta     = Math.round(jornadasBase / 2);
    const sorted        = [...vueltasExtra].sort((a, b) => a.jornada_inicio - b.jornada_inicio);
    const ultimaJornada = sorted.length > 0
      ? sorted[sorted.length - 1].jornada_inicio + porVuelta - 1
      : jornadasBase;
    const nuevaInicio   = ultimaJornada + 1;
    const nuevaVuelta   = (sorted[sorted.length - 1]?.vuelta_num ?? 2) + 1;

    // Copiar partidos de la vuelta base elegida
    const inicioBase = nuevaBase === 1 ? 1 : porVuelta + 1;
    const finBase    = nuevaBase === 1 ? porVuelta : jornadasBase;
    const copias     = partidos
      .filter(m => m.jornada >= inicioBase && m.jornada <= finBase)
      .map(m => ({
        federacion_id: federacion.id,
        division_id:   m.division_id,
        jornada:       nuevaInicio + (m.jornada - inicioBase),
        local_id:      m.local_id,
        visitante_id:  m.visitante_id,
      }));

    if (copias.length === 0) { setMsgCfg('No hay partidos en la vuelta base seleccionada.'); return; }

    const { error: errV } = await sb.from('h2h_vueltas_extra').insert({
      federacion_id: federacion.id, vuelta_num: nuevaVuelta,
      basada_en: nuevaBase, pts_local: nuevaPtsLocal, jornada_inicio: nuevaInicio,
    });
    if (errV) { setMsgCfg('Error: ' + errV.message); return; }

    const { error: errP } = await sb.from('h2h_partidos').insert(copias);
    if (errP) {
      await sb.from('h2h_vueltas_extra').delete().eq('federacion_id', federacion.id).eq('vuelta_num', nuevaVuelta);
      setMsgCfg('Error al insertar partidos: ' + errP.message); return;
    }

    setMsgCfg(`Vuelta ${nuevaVuelta} añadida (J${nuevaInicio}–J${nuevaInicio + porVuelta - 1}).`);
    setTimeout(() => setMsgCfg(''), 3500);
    await cargar(); await cargarConfig();
  };

  const eliminarVueltaExtra = async (ve) => {
    if (!confirm(`¿Eliminar vuelta ${ve.vuelta_num}? Se borrarán sus partidos y resultados.`)) return;
    const jornadasBase = federacion?.h2h_jornadas_base ?? 0;
    const porVuelta    = Math.round(jornadasBase / 2);
    const jFin         = ve.jornada_inicio + porVuelta - 1;
    await sb.from('h2h_partidos').delete()
      .eq('federacion_id', federacion.id)
      .gte('jornada', ve.jornada_inicio).lte('jornada', jFin);
    await sb.from('h2h_vueltas_extra').delete().eq('id', ve.id);
    setMsgCfg(`Vuelta ${ve.vuelta_num} eliminada.`);
    setTimeout(() => setMsgCfg(''), 2500);
    await cargar(); await cargarConfig();
  };

  const actualizarPtsLocalExtra = async (ve, nuevoPts) => {
    await sb.from('h2h_vueltas_extra').update({ pts_local: nuevoPts }).eq('id', ve.id);
    setVueltasExtra(prev => prev.map(v => v.id === ve.id ? { ...v, pts_local: nuevoPts } : v));
  };

  const setJornadaFantasy = async (j_h2h, raw) => {
    const val = raw === '' ? null : Number(raw);
    await sb.from('h2h_jornada_config').upsert(
      { federacion_id: federacion.id, jornada_h2h: j_h2h, jornada_fantasy: val },
      { onConflict: 'federacion_id,jornada_h2h' }
    );
    setJornadaConfig(prev => ({ ...prev, [j_h2h]: val }));
  };

  const guardarBaremo = async () => {
    const { error } = await sb.from('federaciones')
      .update({ h2h_baremo: JSON.stringify(baremo) }).eq('id', federacion.id);
    if (error) { setMsgCfg('Error: ' + error.message); return; }
    onFederacionUpdate({ ...federacion, h2h_baremo: JSON.stringify(baremo) });
    setMsgCfg('Baremo guardado');
    setTimeout(() => setMsgCfg(''), 2500);
  };

  const guardarPtsLocal = async () => {
    const { error } = await sb.from('federaciones')
      .update({ h2h_pts_local_v1: ptsLocalV1, h2h_pts_local_v2: ptsLocalV2 })
      .eq('id', federacion.id);
    if (error) { setMsgCfg('Error: ' + error.message); return; }
    onFederacionUpdate({ ...federacion, h2h_pts_local_v1: ptsLocalV1, h2h_pts_local_v2: ptsLocalV2 });
    setMsgCfg('Ventaja local guardada');
    setTimeout(() => setMsgCfg(''), 2500);
  };

  const calcularDesdeFantasy = async (j_h2h) => {
    const jornada_fantasy = jornadaConfig[j_h2h];
    if (!jornada_fantasy) return;
    setCalculando(j_h2h);
    const { ptsLocal } = getVueltaInfo(j_h2h, federacion?.h2h_jornadas_base, ptsLocalV1, ptsLocalV2, vueltasExtra);
    const partIds = participantes.map(p => p.id);
    const { data: clsData } = await sb.from('clasificacion')
      .select('participante_id, puntos_jornada')
      .eq('jornada', jornada_fantasy)
      .in('participante_id', partIds);
    const ptsMap = {};
    (clsData || []).forEach(r => { ptsMap[r.participante_id] = r.puntos_jornada ?? 0; });
    const ms = partidos.filter(p => p.jornada === j_h2h);
    await Promise.all(ms.map(m => {
      const gl = ptsToGoles((ptsMap[m.local_id] ?? 0) + ptsLocal, baremo);
      const gv = ptsToGoles(ptsMap[m.visitante_id] ?? 0, baremo);
      return sb.from('h2h_partidos').update({
        pts_local: gl, pts_visitante: gv,
        fantasy_local: ptsMap[m.local_id] ?? null,
        fantasy_visitante: ptsMap[m.visitante_id] ?? null,
      }).eq('id', m.id);
    }));
    setCalculando(null);
    await cargar();
    publicar(federacion?.id, 'admin', `H2H J${j_h2h} calculada automáticamente desde jornada fantasy ${jornada_fantasy}`, actorNombre);
    setMsg(`J${j_h2h} calculada desde jornada fantasy ${jornada_fantasy}`);
    setTimeout(() => setMsg(''), 3000);
  };

  const moverCrit = (idx, dir) => {
    const arr = [...desempateOrden];
    const ni = idx + dir;
    if (ni < 0 || ni >= arr.length) return;
    [arr[idx], arr[ni]] = [arr[ni], arr[idx]];
    setDesempateOrden(arr);
  };

  const guardarDesempate = async () => {
    const val = JSON.stringify(desempateOrden);
    const { error } = await sb.from('federaciones').update({ h2h_desempate_orden: val }).eq('id', federacion.id);
    if (error) { setMsg('Error al guardar: ' + error.message); return; }
    onFederacionUpdate({ ...federacion, h2h_desempate_orden: val });
    setMsg('Criterios guardados');
    setTimeout(() => setMsg(''), 2500);
  };

  const toggleH2H = async (val) => {
    await sb.from('federaciones').update({ h2h_habilitado: val }).eq('id', federacion.id);
    setH2hOn(val);
    onFederacionUpdate({ ...federacion, h2h_habilitado: val });
    setMsg(val ? 'Liga H2H activada' : 'Liga H2H desactivada');
    setTimeout(() => setMsg(''), 2500);
  };

  // ── Utilidades ─────────────────────────────────────────────
  const shuffle = (arr) => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  };

  // Reordena para que J1 = (E1 vs E2, E3 vs E4, E5 vs E6...)
  // En el algoritmo circular fijo-rotación, para lograr ese J1 hay que
  // intercalar: [E1,E3,E5,...,E6,E4,E2] antes de aplicar el círculo.
  const reorderParaSorteo = (teams) => {
    if (teams.length < 2 || teams.length % 2 !== 0) return teams;
    const izq = [], der = [];
    for (let i = 0; i < teams.length; i += 2) izq.push(teams[i]);
    for (let i = teams.length - 1; i >= 0; i -= 2) der.push(teams[i]);
    return [...izq, ...der];
  };

  // ── Algoritmo round-robin simétrico ────────────────────────
  const generarRR = (equipos) => {
    const teams = [...equipos];
    if (teams.length % 2 !== 0) teams.push(null);
    const n = teams.length;
    const rot = teams.slice(1);
    const rondas1 = [];
    for (let r = 0; r < n - 1; r++) {
      const actual = [teams[0], ...rot];
      const ronda = [];
      for (let i = 0; i < n / 2; i++) {
        const a = actual[i], b = actual[n - 1 - i];
        if (a && b) ronda.push(r % 2 === 0 ? { local: a, visitante: b } : { local: b, visitante: a });
      }
      rondas1.push(ronda);
      rot.unshift(rot.pop());
    }
    const rondas2 = rondas1.map(ronda => ronda.map(p => ({ local: p.visitante, visitante: p.local })));
    return [...rondas1, ...rondas2];
  };

  // ── Insertar filas en la DB ─────────────────────────────────
  // sorteoFisico=true → reordena para J1=E1vsE2,E3vsE4...
  // sorteoFisico=false → mezcla aleatoriamente
  const insertarCalendario = async (gruposOrdenados, sorteoFisico = false) => {
    const { error: delErr } = await sb.from('h2h_partidos').delete().eq('federacion_id', federacion.id);
    if (delErr) { setMsg('Error al borrar: ' + delErr.message); return false; }

    const rows = [];
    let maxJornada = 0;
    Object.entries(gruposOrdenados).forEach(([key, equips]) => {
      if (equips.length < 2) return;
      const divId = key === '__' ? null : Number(key);
      const ordenados = sorteoFisico ? reorderParaSorteo(equips) : shuffle(equips);
      generarRR(ordenados).forEach((ronda, idx) => {
        const j = idx + 1;
        if (j > maxJornada) maxJornada = j;
        ronda.forEach(p => rows.push({
          federacion_id: federacion.id,
          division_id:   divId,
          jornada:       j,
          local_id:      p.local.id,
          visitante_id:  p.visitante.id,
        }));
      });
    });

    if (rows.length === 0) { setMsg('No hay equipos suficientes.'); return false; }

    const { error } = await sb.from('h2h_partidos').insert(rows);
    if (error) { setMsg('Error al insertar: ' + error.message); return false; }

    // Guardar jornadas base y limpiar vueltas extra (el calendario se rehace desde cero)
    await sb.from('federaciones').update({ h2h_jornadas_base: maxJornada }).eq('id', federacion.id);
    await sb.from('h2h_vueltas_extra').delete().eq('federacion_id', federacion.id);
    onFederacionUpdate({ ...federacion, h2h_jornadas_base: maxJornada });
    setVueltasExtra([]);

    setMsg(`¡Calendario generado! ${rows.length} partidos en ${maxJornada} jornadas.`);
    cargar();
    return true;
  };

  // ── Generar automático ──────────────────────────────────────
  const generarCalendario = async () => {
    if (!confirm('¿Generar nuevo calendario? Se eliminarán todos los partidos y resultados actuales.')) return;
    setGenerando(true); setMsg('');
    await insertarCalendario(grupos);
    setGenerando(false);
  };

  // ── Sorteo físico: iniciar ──────────────────────────────────
  const iniciarSorteoFisico = () => {
    const init = {};
    Object.entries(grupos).forEach(([k, equips]) => {
      init[k] = new Array(equips.length).fill('');
    });
    setAsignaciones(init);
    setModoSorteo(true);
    setMsg('');
  };

  // ── Sorteo físico: generar con asignaciones ─────────────────
  const generarDesdeSorteo = async () => {
    // Validar: todos los slots asignados y sin repetidos
    for (const [k, slots] of Object.entries(asignaciones)) {
      if (slots.some(s => !s)) { setMsg('Faltan equipos por asignar en alguna división.'); return; }
      if (new Set(slots).size !== slots.length) { setMsg('Hay equipos repetidos en alguna división.'); return; }
    }
    if (!confirm('¿Generar calendario con esta asignación? Se eliminarán los partidos actuales.')) return;
    setGenerando(true); setMsg('');

    // Construir grupos ordenados según asignación
    const gruposOrdenados = {};
    Object.entries(asignaciones).forEach(([k, slotIds]) => {
      gruposOrdenados[k] = slotIds
        .map(id => participantes.find(p => p.id === id))
        .filter(Boolean);
    });

    const ok = await insertarCalendario(gruposOrdenados, true);
    setGenerando(false);
    if (ok) setModoSorteo(false);
  };

  const setSlot = (divKey, slotIdx, val) =>
    setAsignaciones(prev => ({
      ...prev,
      [divKey]: prev[divKey].map((v, i) => i === slotIdx ? val : v),
    }));

  const guardarTodo = async () => {
    setGuardando(true);
    await Promise.all(partidos.map(m => {
      const r = resultados[m.id] || {};
      const gl = r.gl === '' ? null : (r.gl !== undefined ? Number(r.gl) : null);
      const gv = r.gv === '' ? null : (r.gv !== undefined ? Number(r.gv) : null);
      return sb.from('h2h_partidos').update({ pts_local: gl, pts_visitante: gv }).eq('id', m.id);
    }));
    setGuardando(false);
    publicar(federacion?.id, 'admin', 'Resultados de Liga H2H guardados', actorNombre);
    setMsg('Resultados guardados');
    setTimeout(() => setMsg(''), 2500);
    cargar();
  };

  const nomMap = Object.fromEntries(participantes.map(p => [p.id, p.nombre]));
  const jornadas = [...new Set(partidos.map(p => p.jornada))].sort((a, b) => a - b);
  const [copiadoJ, setCopiadoJ] = useState(null);

  const generarPlantillaH2H = (j) => {
    const { ptsLocal: ptsL } = getVueltaInfo(j, federacion?.h2h_jornadas_base, ptsLocalV1, ptsLocalV2, vueltasExtra);
    const ms = partidos.filter(p => p.jornada === j);
    const lineas = [`EN DIRECTO J${j}`];
    ms.forEach((m, i) => {
      lineas.push(`${i + 1}. ${nomMap[m.local_id] || '—'} 0 (${ptsL}) - 0 (0) ${nomMap[m.visitante_id] || '—'}`);
    });
    return lineas.join('\n');
  };

  const copiarPlantilla = (j) => {
    const texto = generarPlantillaH2H(j);
    navigator.clipboard.writeText(texto).catch(() => {});
    setCopiadoJ(j);
    setTimeout(() => setCopiadoJ(c => c === j ? null : c), 2000);
  };

  const Opcion = ({ label, desc, activo, onToggle }) => (
    <div style={{display:'flex', alignItems:'flex-start', gap:'1rem',
                 padding:'1rem 0', borderBottom:'1px solid var(--borde)'}}>
      <div style={{flex:1}}>
        <div style={{fontWeight:700, marginBottom:'.2rem'}}>{label}</div>
        <div style={{fontSize:'.85rem', color:'var(--texto2)'}}>{desc}</div>
      </div>
      <div style={{display:'flex', alignItems:'center', gap:'.6rem', flexShrink:0}}>
        <span style={{fontSize:'.85rem', fontWeight:600,
                      color: activo ? 'var(--verde)' : 'var(--texto2)'}}>
          {activo ? 'Activada' : 'Desactivada'}
        </span>
        <button className={activo ? 'btn-cancel' : 'btn-ok'} onClick={() => onToggle(!activo)}>
          {activo ? 'Desactivar' : 'Activar'}
        </button>
      </div>
    </div>
  );

  return (
    <div>
      <div className="card">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'.25rem'}}>
          <h2 style={{margin:0}}>Liga H2H</h2>
          {msg && <span style={{color: msg.startsWith('Error') || msg.startsWith('Faltan') || msg.startsWith('Hay') ? '#dc3545' : 'var(--verde)',
                                fontWeight:600, fontSize:'.88rem'}}>{msg}</span>}
        </div>

        <Opcion
          label="Liga H2H"
          desc="Activa la liga cabeza a cabeza para esta federación. Los equipos podrán ver el calendario y la clasificación H2H."
          activo={h2hOn}
          onToggle={toggleH2H}
        />

        {/* ── Criterios de desempate ── */}
        <div style={{padding:'1rem 0', borderBottom:'1px solid var(--borde)'}}>
          <div style={{fontWeight:700, marginBottom:'.25rem'}}>Criterios de desempate</div>
          <div style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'.75rem'}}>
            Orden de aplicación cuando dos o más equipos están igualados a puntos. El primero tiene mayor prioridad.
          </div>
          <div style={{display:'flex', flexDirection:'column', gap:'.4rem', marginBottom:'.75rem'}}>
            {desempateOrden.map((crit, i) => (
              <div key={crit} style={{display:'flex', alignItems:'center', gap:'.6rem'}}>
                <span style={{fontWeight:700, color:'var(--texto2)', minWidth:18,
                              textAlign:'right', fontSize:'.85rem'}}>{i + 1}.</span>
                <span style={{flex:1, fontSize:'.9rem'}}>{CRITERIOS_H2H[crit]}</span>
                <div style={{display:'flex', gap:'.25rem'}}>
                  <button onClick={() => moverCrit(i, -1)} disabled={i === 0}
                          style={{padding:'.18rem .42rem', borderRadius:6, fontSize:'.8rem',
                                  border:'1.5px solid var(--borde)', background:'var(--fondo)',
                                  cursor: i === 0 ? 'default' : 'pointer',
                                  opacity: i === 0 ? .3 : 1}}>▲</button>
                  <button onClick={() => moverCrit(i, 1)} disabled={i === desempateOrden.length - 1}
                          style={{padding:'.18rem .42rem', borderRadius:6, fontSize:'.8rem',
                                  border:'1.5px solid var(--borde)', background:'var(--fondo)',
                                  cursor: i === desempateOrden.length - 1 ? 'default' : 'pointer',
                                  opacity: i === desempateOrden.length - 1 ? .3 : 1}}>▼</button>
                </div>
              </div>
            ))}
          </div>
          <button className="btn-ok" onClick={guardarDesempate}>Guardar orden</button>
        </div>

        {/* ── Baremo de puntos ── */}
        <div style={{padding:'1rem 0', borderBottom:'1px solid var(--borde)'}}>
          <div style={{fontWeight:700, marginBottom:'.2rem'}}>Baremo de puntos fantasy → goles H2H</div>
          <div style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'.75rem'}}>
            Define cuántos goles obtiene un equipo según sus puntos fantasy. El último tramo aplica a todo lo que supere el máximo.
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{borderCollapse:'collapse', fontSize:'.87rem', width:'100%', maxWidth:380}}>
              <thead>
                <tr style={{borderBottom:'2px solid var(--borde)'}}>
                  <th style={{padding:'.3rem .5rem', textAlign:'center'}}>Pts mín</th>
                  <th style={{padding:'.3rem .5rem', textAlign:'center'}}>Pts máx</th>
                  <th style={{padding:'.3rem .5rem', textAlign:'center'}}>Goles</th>
                  <th style={{padding:'.3rem .5rem'}}></th>
                </tr>
              </thead>
              <tbody>
                {baremo.map(([min, max, g], i) => (
                  <tr key={i} style={{borderBottom:'1px solid var(--borde)'}}>
                    <td style={{padding:'.25rem .4rem'}}>
                      <input type="number" value={min} min={0}
                             onChange={e => setBaremo(b => b.map((r,j) => j===i ? [Number(e.target.value), r[1], r[2]] : r))}
                             style={{width:70, textAlign:'center', padding:'.2rem', border:'1.5px solid var(--borde)',
                                     borderRadius:6, fontSize:'.86rem', fontVariantNumeric:'tabular-nums'}} />
                    </td>
                    <td style={{padding:'.25rem .4rem'}}>
                      {i < baremo.length - 1
                        ? <input type="number" value={max} min={0}
                                 onChange={e => setBaremo(b => b.map((r,j) => j===i ? [r[0], Number(e.target.value), r[2]] : r))}
                                 style={{width:70, textAlign:'center', padding:'.2rem', border:'1.5px solid var(--borde)',
                                         borderRadius:6, fontSize:'.86rem', fontVariantNumeric:'tabular-nums'}} />
                        : <span style={{padding:'0 .5rem', color:'var(--texto2)', fontSize:'.82rem'}}>∞</span>
                      }
                    </td>
                    <td style={{padding:'.25rem .4rem'}}>
                      <input type="number" value={g} min={0}
                             onChange={e => setBaremo(b => b.map((r,j) => j===i ? [r[0], r[1], Number(e.target.value)] : r))}
                             style={{width:60, textAlign:'center', padding:'.2rem', border:'1.5px solid var(--borde)',
                                     borderRadius:6, fontSize:'.86rem', fontVariantNumeric:'tabular-nums'}} />
                    </td>
                    <td style={{padding:'.25rem .4rem'}}>
                      <button onClick={() => setBaremo(b => b.filter((_, j) => j !== i))}
                              style={{padding:'.15rem .4rem', border:'1.5px solid var(--borde)', borderRadius:5,
                                      background:'var(--fondo)', cursor:'pointer', fontSize:'.8rem', color:'#dc3545'}}>
                        ✕
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{display:'flex', gap:'.6rem', marginTop:'.6rem', flexWrap:'wrap', alignItems:'center'}}>
            <button onClick={() => setBaremo(b => [...b, [b[b.length-1]?.[1]+1 ?? 0, b[b.length-1]?.[1]+9 ?? 9, b[b.length-1]?.[2]+1 ?? 0]])}
                    style={{padding:'.3rem .7rem', border:'1.5px solid var(--borde)', borderRadius:6,
                            background:'var(--fondo)', cursor:'pointer', fontSize:'.84rem'}}>
              + Tramo
            </button>
            <button onClick={() => setBaremo(BAREMO_DEFAULT)}
                    style={{padding:'.3rem .7rem', border:'1.5px solid var(--borde)', borderRadius:6,
                            background:'var(--fondo)', cursor:'pointer', fontSize:'.84rem'}}>
              Restaurar por defecto
            </button>
            <button className="btn-ok" onClick={guardarBaremo}>Guardar baremo</button>
            {msgCfg && <span style={{fontSize:'.82rem', color:'var(--verde)', fontWeight:600}}>{msgCfg}</span>}
          </div>
        </div>

        {/* ── Ventaja local por vuelta ── */}
        <div style={{padding:'1rem 0', borderBottom:'1px solid var(--borde)'}}>
          <div style={{fontWeight:700, marginBottom:'.2rem'}}>Ventaja local (pts extra)</div>
          <div style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'.75rem'}}>
            Puntos que se suman al equipo local antes de aplicar el baremo. 0 = sin ventaja. Configurable por vuelta.
          </div>
          <div style={{display:'flex', gap:'1.5rem', flexWrap:'wrap', alignItems:'flex-end'}}>
            {[['Vuelta 1', ptsLocalV1, setPtsLocalV1], ['Vuelta 2', ptsLocalV2, setPtsLocalV2]].map(([label, val, setter]) => (
              <label key={label} style={{display:'flex', flexDirection:'column', gap:'.3rem', fontSize:'.87rem', fontWeight:600}}>
                {label}
                <input type="number" value={val} min={0}
                       onChange={e => setter(Number(e.target.value))}
                       style={{width:70, padding:'.3rem .5rem', border:'1.5px solid var(--borde)',
                               borderRadius:7, fontSize:'.95rem', textAlign:'center',
                               fontVariantNumeric:'tabular-nums'}} />
              </label>
            ))}
            <button className="btn-ok" onClick={guardarPtsLocal} style={{alignSelf:'flex-end'}}>Guardar</button>
          </div>
        </div>

        {/* ── Vueltas extra ── */}
        <div style={{padding:'1rem 0', borderBottom:'1px solid var(--borde)'}}>
          <div style={{fontWeight:700, marginBottom:'.2rem'}}>Vueltas extra</div>
          <div style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'.75rem'}}>
            Añade más vueltas al calendario copiando los enfrentamientos de la ida o la vuelta existente.
            Cada vuelta extra tiene su propia configuración de puntos de local.
          </div>

          {/* Lista de vueltas extra existentes */}
          {vueltasExtra.length > 0 && (
            <div style={{marginBottom:'1rem'}}>
              {vueltasExtra.map(ve => {
                const jornadasBase = federacion?.h2h_jornadas_base ?? 0;
                const porVuelta    = Math.round(jornadasBase / 2);
                const jFin         = ve.jornada_inicio + porVuelta - 1;
                return (
                  <div key={ve.id} style={{display:'flex', alignItems:'center', gap:'.75rem',
                                           padding:'.5rem .75rem', borderRadius:8, marginBottom:'.4rem',
                                           border:'1.5px solid var(--borde)', background:'var(--fondo)',
                                           flexWrap:'wrap'}}>
                    <span style={{fontWeight:700, minWidth:72}}>Vuelta {ve.vuelta_num}</span>
                    <span style={{fontSize:'.82rem', color:'var(--texto2)'}}>
                      Basada en vuelta {ve.basada_en} · J{ve.jornada_inicio}–J{jFin}
                    </span>
                    <label style={{display:'flex', alignItems:'center', gap:'.35rem', fontSize:'.84rem', marginLeft:'auto'}}>
                      Pts local:
                      <input type="number" min={0} defaultValue={ve.pts_local}
                             onBlur={e => actualizarPtsLocalExtra(ve, Number(e.target.value))}
                             style={{width:60, padding:'.2rem .4rem', border:'1.5px solid var(--borde)',
                                     borderRadius:6, fontSize:'.88rem', textAlign:'center'}} />
                    </label>
                    <button onClick={() => eliminarVueltaExtra(ve)}
                            style={{padding:'.2rem .55rem', borderRadius:6, border:'1.5px solid #dc3545',
                                    background:'#fff5f5', color:'#dc3545', cursor:'pointer', fontSize:'.82rem', fontWeight:600}}>
                      Eliminar
                    </button>
                  </div>
                );
              })}
            </div>
          )}

          {/* Formulario añadir vuelta extra */}
          {federacion?.h2h_jornadas_base
            ? (
              <div style={{display:'flex', alignItems:'center', gap:'1rem', flexWrap:'wrap'}}>
                <label style={{display:'flex', alignItems:'center', gap:'.4rem', fontSize:'.87rem', fontWeight:600}}>
                  Basada en:
                  <select value={nuevaBase} onChange={e => setNuevaBase(Number(e.target.value))}
                          style={{padding:'.3rem .6rem', borderRadius:7, border:'1.5px solid var(--borde)',
                                  fontSize:'.87rem', background:'var(--fondo)'}}>
                    <option value={1}>Vuelta 1 (ida)</option>
                    <option value={2}>Vuelta 2 (vuelta)</option>
                  </select>
                </label>
                <label style={{display:'flex', alignItems:'center', gap:'.4rem', fontSize:'.87rem', fontWeight:600}}>
                  Pts local:
                  <input type="number" min={0} value={nuevaPtsLocal}
                         onChange={e => setNuevaPtsLocal(Number(e.target.value))}
                         style={{width:65, padding:'.3rem .4rem', border:'1.5px solid var(--borde)',
                                 borderRadius:7, fontSize:'.88rem', textAlign:'center'}} />
                </label>
                <button className="btn-ok" onClick={añadirVueltaExtra}>
                  + Añadir vuelta {(vueltasExtra[vueltasExtra.length - 1]?.vuelta_num ?? 2) + 1}
                </button>
                {msgCfg && <span style={{fontSize:'.82rem', color:'var(--verde)', fontWeight:600}}>{msgCfg}</span>}
              </div>
            )
            : <div style={{fontSize:'.85rem', color:'var(--texto2)'}}>
                Genera el calendario base primero para poder añadir vueltas extra.
              </div>
          }
        </div>

        {/* ── Opciones de generación ── */}
        {!isModerador && !modoSorteo && (
          <div style={{padding:'1rem 0'}}>
            <div style={{fontWeight:700, marginBottom:'.3rem'}}>Generar calendario</div>
            <div style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'.75rem'}}>
              Calendario a doble vuelta por división. La segunda vuelta es simétrica a la primera (mismo rival, campo invertido).
              <strong style={{color:'#dc3545'}}> Se eliminarán los resultados existentes.</strong>
            </div>
            <div style={{display:'flex', gap:'.75rem', flexWrap:'wrap'}}>
              <button className="btn-ok" disabled={generando} onClick={generarCalendario}>
                {generando ? 'Generando…' : '⚙ Generar automático'}
              </button>
              <button onClick={iniciarSorteoFisico}
                      style={{padding:'.45rem 1rem', borderRadius:8, cursor:'pointer', fontWeight:600,
                              border:'1.5px solid var(--borde)', background:'var(--fondo)', fontSize:'.88rem'}}>
                🎲 Sorteo físico
              </button>
            </div>
          </div>
        )}

        {/* ── Panel de sorteo físico ── */}
        {!isModerador && modoSorteo && (
          <div style={{padding:'1rem 0'}}>
            <div style={{fontWeight:700, fontSize:'1rem', marginBottom:'.3rem'}}>🎲 Sorteo físico</div>
            <div style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'.6rem'}}>
              Asigna cada equipo al número de bola que ha sacado en el sorteo físico.
              La <strong>Jornada 1</strong> quedará según los pares que ves debajo de cada división.
            </div>

            {Object.entries(asignaciones).map(([divKey, slots]) => {
              const equipsDivision = grupos[divKey] || [];
              const divLabel = hasDivs && divKey !== '__' ? `División ${divKey}` : null;
              // Cruces de J1: (E1vsE2, E3vsE4, ...)
              const j1 = [];
              for (let i = 0; i < slots.length - 1; i += 2) j1.push(`Equipo ${i+1} vs Equipo ${i+2}`);
              const j1Str = j1.join(' · ');
              return (
                <div key={divKey} style={{marginBottom:'1.25rem'}}>
                  {divLabel && (
                    <div style={{fontWeight:700, fontSize:'.82rem', color:'var(--verde)',
                                 letterSpacing:'.05em', marginBottom:'.35rem'}}>
                      {divLabel.toUpperCase()}
                    </div>
                  )}
                  <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.5rem',
                               background:'var(--fondo2)', borderRadius:6, padding:'.3rem .6rem',
                               border:'1px solid var(--borde)'}}>
                    <strong>J1:</strong> {j1Str}
                  </div>
                  <div style={{display:'flex', flexDirection:'column', gap:'.4rem'}}>
                    {slots.map((val, idx) => {
                      const asignadosEnDiv = slots.filter((_, i) => i !== idx);
                      return (
                        <div key={idx} style={{display:'flex', alignItems:'center', gap:'.75rem'}}>
                          <span style={{fontWeight:700, fontSize:'.88rem', minWidth:72,
                                        color:'var(--texto2)'}}>
                            Equipo {idx + 1}
                          </span>
                          <select value={val}
                                  onChange={e => setSlot(divKey, idx, e.target.value)}
                                  style={{flex:1, padding:'.35rem .6rem', borderRadius:8,
                                          border:'1.5px solid var(--borde)', fontSize:'.88rem',
                                          background:'var(--fondo)', color:'var(--texto)'}}>
                            <option value="">Selecciona equipo…</option>
                            {equipsDivision.map(p => (
                              <option key={p.id} value={p.id}
                                      disabled={asignadosEnDiv.includes(p.id)}>
                                {p.nombre}
                              </option>
                            ))}
                          </select>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            <div style={{display:'flex', gap:'.75rem', marginTop:'.5rem', flexWrap:'wrap'}}>
              <button className="btn-ok" disabled={generando} onClick={generarDesdeSorteo}>
                {generando ? 'Generando…' : '✓ Generar calendario'}
              </button>
              <button className="btn-cancel" onClick={() => setModoSorteo(false)}>
                Cancelar
              </button>
            </div>
          </div>
        )}
      </div>

      {/* ── Resultados ── */}
      {jornadas.length > 0 && (
        <div className="card" style={{marginTop:'.75rem'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center',
                       marginBottom:'1rem', flexWrap:'wrap', gap:'.5rem'}}>
            <h2 style={{margin:0}}>Resultados</h2>
            <button className="btn-ok" disabled={guardando} onClick={guardarTodo}>
              {guardando ? 'Guardando…' : 'Guardar todo'}
            </button>
          </div>
          {jornadas.map(j => {
            const ms = partidos.filter(p => p.jornada === j);
            return (
              <div key={j} style={{marginBottom:'1.25rem'}}>
                <div style={{display:'flex', alignItems:'center', gap:'.6rem', marginBottom:'.4rem', flexWrap:'wrap'}}>
                  <span style={{fontWeight:700, fontSize:'.82rem', color:'var(--verde)',
                               letterSpacing:'.05em', minWidth:80}}>
                    JORNADA {j}
                  </span>
                  {/* Asignación de jornada fantasy */}
                  <label style={{display:'flex', alignItems:'center', gap:'.3rem', fontSize:'.78rem', color:'var(--texto2)'}}>
                    J. fantasy:
                    <select value={jornadaConfig[j] ?? ''}
                            onChange={e => setJornadaFantasy(j, e.target.value)}
                            style={{padding:'.15rem .35rem', borderRadius:6, border:'1.5px solid var(--borde)',
                                    fontSize:'.78rem', background:'var(--fondo)', color:'var(--texto)'}}>
                      <option value="">—</option>
                      {Array.from({length:38}, (_, i) => i+1).map(jf => (
                        <option key={jf} value={jf}>{jf}</option>
                      ))}
                    </select>
                  </label>
                  {/* Calcular desde fantasy */}
                  {jornadaConfig[j] && (
                    <button onClick={() => calcularDesdeFantasy(j)}
                            disabled={calculando === j}
                            style={{padding:'.18rem .55rem', borderRadius:6, fontSize:'.75rem',
                                    border:'1.5px solid #3b82f6', background: calculando===j ? '#eff6ff' : '#eff6ff',
                                    color:'#1d4ed8', cursor:'pointer', fontWeight:600}}>
                      {calculando === j ? 'Calculando…' : '⚡ Calcular'}
                    </button>
                  )}
                  <button onClick={() => copiarPlantilla(j)}
                          style={{padding:'.18rem .55rem', borderRadius:6, fontSize:'.75rem',
                                  border:'1.5px solid var(--borde)', background:'var(--fondo)',
                                  cursor:'pointer', fontWeight:600}}>
                    {copiadoJ === j ? '¡Copiado!' : 'Copiar plantilla'}
                  </button>
                </div>
                {ms.map(m => {
                  const r = resultados[m.id] || {};
                  return (
                    <div key={m.id}
                         style={{display:'grid', gridTemplateColumns:'1fr 48px 1rem 48px 1fr',
                                 alignItems:'center', gap:'.4rem',
                                 padding:'.4rem .6rem', borderRadius:8,
                                 background:'var(--gris)', marginBottom:'.3rem', fontSize:'.86rem'}}>
                      <span style={{textAlign:'right', fontWeight:600, overflow:'hidden',
                                    textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {nomMap[m.local_id] || '—'}
                      </span>
                      <input type="number" min={0} value={r.gl ?? ''}
                             onChange={e => setResultados(rv => ({ ...rv, [m.id]: { ...rv[m.id], gl: e.target.value } }))}
                             style={{width:'100%', textAlign:'center', padding:'.25rem',
                                     borderRadius:6, border:'1.5px solid var(--borde)', fontSize:'.88rem'}} />
                      <span style={{textAlign:'center', color:'var(--texto2)', fontWeight:700}}>—</span>
                      <input type="number" min={0} value={r.gv ?? ''}
                             onChange={e => setResultados(rv => ({ ...rv, [m.id]: { ...rv[m.id], gv: e.target.value } }))}
                             style={{width:'100%', textAlign:'center', padding:'.25rem',
                                     borderRadius:6, border:'1.5px solid var(--borde)', fontSize:'.88rem'}} />
                      <span style={{fontWeight:600, overflow:'hidden',
                                    textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {nomMap[m.visitante_id] || '—'}
                      </span>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
    </div>
