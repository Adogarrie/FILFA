    const textoJug = posicion === 'POR' ? `Portería ${equipoReal}` : `${nombreJug} (${equipoReal})`;
    publicar(
      federacion?.id,
      'venta',
      `${equipo?.nombre} libera a ${textoJug} al mercado — precio de compra: ${fmt(valor)}`,
      actorNombre
    );
    onParticipantesChange?.();
    cargar();
    flash('Jugador liberado');
  };

  // Modificar puntos de una jornada
  const guardarPts = async () => {
    if (ptsEdit === '') return;
    const pts = Number(ptsEdit);
    await sb.from('clasificacion').upsert({ participante_id: selId, jornada: jornadaEdit, puntos_jornada: pts }, { onConflict: 'participante_id,jornada' });
    cargar();
    flash(`Jornada ${jornadaEdit} → ${pts} pts guardado`);
  };

  // Eliminar fila de jornada
  const borrarPts = async (jornada) => {
    await sb.from('clasificacion').delete().eq('participante_id', selId).eq('jornada', jornada);
    cargar();
  };

  // Añadir penalización
  const aplicarPenalizacion = async () => {
    const cant = Number(penCantidad);
    if (!cant) { flash('Introduce una cantidad válida'); return; }
    if (penTipo === 'presupuesto') {
      const nuevo = (presupuesto || 0) - cant;
      await sb.from('participantes').update({ presupuesto: nuevo }).eq('id', selId);
      onParticipantesChange?.();
      cargar();
      publicar(federacion?.id, 'penalizacion', `${equipo?.nombre} recibe penalización de presupuesto: -${fmt(cant)}${penMotivo ? ` (${penMotivo})` : ''}`, actorNombre);
      flash(`Penalización de ${fmt(cant)} aplicada al presupuesto`);
    } else {
      const jornadaActual = clas.length > 0 ? Math.max(...clas.map(r => r.jornada)) : 1;
      const actual = clas.find(r => r.jornada === jornadaActual)?.puntos_jornada || 0;
      await sb.from('clasificacion').upsert({ participante_id: selId, jornada: jornadaActual, puntos_jornada: actual - cant }, { onConflict: 'participante_id,jornada' });
      cargar();
      publicar(federacion?.id, 'penalizacion', `${equipo?.nombre} recibe penalización de puntos: -${cant} pts${penMotivo ? ` (${penMotivo})` : ''}`, actorNombre);
      flash(`Penalización de ${cant} pts aplicada en jornada ${jornadaActual}`);
    }
    setPenCantidad(''); setPenMotivo('');
  };

  const equipo = participantes.find(p => p.id === selId);
  const totalPts = clas.reduce((s, r) => s + (r.puntos_jornada || 0), 0);

  return (
    <div>
      <div className="card">
        <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'center', marginBottom:'1rem'}}>
          <label style={{fontWeight:600}}>Equipo:</label>
          <select value={selId} onChange={e => setSelId(e.target.value)}
                  style={{padding:'.35rem .6rem', borderRadius:8, border:'1.5px solid var(--borde)'}}>
            {participantes.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
          {divisiones.length > 0 && (
            <div style={{display:'flex', gap:'.4rem', alignItems:'center'}}>
              <label style={{fontWeight:600, fontSize:'.9rem'}}>División:</label>
              <select value={equipo?.division_id || ''}
                      onChange={e => cambiarDivision(e.target.value)}
                      style={{padding:'.3rem .5rem', borderRadius:8, border:'1.5px solid var(--borde)', fontSize:'.85rem'}}>
                {divisiones.map(d => <option key={d.id} value={d.id}>{d.nombre}</option>)}
              </select>
            </div>
          )}
          {presupuesto !== null && (
            <span style={{fontSize:'.9rem', color:'var(--verde)', fontWeight:700}}>
              Presupuesto: {fmt(presupuesto)}
            </span>
          )}
          {clas.length > 0 && (
            <span style={{fontSize:'.9rem', fontWeight:700}}>
              Pts totales: {totalPts}
            </span>
          )}
        </div>
        <div className="tabs" style={{marginBottom:0}}>
          {[['plantilla','Plantilla'],['puntos','Puntos por jornada'],['penalizaciones','Penalizaciones']].map(([k,l]) => (
            <button key={k} className={`tab ${subtab===k?'active':''}`} onClick={() => setSubtab(k)}>{l}</button>
          ))}
        </div>
      </div>

      {msg && <div style={{background:'#d1e7dd', color:'#0a3622', padding:'.5rem 1rem', borderRadius:8, marginBottom:'.5rem', fontSize:'.85rem'}}>{msg}</div>}

      {subtab === 'plantilla' && (
        <div className="card">
          <h3 style={{marginBottom:'1rem'}}>Plantilla — {equipo?.nombre}</h3>
          {plantilla === null ? <Spinner /> : plantilla.length === 0
            ? <div className="empty">Plantilla vacía.</div>
            : <>
                <table>
                  <thead><tr><th>Jugador</th><th>Pos</th><th>Equipo real</th><th style={{textAlign:'right'}}>Precio compra</th><th></th></tr></thead>
                  <tbody>
                    {plantilla.map(r => (
                      <tr key={r.id}>
                        <td style={{fontWeight:600}}>{r.jugadores?.posicion === 'POR' ? r.jugadores?.equipo : r.jugadores?.nombre}</td>
                        <td><span className={`badge ${r.jugadores?.posicion}`}>{r.jugadores?.posicion}</span></td>
                        <td style={{color:'var(--texto2)'}}>{r.jugadores?.posicion !== 'POR' ? r.jugadores?.equipo : ''}</td>
                        <td style={{textAlign:'right'}}>
                          <input type="number" value={editPrecios[r.id] ?? ''} min="0"
                                 onChange={e => setEditPrecios(p => ({...p, [r.id]: e.target.value}))}
                                 style={{width:100, padding:'.25rem .4rem', borderRadius:6, border:'1.5px solid var(--borde)', textAlign:'right'}} />
                        </td>
                        <td>
                          <button onClick={() => liberarJugador(r.id, r.jugadores?.posicion === 'POR' ? r.jugadores?.equipo : r.jugadores?.nombre)}
                                  style={{padding:'.25rem .6rem', borderRadius:6, border:'1.5px solid #dc3545', background:'#fff', color:'#dc3545', cursor:'pointer', fontSize:'.8rem'}}>
                            Liberar
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <button className="btn-ok" style={{marginTop:'1rem'}} onClick={guardarPrecios}>Guardar precios</button>
              </>
          }
        </div>
      )}

      {subtab === 'puntos' && (
        <div className="card">
          <h3 style={{marginBottom:'1rem'}}>Puntos por jornada — {equipo?.nombre}</h3>
          <div style={{display:'flex', gap:'1rem', alignItems:'center', marginBottom:'1.25rem', flexWrap:'wrap'}}>
            <div style={{display:'flex', gap:'.5rem', alignItems:'center'}}>
              <label>Jornada:</label>
              <select value={jornadaEdit} onChange={e => setJornadaEdit(Number(e.target.value))}
                      style={{padding:'.3rem .5rem', borderRadius:8, border:'1.5px solid var(--borde)'}}>
                {Array.from({length:38},(_,i)=>i+1).map(j => <option key={j} value={j}>J{j}</option>)}
              </select>
            </div>
            <div style={{display:'flex', gap:'.5rem', alignItems:'center'}}>
              <label>Pts:</label>
              <input type="number" value={ptsEdit} onChange={e => setPtsEdit(e.target.value)}
                     style={{width:80, padding:'.3rem .5rem', borderRadius:8, border:'1.5px solid var(--borde)', textAlign:'right'}} />
            </div>
            <button className="btn-ok" onClick={guardarPts}>Guardar</button>
          </div>
          {clas.length === 0
            ? <div className="empty">Sin datos de clasificación.</div>
            : <table>
                <thead><tr><th>Jornada</th><th style={{textAlign:'right'}}>Pts</th><th></th></tr></thead>
                <tbody>
                  {clas.map(r => (
                    <tr key={r.jornada}>
                      <td>J{r.jornada}</td>
                      <td style={{textAlign:'right', fontWeight:600}}>{r.puntos_jornada}</td>
                      <td>
                        <button onClick={() => borrarPts(r.jornada)}
                                style={{padding:'.2rem .5rem', borderRadius:6, border:'1.5px solid #dc3545', background:'#fff', color:'#dc3545', cursor:'pointer', fontSize:'.8rem'}}>
                          Borrar
                        </button>
                      </td>
                    </tr>
                  ))}
                  <tr style={{fontWeight:700, borderTop:'2px solid var(--borde)'}}>
                    <td>Total</td>
                    <td style={{textAlign:'right'}}>{totalPts}</td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
          }
        </div>
      )}

      {subtab === 'penalizaciones' && (
        <div className="card">
          <h3 style={{marginBottom:'1rem'}}>Añadir penalización — {equipo?.nombre}</h3>
          <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'flex-end'}}>
            <div>
              <label style={{fontSize:'.82rem', display:'block', marginBottom:'.3rem'}}>Tipo</label>
              <select value={penTipo} onChange={e => setPenTipo(e.target.value)}
                      style={{padding:'.35rem .6rem', borderRadius:8, border:'1.5px solid var(--borde)'}}>
                <option value="presupuesto">Presupuesto</option>
                <option value="puntos">Puntos</option>
              </select>
            </div>
            <div>
              <label style={{fontSize:'.82rem', display:'block', marginBottom:'.3rem'}}>
                Cantidad ({penTipo === 'presupuesto' ? '€' : 'pts'})
              </label>
              <input type="number" min="0" value={penCantidad} onChange={e => setPenCantidad(e.target.value)}
                     style={{width:100, padding:'.35rem .5rem', borderRadius:8, border:'1.5px solid var(--borde)'}} />
            </div>
            <div style={{flex:1, minWidth:160}}>
              <label style={{fontSize:'.82rem', display:'block', marginBottom:'.3rem'}}>Motivo (opcional)</label>
              <input value={penMotivo} onChange={e => setPenMotivo(e.target.value)}
                     style={{width:'100%', padding:'.35rem .5rem', borderRadius:8, border:'1.5px solid var(--borde)'}} />
            </div>
            <button className="btn-ok" style={{background:'#dc3545'}} onClick={aplicarPenalizacion}>
              Aplicar penalización
            </button>
          </div>
          <p style={{fontSize:'.8rem', color:'var(--texto2)', marginTop:'1rem'}}>
            La penalización de presupuesto reduce directamente el presupuesto disponible del equipo.<br/>
            La penalización de puntos se descuenta de la última jornada con datos.
          </p>
        </div>
      )}
    </div>
  );
}

// ── OFERTAS ENTRE EQUIPOS ──────────────────────────────────────
function Ofertas({ miParticipanteId, participantes, federacion, isAdmin, onBadgeChange, onPujaChange }) {
  const [subtab, setSubtab]         = useState('recibidas');
  const [recibidas, setRecibidas]   = useState(null);
  const [enviadas, setEnviadas]     = useState(null);
  const [misPujas, setMisPujas]     = useState(null);
  const [rechazModal, setRechazModal] = useState(null);
  const [msgRechazo, setMsgRechazo] = useState('');
  const [editModal, setEditModal]   = useState(null);
  const [editCant, setEditCant]     = useState('');
  const [editPuja, setEditPuja]     = useState(null);
  const [editPujaCant, setEditPujaCant] = useState('');
  const [procesando, setProcesando] = useState(null);
  const [msg, setMsg]               = useState('');

  const cargar = async () => {
    if (!sb || !miParticipanteId) return;
    const [{ data: rec }, { data: env }, { data: pujas }] = await Promise.all([
      sb.from('ofertas_jugadores')
        .select('id, cantidad, estado, mensaje, leida, created_at, jugadores(id,nombre,equipo,posicion,valor_mercado), ofertante:ofertante_id(id,nombre,presupuesto)')
        .eq('propietario_id', miParticipanteId)
        .order('created_at', { ascending: false }),
      sb.from('ofertas_jugadores')
        .select('id, cantidad, estado, mensaje, leida, created_at, jugadores(id,nombre,equipo,posicion,valor_mercado), propietario:propietario_id(id,nombre)')
        .eq('ofertante_id', miParticipanteId)
        .order('created_at', { ascending: false }),
      sb.from('pujas')
        .select('id, jugador_id, cantidad, created_at, jugadores(id,nombre,equipo,posicion,valor_mercado)')
        .eq('participante_id', miParticipanteId)
        .eq('resuelta', false)
        .order('created_at', { ascending: false }),
    ]);
    setRecibidas(rec || []);
    setEnviadas(env || []);
    setMisPujas(pujas || []);
    // Marcar recibidas pendientes como leídas
    const sinLeer = (rec || []).filter(o => !o.leida && o.estado === 'pendiente').map(o => o.id);
    if (sinLeer.length > 0) {
      await sb.from('ofertas_jugadores').update({ leida: true }).in('id', sinLeer);
      onBadgeChange && onBadgeChange();
    }
  };

  useEffect(() => { cargar(); }, [miParticipanteId]);

  const ERR_MSGS = {
    presupuesto_insuficiente: 'El equipo ofertante no tiene presupuesto suficiente.',
    sin_permiso:              'No tienes permiso para aceptar esta oferta.',
    oferta_no_pendiente:      'Esta oferta ya no está pendiente.',
    oferta_no_encontrada:     'Oferta no encontrada.',
  };

  const aceptar = async (oferta) => {
    setProcesando(oferta.id); setMsg('');
    const { data, error } = await sb.rpc('aceptar_oferta', { p_oferta_id: oferta.id });
    if (error || !data?.ok) {
      setMsg(ERR_MSGS[data?.error] || error?.message || 'Error al aceptar la oferta.');
      setProcesando(null);
      return;
    }
    setProcesando(null);
    cargar();
    onBadgeChange && onBadgeChange();
  };

  const rechazar = async () => {
    if (!rechazModal) return;
    setProcesando(rechazModal.id);
    await sb.from('ofertas_jugadores')
      .update({ estado: 'rechazada', mensaje: msgRechazo.trim() || null })
      .eq('id', rechazModal.id);
    setProcesando(null);
    setRechazModal(null); setMsgRechazo('');
    cargar();
    onBadgeChange && onBadgeChange();
  };

  const editar = async () => {
    if (!editModal) return;
    const cant = Number(editCant);
    if (!cant || cant <= 0) { setMsg('Introduce una cantidad válida.'); return; }
    setProcesando(editModal.id);
    await sb.from('ofertas_jugadores')
      .update({ cantidad: cant, leida: false })
      .eq('id', editModal.id);
    setProcesando(null);
    setEditModal(null);
    cargar();
  };

  const retirar = async (id) => {
    if (!window.confirm('¿Retirar esta oferta?')) return;
    await sb.from('ofertas_jugadores').delete().eq('id', id);
    cargar();
  };

  const cancelarPuja = async (pujaId) => {
    if (!window.confirm('¿Retirar esta puja?')) return;
    await sb.from('pujas').delete().eq('id', pujaId);
    cargar();
    onPujaChange && onPujaChange();
  };

  const guardarEditPuja = async () => {
    if (!editPuja) return;
    const cant = Number(editPujaCant);
    const minimo = editPuja.jugadores?.valor_mercado || 0;
    if (!cant || cant < minimo) { setMsg(`La puja mínima es ${fmt(minimo)}.`); return; }
    await sb.from('pujas').update({ cantidad: cant }).eq('id', editPuja.id);
    setEditPuja(null);
    cargar();
    onPujaChange && onPujaChange();
  };

  const fmtFecha = ts => new Date(ts).toLocaleDateString('es-ES', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });

  const ESTADO_BADGE = {
    pendiente:  { label: 'Pendiente', color: '#fd7e14' },
    aceptada:   { label: 'Aceptada',  color: '#198754' },
    rechazada:  { label: 'Rechazada', color: '#dc3545' },
  };

  const renderOferta = (o, esRecibida) => {
    const jug      = o.jugadores || {};
    const nomJug   = jug.posicion === 'POR' ? `Portería ${jug.equipo}` : jug.nombre;
    const contraparte = esRecibida ? o.ofertante : o.propietario;
    const est      = ESTADO_BADGE[o.estado] || {};
    return (
      <div key={o.id} style={{padding:'.8rem 1rem', borderRadius:10, background:'var(--gris)',
                               border: o.estado==='pendiente'&&esRecibida ? '1.5px solid #fd7e14':'none',
                               display:'flex', flexDirection:'column', gap:'.5rem'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:'.5rem'}}>
          <div>
            <div style={{fontWeight:700, fontSize:'.95rem', display:'flex', alignItems:'center', gap:6}}>
              <Escudo equipo={jug.equipo} size={ESCUDO_SIZE}/>
              {nomJug}
              <span className={`badge ${jug.posicion}`} style={{marginLeft:4}}>{jug.posicion}</span>
            </div>
            <div style={{fontSize:'.82rem', color:'var(--texto2)', marginTop:'.2rem'}}>
              {esRecibida ? 'Oferta de' : 'Oferta a'}: <strong>{contraparte?.nombre || '—'}</strong>
              {' · '}{fmtFecha(o.created_at)}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontWeight:800, fontSize:'1.1rem'}}>{fmt(o.cantidad)}</div>
            <span style={{fontSize:'.75rem', fontWeight:700, color: est.color}}>{est.label}</span>
          </div>
        </div>

        {o.mensaje && (
          <div style={{background:'#fff3cd', border:'1px solid #ffc107', borderRadius:7,
                       padding:'.45rem .75rem', fontSize:'.85rem', color:'#664d03'}}>
            <strong>Mensaje:</strong> {o.mensaje}
          </div>
        )}

        {esRecibida && o.estado === 'pendiente' && (
          <div style={{display:'flex', gap:'.6rem', flexWrap:'wrap'}}>
            <button onClick={() => aceptar(o)} disabled={procesando === o.id}
                    style={{background:'#198754', color:'#fff', border:'none', padding:'.35rem .9rem',
                            borderRadius:7, cursor:'pointer', fontWeight:600, fontSize:'.85rem',
                            opacity: procesando===o.id?.5:1}}>
              {procesando === o.id ? '…' : 'Aceptar'}
            </button>
            <button onClick={() => { setRechazModal(o); setMsgRechazo(''); }}
                    style={{background:'#dc3545', color:'#fff', border:'none', padding:'.35rem .9rem',
                            borderRadius:7, cursor:'pointer', fontWeight:600, fontSize:'.85rem'}}>
              Rechazar
            </button>
          </div>
        )}
        {!esRecibida && o.estado === 'pendiente' && (
          <div style={{display:'flex', gap:'.6rem', flexWrap:'wrap'}}>
            <button onClick={() => { setEditModal(o); setEditCant(String(o.cantidad)); setMsg(''); }}
                    style={{background:'#0d6efd', color:'#fff', border:'none', padding:'.35rem .9rem',
                            borderRadius:7, cursor:'pointer', fontWeight:600, fontSize:'.85rem'}}>
              Editar importe
            </button>
            <button onClick={() => retirar(o.id)} disabled={procesando === o.id}
                    style={{background:'#6c757d', color:'#fff', border:'none', padding:'.35rem .9rem',
                            borderRadius:7, cursor:'pointer', fontWeight:600, fontSize:'.85rem'}}>
              Retirar
            </button>
          </div>
        )}
      </div>
    );
  };

  const pendientes = (recibidas || []).filter(o => o.estado === 'pendiente');
  const resueltas  = (recibidas || []).filter(o => o.estado !== 'pendiente');

  return (
    <div>
      <div className="tabs">
        <button className={`tab ${subtab==='recibidas'?'active':''}`} onClick={() => setSubtab('recibidas')}>
          Recibidas {pendientes.length > 0 && <span style={{background:'#dc3545',color:'#fff',borderRadius:'50%',padding:'0 5px',fontSize:'.75rem',marginLeft:4}}>{pendientes.length}</span>}
        </button>
        <button className={`tab ${subtab==='enviadas'?'active':''}`} onClick={() => setSubtab('enviadas')}>Enviadas</button>
        <button className={`tab ${subtab==='pujas'?'active':''}`} onClick={() => setSubtab('pujas')}>
          Pujas del mercado {misPujas?.length > 0 && <span style={{background:'var(--verde)',color:'#fff',borderRadius:'50%',padding:'0 5px',fontSize:'.75rem',marginLeft:4}}>{misPujas.length}</span>}
        </button>
      </div>

      {msg && <div style={{background:'#f8d7da', color:'#58151c', padding:'.6rem 1rem', borderRadius:8, marginBottom:'.75rem', fontSize:'.88rem'}}>{msg}</div>}

      {subtab === 'recibidas' && (
        <>
          {recibidas === null ? <Spinner /> : recibidas.length === 0
            ? <div className="card"><div className="empty">No has recibido ofertas.</div></div>
            : <>
                {pendientes.length > 0 && (
                  <div className="card">
                    <h2 style={{marginBottom:'.75rem'}}>Pendientes de respuesta</h2>
                    <div style={{display:'flex', flexDirection:'column', gap:'.6rem'}}>
                      {pendientes.map(o => renderOferta(o, true))}
                    </div>
                  </div>
                )}
                {resueltas.length > 0 && (
                  <div className="card">
                    <h2 style={{marginBottom:'.75rem'}}>Historial</h2>
                    <div style={{display:'flex', flexDirection:'column', gap:'.6rem'}}>
                      {resueltas.map(o => renderOferta(o, true))}
                    </div>
                  </div>
                )}
              </>
          }
        </>
      )}

      {subtab === 'enviadas' && (
        <div className="card">
          {enviadas === null ? <Spinner /> : enviadas.length === 0
            ? <div className="empty">No has enviado ofertas.</div>
            : <div style={{display:'flex', flexDirection:'column', gap:'.6rem'}}>
                {enviadas.map(o => renderOferta(o, false))}
              </div>
          }
        </div>
      )}

      {subtab === 'pujas' && (
        <div className="card">
          <h2 style={{marginBottom:'.75rem'}}>Mis pujas activas</h2>
          {misPujas === null ? <Spinner /> : misPujas.length === 0
            ? <div className="empty">No tienes pujas activas en el mercado.</div>
            : <div style={{display:'flex', flexDirection:'column', gap:'.6rem'}}>
                {misPujas.map(p => {
                  const jug = p.jugadores || {};
                  const nom = jug.posicion === 'POR' ? `Portería ${jug.equipo}` : jug.nombre;
                  return (
                    <div key={p.id} style={{padding:'.8rem 1rem', borderRadius:10,
                                            background:'var(--gris)', display:'flex',
                                            flexDirection:'column', gap:'.5rem'}}>
                      <div style={{display:'flex', justifyContent:'space-between',
                                   alignItems:'flex-start', flexWrap:'wrap', gap:'.5rem'}}>
                        <div>
                          <div style={{fontWeight:700, fontSize:'.95rem', display:'flex',
                                       alignItems:'center', gap:6}}>
                            <Escudo equipo={jug.equipo} size={ESCUDO_SIZE}/>
                            {nom}
                            <span className={`badge ${jug.posicion}`} style={{marginLeft:4}}>{jug.posicion}</span>
                          </div>
                          <div style={{fontSize:'.82rem', color:'var(--texto2)', marginTop:'.2rem'}}>
                            Valor de mercado: {fmt(jug.valor_mercado || 0)}
                            {' · '}{fmtFecha(p.created_at)}
                          </div>
                        </div>
                        <div style={{textAlign:'right'}}>
                          <div style={{fontWeight:800, fontSize:'1.1rem'}}>{fmt(p.cantidad)}</div>
                          <div style={{fontSize:'.75rem', color: p.cantidad > (jug.valor_mercado||0) ? '#198754' : 'var(--texto2)'}}>
                            {p.cantidad > (jug.valor_mercado||0)
                              ? `+${fmt(p.cantidad - (jug.valor_mercado||0))} sobre valor`
                              : 'Al valor de mercado'}
                          </div>
                        </div>
                      </div>
                      <div style={{display:'flex', gap:'.6rem', flexWrap:'wrap'}}>
                        <button onClick={() => { setEditPuja(p); setEditPujaCant(String(p.cantidad)); setMsg(''); }}
                                style={{background:'#0d6efd', color:'#fff', border:'none',
                                        padding:'.35rem .9rem', borderRadius:7,
                                        cursor:'pointer', fontWeight:600, fontSize:'.85rem'}}>
                          Editar puja
                        </button>
                        <button onClick={() => cancelarPuja(p.id)}
                                style={{background:'#6c757d', color:'#fff', border:'none',
                                        padding:'.35rem .9rem', borderRadius:7,
                                        cursor:'pointer', fontWeight:600, fontSize:'.85rem'}}>
                          Retirar puja
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
          }
        </div>
      )}

      {/* ── Modal editar puja ── */}
      {editPuja && (
        <div className="overlay" onClick={() => setEditPuja(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Editar puja</h3>
            <p style={{fontSize:'.88rem', color:'var(--texto2)', marginBottom:'1rem'}}>
              Modifica tu puja por <strong>
                {editPuja.jugadores?.posicion === 'POR'
                  ? `Portería ${editPuja.jugadores?.equipo}`
                  : editPuja.jugadores?.nombre || 'el jugador'}
              </strong>.
              Mínimo: <strong>{fmt(editPuja.jugadores?.valor_mercado || 0)}</strong>.
            </p>
            <div className="campo">
              <label>Nueva puja (€)</label>
              <input type="number" value={editPujaCant}
                     onChange={e => setEditPujaCant(e.target.value)}
                     min={editPuja.jugadores?.valor_mercado || 0} step="100000" autoFocus
                     style={{width:'100%', padding:'.5rem .7rem', borderRadius:8,
                             border:'1.5px solid var(--borde)', fontSize:'.9rem',
                             boxSizing:'border-box'}} />
            </div>
            {msg && <div style={{color:'#dc3545', fontSize:'.85rem', marginTop:'.3rem'}}>{msg}</div>}
            <div style={{display:'flex', gap:'.75rem', marginTop:'.75rem'}}>
              <button className="btn-cancel" onClick={() => setEditPuja(null)}>Cancelar</button>
              <button onClick={guardarEditPuja}
                      style={{background:'#0d6efd', color:'#fff', border:'none',
                              padding:'.45rem 1.1rem', borderRadius:8,
                              cursor:'pointer', fontWeight:700, fontSize:'.9rem'}}>
                Guardar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Modal rechazo ── */}
      {rechazModal && (
        <div className="overlay" onClick={() => setRechazModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Rechazar oferta</h3>
            <p style={{fontSize:'.88rem', color:'var(--texto2)', marginBottom:'1rem'}}>
              Puedes enviar un mensaje al equipo ofertante explicando el motivo o indicando el precio que pides.
            </p>
            <div className="campo">
              <label>Mensaje (opcional)</label>
              <textarea value={msgRechazo} onChange={e => setMsgRechazo(e.target.value)}
                        rows={3} placeholder="Ej: El jugador no está a la venta / Pido mínimo 8.000.000 €"
                        style={{width:'100%', padding:'.5rem .7rem', borderRadius:8,
                                border:'1.5px solid var(--borde)', fontSize:'.9rem',
                                resize:'vertical', fontFamily:'inherit', boxSizing:'border-box'}} />
            </div>
            <div style={{display:'flex', gap:'.75rem', marginTop:'.75rem'}}>
              <button className="btn-cancel" onClick={() => setRechazModal(null)}>Cancelar</button>
              <button onClick={rechazar} disabled={procesando === rechazModal?.id}
                      style={{background:'#dc3545', color:'#fff', border:'none', padding:'.45rem 1.1rem',
                              borderRadius:8, cursor:'pointer', fontWeight:700, fontSize:'.9rem'}}>
                {procesando === rechazModal?.id ? 'Enviando…' : 'Rechazar oferta'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Modal editar importe ── */}
      {editModal && (
        <div className="overlay" onClick={() => setEditModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Editar oferta</h3>
            <p style={{fontSize:'.88rem', color:'var(--texto2)', marginBottom:'1rem'}}>
              Cambia el importe de tu oferta por <strong>
                {editModal.jugadores?.posicion === 'POR'
                  ? `Portería ${editModal.jugadores?.equipo}`
                  : editModal.jugadores?.nombre || 'el jugador'}
              </strong>.
            </p>
            <div className="campo">
              <label>Nuevo importe (€)</label>
              <input type="number" value={editCant} onChange={e => setEditCant(e.target.value)}
                     min={1} autoFocus
                     style={{width:'100%', padding:'.5rem .7rem', borderRadius:8,
                             border:'1.5px solid var(--borde)', fontSize:'.9rem', boxSizing:'border-box'}} />
            </div>
            {msg && <div style={{color:'#dc3545', fontSize:'.85rem', marginTop:'.3rem'}}>{msg}</div>}
            <div style={{display:'flex', gap:'.75rem', marginTop:'.75rem'}}>
              <button className="btn-cancel" onClick={() => setEditModal(null)}>Cancelar</button>
              <button onClick={editar} disabled={procesando === editModal?.id}
                      style={{background:'#0d6efd', color:'#fff', border:'none', padding:'.45rem 1.1rem',
                              borderRadius:8, cursor:'pointer', fontWeight:700, fontSize:'.9rem'}}>
                {procesando === editModal?.id ? 'Guardando…' : 'Guardar cambios'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ADMIN JUGADORES — añadir / borrar jugadores ────────────────
function AdminJugadores({ participantes, federacion, actorNombre }) {
  const POSICIONES = ['POR', 'DEF', 'MED', 'DEL'];

  // ── Equipos reales conocidos (del mapa de escudos + los de la BD)
  const EQUIPOS_CONOCIDOS = [
    'FC Barcelona','Real Madrid CF','Atlético de Madrid','Athletic Club',
    'Villarreal CF','Real Sociedad','Real Betis','Sevilla FC','Valencia CF',
    'RC Celta de Vigo','CA Osasuna','Getafe CF','Rayo Vallecano','RCD Espanyol',
    'Deportivo Alavés','Málaga CF','Real Zaragoza','CD Tenerife','SD Huesca',
    'Elche CF','Levante UD','Granada CF','RC Deportivo de La Coruña',
    'Burgos CF','Racing de Santander','SD Ponferradina','FC Andorra',
    'CD Castellón','AD Alcorcón',
  ].sort();

  const vacioForm = { nombre: '', equipo: '', posicion: 'DEF', valor: '', destino: 'mercado', participante_id: '' };
  const [form, setForm]         = useState(vacioForm);
  const [guardando, setGuardando] = useState(false);
  const [msg, setMsg]           = useState('');

  // Lista de jugadores para borrar
  const [jugadores, setJugadores]   = useState(null);
  const [filtroNom, setFiltroNom]   = useState('');
  const [filtroEq, setFiltroEq]     = useState('');
  const [borrando, setBorrando]     = useState(null);

  const cargarJugadores = async () => {
    const { data } = await sb.from('jugadores').select('id, nombre, equipo, posicion, valor_mercado, lesionado').order('equipo').order('nombre');
    setJugadores(data || []);
  };

  const toggleLesionado = async (j) => {
    const nuevoEstado = !j.lesionado;
    const { error } = await sb.from('jugadores').update({ lesionado: nuevoEstado }).eq('id', j.id);
    if (error) { alert('Error: ' + error.message); return; }
    const nomJug = j.posicion === 'POR' ? `Portería ${j.equipo}` : j.nombre;
    publicar(federacion?.id, 'admin', `${nomJug} marcado como ${nuevoEstado ? 'lesionado' : 'disponible'}`, actorNombre);
    setJugadores(prev => prev.map(p => p.id === j.id ? { ...p, lesionado: nuevoEstado } : p));
  };

  useEffect(() => { if (sb) cargarJugadores(); }, []);

  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const añadir = async () => {
    if (!form.nombre.trim()) { setMsg('Introduce el nombre del jugador.'); return; }
    if (!form.equipo.trim()) { setMsg('Introduce el equipo real.'); return; }
    if (!form.valor || isNaN(Number(form.valor)) || Number(form.valor) < 0) { setMsg('Valor de mercado no válido.'); return; }
    if (form.destino === 'equipo' && !form.participante_id) { setMsg('Selecciona el equipo de la federación.'); return; }
    setGuardando(true); setMsg('');

    // 1. Insertar en jugadores
    const { data: jug, error: errJug } = await sb.from('jugadores').insert({
      nombre:        form.nombre.trim(),
      equipo:        form.equipo.trim(),
      posicion:      form.posicion,
      valor_mercado: Number(form.valor),
    }).select().single();
    if (errJug) { setMsg('Error: ' + errJug.message); setGuardando(false); return; }

    // 2. Si destino es un equipo, añadir a plantillas
    if (form.destino === 'equipo') {
      const { error: errPl } = await sb.from('plantillas').insert({
        participante_id: form.participante_id,
        jugador_id:      jug.id,
        precio_compra:   Number(form.valor),
      });
      if (errPl) { setMsg('Jugador creado pero error al asignar equipo: ' + errPl.message); setGuardando(false); return; }

      // Descontar presupuesto
      const part = participantes.find(p => p.id === form.participante_id);
      if (part) {
        await sb.from('participantes').update({ presupuesto: part.presupuesto - Number(form.valor) }).eq('id', form.participante_id);
      }
    }

    const nomJug = form.posicion === 'POR' ? `Portería de ${form.equipo.trim()}` : form.nombre.trim();
    publicar(federacion?.id, 'admin', `Jugador añadido: ${nomJug} (${form.equipo.trim()}, ${form.posicion})${form.destino === 'equipo' ? ` → ${participantes.find(p => p.id === form.participante_id)?.nombre}` : ' → Mercado libre'}`, actorNombre);
    setMsg(`✓ ${nomJug} añadido${form.destino === 'equipo' ? ' a la plantilla' : ' al mercado'}.`);
    setForm(vacioForm);
    setGuardando(false);
    cargarJugadores();
  };

  const borrar = async (j) => {
    if (!confirm(`¿Eliminar a "${j.posicion === 'POR' ? 'Portería ' + j.equipo : j.nombre}" (${j.equipo})?\nSe borrará también de plantillas, alineaciones y pujas.`)) return;
    setBorrando(j.id);
    const nomJug = j.posicion === 'POR' ? `Portería ${j.equipo}` : j.nombre;
    const { error } = await sb.from('jugadores').delete().eq('id', j.id);
    setBorrando(null);
    if (error) { alert('Error: ' + error.message); return; }
    publicar(federacion?.id, 'admin', `Jugador eliminado: ${nomJug} (${j.equipo})`, actorNombre);
    cargarJugadores();
  };

  const listaFiltrada = (jugadores || []).filter(j => {
    const nom = (j.posicion === 'POR' ? 'Portería ' + j.equipo : j.nombre).toLowerCase();
    return nom.includes(filtroNom.toLowerCase()) && j.equipo.toLowerCase().includes(filtroEq.toLowerCase());
  });

  const iS = { width: '100%', padding: '.45rem .7rem', borderRadius: 8,
               border: '1.5px solid var(--borde)', fontSize: '.92rem' };

  return (
    <div>
      {/* ── Formulario alta ── */}
      <div className="card">
        <h2>Añadir jugador</h2>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:'1rem', marginBottom:'1rem' }}>
          <div>
            <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Nombre</label>
            <input value={form.nombre} onChange={e => f('nombre', e.target.value)} placeholder="Nombre del jugador" style={iS} />
          </div>
          <div>
            <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Equipo real</label>
            <input list="equipos-lista" value={form.equipo} onChange={e => f('equipo', e.target.value)} placeholder="Ej: Málaga CF" style={iS} />
            <datalist id="equipos-lista">
              {EQUIPOS_CONOCIDOS.map(eq => <option key={eq} value={eq} />)}
            </datalist>
          </div>
          <div>
            <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Posición</label>
            <select value={form.posicion} onChange={e => f('posicion', e.target.value)} style={iS}>
              {POSICIONES.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Valor de mercado (€)</label>
            <input type="number" min="0" value={form.valor} onChange={e => f('valor', e.target.value)} placeholder="Ej: 5000000" style={iS} />
          </div>
          <div>
            <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Destino</label>
            <select value={form.destino} onChange={e => f('destino', e.target.value)} style={iS}>
              <option value="mercado">Mercado libre</option>
              <option value="equipo">Equipo de la federación</option>
            </select>
          </div>
          {form.destino === 'equipo' && (
            <div>
              <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Equipo de la federación</label>
              <select value={form.participante_id} onChange={e => f('participante_id', e.target.value)} style={iS}>
                <option value="">— Selecciona —</option>
                {participantes.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
              </select>
            </div>
          )}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:'1rem', flexWrap:'wrap' }}>
          <button onClick={añadir} disabled={guardando} className="btn-ok"
                  style={{ opacity: guardando ? .6 : 1, cursor: guardando ? 'wait' : 'pointer' }}>
            {guardando ? 'Añadiendo…' : 'Añadir jugador'}
          </button>
          {msg && <span style={{ color: msg.startsWith('✓') ? 'var(--verde)' : '#dc3545', fontWeight: 600, fontSize: '.9rem' }}>{msg}</span>}
        </div>
      </div>

      {/* ── Lista para borrar ── */}
      <div className="card">
        <h2>Eliminar jugador</h2>
        <div style={{ display:'flex', gap:'.75rem', flexWrap:'wrap', marginBottom:'1rem' }}>
          <input value={filtroNom} onChange={e => setFiltroNom(e.target.value)}
                 placeholder="Buscar por nombre…"
                 style={{ flex:2, minWidth:160, padding:'.4rem .7rem', borderRadius:8, border:'1.5px solid var(--borde)', fontSize:'.88rem' }} />
          <input value={filtroEq} onChange={e => setFiltroEq(e.target.value)}
                 placeholder="Filtrar por equipo real…"
                 style={{ flex:1, minWidth:140, padding:'.4rem .7rem', borderRadius:8, border:'1.5px solid var(--borde)', fontSize:'.88rem' }} />
        </div>
        {jugadores === null
          ? <Spinner />
          : listaFiltrada.length === 0
            ? <div className="empty">No hay jugadores que coincidan.</div>
            : <table>
                <thead>
                  <tr><th>Jugador</th><th>Equipo</th><th>Pos</th><th style={{ textAlign:'right' }}>Valor</th><th>Lesión</th><th></th></tr>
                </thead>
                <tbody>
                  {listaFiltrada.map(j => (
                    <tr key={j.id}>
                      <td style={{ fontWeight:600 }}>
                        {j.posicion === 'POR' ? <em style={{ color:'var(--texto2)' }}>Portería</em> : j.nombre}
                        {j.lesionado && <span style={{ marginLeft:6, background:'#dc3545', color:'#fff', borderRadius:4, fontSize:'.7rem', padding:'1px 5px', fontWeight:700 }}>LES</span>}
                      </td>
                      <td style={{ display:'flex', alignItems:'center', gap:6 }}>
                        <Escudo equipo={j.equipo} size={ESCUDO_SIZE}/>{j.equipo}
                      </td>
                      <td><span className={`badge ${j.posicion}`}>{j.posicion}</span></td>
                      <td style={{ textAlign:'right', fontVariantNumeric:'tabular-nums' }}>{fmt(j.valor_mercado ?? 0)}</td>
                      <td style={{ textAlign:'center' }}>
                        <button onClick={() => toggleLesionado(j)}
                                style={{ background: j.lesionado ? '#dc3545' : 'var(--gris)',
                                         color: j.lesionado ? '#fff' : 'var(--texto)',
                                         border:'none', padding:'.25rem .55rem', borderRadius:6,
                                         cursor:'pointer', fontSize:'.75rem', fontWeight:700 }}>
                          {j.lesionado ? 'Lesionado' : 'Sano'}
                        </button>
                      </td>
                      <td style={{ textAlign:'right' }}>
                        <button onClick={() => borrar(j)} disabled={borrando === j.id}
                                style={{ background:'#dc3545', color:'#fff', border:'none',
                                         padding:'.28rem .7rem', borderRadius:7, cursor:'pointer',
                                         fontSize:'.8rem', fontWeight:600, opacity: borrando===j.id?.5:1 }}>
                          {borrando === j.id ? '…' : 'Eliminar'}
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
        }
      </div>
    </div>
  );
}

// ── CESIONES (usuario) ─────────────────────────────────────────
function Cesiones({ federacion, miParticipanteId }) {
  const federacionId = federacion?.id;
  const [solicitudes, setSolicitudes]   = useState([]);
  const [cargando, setCargando]         = useState(true);
  const [formAbierto, setFormAbierto]   = useState(false);
  const [fJornada, setFJornada]         = useState(federacion?.jornada_actual || 1);
  const [fJugador, setFJugador]         = useState('');
  const [busqueda, setBusqueda]         = useState('');
  const [jugadoresLibres, setJugadoresLibres] = useState([]);
  const [cargandoMercado, setCargandoMercado] = useState(false);
  const [enviando, setEnviando]         = useState(false);
  const [msg, setMsg]                   = useState('');

  useEffect(() => { if (federacionId && miParticipanteId) cargar(); }, [federacionId, miParticipanteId]);

  const cargar = async () => {
    setCargando(true);
    const { data } = await sb.from('cesiones')
      .select('id, jornada, estado, created_at, jugadores(id, nombre, equipo, posicion)')
      .eq('federacion_id', federacionId)
      .eq('participante_id', miParticipanteId)
      .order('created_at', { ascending: false });
    setSolicitudes(data || []);
    setCargando(false);
  };

  const cargarMercado = async () => {
    if (!sb) return;
    setCargandoMercado(true);
    const { data: parts } = await sb.from('participantes').select('id').eq('federacion_id', federacionId);
    const partIds = (parts || []).map(p => p.id);
    const ocupados = new Set();
    if (partIds.length > 0) {
      const [{ data: pl }, { data: pend }] = await Promise.all([
        sb.from('plantillas').select('jugador_id').in('participante_id', partIds),
        sb.from('fichajes_pendientes').select('jugador_id').in('participante_id', partIds),
      ]);
      for (const p of [...(pl || []), ...(pend || [])]) ocupados.add(p.jugador_id);
    }
    const { data: jugs } = await sb.from('jugadores')
      .select('id, nombre, equipo, posicion, valor_mercado')
      .order('nombre');
    setJugadoresLibres((jugs || []).filter(j => !ocupados.has(j.id)));
    setCargandoMercado(false);
  };

  const abrirForm = () => {
    setFormAbierto(true); setMsg(''); setFJugador(''); setBusqueda('');
    cargarMercado();
  };

  const enviarSolicitud = async () => {
    if (!fJugador) { setMsg('Selecciona un jugador.'); return; }
    setEnviando(true);
    const { error } = await sb.from('cesiones').insert({
      federacion_id: federacionId, jugador_id: fJugador,
      participante_id: miParticipanteId, jornada: fJornada,
    });
    setEnviando(false);
    if (error) { setMsg('Error: ' + error.message); return; }
    setMsg('Solicitud enviada. Pendiente de aprobación del admin.');
    setFormAbierto(false); setFJugador('');
    cargar();
  };

  const cancelar = async (id) => {
    if (!confirm('¿Cancelar esta solicitud?')) return;
    const { error } = await sb.from('cesiones').delete().eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    cargar();
  };

  const estadoBadge = (e) => {
    const colors = { pendiente: ['#664d03','#fff3cd'], aprobada: ['#0a3622','#d1e7dd'], rechazada: ['#842029','#f8d7da'] };
    const [c, bg] = colors[e] || ['#333','#eee'];
    return <span style={{padding:'.15rem .45rem', borderRadius:5, fontSize:'.72rem', fontWeight:700, background:bg, color:c}}>{e.toUpperCase()}</span>;
  };

  const cesionesActivas = federacion?.cesiones_habilitadas ?? true;
  const q = busqueda.toLowerCase();
  const jugFiltrados = jugadoresLibres.filter(j =>
    !q || j.nombre.toLowerCase().includes(q) || (j.equipo || '').toLowerCase().includes(q)
  );
  const pendientes = solicitudes.filter(c => c.estado === 'pendiente').length;

  return (
    <div className="card">
      <h3 style={{marginTop:0}}>Cesiones</h3>
      <p style={{fontSize:'.85rem', color:'var(--texto2)', marginTop:'-0.5rem', marginBottom:'1rem'}}>
        Solicita la cesión temporal de un jugador libre del mercado para una jornada concreta. Los puntos cuentan al 100%. Sujeto a aprobación del administrador.
      </p>
      {cargando ? <Spinner /> : (
        <>
          {solicitudes.length === 0
            ? <div className="empty">No tienes solicitudes de cesión.</div>
            : (
              <div style={{overflowX:'auto', marginBottom:'1.2rem'}}>
                <table>
                  <thead><tr>
                    <th>J.</th><th>Jugador</th><th>Estado</th><th></th>
                  </tr></thead>
                  <tbody>
                    {solicitudes.map(c => (
                      <tr key={c.id}>
                        <td><strong>J{c.jornada}</strong></td>
                        <td>
                          <span className={`badge ${c.jugadores?.posicion}`} style={{marginRight:5}}>{c.jugadores?.posicion}</span>
                          <strong>{nombreJugador(c.jugadores?.nombre, c.jugadores?.posicion, c.jugadores?.equipo)}</strong>
                          <span style={{color:'var(--texto2)', fontSize:'.8rem', marginLeft:4}}>{c.jugadores?.equipo}</span>
                        </td>
                        <td>{estadoBadge(c.estado)}</td>
                        <td style={{textAlign:'right'}}>
                          {c.estado === 'pendiente' && (
                            <button onClick={() => cancelar(c.id)}
                                    style={{padding:'.2rem .5rem', fontSize:'.75rem', border:'1.5px solid #dc3545',
                                            borderRadius:6, color:'#dc3545', background:'transparent', cursor:'pointer'}}>
                              Cancelar
                            </button>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )
          }
          <div>
            {!cesionesActivas && (
              <div style={{background:'#fff3cd', color:'#856404', padding:'.5rem .85rem',
                           borderRadius:8, fontSize:'.85rem', border:'1px solid #ffc107', marginBottom:'.75rem'}}>
                Las solicitudes de cesión están desactivadas en esta federación.
              </div>
            )}
            {!formAbierto
              ? <button className="btn-ok" disabled={!cesionesActivas}
                        onClick={abrirForm}>+ Nueva solicitud</button>
              : (
                <div style={{background:'var(--fondo2)', borderRadius:'var(--radio)', padding:'1rem'}}>
                  <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', marginBottom:'.8rem'}}>
                    <div>
                      <label style={{fontSize:'.8rem', color:'var(--texto2)', display:'block', marginBottom:3}}>Jornada</label>
                      <select value={fJornada} onChange={e => setFJornada(Number(e.target.value))}
                              style={{padding:'.35rem .6rem', borderRadius:6, border:'1.5px solid var(--borde)'}}>
                        {Array.from({length:38},(_,i)=>i+1).map(j => <option key={j} value={j}>J{j}</option>)}
                      </select>
                    </div>
                    <div style={{flex:1, minWidth:220}}>
                      <label style={{fontSize:'.8rem', color:'var(--texto2)', display:'block', marginBottom:3}}>Buscar jugador libre</label>
                      <input type="text" value={busqueda} onChange={e => { setBusqueda(e.target.value); setFJugador(''); }}
                             placeholder="Nombre o equipo…"
                             style={{width:'100%', padding:'.35rem .6rem', borderRadius:6, border:'1.5px solid var(--borde)',
                                     boxSizing:'border-box', marginBottom:'.4rem'}} />
                      {cargandoMercado
                        ? <span style={{fontSize:'.8rem', color:'var(--texto2)'}}>Cargando jugadores…</span>
                        : (
                          <select value={fJugador} onChange={e => setFJugador(e.target.value)}
                                  style={{width:'100%', padding:'.35rem .6rem', borderRadius:6, border:'1.5px solid var(--borde)', boxSizing:'border-box'}}>
                            <option value="">Selecciona jugador… ({jugFiltrados.length} disponibles)</option>
                            {jugFiltrados.slice(0, 100).map(j => (
                              <option key={j.id} value={j.id}>
                                [{j.posicion}] {j.nombre} ({j.equipo}) — {fmt(j.valor_mercado)}
                              </option>
                            ))}
                          </select>
                        )
                      }
                    </div>
                  </div>
                  <div style={{display:'flex', gap:'.5rem', alignItems:'center'}}>
                    <button className="btn-ok" onClick={enviarSolicitud} disabled={enviando || !fJugador}>
                      {enviando ? 'Enviando…' : 'Solicitar cesión'}
                    </button>
                    <button onClick={() => setFormAbierto(false)}
                            style={{padding:'.4rem .9rem', border:'1.5px solid var(--borde)', borderRadius:6, cursor:'pointer', background:'transparent'}}>
                      Cancelar
                    </button>
                    {msg && <span style={{fontSize:'.85rem', color: msg.startsWith('Error') ? '#dc3545' : '#198754'}}>{msg}</span>}
                  </div>
                </div>
              )
            }
          </div>
        </>
      )}
    </div>
  );
}

// ── ADMIN — CESIONES ───────────────────────────────────────────
function AdminCesiones({ federacion, participantes, actorNombre }) {
  const federacionId = federacion?.id;
  const [cesiones, setCesiones] = useState([]);
  const [cargando, setCargando] = useState(true);
  const [filtro, setFiltro]     = useState('pendiente');

  useEffect(() => { if (federacionId) cargar(); }, [federacionId]);

  const cargar = async () => {
    setCargando(true);
    const { data } = await sb.from('cesiones')
      .select('id, jornada, estado, created_at, jugadores(id, nombre, equipo, posicion), participante:participantes!participante_id(id, nombre)')
      .eq('federacion_id', federacionId)
      .order('created_at', { ascending: false });
    setCesiones(data || []);
    setCargando(false);
  };

  const cambiarEstado = async (id, nuevoEstado) => {
    const cesion = cesiones.find(c => c.id === id);
    const { error } = await sb.from('cesiones').update({ estado: nuevoEstado }).eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    if (cesion) {
      const nomJug = nombreJugador(cesion.jugadores?.nombre, cesion.jugadores?.posicion, cesion.jugadores?.equipo);
      const nomEq  = cesion.participante?.nombre;
      const accion = nuevoEstado === 'aprobada' ? 'aprobada' : nuevoEstado === 'rechazada' ? 'rechazada' : 'revertida a pendiente';
      publicar(federacion?.id, 'admin', `Cesión de ${nomJug} para ${nomEq} (J${cesion.jornada}): ${accion}`, actorNombre);
    }
    cargar();
  };

  const borrar = async (id) => {
    if (!confirm('¿Eliminar esta cesión definitivamente?')) return;
    const { error } = await sb.from('cesiones').delete().eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    cargar();
  };

  const estadoBadge = (e) => {
    const colors = { pendiente: ['#664d03','#fff3cd'], aprobada: ['#0a3622','#d1e7dd'], rechazada: ['#842029','#f8d7da'] };
    const [c, bg] = colors[e] || ['#333','#eee'];
    return <span style={{padding:'.15rem .45rem', borderRadius:5, fontSize:'.72rem', fontWeight:700, background:bg, color:c}}>{e.toUpperCase()}</span>;
  };

  const lista = filtro === 'todas' ? cesiones : cesiones.filter(c => c.estado === filtro);

  return (
    <div>
      <p style={{fontSize:'.85rem', color:'var(--texto2)', marginTop:0}}>
        Solicitudes de cesión de jugadores libres del mercado para una jornada concreta.
      </p>
      <div style={{display:'flex', gap:'.5rem', marginBottom:'1rem', flexWrap:'wrap', alignItems:'center'}}>
        {['pendiente','aprobada','rechazada','todas'].map(f => (
          <button key={f} onClick={() => setFiltro(f)}
                  style={{padding:'.3rem .75rem', borderRadius:6, fontSize:'.82rem',
                          border:`1.5px solid ${filtro===f ? 'var(--verde)' : 'var(--borde)'}`,
                          background: filtro===f ? 'var(--verde)' : 'transparent',
                          color: filtro===f ? '#fff' : 'var(--texto)', cursor:'pointer', fontWeight: filtro===f ? 700 : 400}}>
            {f.charAt(0).toUpperCase() + f.slice(1)}{f !== 'todas' && ` (${cesiones.filter(c => c.estado === f).length})`}
          </button>
        ))}
        <button onClick={cargar} style={{marginLeft:'auto', padding:'.3rem .75rem', border:'1.5px solid var(--borde)', borderRadius:6, cursor:'pointer', background:'transparent', fontSize:'.82rem'}}>↺ Recargar</button>
      </div>
      {cargando ? <Spinner /> : lista.length === 0
        ? <div className="empty">No hay cesiones en esta categoría.</div>
        : (
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr>
                <th>J.</th><th>Jugador libre</th><th>Equipo solicitante</th><th>Estado</th><th></th>
              </tr></thead>
              <tbody>
                {lista.map(c => (
                  <tr key={c.id}>
                    <td><strong>J{c.jornada}</strong></td>
                    <td>
                      <span className={`badge ${c.jugadores?.posicion}`} style={{marginRight:5}}>{c.jugadores?.posicion}</span>
                      <strong>{nombreJugador(c.jugadores?.nombre, c.jugadores?.posicion, c.jugadores?.equipo)}</strong>
                      <span style={{color:'var(--texto2)', fontSize:'.8rem', marginLeft:4}}>{c.jugadores?.equipo}</span>
                    </td>
                    <td style={{fontWeight:600}}>{c.participante?.nombre}</td>
                    <td>{estadoBadge(c.estado)}</td>
                    <td style={{textAlign:'right', whiteSpace:'nowrap'}}>
                      {c.estado === 'pendiente' && (
                        <>
                          <button onClick={() => cambiarEstado(c.id, 'aprobada')}
                                  style={{padding:'.2rem .5rem', fontSize:'.75rem', border:'1.5px solid #198754',
                                          borderRadius:6, color:'#fff', background:'#198754', cursor:'pointer', marginRight:4}}>
                            Aprobar
                          </button>
                          <button onClick={() => cambiarEstado(c.id, 'rechazada')}
                                  style={{padding:'.2rem .5rem', fontSize:'.75rem', border:'1.5px solid #dc3545',
                                          borderRadius:6, color:'#dc3545', background:'transparent', cursor:'pointer'}}>
                            Rechazar
                          </button>
                        </>
                      )}
                      {c.estado === 'aprobada' && (
                        <button onClick={() => cambiarEstado(c.id, 'pendiente')}
                                style={{padding:'.2rem .5rem', fontSize:'.75rem', border:'1.5px solid #fd7e14',
                                        borderRadius:6, color:'#fd7e14', background:'transparent', cursor:'pointer', marginRight:4}}>
                          Revertir
                        </button>
                      )}
                      <button onClick={() => borrar(c.id)}
                              style={{padding:'.2rem .45rem', fontSize:'.75rem', border:'1.5px solid var(--borde)',
                                      borderRadius:6, color:'var(--texto2)', background:'transparent', cursor:'pointer'}}>
                        ✕
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      }
    </div>
  );
}

// ── HELPER: CÁLCULO DE SUSTITUCIONES AUTOMÁTICAS ─────────────
// Recibe los registros de alineaciones (titulares + suplentes),
// el Set de jugador_ids que no jugaron y un mapa jugador_id → {posicion}.
// Devuelve array de { participante_id, jugador_sale_id, jugador_entra_id }.
function calcularSustitucionesAuto(alisData, noJugoSet, jugadoresMap) {
  const FORMACIONES = [[5,4,1],[5,3,2],[5,2,3],[4,5,1],[4,4,2],[4,3,3],[4,2,4],[3,5,2],[3,6,1],[3,4,3],[3,3,4]];

  function esValida(jids) {
    if (jids.length !== 11) return false;
    const c = { POR: 0, DEF: 0, MED: 0, DEL: 0 };
    for (const jid of jids) { const p = jugadoresMap[jid]?.posicion; if (p) c[p] = (c[p]||0) + 1; }
    if (c.POR !== 1) return false;
    return FORMACIONES.some(f => f[0]===c.DEF && f[1]===c.MED && f[2]===c.DEL);
  }

  const porParticipante = {};
  for (const a of alisData) {
    if (!porParticipante[a.participante_id]) porParticipante[a.participante_id] = { titulars: [], bench: [] };
    if (a.es_titular) porParticipante[a.participante_id].titulars.push(a.jugador_id);
    else if (a.orden_suplente != null) porParticipante[a.participante_id].bench.push({ jid: a.jugador_id, orden: a.orden_suplente });
  }

  const posOrder = { DEF: 0, MED: 1, DEL: 2, POR: 3 };
  const resultado = [];

  for (const [partId, { titulars, bench }] of Object.entries(porParticipante)) {
    bench.sort((a, b) => a.orden - b.orden);
    const benchIds = bench.map(b => b.jid);
    const titOrdenados = [...titulars].sort((a, b) =>
      (posOrder[jugadoresMap[a]?.posicion] ?? 3) - (posOrder[jugadoresMap[b]?.posicion] ?? 3)
    );
    const efectivos = [...titulars];
    const usados = new Set();

    for (const jid of titOrdenados) {
      if (!noJugoSet.has(jid)) continue;
      if (jugadoresMap[jid]?.posicion === 'POR') continue;

      const probar = sid => esValida(efectivos.map(t => t === jid ? sid : t));
      let candidato = benchIds.find(sid => !usados.has(sid) && !noJugoSet.has(sid) && probar(sid));
      if (!candidato) candidato = benchIds.find(sid => !usados.has(sid) && probar(sid));

      if (candidato) {
        resultado.push({ participante_id: partId, jugador_sale_id: jid, jugador_entra_id: candidato });
        usados.add(candidato);
        const idx = efectivos.indexOf(jid); if (idx !== -1) efectivos[idx] = candidato;
      }
    }
  }
  return resultado;
}

// ── ADMIN: JUGADORES QUE NO JUGARON + SUSTITUCIONES AUTOMÁTICAS ──
function AdminNoJugo({ federacion, participantes, actorNombre }) {
  const federacionId = federacion?.id;
  const [jornada, setJornada]         = useState(1);
  const [alisData, setAlisData]       = useState([]);
  const [jugMap, setJugMap]           = useState({});
  const [titulares, setTitulares]     = useState([]);
  const [noJugo, setNoJugo]           = useState(new Set());
  const [subsPreview, setSubsPreview] = useState([]);
  const [cargando, setCargando]       = useState(false);
  const [guardando, setGuardando]     = useState(false);
  const [msg, setMsg]                 = useState('');
  const [listado, setListado]         = useState('');

  useEffect(() => { if (federacionId && participantes?.length) cargar(); }, [federacionId, jornada, participantes]);

  const cargar = async () => {
    setCargando(true);
    const partIds = participantes.map(p => p.id);
    const [{ data: alis }, { data: njData }] = await Promise.all([
      sb.from('alineaciones')
        .select('jugador_id, participante_id, orden_suplente, es_titular, jugadores(id, nombre, equipo, posicion)')
        .eq('jornada', jornada)
        .in('participante_id', partIds),
      sb.from('jornada_no_jugo')
        .select('jugador_id')
        .eq('federacion_id', federacionId)
        .eq('jornada', jornada),
    ]);

    const mapa = {};
    for (const a of (alis || [])) { if (a.jugadores) mapa[a.jugador_id] = a.jugadores; }
    setJugMap(mapa);
    setAlisData(alis || []);

    const uniqueTit = new Map();
    for (const a of (alis || [])) {
      if (a.es_titular && a.jugadores && a.jugadores.posicion !== 'POR') {
        uniqueTit.set(a.jugador_id, a.jugadores);
      }
    }
    setTitulares([...uniqueTit.values()]);
    const njSet = new Set((njData || []).map(r => r.jugador_id));
    setNoJugo(njSet);
    setCargando(false);
  };

  // Recalcular preview cada vez que cambia noJugo o los datos
  useEffect(() => {
    if (!alisData.length) { setSubsPreview([]); return; }
    setSubsPreview(calcularSustitucionesAuto(alisData, noJugo, jugMap));
  }, [noJugo, alisData, jugMap]);

  const toggleNoJugo = jid => {
    setNoJugo(prev => {
      const next = new Set(prev);
      next.has(jid) ? next.delete(jid) : next.add(jid);
      return next;
    });
  };

  const guardar = async () => {
    setGuardando(true);
    const partIds = participantes.map(p => p.id);

    // 1. Persistir no_jugo
    await sb.from('jornada_no_jugo').delete().eq('federacion_id', federacionId).eq('jornada', jornada);
    if (noJugo.size > 0) {
      const rows = [...noJugo].map(jid => ({ federacion_id: federacionId, jugador_id: jid, jornada }));
      const { error } = await sb.from('jornada_no_jugo').insert(rows);
      if (error) { alert('Error al guardar no_jugo: ' + error.message); setGuardando(false); return; }
    }

    // 2. Persistir sustituciones_auto
    await sb.from('sustituciones_auto').delete().eq('federacion_id', federacionId).eq('jornada', jornada);
    if (subsPreview.length > 0) {
      const rows = subsPreview.map(s => ({ federacion_id: federacionId, jornada, ...s }));
      const { error } = await sb.from('sustituciones_auto').insert(rows);
      if (error) { alert('Error al guardar sustituciones: ' + error.message); setGuardando(false); return; }
    }

    // 3. Recalcular clasificacion con sustituciones aplicadas
    const { data: ptsData } = await sb.from('puntos_jugador')
      .select('jugador_id, pts')
      .eq('federacion_id', federacionId)
      .eq('jornada', jornada);

    if (ptsData && ptsData.length > 0) {
      const ptsMapa = Object.fromEntries(ptsData.map(r => [r.jugador_id, r.pts]));
      const alisPorPart = {};
      for (const a of alisData) {
        if (!a.es_titular) continue;
        if (!alisPorPart[a.participante_id]) alisPorPart[a.participante_id] = [];
        alisPorPart[a.participante_id].push(a.jugador_id);
      }
      const subsPorPart = {};
      for (const s of subsPreview) {
        if (!subsPorPart[s.participante_id]) subsPorPart[s.participante_id] = [];
        subsPorPart[s.participante_id].push(s);
      }
      const clasRows = participantes.map(p => {
        let jids = alisPorPart[p.id] || [];
        for (const s of (subsPorPart[p.id] || [])) {
          jids = jids.map(jid => jid === s.jugador_sale_id ? s.jugador_entra_id : jid);
        }
        return { participante_id: p.id, jornada, puntos_jornada: jids.reduce((sum, jid) => sum + (ptsMapa[jid] ?? 0), 0) };
      });
      await sb.from('clasificacion').upsert(clasRows, { onConflict: 'participante_id,jornada' });
    }

    setGuardando(false);
    const nomNJ = [...noJugo].map(jid => jugMap[jid]).filter(Boolean)
      .map(j => j.posicion === 'POR' ? `Portería ${j.equipo}` : j.nombre);
    publicar(federacion?.id, 'admin',
      noJugo.size > 0
        ? `No jugaron J${jornada}: ${nomNJ.join(', ')}`
        : `No jugaron J${jornada}: lista limpiada`,
      actorNombre);
    setMsg('Guardado. Sustituciones calculadas y clasificación actualizada.');
    setTimeout(() => setMsg(''), 5000);
  };

  // Agrupar titulares por equipo real
  const equipos = [...new Set(titulares.map(j => j.equipo))].sort();
  const partMap = Object.fromEntries((participantes || []).map(p => [p.id, p]));

  // Agrupar subsPreview por participante para mostrar tabla
  const subsPorPart = {};
  for (const s of subsPreview) {
    if (!subsPorPart[s.participante_id]) subsPorPart[s.participante_id] = [];
    subsPorPart[s.participante_id].push(s);
  }

  const hayDatos = titulares.length > 0;

  const generarListado = () => {
    const labPos = { POR: 'PO', DEF: 'DF', MED: 'MC', DEL: 'DEL' };
    const porEquipo = {};
    for (const a of alisData) {
      const jug = jugMap[a.jugador_id];
      if (!jug) continue;
      if (!porEquipo[a.participante_id]) porEquipo[a.participante_id] = { POR: [], DEF: [], MED: [], DEL: [], suplentes: [] };
      if (a.es_titular) {
        if (porEquipo[a.participante_id][jug.posicion] !== undefined) {
          porEquipo[a.participante_id][jug.posicion].push(jug.nombre);
        }
      } else if (a.orden_suplente != null) {
        porEquipo[a.participante_id].suplentes.push({ nombre: jug.nombre, orden: a.orden_suplente });
      }
    }
    const bloques = (participantes || [])
      .filter(p => porEquipo[p.id])
      .sort((a, b) => a.nombre.localeCompare(b.nombre, 'es'))
      .map(p => {
        const pos = porEquipo[p.id];
        const sups = pos.suplentes.sort((a, b) => a.orden - b.orden).map(s => s.nombre);
        return [
          `_${p.nombre}_`,
          ...['POR','DEF','MED','DEL'].map(k => `${labPos[k]}: ${(pos[k] || []).join(', ')}`),
          `Suplentes: ${sups.join(', ')}`,
        ].join('\n');
      });
    const texto = bloques.join('\n\n');
    setListado(texto);
    return texto;
  };

  return (
    <div>
      {/* Selector de jornada */}
      <div className="card" style={{display:'flex', alignItems:'center', gap:'.75rem', flexWrap:'wrap'}}>
        <span style={{fontWeight:600}}>Jornada:</span>
        <div style={{display:'flex', gap:'.28rem', flexWrap:'wrap'}}>
          {Array.from({length:38}, (_, i) => i+1).map(j => (
            <button key={j} onClick={() => { setJornada(j); setMsg(''); setListado(''); }}
                    style={{padding:'.22rem .48rem', borderRadius:6, fontSize:'.75rem',
                            border:'1.5px solid var(--borde)', cursor:'pointer',
                            background: jornada===j?'var(--verde)':'#fff',
                            color: jornada===j?'#fff':'var(--texto)', fontWeight: jornada===j?700:400}}>
              {j}
            </button>
          ))}
        </div>
      </div>

      {cargando && <div className="card"><div className="empty">Cargando…</div></div>}

      {!cargando && !hayDatos && (
        <div className="card">
          <div className="empty">No hay alineaciones para la jornada {jornada}.</div>
        </div>
      )}

      {!cargando && hayDatos && (
        <>
          {/* Titulares agrupados por equipo real */}
          <div className="card">
            <div style={{fontWeight:700, marginBottom:'.75rem'}}>
              Marcar jugadores que jugaron 0 minutos en J{jornada}
            </div>
            <p style={{fontSize:'.82rem', color:'var(--texto-2)', marginBottom:'1rem'}}>
              Los porteros no aparecen aquí (la portería se gestiona automáticamente).
              Al guardar se calculan las sustituciones y se recalculan los puntos de equipo.
            </p>
            {equipos.map(eq => {
              const jugsEq = titulares.filter(j => j.equipo === eq);
              return (
                <div key={eq} style={{marginBottom:'1rem'}}>
                  <div style={{fontWeight:600, fontSize:'.85rem', color:'var(--texto-2)',
                               borderBottom:'1px solid var(--borde)', paddingBottom:'.25rem', marginBottom:'.4rem',
                               display:'flex', alignItems:'center', gap:'.4rem'}}>
                    <Escudo equipo={eq} size={ESCUDO_SIZE} /> {eq}
                  </div>
                  <div style={{display:'flex', flexWrap:'wrap', gap:'.4rem'}}>
                    {jugsEq.map(j => {
                      const marcado = noJugo.has(j.id);
                      return (
                        <label key={j.id} style={{
                          display:'flex', alignItems:'center', gap:'.35rem',
                          padding:'.3rem .6rem', borderRadius:6, cursor:'pointer', fontSize:'.85rem',
                          border: `1.5px solid ${marcado ? '#ef4444' : 'var(--borde)'}`,
                          background: marcado ? '#fef2f2' : 'var(--fondo)',
                          color: marcado ? '#b91c1c' : 'var(--texto)',
                        }}>
                          <input type="checkbox" checked={marcado} onChange={() => toggleNoJugo(j.id)}
                                 style={{accentColor:'#ef4444'}} />
                          <span style={{fontWeight: marcado ? 700 : 400}}>{j.nombre}</span>
                          <span style={{fontSize:'.72rem', opacity:.6}}>{j.posicion}</span>
                        </label>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Preview de sustituciones calculadas */}
          <div className="card">
            <div style={{fontWeight:700, marginBottom:'.75rem'}}>
              Sustituciones automáticas calculadas
              {noJugo.size === 0 && <span style={{fontWeight:400, fontSize:'.82rem', color:'var(--texto-2)'}}> — marca jugadores arriba para ver las sustituciones</span>}
            </div>
            {subsPreview.length === 0 && noJugo.size > 0 && (
              <div className="empty">No hay sustituciones posibles (ningún suplente encaja en la formación).</div>
            )}
            {subsPreview.length > 0 && (
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:'.87rem'}}>
                <thead>
                  <tr style={{borderBottom:'2px solid var(--borde)'}}>
                    <th style={{textAlign:'left', padding:'.3rem .5rem'}}>Equipo</th>
                    <th style={{textAlign:'left', padding:'.3rem .5rem'}}>Sale</th>
                    <th style={{textAlign:'left', padding:'.3rem .5rem'}}>Entra</th>
                  </tr>
                </thead>
                <tbody>
                  {subsPreview.map((s, i) => {
                    const jSale  = jugMap[s.jugador_sale_id];
                    const jEntra = jugMap[s.jugador_entra_id];
                    const equipo = partMap[s.participante_id];
                    return (
                      <tr key={i} style={{borderBottom:'1px solid var(--borde)'}}>
                        <td style={{padding:'.3rem .5rem', fontWeight:600}}>{equipo?.nombre ?? '—'}</td>
                        <td style={{padding:'.3rem .5rem', color:'#b91c1c'}}>
                          {jSale?.nombre ?? s.jugador_sale_id}
                          <span style={{fontSize:'.72rem', marginLeft:'.3rem', opacity:.6}}>{jSale?.posicion}</span>
                        </td>
                        <td style={{padding:'.3rem .5rem', color:'#15803d'}}>
                          {jEntra?.nombre ?? s.jugador_entra_id}
                          <span style={{fontSize:'.72rem', marginLeft:'.3rem', opacity:.6}}>{jEntra?.posicion}</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
            {/* Equipos sin sustitución pese a tener jugadores sin jugar */}
            {noJugo.size > 0 && (() => {
              const partConNoJugo = new Set(
                alisData.filter(a => a.es_titular && noJugo.has(a.jugador_id) && jugMap[a.jugador_id]?.posicion !== 'POR')
                        .map(a => a.participante_id)
              );
              const partConSub = new Set(subsPreview.map(s => s.participante_id));
              const sinSub = [...partConNoJugo].filter(pid => !partConSub.has(pid));
              if (!sinSub.length) return null;
              return (
                <div style={{marginTop:'.75rem', padding:'.6rem', background:'#fffbeb',
                             border:'1px solid #fbbf24', borderRadius:6, fontSize:'.82rem', color:'#92400e'}}>
                  <strong>Sin sustitución posible:</strong>{' '}
                  {sinSub.map(pid => partMap[pid]?.nombre ?? pid).join(', ')}
                  {' — ningún suplente compatible encaja en ninguna formación válida.'}
                </div>
              );
            })()}
          </div>

          <div style={{display:'flex', alignItems:'center', gap:'1rem', flexWrap:'wrap'}}>
            <button onClick={guardar} disabled={guardando} className="btn-primary">
              {guardando ? 'Guardando…' : 'Guardar y aplicar sustituciones'}
            </button>
            {msg && <span style={{color:'var(--verde)', fontWeight:600, fontSize:'.9rem'}}>{msg}</span>}
          </div>
        </>
      )}

      {/* Listado de alineaciones */}
      {hayDatos && (
        <div className="card" style={{marginTop:'1rem'}}>
          <div style={{display:'flex', alignItems:'center', gap:'1rem', flexWrap:'wrap', marginBottom: listado ? '.75rem' : 0}}>
            <button onClick={() => {
                      const texto = generarListado();
                      navigator.clipboard.writeText(texto).catch(() => {});
                    }}
                    style={{padding:'.4rem .9rem', borderRadius:7, border:'1.5px solid var(--borde)',
                            background:'var(--fondo)', cursor:'pointer', fontWeight:600, fontSize:'.87rem'}}>
              Copiar listado J{jornada}
            </button>
            {listado && <span style={{fontSize:'.82rem', color:'var(--verde)', fontWeight:600}}>¡Copiado!</span>}
          </div>
          {listado && (
            <pre style={{margin:0, fontFamily:'monospace', fontSize:'.85rem', whiteSpace:'pre-wrap',
                         wordBreak:'break-word', color:'var(--texto)', lineHeight:1.6}}>
              {listado}
            </pre>
          )}
        </div>
      )}
    </div>
  );
}
