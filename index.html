      setJugadoresCedidos(cedidos);

      const e = {};
      for (const j of [...plantilla, ...cedidos]) e[j.id] = 'F';

      let fuente = ali || [];
      if (fuente.length === 0) {
        // Sin alineación para esta jornada → usar la última guardada (solo jornadas anteriores)
        const { data: ref } = await sb.from('alineaciones')
          .select('jornada')
          .eq('participante_id', participanteId)
          .lt('jornada', jornada)
          .order('jornada', { ascending: false })
          .limit(1);
        if (ref?.length > 0) {
          const { data: ultima } = await sb.from('alineaciones')
            .select('jugador_id, es_titular, orden_suplente')
            .eq('participante_id', participanteId)
            .eq('jornada', ref[0].jornada);
          fuente = ultima || [];
        }
      }

      const ord = {};
      for (const a of fuente) {
        if (Object.prototype.hasOwnProperty.call(e, a.jugador_id)) {
          e[a.jugador_id] = a.es_titular ? 'T' : 'S';
          if (!a.es_titular && a.orden_suplente != null) ord[a.jugador_id] = a.orden_suplente;
        }
      }

      // Jugadores vendidos: en alineación guardada pero ya no en plantilla
      const idsActuales = new Set(plantilla.map(j => j.id));
      const idsVendidos = [...new Set(fuente.filter(a => !idsActuales.has(a.jugador_id)).map(a => a.jugador_id))];

      const esJornadaPasada = jornada < jornadaActual;

      if (esJornadaPasada && idsVendidos.length > 0) {
        // Jornada pasada → mostrar vendidos como histórico (solo lectura, sin botones)
        const { data: jugsHist } = await sb.from('jugadores').select('id, nombre, equipo, posicion').in('id', idsVendidos);
        for (const a of fuente) {
          if (idsVendidos.includes(a.jugador_id)) {
            e[a.jugador_id] = a.es_titular ? 'T' : 'S';
            if (!a.es_titular && a.orden_suplente != null) ord[a.jugador_id] = a.orden_suplente;
          }
        }
        setJugadoresHistoricos(jugsHist || []);
      } else {
        // Jornada actual/futura → ignorar vendidos por completo
        // Si estaban guardados en DB para esta jornada, limpiarlos silenciosamente
        if (!esJornadaPasada && idsVendidos.length > 0) {
          await sb.from('alineaciones')
            .delete()
            .eq('participante_id', participanteId)
            .eq('jornada', jornada)
            .in('jugador_id', idsVendidos);
        }
        setJugadoresHistoricos([]);
      }

      setEstado(e);
      setOrdenSup(ord);
      setCargandoAli(false);
    };
    cargar();
  }, [participanteId, jornada, plantilla]);

  const FORMACIONES = [[5,4,1],[5,3,2],[5,2,3],[4,5,1],[4,4,2],[4,3,3],[4,2,4],[3,5,2],[3,6,1],[3,4,3],[3,3,4]];

  const bloqueado = !!(cierre && new Date() > new Date(cierre));
  const nT = Object.values(estado).filter(v => v === 'T').length;
  const nS = Object.values(estado).filter(v => v === 'S').length;

  const titPos = { POR: 0, DEF: 0, MED: 0, DEL: 0 };
  for (const j of [...(plantilla || []), ...jugadoresHistoricos, ...jugadoresCedidos]) if (estado[j.id] === 'T') titPos[j.posicion]++;
  const formActual  = [titPos.DEF, titPos.MED, titPos.DEL];
  const formStr     = formActual.join('-');
  const formCompleta = nT === 11 && titPos.POR === 1;
  const formValida  = formCompleta && FORMACIONES.some(f => f[0]===formActual[0] && f[1]===formActual[1] && f[2]===formActual[2]);

  const setJugadorEstado = (id, op) => {
    if (bloqueado) return;
    const prev = estado[id];
    if (op === 'T' && nT >= 11 && prev !== 'T') { alert('Ya tienes 11 titulares.'); return; }
    if (op === 'S' && nS >= 4  && prev !== 'S') { alert('Máximo 4 suplentes.'); return; }
    setEstado(e => ({ ...e, [id]: op }));
    if (op === 'S' && prev !== 'S') {
      // Asignar siguiente posición disponible
      setOrdenSup(o => {
        const max = Object.values(o).reduce((m, v) => Math.max(m, v), 0);
        return { ...o, [id]: max + 1 };
      });
    } else if (op !== 'S' && prev === 'S') {
      // Eliminar y compactar
      setOrdenSup(o => {
        const quitado = o[id];
        const nuevo = { ...o };
        delete nuevo[id];
        for (const k of Object.keys(nuevo)) if (nuevo[k] > quitado) nuevo[k]--;
        return nuevo;
      });
    }
    setMsg('');
  };

  const moverSuplente = (id, dir) => { // dir: -1 sube, +1 baja
    const pos = ordenSup[id];
    const nueva = pos + dir;
    if (nueva < 1 || nueva > nS) return;
    const otro = Object.entries(ordenSup).find(([, v]) => v === nueva)?.[0];
    if (!otro) return;
    setOrdenSup(o => ({ ...o, [id]: nueva, [otro]: pos }));
  };

  const guardar = async () => {
    if (bloqueado || !sb) return;
    if (nT === 11 && !formValida) {
      alert(`Formación ${formStr} no válida.\nFormaciones permitidas: ${FORMACIONES.map(f => f.join('-')).join(', ')}`);
      return;
    }
    setGuardando(true);
    const registros = Object.entries(estado)
      .filter(([, v]) => v === 'T' || v === 'S')
      .map(([jugadorId, v]) => ({
        participante_id: participanteId, jornada,
        jugador_id: jugadorId, es_titular: v === 'T',
        orden_suplente: v === 'S' ? (ordenSup[jugadorId] ?? null) : null,
      }));
    const { error: errDel } = await sb.from('alineaciones').delete()
      .eq('participante_id', participanteId).eq('jornada', jornada);
    if (errDel) { alert('Error al borrar alineación anterior: ' + errDel.message); setGuardando(false); return; }
    if (registros.length) {
      const { error: errIns } = await sb.from('alineaciones').insert(registros);
      if (errIns) { alert('Error al guardar: ' + errIns.message); setGuardando(false); return; }
    }
    setGuardando(false);
    setMsg('✓ Alineación guardada');
    setTimeout(() => setMsg(''), 3000);
  };

  if (plantilla === null) return <Spinner />;

  const incompleta = nT > 0 && nT !== 11;

  const secciones = [
    { key: 'T', label: `Titulares (${nT}/11)`, color: '#198754' },
    { key: 'S', label: `Suplentes (${nS}/4)`,  color: '#fd7e14' },
    { key: 'F', label: 'Sin convocar',           color: 'var(--texto2)' },
  ];
  const supsOrdenados = [...(plantilla || []), ...jugadoresHistoricos, ...jugadoresCedidos]
    .filter(j => estado[j.id] === 'S')
    .sort((a, b) => (ordenSup[a.id] ?? 99) - (ordenSup[b.id] ?? 99));

  return (
    <div className="card">
      <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'center', marginBottom:'1.2rem'}}>
        <div>
          <label style={{fontSize:'.85rem', color:'var(--texto2)', marginRight:'.4rem'}}>Jornada:</label>
          <select value={jornada} onChange={e => setJornada(Number(e.target.value))}
                  style={{padding:'.3rem .6rem', borderRadius:6, border:'1.5px solid var(--borde)'}}>
            {Array.from({length:38},(_,i)=>i+1).map(j =>
              <option key={j} value={j}>J{j}</option>)}
          </select>
        </div>
        <div style={{fontSize:'.85rem'}}>
          {cierre
            ? <span style={{color: bloqueado ? '#dc3545' : '#198754', fontWeight:600}}>
                {bloqueado ? '🔒 Cerrada' : '🟢 Abierta'} — cierre: {new Date(cierre).toLocaleString('es-ES')}
              </span>
            : <span style={{color:'#198754', fontWeight:600}}>🟢 Sin hora de cierre</span>}
        </div>
        <div style={{marginLeft:'auto', fontSize:'.9rem', display:'flex', gap:'.75rem', alignItems:'center', flexWrap:'wrap'}}>
          {nT > 0 && (
            <span style={{fontWeight:700, padding:'.2rem .55rem', borderRadius:7,
                          background: formValida ? '#d1e7dd' : formCompleta ? '#f8d7da' : '#fff3cd',
                          color:      formValida ? '#0a3622' : formCompleta ? '#842029' : '#664d03'}}>
              {titPos.POR > 0 ? `1-${formStr}` : formStr}
              {formCompleta && !formValida && ' ✗'}
              {formValida && ' ✓'}
            </span>
          )}
          <span>
            <strong style={{color: nT===11 ? '#198754' : 'inherit'}}>{nT}/11</strong>
            <span style={{color:'var(--texto2)'}}> tit &nbsp;·&nbsp; </span>
            <strong>{nS}/4</strong>
            <span style={{color:'var(--texto2)'}}> sup</span>
          </span>
        </div>
      </div>

      {cargandoAli
        ? <Spinner />
        : <>
            {plantilla.length === 0 && jugadoresCedidos.length === 0 && (
              <div className="empty">Tu plantilla está vacía. Ficha jugadores primero.</div>
            )}

            {secciones.map(({ key, label, color }) => {
              const idsHist = new Set(jugadoresHistoricos.map(j => j.id));
              const jugs = key === 'S'
                ? supsOrdenados
                : key === 'F'
                  ? [...plantilla, ...jugadoresCedidos].filter(j => estado[j.id] === key)
                  : [...plantilla.filter(j => estado[j.id] === key),
                     ...jugadoresHistoricos.filter(j => estado[j.id] === key),
                     ...jugadoresCedidos.filter(j => estado[j.id] === key)];
              if (!jugs.length) return null;
              return (
                <div key={key} style={{marginBottom:'1rem'}}>
                  <div style={{fontWeight:700, fontSize:'.78rem', color, textTransform:'uppercase',
                               letterSpacing:'.05em', marginBottom:'.35rem'}}>
                    {label}
                  </div>
                  <table style={{width:'100%'}}>
                    <tbody>
                      {jugs.map(j => {
                        const esHistorico = idsHist.has(j.id);
                        const esCedido   = !!j._esCedido;
                        return (
                          <tr key={j.id} style={esHistorico ? {opacity:.6} : esCedido ? {background:'rgba(13,202,240,.07)'} : {}}>
                            {key === 'S' && (
                              <td style={{width:28, textAlign:'center', fontWeight:700, fontSize:'.85rem', color}}>
                                {ordenSup[j.id]}°
                              </td>
                            )}
                            <td style={{width:48}}><span className={`badge ${j.posicion}`}>{j.posicion}</span></td>
                            <td style={{fontWeight:600}}>
                              {nombreJugador(j.nombre, j.posicion, j.equipo)}
                              {esCedido && (
                                <span style={{marginLeft:5, fontSize:'.63rem', fontWeight:700, letterSpacing:.4,
                                             padding:'1px 4px', borderRadius:3, background:'#0dcaf0', color:'#000', verticalAlign:'middle'}}>
                                  CESIÓN
                                </span>
                              )}
                            </td>
                            <td style={{color:'var(--texto2)', fontSize:'.85rem'}}>
                              {j.posicion === 'POR' ? null
                                : <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                                    <Escudo equipo={j.equipo} size={ESCUDO_SIZE}/>{j.equipo}
                                  </span>}
                            </td>
                            {esHistorico
                              ? <td style={{textAlign:'right'}}>
                                  <span style={{fontSize:'.72rem', color:'var(--texto2)', fontStyle:'italic'}}>vendido</span>
                                </td>
                              : !bloqueado && (
                                <td style={{textAlign:'right', whiteSpace:'nowrap'}}>
                                  {key === 'S' && (
                                    <>
                                      <button onClick={() => moverSuplente(j.id, -1)}
                                              disabled={ordenSup[j.id] === 1}
                                              style={{marginLeft:3, padding:'.2rem .45rem', fontSize:'.75rem',
                                                      border:'1.5px solid var(--borde)', borderRadius:6,
                                                      cursor: ordenSup[j.id] === 1 ? 'default' : 'pointer',
                                                      background:'#fff', opacity: ordenSup[j.id] === 1 ? .35 : 1}}>▲</button>
                                      <button onClick={() => moverSuplente(j.id, +1)}
                                              disabled={ordenSup[j.id] === nS}
                                              style={{marginLeft:2, padding:'.2rem .45rem', fontSize:'.75rem',
                                                      border:'1.5px solid var(--borde)', borderRadius:6,
                                                      cursor: ordenSup[j.id] === nS ? 'default' : 'pointer',
                                                      background:'#fff', opacity: ordenSup[j.id] === nS ? .35 : 1}}>▼</button>
                                    </>
                                  )}
                                  {[['T','Titular','#198754'],['S','Suplente','#fd7e14'],['F','Fuera','#6c757d']].map(([op, etiq, col]) => (
                                    <button key={op} onClick={() => setJugadorEstado(j.id, op)}
                                            style={{marginLeft:3, padding:'.2rem .5rem', fontSize:'.75rem',
                                                    border:`1.5px solid ${estado[j.id]===op ? col : 'var(--borde)'}`,
                                                    borderRadius:6, cursor:'pointer',
                                                    background: estado[j.id]===op ? col : '#fff',
                                                    color: estado[j.id]===op ? '#fff' : 'var(--texto)'}}>
                                      {etiq}
                                    </button>
                                  ))}
                                </td>
                              )
                            }
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              );
            })}

            {!bloqueado && (plantilla.length > 0 || jugadoresCedidos.length > 0) && (
              <div style={{marginTop:'1rem', display:'flex', gap:'1rem', alignItems:'center', flexWrap:'wrap'}}>
                <button className="btn-ok" onClick={guardar} disabled={guardando}>
                  {guardando ? 'Guardando…' : 'Guardar alineación'}
                </button>
                {incompleta && (
                  <span style={{color:'#856404', fontSize:'.85rem'}}>
                    ⚠ Faltan titulares ({nT}/11)
                  </span>
                )}
                {formCompleta && !formValida && (
                  <span style={{color:'#dc3545', fontSize:'.85rem'}}>
                    ✗ Formación {formStr} no válida
                  </span>
                )}
                {msg && <span style={{color:'#198754', fontSize:'.9rem'}}>{msg}</span>}
              </div>
            )}
            {bloqueado && (
              <p style={{color:'#dc3545', fontSize:'.9rem', marginTop:'.6rem'}}>
                La alineación de esta jornada está cerrada y no puede modificarse.
              </p>
            )}
          </>
      }
    </div>
  );
}

// ── ADMIN — PRESUPUESTOS ───────────────────────────────────────
function AdminPresupuestos({ participantes, federacion, actorNombre }) {
  const [valores, setValores]   = useState({});
  const [guardado, setGuardado] = useState(null);

  useEffect(() => {
    if (!sb || participantes.length === 0) return;
    const ids = participantes.map(p => p.id);
    sb.from('participantes').select('id, presupuesto').in('id', ids).then(({ data }) => {
      const m = {};
      (data || []).forEach(p => { m[p.id] = String(p.presupuesto ?? 100000000); });
      setValores(m);
    });
  }, [participantes]);

  const guardar = async (pid) => {
    const val = parseFloat(valores[pid]);
    if (isNaN(val)) return;
    const { error } = await sb.from('participantes').update({ presupuesto: val }).eq('id', pid);
    if (error) { alert('Error: ' + error.message); return; }
    const equipo = participantes.find(p => p.id === pid)?.nombre;
    publicar(federacion?.id, 'admin', `Presupuesto de ${equipo} modificado a ${fmt(val)}`, actorNombre);
    setGuardado(pid);
    setTimeout(() => setGuardado(null), 2000);
  };

  const Seccion = ({ lista, titulo }) => (
    <div className="card">
      <h2>{titulo}</h2>
      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th style={{textAlign:'right'}}>Presupuesto (€)</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {lista.map(p => (
            <tr key={p.id}>
              <td style={{fontWeight:600}}>{p.nombre}</td>
              <td style={{textAlign:'right'}}>
                <input type="number" value={valores[p.id] ?? ''}
                  onChange={e => setValores(prev => ({...prev, [p.id]: e.target.value}))}
                  style={{width:'150px', textAlign:'right', padding:'.3rem .5rem',
                          border:'1.5px solid var(--borde)', borderRadius:'8px', fontSize:'.9rem'}} />
              </td>
              <td style={{paddingLeft:'.5rem'}}>
                <button onClick={() => guardar(p.id)} className="btn-fichar"
                  style={{background: guardado === p.id ? 'var(--verde)' : undefined,
                          minWidth:'90px'}}>
                  {guardado === p.id ? 'Guardado ✓' : 'Guardar'}
                </button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  return (
    <div>
      <Seccion lista={participantes.filter(p => p.division_id === 1)} titulo="Primera División" />
      <Seccion lista={participantes.filter(p => p.division_id === 2)} titulo="Segunda División" />
    </div>
  );
}

// ── ADMIN — FICHAJES PENDIENTES ────────────────────────────────
function AdminFichajesPendientes({ participantes, federacion, actorNombre }) {
  const [pendientes, setPendientes]   = useState(null);
  const [plantillasMap, setPlantillasMap] = useState({}); // participante_id → [{jugador_id, nombre, posicion, equipo}]
  const [liberarSel, setLiberarSel]   = useState({});     // pendiente_id → jugador_id a liberar
  const [procesando, setProcesando]   = useState(null);

  const cargar = async () => {
    if (!sb) return;
    const partIds = participantes.map(p => p.id);
    if (!partIds.length) { setPendientes([]); return; }
    const [{ data: pends }, { data: plants }] = await Promise.all([
      sb.from('fichajes_pendientes')
        .select('id, participante_id, jugador_id, precio_compra, traspaso_de_id, participantes(nombre), jugadores(nombre, equipo, posicion), origen:traspaso_de_id(nombre)')
        .in('participante_id', partIds)
        .order('id', { ascending: true }),
      sb.from('plantillas')
        .select('participante_id, jugador_id, jugadores(nombre, equipo, posicion, lesionado)')
        .in('participante_id', partIds),
    ]);
    const pm = {};
    for (const p of (plants || [])) {
      if (!pm[p.participante_id]) pm[p.participante_id] = [];
      pm[p.participante_id].push({ jugador_id: p.jugador_id, nombre: p.jugadores?.nombre || '', posicion: p.jugadores?.posicion || '', equipo: p.jugadores?.equipo || '', lesionado: p.jugadores?.lesionado || false });
    }
    setPendientes(pends || []);
    setPlantillasMap(pm);
  };

  useEffect(() => { cargar(); }, []);

  const activar = async (pend) => {
    const plantilla = plantillasMap[pend.participante_id] || [];
    const activosCount = plantilla.filter(p => !p.lesionado).length;
    const liberar   = activosCount >= 14 ? (liberarSel[pend.id] || '') : null;
    if (activosCount >= 14 && !liberar) {
      alert('El equipo tiene la plantilla llena (14 activos). Selecciona qué jugador liberar primero.');
      return;
    }
    setProcesando(pend.id);
    const { error } = await sb.rpc('activar_fichaje_pendiente', {
      p_pendiente_id:       pend.id,
      p_liberar_jugador_id: liberar || null,
      p_federacion_id:      federacion?.id,
    });
    setProcesando(null);
    if (error) {
      const msgs = {
        plantilla_llena_indica_baja:      'El equipo está lleno. Selecciona quién sale.',
        jugador_a_liberar_no_encontrado:  'El jugador a liberar no está en la plantilla.',
        fichaje_no_encontrado:            'Este fichaje pendiente ya no existe.',
        no_autorizado:                    'No tienes permiso para realizar esta acción.',
      };
      alert(msgs[error.message] || 'Error: ' + error.message);
      return;
    }
    const jug = pend.jugadores;
    const nom = jug?.posicion === 'POR' ? `Portería ${jug?.equipo}` : jug?.nombre;
    publicar(federacion?.id, 'fichaje', `${pend.participantes?.nombre} incorpora a ${nom} a su plantilla`);
    cargar();
  };

  const anular = async (pend) => {
    const jug = pend.jugadores;
    const nom = jug?.posicion === 'POR' ? `Portería ${jug?.equipo}` : jug?.nombre;
    const esTraspaso = !!pend.traspaso_de_id;
    const pct    = federacion?.pct_venta_mercado ?? 100;
    const refund = fmt(Math.round(pend.precio_compra * pct / 100));
    const msg = esTraspaso
      ? `¿Descartar el traspaso de ${nom} para ${pend.participantes?.nombre}?\n` +
        `Se reembolsará el ${pct}% del traspaso (${refund}).\n` +
        `El jugador volverá a ${pend.origen?.nombre || 'su equipo de origen'} si tiene plaza libre, o quedará libre.`
      : `¿Anular el fichaje pendiente de ${nom} para ${pend.participantes?.nombre}?\nSe reembolsará el ${pct}% del precio pagado (${refund}).`;
    if (!confirm(msg)) return;
    setProcesando(pend.id);
    if (esTraspaso) {
      const { data, error } = await sb.rpc('anular_traspaso_pendiente', {
        p_pendiente_id:  pend.id,
        p_federacion_id: federacion?.id,
      });
      setProcesando(null);
      if (error || !data?.ok) { alert('Error: ' + (error?.message || data?.error || 'desconocido')); return; }
    } else {
      const { error } = await sb.rpc('anular_fichaje_pendiente', {
        p_pendiente_id:  pend.id,
        p_federacion_id: federacion?.id,
      });
      setProcesando(null);
      if (error) { alert('Error: ' + error.message); return; }
    }
    publicar(federacion?.id, 'admin', `Fichaje de ${nom} para ${pend.participantes?.nombre} anulado`, actorNombre);
    cargar();
  };

  if (pendientes === null) return <Spinner />;

  return (
    <div className="card">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center',
                   marginBottom:'1rem', flexWrap:'wrap', gap:'.5rem'}}>
        <h2 style={{margin:0}}>Fichajes pendientes de plaza ({pendientes.length})</h2>
        <button onClick={cargar}
                style={{padding:'.3rem .8rem', borderRadius:6, border:'1.5px solid var(--borde)',
                        background:'var(--fondo)', cursor:'pointer', fontSize:'.85rem'}}>
          Actualizar
        </button>
      </div>

      {pendientes.length === 0 ? (
        <div className="empty">No hay fichajes pendientes de plaza.</div>
      ) : pendientes.map(pend => {
        const jug      = pend.jugadores || {};
        const nomJug   = jug.posicion === 'POR' ? `Portería ${jug.equipo}` : jug.nombre;
        const plantilla = plantillasMap[pend.participante_id] || [];
        const activosAdm = plantilla.filter(p => !p.lesionado).length;
        const llena     = activosAdm >= 14;
        const sel       = liberarSel[pend.id] || '';
        const enProceso = procesando === pend.id;

        return (
          <div key={pend.id}
               style={{display:'flex', flexWrap:'wrap', gap:'.75rem', alignItems:'flex-start',
                       padding:'.9rem 0', borderBottom:'1px solid var(--borde)'}}>

            {/* Equipo */}
            <div style={{minWidth:130, flex:'0 0 auto'}}>
              <div style={{fontSize:'.75rem', color:'var(--texto2)', marginBottom:'.1rem'}}>Equipo</div>
              <div style={{fontWeight:700}}>{pend.participantes?.nombre || '—'}</div>
            </div>

            {/* Jugador */}
            <div style={{flex:'1 1 160px'}}>
              <div style={{fontSize:'.75rem', color:'var(--texto2)', marginBottom:'.1rem'}}>Jugador</div>
              <div style={{fontWeight:600}}>{nomJug || '—'}</div>
              <div style={{fontSize:'.8rem', color:'var(--texto2)'}}>{jug.posicion} · {jug.equipo}</div>
            </div>

            {/* Precio / origen */}
            <div style={{minWidth:110, flex:'0 0 auto'}}>
              <div style={{fontSize:'.75rem', color:'var(--texto2)', marginBottom:'.1rem'}}>
                {pend.traspaso_de_id ? 'Traspaso de' : 'Precio'}
              </div>
              {pend.traspaso_de_id
                ? <><div style={{fontWeight:600, fontSize:'.85rem'}}>{pend.origen?.nombre || '—'}</div>
                    <div style={{fontSize:'.8rem', color:'var(--texto2)'}}>{fmt(pend.precio_compra)}</div></>
                : <div style={{fontWeight:600}}>{fmt(pend.precio_compra)}</div>
              }
            </div>

            {/* Plantilla */}
            <div style={{minWidth:80, flex:'0 0 auto'}}>
              <div style={{fontSize:'.75rem', color:'var(--texto2)', marginBottom:'.1rem'}}>Plantilla</div>
              <div style={{fontWeight:600, color: llena ? '#dc3545' : '#198754'}}>
                {activosAdm}/14 {llena ? '(llena)' : ''}
                {plantilla.length > activosAdm && <span style={{fontSize:'.8rem', color:'#dc3545', marginLeft:4}}>(+{plantilla.length - activosAdm} les.)</span>}
              </div>
            </div>

            {/* Acciones */}
            <div style={{display:'flex', flexWrap:'wrap', gap:'.5rem', alignItems:'center', flex:'1 1 220px'}}>
              {llena && (
                <select value={sel}
                        onChange={e => setLiberarSel(s => ({...s, [pend.id]: e.target.value}))}
                        style={{padding:'.3rem .6rem', borderRadius:7, border:'1.5px solid var(--borde)',
                                fontSize:'.82rem', maxWidth:200}}>
                  <option value="">— Quién sale —</option>
                  {plantilla.map(p => (
                    <option key={p.jugador_id} value={p.jugador_id}>
                      {p.posicion === 'POR' ? `POR ${p.equipo}` : p.nombre} ({p.posicion})
                    </option>
                  ))}
                </select>
              )}
              <button className="btn-fichar"
                      disabled={enProceso || (llena && !sel)}
                      onClick={() => activar(pend)}>
                {enProceso ? '…' : 'Activar'}
              </button>
              <button disabled={enProceso}
                      onClick={() => anular(pend)}
                      style={{padding:'.3rem .7rem', borderRadius:7, border:'1.5px solid #dc3545',
                              background:'var(--fondo)', color:'#dc3545', cursor:'pointer',
                              fontSize:'.82rem', fontWeight:600}}>
                {pend.traspaso_de_id ? 'Descartar (80%)' : 'Anular'}
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── ADMIN — PUJAS ──────────────────────────────────────────────
function AdminPujas({ participantes, federacion, actorNombre }) {
  const [pujas, setPujas]           = useState(null);
  const [resolviendo, setResolviendo] = useState(null);
  const [resueltos, setResueltos]   = useState(new Set()); // jugador_ids ya adjudicados esta sesión
  const [historial, setHistorial]   = useState([]);
  const [verHistorial, setVerHistorial] = useState(false);

  const cargar = () => {
    if (!sb) return;
    const partIds = participantes.map(p => p.id);
    if (!partIds.length) { setPujas([]); return; }
    sb.from('pujas')
      .select('id, participante_id, jugador_id, cantidad, created_at, jugadores(id, nombre, equipo, posicion, valor_mercado), participantes(nombre)')
      .eq('resuelta', false)
      .in('participante_id', partIds)
      .order('cantidad', { ascending: false })
      .then(({ data }) => setPujas(data || []));
  };

  const cargarHistorial = () => {
    if (!sb) return;
    const partIds = participantes.map(p => p.id);
    if (!partIds.length) { setHistorial([]); return; }
    sb.from('pujas')
      .select('id, participante_id, cantidad, ganadora, created_at, jugadores(nombre, equipo, posicion), participantes(nombre)')
      .eq('resuelta', true)
      .eq('ganadora', true)
      .in('participante_id', partIds)
      .order('created_at', { ascending: false })
      .limit(50)
      .then(({ data }) => setHistorial(data || []));
  };

  useEffect(cargar, []);

  // Agrupar por jugador, bids ordenadas de mayor a menor
  const porJugador = useMemo(() => {
    if (!pujas) return [];
    const m = {};
    for (const p of pujas) {
      const jid = p.jugador_id;
      if (resueltos.has(jid)) continue; // ya adjudicado en esta sesión, no mostrar
      if (!m[jid]) m[jid] = { jugador: p.jugadores, bids: [] };
      m[jid].bids.push({ ...p, equipo: p.participantes?.nombre });
    }
    for (const jid in m) m[jid].bids.sort((a,b) => b.cantidad - a.cantidad);
    return Object.values(m).sort((a,b) =>
      (POS_ORDEN[a.jugador?.posicion]||9) - (POS_ORDEN[b.jugador?.posicion]||9));
  }, [pujas, resueltos]);

  const resolver = async (jugadorId, ganador) => {
    setResolviendo(jugadorId);

    const { data: rpcData, error } = await sb.rpc('resolver_puja', {
      p_jugador_id:    jugadorId,
      p_puja_id:       ganador.id,
      p_federacion_id: federacion?.id,
    });

    if (error) {
      const msgs = {
        puja_ya_resuelta:           'Esta puja ya fue adjudicada por otro administrador.',
        presupuesto_insuficiente:   `${ganador.equipo} no tiene presupuesto suficiente.`,
        porteria_ocupada:           'Esta portería ya está en otro equipo de la misma división.',
        no_autorizado:              'No tienes permisos para resolver pujas en esta federación.',
        jugador_ya_en_equipo:       'Este equipo ya tiene a este jugador en su plantilla.',
        jugador_ya_fichado:         'Este jugador ya ha sido fichado por otro equipo.',
        limite_duplicados_alcanzado:'Se ha alcanzado el número máximo de equipos permitidos para este jugador.',
      };
      alert(msgs[error.message] || 'Error al resolver la puja: ' + error.message);
      setResolviendo(null);
      return;
    }

    const grupo  = porJugador.find(g => g.jugador?.id === jugadorId);
    const jug    = grupo?.jugador;
    const nomJug = jug?.posicion === 'POR' ? `Portería ${jug?.equipo}` : jug?.nombre;
    const resto  = (grupo?.bids || [])
      .filter(b => b.id !== ganador.id)
      .sort((a, b) => b.cantidad - a.cantidad)
      .map(b => `- ${b.equipo} pujó ${fmt(b.cantidad)}`)
      .join('\n');
    const lineaPrincipal = rpcData?.pendiente
      ? `${ganador.equipo} ficha a ${nomJug} por ${fmt(ganador.cantidad)} (pendiente de plaza).`
      : `${ganador.equipo} ficha a ${nomJug} por ${fmt(ganador.cantidad)}.`;
    const texto = resto ? `${lineaPrincipal}\nResto de pujas:\n${resto}` : lineaPrincipal;
    publicar(federacion?.id, 'fichaje', texto, actorNombre);
    setResueltos(prev => new Set([...prev, jugadorId]));
    setResolviendo(null);
    cargar();
    cargarHistorial();
  };

  const descartarPujas = async (jugadorId) => {
    const { error } = await sb.from('pujas').update({ resuelta: true, ganadora: false }).eq('jugador_id', jugadorId);
    if (error) { alert('Error al descartar pujas: ' + error.message); return; }
    setResueltos(prev => new Set([...prev, jugadorId]));
    cargar();
    cargarHistorial();
  };

  if (pujas === null) return <Spinner />;

  return (
    <div className="card">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem', flexWrap:'wrap', gap:'.5rem'}}>
        <h2 style={{margin:0}}>Pujas pendientes</h2>
        <div style={{display:'flex', gap:'.5rem'}}>
          <button onClick={cargar} style={{padding:'.3rem .8rem', borderRadius:6,
                  border:'1.5px solid var(--borde)', background:'#fff', cursor:'pointer', fontSize:'.85rem'}}>
            Actualizar
          </button>
          <button onClick={() => { setVerHistorial(v => !v); if (!verHistorial) cargarHistorial(); }}
                  style={{padding:'.3rem .8rem', borderRadius:6, border:'1.5px solid var(--borde)',
                          background: verHistorial ? 'var(--verde)' : '#fff', color: verHistorial ? '#fff' : 'inherit',
                          cursor:'pointer', fontSize:'.85rem'}}>
            {verHistorial ? 'Ocultar historial' : 'Ver historial'}
          </button>
        </div>
      </div>

      {verHistorial && (
        <div style={{marginBottom:'1.5rem'}}>
          <h3 style={{fontSize:'1rem', marginBottom:'.75rem'}}>Historial de pujas adjudicadas</h3>
          {historial.length === 0
            ? <div className="empty">Sin pujas resueltas aún.</div>
            : <table style={{width:'100%', fontSize:'.85rem'}}>
                <thead>
                  <tr>
                    <th style={{textAlign:'left'}}>Jugador</th>
                    <th style={{textAlign:'left'}}>Equipo adjudicado</th>
                    <th style={{textAlign:'right'}}>Cantidad</th>
                    <th style={{textAlign:'left', color:'var(--texto2)'}}>Fecha</th>
                  </tr>
                </thead>
                <tbody>
                  {historial.map(p => (
                    <tr key={p.id}>
                      <td style={{fontWeight:600}}>
                        <span className={`badge ${p.jugadores?.posicion}`} style={{marginRight:6}}>{p.jugadores?.posicion}</span>
                        {p.jugadores?.posicion === 'POR' ? `Portería ${p.jugadores?.equipo}` : p.jugadores?.nombre}
                      </td>
                      <td>{p.participantes?.nombre}</td>
                      <td style={{textAlign:'right', fontWeight:700, color:'var(--verde)'}}>{fmt(p.cantidad)}</td>
                      <td style={{color:'var(--texto2)', fontSize:'.78rem'}}>{new Date(p.created_at).toLocaleDateString('es-ES')}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
          <hr style={{margin:'1rem 0', borderColor:'var(--borde)'}} />
        </div>
      )}


      {porJugador.length === 0 && (
        <div className="empty">No hay pujas pendientes.</div>
      )}

      {porJugador.map(({ jugador, bids }) => (
        <div key={jugador?.id} style={{marginBottom:'1.5rem', borderBottom:'1px solid var(--borde)', paddingBottom:'1rem'}}>
          <div style={{display:'flex', alignItems:'center', gap:'.6rem', marginBottom:'.5rem'}}>
            <span className={`badge ${jugador?.posicion}`}>{jugador?.posicion}</span>
            <strong>{jugador?.posicion === 'POR' ? `Portería ${jugador?.equipo}` : jugador?.nombre}</strong>
            {jugador?.posicion !== 'POR' && <span style={{color:'var(--texto2)', fontSize:'.85rem'}}>{jugador?.equipo}</span>}
            <span style={{color:'var(--texto2)', fontSize:'.8rem', marginLeft:'auto'}}>{bids.length} puja{bids.length !== 1 ? 's' : ''}</span>
          </div>
          <table style={{width:'100%', marginBottom:'.5rem'}}>
            <thead>
              <tr>
                <th style={{textAlign:'left', fontSize:'.8rem', color:'var(--texto2)', fontWeight:600, paddingBottom:'.2rem'}}>Equipo</th>
                <th style={{textAlign:'right', fontSize:'.8rem', color:'var(--texto2)', fontWeight:600, paddingBottom:'.2rem'}}>Puja</th>
                <th style={{textAlign:'right', fontSize:'.8rem', color:'var(--texto2)', fontWeight:600, paddingBottom:'.2rem'}}>Dif. VM</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {bids.map((b, i) => {
                const dif = b.cantidad - (jugador?.valor_mercado || 0);
                return (
                  <tr key={b.id} style={{background: i === 0 ? '#f0fdf4' : ''}}>
                    <td style={{fontWeight: i===0 ? 700 : 400}}>
                      {i === 0 && <span style={{color:'#198754', marginRight:4}}>👑</span>}
                      {b.equipo}
                    </td>
                    <td style={{textAlign:'right', fontWeight: i===0 ? 700 : 400}}>{fmt(b.cantidad)}</td>
                    <td style={{textAlign:'right', fontSize:'.85rem',
                                color: dif >= 0 ? '#198754' : '#dc3545'}}>
                      {dif > 0 ? '+' : ''}{fmt(dif)}
                    </td>
                    <td style={{textAlign:'right'}}>
                      {i === 0 && (
                        <button onClick={() => resolver(jugador.id, b)}
                                disabled={resolviendo === jugador.id}
                                style={{padding:'.25rem .6rem', fontSize:'.8rem', borderRadius:6,
                                        border:'none', background:'#198754', color:'#fff',
                                        cursor:'pointer', fontWeight:600}}>
                          {resolviendo === jugador.id ? '…' : 'Adjudicar'}
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <button onClick={() => descartarPujas(jugador.id)}
                  style={{fontSize:'.78rem', color:'#dc3545', background:'none', border:'none',
                          cursor:'pointer', padding:0}}>
            Descartar todas las pujas de este jugador
          </button>
        </div>
      ))}
    </div>
  );
}

// ── ADMIN — CIERRES DE JORNADA ─────────────────────────────────
function AdminCierres({ federacion, actorNombre }) {
  const [jornada, setJornada] = useState(federacion?.jornada_actual || 1);
  const [cierre, setCierre]   = useState('');
  const [msg, setMsg]         = useState('');

  const fedId = federacion?.id;

  const cargar = () => {
    if (!sb || !fedId) return;
    sb.from('jornadas_cierre').select('cierre')
      .eq('federacion_id', fedId).eq('jornada', jornada).maybeSingle()
      .then(({ data }) => setCierre(data?.cierre ? data.cierre.slice(0, 16) : ''));
  };
  useEffect(cargar, [jornada, fedId]);

  const guardar = async () => {
    if (!sb || !fedId) return;
    if (!cierre) {
      await sb.from('jornadas_cierre').delete()
        .eq('federacion_id', fedId).eq('jornada', jornada);
      publicar(fedId, 'admin', `Cierre de alineaciones de J${jornada} eliminado`, actorNombre);
      setMsg('Cierre eliminado');
    } else {
      await sb.from('jornadas_cierre')
        .upsert({ federacion_id: fedId, jornada, cierre: new Date(cierre).toISOString() },
                { onConflict: 'federacion_id,jornada' });
      publicar(fedId, 'admin', `Cierre de alineaciones de J${jornada} fijado para el ${new Date(cierre).toLocaleString('es-ES', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}`, actorNombre);
      setMsg('Cierre guardado');
    }
    setTimeout(() => setMsg(''), 3000);
  };

  return (
    <div className="card">
      <h2>Cierre de alineaciones por jornada</h2>
      <p style={{fontSize:'.9rem', color:'var(--texto2)', marginBottom:'1rem'}}>
        Establece la hora límite a partir de la cual los equipos no pueden modificar su alineación.
        Deja el campo vacío y guarda para eliminar el cierre de una jornada.
      </p>
      <div style={{display:'flex', gap:'1rem', alignItems:'flex-end', flexWrap:'wrap'}}>
        <div>
          <label style={{fontSize:'.85rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>Jornada</label>
          <select value={jornada} onChange={e => setJornada(Number(e.target.value))}
                  style={{padding:'.4rem .7rem', borderRadius:6, border:'1.5px solid var(--borde)'}}>
            {Array.from({length:38},(_,i)=>i+1).map(j =>
              <option key={j} value={j}>Jornada {j}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:'.85rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>
            Fecha y hora de cierre
          </label>
          <input type="datetime-local" value={cierre} onChange={e => setCierre(e.target.value)}
                 style={{padding:'.4rem .7rem', borderRadius:6, border:'1.5px solid var(--borde)'}} />
        </div>
        <button className="btn-ok" onClick={guardar}>Guardar</button>
        {msg && <span style={{color:'#198754', fontSize:'.9rem'}}>{msg}</span>}
      </div>
      {cierre && (
        <p style={{marginTop:'.8rem', fontSize:'.85rem', color:'var(--texto2)'}}>
          Cierre actual J{jornada}: <strong>{new Date(cierre).toLocaleString('es-ES')}</strong>
        </p>
      )}
    </div>
  );
}

// ── ADMIN — MERCADO (ventas + sorteo) ─────────────────────────
function AdminMercado({ federacion, onFederacionUpdate, actorNombre }) {
  const [ventas,       setVentas]       = useState(!!federacion?.ventas_habilitadas);
  const [sorteo,       setSorteo]       = useState(!!federacion?.sorteo_habilitado);
  const [ptsMod,       setPtsMod]       = useState(!!federacion?.puntos_mod_habilitado);
  const [cesiones,     setCesiones]     = useState(federacion?.cesiones_habilitadas ?? true);
  const [duplicados,   setDuplicados]   = useState(!!federacion?.duplicados_habilitado);
  const [duplValorMin, setDuplValorMin] = useState(federacion?.duplicados_valor_min ?? 0);
  const [duplMax,      setDuplMax]      = useState(federacion?.duplicados_max ?? 2);
  const [limpiando,    setLimpiando]    = useState(false);
  const [horaCierre,   setHoraCierre]   = useState(federacion?.hora_cierre_pujas?.slice(0,5) || '');
  const [pctVenta,     setPctVenta]     = useState(federacion?.pct_venta_mercado ?? 100);
  const [msg, setMsg]                   = useState('');

  const CAMPO_LOG = {
    ventas_habilitadas:      v => `Ventas en el mercado ${v ? 'habilitadas' : 'deshabilitadas'}`,
    sorteo_habilitado:       v => `Sorteo del mercado ${v ? 'habilitado' : 'deshabilitado'}`,
    puntos_mod_habilitado:   v => `Puntos por moderador ${v ? 'habilitado' : 'deshabilitado'}`,
    cesiones_habilitadas:    v => `Cesiones ${v ? 'habilitadas' : 'deshabilitadas'}`,
    duplicados_habilitado:   v => `Jugadores duplicados ${v ? 'habilitados' : 'deshabilitados'}`,
  };

  const cambiar = async (campo, valor, setEstado) => {
    if (!sb || !federacion) return;
    const { error } = await sb.from('federaciones')
      .update({ [campo]: valor }).eq('id', federacion.id);
    if (error) { alert('Error al guardar: ' + error.message); return; }
    setEstado(valor);
    onFederacionUpdate({ ...federacion, [campo]: valor });
    if (CAMPO_LOG[campo]) publicar(federacion.id, 'admin', CAMPO_LOG[campo](valor), actorNombre);
    setMsg('Guardado');
    setTimeout(() => setMsg(''), 2500);
  };

  const guardarHora = async () => {
    if (!sb || !federacion) return;
    const val = horaCierre || null;
    const { error } = await sb.from('federaciones')
      .update({ hora_cierre_pujas: val }).eq('id', federacion.id);
    if (error) { alert('Error al guardar: ' + error.message); return; }
    onFederacionUpdate({ ...federacion, hora_cierre_pujas: val });
    publicar(federacion.id, 'admin', val ? `Hora de cierre automático de pujas fijada a las ${val}` : 'Hora de cierre automático de pujas desactivada', actorNombre);
    setMsg('Guardado');
    setTimeout(() => setMsg(''), 2500);
  };

  const guardarPctVenta = async () => {
    if (!sb || !federacion) return;
    const val = Math.max(1, Math.min(100, Number(pctVenta) || 100));
    setPctVenta(val);
    const { error } = await sb.from('federaciones')
      .update({ pct_venta_mercado: val }).eq('id', federacion.id);
    if (error) { alert('Error al guardar: ' + error.message); return; }
    onFederacionUpdate({ ...federacion, pct_venta_mercado: val });
    setMsg('Guardado');
    setTimeout(() => setMsg(''), 2500);
  };


  const limpiarYDesactivar = async () => {
    if (!sb || !federacion) return;
    const ok = window.confirm(
      'Al desactivar los jugadores duplicados se realizará una limpieza automática:\n\n' +
      '· Se eliminará de cada plantilla toda copia extra del mismo jugador, conservando la primera en ficharse.\n' +
      '· El precio de compra se devolverá al presupuesto de cada equipo afectado.\n\n' +
      'Esta acción no se puede deshacer. ¿Continuar?'
    );
    if (!ok) return;
    setLimpiando(true);
    setMsg('Limpiando duplicados…');
    const { data, error } = await sb.rpc('limpiar_duplicados_federacion', { p_federacion_id: federacion.id });
    setLimpiando(false);
    if (error) {
      setMsg('');
      alert('Error al limpiar duplicados: ' + error.message);
      return;
    }
    const { afectados, reembolsado } = data || {};
    await cambiar('duplicados_habilitado', false, setDuplicados);
    if (afectados > 0) {
      setMsg(`Limpieza completada: ${afectados} jugador${afectados !== 1 ? 'es' : ''} saneado${afectados !== 1 ? 's' : ''}, ${fmt(reembolsado || 0)} devueltos.`);
      setTimeout(() => setMsg(''), 6000);
    }
  };

  const guardarDuplicadosCfg = async () => {
    if (!sb || !federacion) return;
    const vm  = Math.max(0, Number(duplValorMin) || 0);
    const mx  = Math.max(2, Number(duplMax) || 2);
    const oldVm = federacion.duplicados_valor_min ?? 0;
    const subeUmbral = vm > oldVm;

    if (subeUmbral) {
      const ok = window.confirm(
        `Al subir el umbral a ${fmt(vm)}, los jugadores con valor inferior que estén duplicados perderán sus copias extra.\n\n` +
        'Solo se conservará la primera copia fichada. El precio de compra se devolverá al presupuesto de cada equipo afectado.\n\n' +
        '¿Continuar?'
      );
      if (!ok) return;
    }

    setDuplValorMin(vm); setDuplMax(mx);
    const { error } = await sb.from('federaciones')
      .update({ duplicados_valor_min: vm, duplicados_max: mx }).eq('id', federacion.id);
    if (error) { alert('Error al guardar: ' + error.message); return; }
    onFederacionUpdate({ ...federacion, duplicados_valor_min: vm, duplicados_max: mx });

    if (subeUmbral) {
      setMsg('Limpiando duplicados por debajo del nuevo umbral…');
      const { data, error: errRpc } = await sb.rpc('limpiar_duplicados_bajo_umbral', {
        p_federacion_id:   federacion.id,
        p_nuevo_valor_min: vm,
      });
      if (errRpc) {
        alert('Configuración guardada, pero error al limpiar duplicados: ' + errRpc.message);
        setMsg(''); return;
      }
      const { afectados, reembolsado } = data || {};
      setMsg(afectados > 0
        ? `Guardado. ${afectados} jugador${afectados !== 1 ? 'es' : ''} saneado${afectados !== 1 ? 's' : ''}, ${fmt(reembolsado || 0)} devueltos.`
        : 'Guardado. No había duplicados por debajo del nuevo umbral.'
      );
    } else {
      setMsg('Guardado');
    }
    setTimeout(() => setMsg(''), 5000);
  };

  const Opcion = ({ label, desc, activo, onChange, disabled }) => (
    <div style={{display:'flex', alignItems:'flex-start', gap:'1rem',
                 padding:'1rem 0', borderBottom:'1px solid var(--borde)'}}>
      <div style={{flex:1}}>
        <div style={{fontWeight:700, marginBottom:'.2rem'}}>{label}</div>
        <div style={{fontSize:'.85rem', color:'var(--texto2)'}}>{desc}</div>
      </div>
      <div style={{display:'flex', alignItems:'center', gap:'.6rem', flexShrink:0}}>
        <span style={{fontSize:'.85rem', fontWeight:600,
                      color: activo ? 'var(--verde)' : 'var(--texto2)'}}>
          {activo ? 'Activado' : 'Desactivado'}
        </span>
        <button className={activo ? 'btn-cancel' : 'btn-ok'}
                onClick={() => onChange(!activo)} disabled={!!disabled}>
          {activo ? 'Desactivar' : 'Activar'}
        </button>
      </div>
    </div>
  );

  return (
    <div className="card">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'.25rem'}}>
        <h2 style={{margin:0}}>Mercado</h2>
        {msg && <span style={{color:'var(--verde)', fontSize:'.88rem', fontWeight:600}}>{msg}</span>}
      </div>
      <Opcion
        label="Venta de jugadores"
        desc="Permite a los equipos vender jugadores de su plantilla y recibir su valor de mercado."
        activo={ventas}
        onChange={v => cambiar('ventas_habilitadas', v, setVentas)}
      />
      <Opcion
        label="Sorteo aleatorio"
        desc="Permite a cada equipo rellenar su plantilla con jugadores libres elegidos al azar, pagando su valor de mercado."
        activo={sorteo}
        onChange={v => cambiar('sorteo_habilitado', v, setSorteo)}
      />
      <Opcion
        label="Moderadores pueden introducir puntos"
        desc="Permite a los moderadores acceder a la pestaña 'Pts Jugadores' en Admin."
        activo={ptsMod}
        onChange={v => cambiar('puntos_mod_habilitado', v, setPtsMod)}
      />
      <Opcion
        label="Solicitudes de cesión"
        desc="Permite a los equipos solicitar el préstamo de jugadores de otros equipos para una jornada concreta. Desactivar esto impide nuevas solicitudes, pero no afecta a las cesiones ya aprobadas."
        activo={cesiones}
        onChange={v => cambiar('cesiones_habilitadas', v, setCesiones)}
      />
      <Opcion
        label="Jugadores duplicados"
        desc="Permite que un mismo jugador (nunca porteros) esté fichado por varios equipos simultáneamente, hasta el número máximo de copias. Si el valor mínimo es 0, aplica a todos los jugadores no-POR."
        activo={duplicados}
        onChange={v => {
          if (!v) { limpiarYDesactivar(); return; }
          cambiar('duplicados_habilitado', true, setDuplicados);
        }}
        disabled={limpiando}
      />
      {duplicados && (
        <div style={{display:'flex', gap:'1.5rem', padding:'.5rem 0 1rem', flexWrap:'wrap', alignItems:'flex-end', borderBottom:'1px solid var(--borde)'}}>
          <label style={{display:'flex', flexDirection:'column', gap:'.3rem', fontSize:'.9rem'}}>
            <span style={{fontWeight:700}}>Valor mínimo (M€) para duplicar <span style={{fontWeight:400, color:'var(--texto2)'}}>(0 = todos)</span></span>
            <input type="number" min={0} step={100000} value={duplValorMin}
                   onChange={e => setDuplValorMin(e.target.value)}
                   style={{width:150, padding:'.4rem .6rem', borderRadius:8,
                           border:'1.5px solid var(--borde)', fontSize:'.9rem', textAlign:'right'}} />
          </label>
          <label style={{display:'flex', flexDirection:'column', gap:'.3rem', fontSize:'.9rem'}}>
            <span style={{fontWeight:700}}>Máx. equipos por jugador</span>
            <input type="number" min={2} max={20} value={duplMax}
                   onChange={e => setDuplMax(e.target.value)}
                   style={{width:80, padding:'.4rem .6rem', borderRadius:8,
                           border:'1.5px solid var(--borde)', fontSize:'.9rem', textAlign:'right'}} />
          </label>
          <button className="btn-ok" onClick={guardarDuplicadosCfg}>Guardar</button>
        </div>
      )}
      <div style={{display:'flex', alignItems:'center', gap:'1rem',
                   padding:'1rem 0', flexWrap:'wrap'}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700, marginBottom:'.2rem'}}>Hora de cierre automático de pujas</div>
          <div style={{fontSize:'.85rem', color:'var(--texto2)'}}>
            Cada día a esta hora se resuelven automáticamente todas las pujas: el equipo que más
            dinero haya pujado se lleva al jugador. Solo activo cuando el mercado está habilitado.
            Deja en blanco para desactivar.
          </div>
        </div>
        <div style={{display:'flex', gap:'.5rem', alignItems:'center', flexShrink:0}}>
          <input type="time" value={horaCierre} onChange={e => setHoraCierre(e.target.value)}
                 style={{padding:'.45rem .7rem', borderRadius:8,
                         border:'1.5px solid var(--borde)', fontSize:'.95rem'}} />
          <button className="btn-ok" onClick={guardarHora}>Guardar</button>
        </div>
      </div>

      <div style={{display:'flex', alignItems:'center', gap:'1rem',
                   padding:'1rem 0', flexWrap:'wrap'}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700, marginBottom:'.2rem'}}>Porcentaje de recuperación al vender</div>
          <div style={{fontSize:'.85rem', color:'var(--texto2)'}}>
            Porcentaje del valor de mercado que recibe el equipo al vender un jugador al mercado.
            100 % = recupera el valor íntegro. Valores inferiores suponen una penalización por venta.
          </div>
        </div>
        <div style={{display:'flex', gap:'.5rem', alignItems:'center', flexShrink:0}}>
          <div style={{display:'flex', alignItems:'center', gap:'.3rem'}}>
            <input type="number" min={1} max={100} value={pctVenta}
                   onChange={e => setPctVenta(e.target.value)}
                   style={{width:70, padding:'.45rem .7rem', borderRadius:8,
                           border:'1.5px solid var(--borde)', fontSize:'.95rem',
                           textAlign:'center'}} />
            <span style={{fontWeight:700, fontSize:'.95rem'}}>%</span>
          </div>
          <button className="btn-ok" onClick={guardarPctVenta}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN — MI FEDERACIÓN ──────────────────────────────────────
function AdminFederacion({ federacion, onFederacionUpdate, participantes = [], onParticipantesChange, isModerador, actorNombre }) {
  const [nombre, setNombre]       = useState(federacion?.nombre || '');
  const [presup, setPresup]       = useState(String(federacion?.presupuesto_inicial ?? 100000000));
  const [jornada, setJornada]     = useState(String(federacion?.jornada_actual ?? 1));
  const [msg, setMsg]             = useState('');
  const [copiado, setCopiado]     = useState(false);
  const [nuevoEq, setNuevoEq]     = useState({ nombre:'', estadio:'', entrenador:'' });
  const [msgEq, setMsgEq]         = useState('');
  const [eliminando, setEliminando] = useState(null);
  const [subiendo, setSubiendo]   = useState(false);

  const [mods, setMods]       = useState([]);   // [{id, participante_id}]
  const [selMod, setSelMod]   = useState('');
  const [msgMod, setMsgMod]   = useState('');

  const [resetModal,        setResetModal]        = useState(false);
  const [resetConfirmNombre, setResetConfirmNombre] = useState('');
  const [reseteando,        setReseteando]        = useState(false);

  const cargarMods = async () => {
    if (!federacion) return;
    const { data } = await sb.from('moderadores').select('id, participante_id')
      .eq('federacion_id', federacion.id);
    setMods(data || []);
  };

  useEffect(() => { cargarMods(); }, [federacion?.id]);

  const añadirModerador = async () => {
    if (!selMod) { setMsgMod('Selecciona un equipo'); return; }
    const { error } = await sb.from('moderadores')
      .insert({ federacion_id: federacion.id, participante_id: selMod });
    if (error) { setMsgMod('Error: ' + error.message); return; }
    const nomMod = participantes.find(p => p.id === selMod)?.nombre || selMod;
    publicar(federacion.id, 'moderador', `${nomMod} ha sido nombrado moderador de la federación`, actorNombre);
    setSelMod('');
    setMsgMod('Moderador añadido');
    setTimeout(() => setMsgMod(''), 2500);
    cargarMods();
  };

  const quitarModerador = async (modId) => {
    const modPid = mods.find(m => m.id === modId)?.participante_id;
    const nomMod = participantes.find(p => p.id === modPid)?.nombre;
    await sb.from('moderadores').delete().eq('id', modId);
    if (nomMod) publicar(federacion.id, 'moderador', `${nomMod} ha dejado de ser moderador de la federación`, actorNombre);
    cargarMods();
  };

  const modPids  = new Set(mods.map(m => m.participante_id));
  // Candidatos: equipos de la federación que tienen usuario, no son admin, y no son ya moderadores
  const candidatos = participantes.filter(p => p.user_id && p.user_id !== federacion?.admin_user_id && !modPids.has(p.id));

  const reiniciarFederacion = async () => {
    if (resetConfirmNombre !== federacion?.nombre || reseteando) return;
    setReseteando(true);
    const { error } = await sb.rpc('reiniciar_federacion', { p_federacion_id: federacion.id });
    setReseteando(false);
    if (error) { alert('Error: ' + error.message); return; }
    setResetModal(false);
    setResetConfirmNombre('');
    setJornada('1');
    onFederacionUpdate({ ...federacion, jornada_actual: 1 });
    await publicar(federacion.id, 'reinicio', 'La temporada ha sido reiniciada. Plantillas, clasificaciones y H2H han sido borrados. ¡Comienza una nueva temporada!');
    alert('Temporada reiniciada. Los presupuestos han sido restaurados y la jornada reseteada a 1.');
  };

  const copiar = () => {
    navigator.clipboard.writeText(federacion?.codigo || '').then(() => {
      setCopiado(true);
      setTimeout(() => setCopiado(false), 2000);
    }).catch(() => {});
  };

  const guardar = async () => {
    if (!sb || !federacion) return;
    const nuevoNombre = nombre.trim() || federacion.nombre;
    const nuevoPresup = parseFloat(presup) || federacion.presupuesto_inicial;
    const nuevaJornada = parseInt(jornada) || federacion.jornada_actual;
    const { error, data } = await sb.from('federaciones')
      .update({ nombre: nuevoNombre, presupuesto_inicial: nuevoPresup, jornada_actual: nuevaJornada })
      .eq('id', federacion.id)
      .select().single();
    if (error) { alert('Error: ' + error.message); return; }
    onFederacionUpdate(data);
    const cambios = [];
    if (nuevoNombre !== federacion.nombre) cambios.push(`nombre → "${nuevoNombre}"`);
    if (nuevoPresup !== federacion.presupuesto_inicial) cambios.push(`presupuesto inicial → ${fmt(nuevoPresup)}`);
    if (nuevaJornada !== federacion.jornada_actual) cambios.push(`jornada actual → J${nuevaJornada}`);
    if (cambios.length) publicar(federacion.id, 'admin', `Configuración de federación actualizada: ${cambios.join(', ')}`, actorNombre);
    setMsg('Guardado correctamente');
    setTimeout(() => setMsg(''), 3000);
  };

  const subirLogo = async (file) => {
    if (!file || !sb || !federacion) return;
    setSubiendo(true);
    const ext  = file.name.split('.').pop().toLowerCase();
    const path = `${federacion.id}/logo.${ext}`;
    const { error: upErr } = await sb.storage
      .from('logos-federacion')
      .upload(path, file, { upsert: true, contentType: file.type });
    if (upErr) { alert('Error al subir imagen: ' + upErr.message); setSubiendo(false); return; }
    const { data: { publicUrl } } = sb.storage.from('logos-federacion').getPublicUrl(path);
    // Añadir timestamp para forzar refresco de caché del navegador
    const urlFinal = publicUrl + '?t=' + Date.now();
    const { error, data } = await sb.from('federaciones')
      .update({ logo_url: urlFinal })
      .eq('id', federacion.id).select().single();
    if (error) { alert('Error: ' + error.message); setSubiendo(false); return; }
    onFederacionUpdate(data);
    setSubiendo(false);
    setMsg('Logo actualizado');
    setTimeout(() => setMsg(''), 3000);
  };

  const quitarLogo = async () => {
    if (!sb || !federacion) return;
    const { error, data } = await sb.from('federaciones')
      .update({ logo_url: null })
      .eq('id', federacion.id).select().single();
    if (error) { alert('Error: ' + error.message); return; }
    onFederacionUpdate(data);
    setMsg('Logo eliminado');
    setTimeout(() => setMsg(''), 3000);
  };

  return (
    <>
    <div className="card">
      <h2>Mi Federación</h2>

      {/* ── Logo de la federación ── */}
      <div style={{marginBottom:'1.25rem'}}>
        <div style={{fontSize:'.82rem', color:'var(--texto2)', marginBottom:'.5rem', fontWeight:600}}>
          Logo de la liga
        </div>
        <div style={{display:'flex', alignItems:'center', gap:'1rem', flexWrap:'wrap'}}>
          {federacion?.logo_url
            ? <img src={federacion.logo_url} alt="Logo"
                   style={{height:56, maxWidth:120, objectFit:'contain',
                           border:'1.5px solid var(--borde)', borderRadius:8, padding:4, background:'#fff'}} />
            : <div style={{height:56, width:56, borderRadius:8, border:'1.5px dashed var(--borde)',
                           display:'flex', alignItems:'center', justifyContent:'center',
                           fontSize:'.75rem', color:'var(--texto2)'}}>Sin logo</div>
          }
          <div style={{display:'flex', flexDirection:'column', gap:'.4rem'}}>
            <label style={{display:'inline-block', padding:'.35rem .9rem', borderRadius:8,
                           border:'1.5px solid var(--verde)', background:'#fff', color:'var(--verde)',
                           cursor: subiendo ? 'wait' : 'pointer', fontWeight:600, fontSize:'.85rem',
                           opacity: subiendo ? .6 : 1}}>
              {subiendo ? 'Subiendo…' : 'Subir imagen'}
              <input type="file" accept="image/*" style={{display:'none'}} disabled={subiendo}
                     onChange={e => { if (e.target.files[0]) subirLogo(e.target.files[0]); e.target.value = ''; }} />
            </label>
            {federacion?.logo_url && (
              <button onClick={quitarLogo}
                      style={{padding:'.3rem .75rem', borderRadius:8, border:'1.5px solid #d93025',
                              background:'#fff', color:'#d93025', cursor:'pointer', fontSize:'.82rem', fontWeight:600}}>
                Quitar logo
              </button>
            )}
          </div>
          <div style={{fontSize:'.78rem', color:'var(--texto2)'}}>
            Se mostrará en la esquina superior izquierda.<br/>
            Formatos: PNG, JPG, SVG. Recomendado: fondo transparente.
          </div>
        </div>
      </div>

      <div style={{background:'var(--gris)', borderRadius:10, padding:'1rem 1.25rem', marginBottom:'1.25rem'}}>
        <div style={{fontSize:'.82rem', color:'var(--texto2)', marginBottom:'.35rem', fontWeight:600}}>
          Código de invitación — compártelo con tus amigos
        </div>
        <div style={{display:'flex', alignItems:'center', gap:'1rem'}}>
          <span style={{fontSize:'1.8rem', fontWeight:800, letterSpacing:'.18em', color:'var(--verde)'}}>
            {federacion?.codigo}
          </span>
          <button onClick={copiar}
                  style={{padding:'.35rem .9rem', borderRadius:8, border:'1.5px solid var(--verde)',
                          background:'#fff', color:'var(--verde)', cursor:'pointer', fontWeight:600, fontSize:'.85rem'}}>
            {copiado ? '✓ Copiado' : 'Copiar'}
          </button>
        </div>
        <div style={{fontSize:'.8rem', color:'var(--texto2)', marginTop:'.4rem'}}>
          Para unirse: nombre de la federación + este código
        </div>
      </div>

      <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'flex-end'}}>
        <div style={{flex:2, minWidth:180}}>
          <label style={{fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>
            Nombre de la federación
          </label>
          <input value={nombre} onChange={e => setNombre(e.target.value)}
                 style={{width:'100%', padding:'.45rem .7rem', borderRadius:8,
                         border:'1.5px solid var(--borde)', fontSize:'.95rem'}} />
        </div>
        <div style={{minWidth:140}}>
          <label style={{fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>
            Presupuesto inicial (€)
          </label>
          <input type="number" value={presup} onChange={e => setPresup(e.target.value)}
                 style={{width:'100%', padding:'.45rem .7rem', borderRadius:8,
                         border:'1.5px solid var(--borde)', fontSize:'.95rem'}} />
        </div>
        <div style={{minWidth:100}}>
          <label style={{fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>
            Jornada actual
          </label>
          <input type="number" min="1" max="38" value={jornada} onChange={e => setJornada(e.target.value)}
                 style={{width:'100%', padding:'.45rem .7rem', borderRadius:8,
                         border:'1.5px solid var(--borde)', fontSize:'.95rem'}} />
        </div>
        <button className="btn-ok" onClick={guardar}>Guardar</button>
        {msg && <span style={{color:'var(--verde)', fontWeight:600, fontSize:'.9rem'}}>{msg}</span>}
      </div>
    </div>

    {/* ── Equipos de la federación ── */}
    <div className="card">
      <h2>Equipos de la federación</h2>
      {participantes.length > 0 && (
        <table style={{marginBottom:'1rem'}}>
          <thead>
            <tr><th>Equipo</th><th>Usuario</th><th></th></tr>
          </thead>
          <tbody>
            {participantes.map(p => (
              <tr key={p.id}>
                <td style={{fontWeight:600}}>{p.nombre}</td>
                <td style={{color:'var(--texto2)', fontSize:'.85rem'}}>
                  {p.user_id ? 'Registrado' : 'Sin usuario'}
                </td>
                <td style={{textAlign:'right'}}>
                  <button disabled={eliminando === p.id}
                          onClick={async () => {
                            if (!confirm(`¿Eliminar "${p.nombre}"? Se borrará también su plantilla, alineaciones, pujas e historial de puntos.`)) return;
                            setEliminando(p.id);
                            const { error, count } = await sb.from('participantes')
                              .delete({ count: 'exact' }).eq('id', p.id);
                            setEliminando(null);
                            if (error) {
                              alert('Error al eliminar: ' + error.message);
                              return;
                            }
                            if (!count) {
                              alert('No se ha podido eliminar el equipo. Puede que falten permisos (RLS) en Supabase — revisa que se haya ejecutado supabase_admin_liga.sql.');
                              return;
                            }
                            onParticipantesChange?.();
                          }}
                          style={{background:'none', border:'none', color:'#dc3545',
                                  cursor:'pointer', fontSize:'.82rem'}}>
                    Eliminar
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
      <p style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'.75rem'}}>
        Añade un equipo sin usuario (para completar la liga, bots, etc.).
      </p>
      {msgEq && (
        <div style={{color: msgEq.includes('Error') ? '#dc3545' : 'var(--verde)',
                     fontWeight:600, marginBottom:'.75rem', fontSize:'.88rem'}}>
          {msgEq}
        </div>
      )}
      <div style={{display:'flex', gap:'.5rem', flexWrap:'wrap'}}>
        <input placeholder="Nombre del equipo *" value={nuevoEq.nombre}
               onChange={e => setNuevoEq(p => ({...p, nombre: e.target.value}))}
               style={{flex:1, minWidth:150, padding:'.4rem .7rem',
                       border:'1.5px solid var(--borde)', borderRadius:8}} />
        <input placeholder="Estadio" value={nuevoEq.estadio}
               onChange={e => setNuevoEq(p => ({...p, estadio: e.target.value}))}
               style={{flex:1, minWidth:120, padding:'.4rem .7rem',
                       border:'1.5px solid var(--borde)', borderRadius:8}} />
        <input placeholder="Entrenador" value={nuevoEq.entrenador}
               onChange={e => setNuevoEq(p => ({...p, entrenador: e.target.value}))}
               style={{flex:1, minWidth:120, padding:'.4rem .7rem',
                       border:'1.5px solid var(--borde)', borderRadius:8}} />
        <button className="btn-ok" onClick={async () => {
          if (!nuevoEq.nombre.trim()) { setMsgEq('El nombre es obligatorio'); return; }
          const { error } = await sb.from('participantes').insert({
            nombre:        nuevoEq.nombre.trim(),
            federacion_id: federacion.id,
            presupuesto:   federacion.presupuesto_inicial ?? 100000000,
            estadio:       nuevoEq.estadio.trim()    || null,
            entrenador:    nuevoEq.entrenador.trim() || null,
          });
          if (error) { setMsgEq('Error: ' + error.message); return; }
          publicar(federacion.id, 'admin', `Nuevo equipo creado: ${nuevoEq.nombre.trim()}`, actorNombre);
          setNuevoEq({ nombre:'', estadio:'', entrenador:'' });
          setMsgEq('Equipo creado');
          setTimeout(() => setMsgEq(''), 2500);
          onParticipantesChange?.();
        }}>Crear equipo</button>
      </div>
    </div>

    {/* ── Moderadores ── */}
    <div className="card">
      <h2>Moderadores</h2>
      <p style={{fontSize:'.84rem', color:'var(--texto2)', marginBottom:'1rem'}}>
        Los moderadores pueden gestionar clasificaciones, presupuestos, pujas, cierres y competiciones, pero no la configuración de la federación ni el mercado.
      </p>

      {mods.length > 0 && (
        <table style={{marginBottom:'1rem'}}>
          <thead><tr><th>Equipo</th><th></th></tr></thead>
          <tbody>
            {mods.map(m => {
              const p = participantes.find(x => x.id === m.participante_id);
              return (
                <tr key={m.id}>
                  <td style={{fontWeight:600}}>{p?.nombre || '?'}</td>
                  <td style={{textAlign:'right'}}>
                    <button onClick={() => quitarModerador(m.id)}
                            style={{background:'none', border:'none', color:'#dc3545',
                                    cursor:'pointer', fontSize:'.82rem'}}>
                      Quitar
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
      {mods.length === 0 && (
        <p style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'1rem'}}>
          Sin moderadores asignados.
        </p>
      )}
      {msgMod && (
        <div style={{color: msgMod.includes('Error') ? '#dc3545' : 'var(--verde)',
                     fontWeight:600, marginBottom:'.75rem', fontSize:'.88rem'}}>
          {msgMod}
        </div>
      )}
      <div style={{display:'flex', gap:'.5rem', alignItems:'center', flexWrap:'wrap'}}>
        <select value={selMod} onChange={e => setSelMod(e.target.value)}
                style={{flex:1, minWidth:180, padding:'.4rem .7rem',
                        border:'1.5px solid var(--borde)', borderRadius:8, fontSize:'.9rem'}}>
          <option value="">Seleccionar equipo…</option>
          {candidatos.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
        </select>
        <button className="btn-ok" onClick={añadirModerador} disabled={!selMod}>
          Añadir moderador
        </button>
      </div>
      {candidatos.length === 0 && participantes.filter(p => p.user_id).length === 0 && (
        <p style={{fontSize:'.8rem', color:'var(--texto2)', marginTop:'.5rem'}}>
          Solo equipos con usuario registrado pueden ser moderadores.
        </p>
      )}
    </div>

    {/* ── REINICIO DE TEMPORADA ── */}
    {!isModerador && (
    <div className="card" style={{borderColor:'#dc3545', borderWidth:2}}>
      <h2 style={{color:'#dc3545', marginBottom:'.5rem'}}>REINICIO DE TEMPORADA</h2>
      <p style={{fontSize:'.84rem', color:'var(--texto2)', marginBottom:'1rem'}}>
        Las siguientes acciones son irreversibles. Úsalas con extremo cuidado.
      </p>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between',
                   flexWrap:'wrap', gap:'.75rem', padding:'.85rem 1rem',
                   border:'1.5px solid #dc3545', borderRadius:8,
                   background:'rgba(220,53,69,.04)'}}>
        <div style={{flex:1, minWidth:200}}>
          <div style={{fontWeight:700, marginBottom:'.25rem'}}>Reiniciar temporada</div>
          <div style={{fontSize:'.82rem', color:'var(--texto2)', lineHeight:1.5}}>
            Borra plantillas, alineaciones, clasificaciones, ofertas, pujas, cesiones y H2H.
            Conserva los equipos y resetea presupuestos a {fmt(federacion?.presupuesto_inicial ?? 0)}.
          </div>
        </div>
        <button onClick={() => setResetModal(true)}
                style={{padding:'.45rem 1.1rem', borderRadius:8,
                        border:'2px solid #dc3545', background:'none',
                        color:'#dc3545', fontWeight:700, cursor:'pointer',
                        fontSize:'.88rem', whiteSpace:'nowrap'}}>
          Reiniciar temporada
        </button>
      </div>
    </div>
    )}

    {/* ── Modal de confirmación ── */}
    {!isModerador && resetModal && (
      <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,.55)',
                   display:'flex', alignItems:'center', justifyContent:'center',
                   zIndex:1000, padding:'1rem'}}>
        <div className="card" style={{maxWidth:480, width:'100%', border:'2px solid #dc3545'}}>
          <h2 style={{color:'#dc3545', marginBottom:'.75rem'}}>Reiniciar temporada</h2>
          <p style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'.75rem'}}>
            Esta acción es <strong>irreversible</strong>. Se eliminarán permanentemente:
          </p>
          <ul style={{fontSize:'.84rem', color:'var(--texto2)', marginBottom:'1rem',
                      paddingLeft:'1.25rem', lineHeight:1.8}}>
            <li>Plantillas de todos los equipos</li>
            <li>Alineaciones y sustituciones automáticas</li>
            <li>Clasificaciones y puntos fantasy</li>
            <li>Ofertas entre equipos, pujas y fichajes pendientes</li>
            <li>Cesiones</li>
            <li>Calendario y resultados H2H</li>
            <li>Cierres de jornada</li>
          </ul>
          <p style={{fontSize:'.84rem', marginBottom:'1rem'}}>
            Los equipos se conservan con presupuesto reseteado a{' '}
            <strong>{fmt(federacion?.presupuesto_inicial ?? 0)}</strong>{' '}
            y la jornada vuelve a 1.
          </p>
          <p style={{fontSize:'.84rem', fontWeight:700, marginBottom:'.35rem'}}>
            Escribe el nombre exacto de la federación para confirmar:
          </p>
          <p style={{fontSize:'.82rem', color:'var(--texto2)', marginBottom:'.6rem'}}>
            <code style={{background:'var(--gris)', padding:'2px 8px',
                          borderRadius:4, fontFamily:'monospace'}}>
              {federacion?.nombre}
            </code>
          </p>
          <input
            type="text"
            value={resetConfirmNombre}
            onChange={e => setResetConfirmNombre(e.target.value)}
            placeholder="Nombre de la federación…"
            style={{width:'100%', padding:'.5rem .75rem', marginBottom:'1.1rem',
                    border:'1.5px solid ' + (resetConfirmNombre === federacion?.nombre ? '#dc3545' : 'var(--borde)'),
                    borderRadius:8, fontSize:'.9rem', boxSizing:'border-box',
                    background:'var(--fondo)', color:'var(--texto)'}}
          />
          <div style={{display:'flex', gap:'.75rem', justifyContent:'flex-end'}}>
            <button
              onClick={() => { setResetModal(false); setResetConfirmNombre(''); }}
              style={{padding:'.45rem 1rem', borderRadius:8,
                      border:'1.5px solid var(--borde)', background:'none',
                      cursor:'pointer', fontWeight:600, fontSize:'.88rem'}}>
              Cancelar
            </button>
            <button
              onClick={reiniciarFederacion}
              disabled={resetConfirmNombre !== federacion?.nombre || reseteando}
              style={{padding:'.45rem 1.2rem', borderRadius:8, border:'none',
                      background: resetConfirmNombre === federacion?.nombre ? '#dc3545' : 'var(--borde)',
                      color: resetConfirmNombre === federacion?.nombre ? '#fff' : 'var(--texto2)',
                      fontWeight:700, cursor: resetConfirmNombre === federacion?.nombre ? 'pointer' : 'default',
                      fontSize:'.88rem', transition:'background .15s'}}>
              {reseteando ? 'Reiniciando…' : 'Confirmar reinicio'}
            </button>
          </div>
        </div>
      </div>
    )}
    </>
  );
}

// ── ADMIN — PANEL PRINCIPAL ────────────────────────────────────
// ── ADMIN EQUIPOS — editar plantilla, pts y penalizaciones ─────
function AdminEquipos({ participantes, federacion, onParticipantesChange, actorNombre }) {
  const [selId, setSelId]         = useState(participantes[0]?.id || '');
  const [subtab, setSubtab]       = useState('plantilla');
  const [plantilla, setPlantilla] = useState(null);
  const [presupuesto, setPresupuesto] = useState(null);
  const [clas, setClas]           = useState([]);
  const [editPrecios, setEditPrecios] = useState({});
  const [jornadaEdit, setJornadaEdit] = useState(1);
  const [ptsEdit, setPtsEdit]     = useState('');
  const [penTipo, setPenTipo]     = useState('presupuesto');
  const [penCantidad, setPenCantidad] = useState('');
  const [penMotivo, setPenMotivo] = useState('');
  const [msg, setMsg]             = useState('');
  const [divisiones, setDivisiones] = useState([]);

  const flash = txt => { setMsg(txt); setTimeout(() => setMsg(''), 3000); };

  useEffect(() => {
    if (!sb) return;
    sb.from('divisiones').select('id, nombre').order('id')
      .then(({ data }) => setDivisiones(data || []));
  }, []);

  const cambiarDivision = async (nuevoId) => {
    await sb.from('participantes').update({ division_id: Number(nuevoId) }).eq('id', selId);
    onParticipantesChange?.();
    flash('División actualizada');
  };

  const cargar = async () => {
    if (!sb || !selId) return;
    setPlantilla(null);
    const [{ data: pl }, { data: pd }, { data: cl }] = await Promise.all([
      sb.from('plantillas').select('id, precio_compra, jugadores(id, nombre, equipo, posicion, valor_mercado)').eq('participante_id', selId).order('jugadores(posicion)'),
      sb.from('participantes').select('presupuesto').eq('id', selId).single(),
      sb.from('clasificacion').select('jornada, puntos_jornada').eq('participante_id', selId).order('jornada'),
    ]);
    setPlantilla(pl || []);
    setPresupuesto(pd?.presupuesto ?? null);
    setClas(cl || []);
    const precios = {};
    (pl || []).forEach(r => { precios[r.id] = String(r.precio_compra || 0); });
    setEditPrecios(precios);
  };

  useEffect(() => { cargar(); }, [selId]);

  // Guardar precio de compra de todos los jugadores
  const guardarPrecios = async () => {
    for (const [rowId, val] of Object.entries(editPrecios)) {
      await sb.from('plantillas').update({ precio_compra: Number(val) || 0 }).eq('id', rowId);
    }
    flash('Precios guardados');
  };

  // Liberar jugador (eliminar de plantilla)
  const liberarJugador = async (rowId, nombreJug) => {
    if (!confirm(`¿Liberar a ${nombreJug}?`)) return;
    const row = plantilla.find(r => r.id === rowId);
    const valor = row?.precio_compra || 0;
    const posicion = row?.jugadores?.posicion || '';
    const equipoReal = row?.jugadores?.equipo || '';
    await sb.from('plantillas').delete().eq('id', rowId);
    await sb.from('participantes').update({ presupuesto: (presupuesto || 0) + valor }).eq('id', selId);
    // Tablón
