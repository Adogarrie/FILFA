// ── UTILIDAD GOLES ─────────────────────────────────────────────
function ptsAGoles(pts) {
  if (pts < 36) return 0;
  return Math.floor((pts - 36) / 9) + 1;
}

// ── LIGA ───────────────────────────────────────────────────────
function Liga({ participantes }) {
  const [subtab, setSubtab]         = useState('global');
  const [calendario, setCalendario] = useState(null);
  const [clasMap, setClasMap]       = useState(null);   // {pid: {jornada: pts}}
  const [divisiones, setDivisiones] = useState([]);
  const [jornadaP, setJornadaP]     = useState(1);

  const idNombre = useMemo(
    () => Object.fromEntries(participantes.map(p => [p.id, p.nombre])),
    [participantes]
  );

  useEffect(() => {
    if (!sb) return;
    Promise.all([
      sb.from('calendario').select('id, jornada, division_id, local_id, visitante_id, es_neutral'),
      sb.from('clasificacion').select('participante_id, jornada, puntos_jornada'),
      sb.from('divisiones').select('id, nombre'),
    ]).then(([{ data: cal }, { data: clas }, { data: divs }]) => {
      setCalendario(cal || []);
      const mapa = {};
      (clas || []).forEach(r => {
        if (!mapa[r.participante_id]) mapa[r.participante_id] = {};
        mapa[r.participante_id][r.jornada] = r.puntos_jornada;
      });
      setClasMap(mapa);
      setDivisiones(divs || []);
    });
  }, []);

  const computarTabla = (divisionId) => {
    const fixtures = (calendario || []).filter(f => f.division_id === divisionId);
    const tabla = {};
    participantes.filter(p => p.division_id === divisionId).forEach(p => {
      tabla[p.id] = { nombre: p.nombre, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, pts: 0 };
    });

    fixtures.forEach(f => {
      const ptsLRec = (clasMap[f.local_id]     || {})[f.jornada];
      const ptsVRec = (clasMap[f.visitante_id] || {})[f.jornada];
      if (ptsLRec === undefined && ptsVRec === undefined) return; // jornada no jugada

      const ptsL = ptsLRec ?? 0;
      const ptsV = ptsVRec ?? 0;
      const efL  = f.es_neutral ? ptsL : ptsL + 5;  // bono local
      const gL   = ptsAGoles(efL);
      const gV   = ptsAGoles(ptsV);

      if (!tabla[f.local_id] || !tabla[f.visitante_id]) return;

      tabla[f.local_id].pj++;
      tabla[f.visitante_id].pj++;
      tabla[f.local_id].gf     += gL;
      tabla[f.local_id].gc     += gV;
      tabla[f.visitante_id].gf += gV;
      tabla[f.visitante_id].gc += gL;

      if (gL > gV) {
        tabla[f.local_id].pg++;
        tabla[f.local_id].pts += 3;
        tabla[f.visitante_id].pp++;
      } else if (gL < gV) {
        tabla[f.visitante_id].pg++;
        tabla[f.visitante_id].pts += 3;
        tabla[f.local_id].pp++;
      } else {
        tabla[f.local_id].pe++;     tabla[f.local_id].pts++;
        tabla[f.visitante_id].pe++; tabla[f.visitante_id].pts++;
      }
    });

    return Object.values(tabla).sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      const difA = a.gf - a.gc, difB = b.gf - b.gc;
      if (difB !== difA) return difB - difA;
      return b.gf - a.gf;
    });
  };

  const globalRanking = () => {
    if (!clasMap) return [];
    return participantes.map(p => ({
      nombre: p.nombre,
      pts: Object.values(clasMap[p.id] || {}).reduce((s, v) => s + v, 0),
    })).sort((a, b) => b.pts - a.pts);
  };

  if (calendario === null || clasMap === null) return <Spinner />;

  const divPrimera  = divisiones.find(d => d.nombre === 'Primera');
  const divSegunda  = divisiones.find(d => d.nombre === 'Segunda');
  const maxJornada  = calendario.length > 0 ? Math.max(...calendario.map(f => f.jornada)) : 38;

  const TablaLiga = ({ datos, titulo }) => (
    <div className="card">
      <h2>{titulo}</h2>
      {datos.length === 0
        ? <div className="empty">
            Sin calendario generado.<br/>
            Ejecuta: <code>python generar_calendario.py</code>
          </div>
        : <table>
            <thead>
              <tr>
                <th>Pos</th><th>Equipo</th>
                <th style={{textAlign:'center'}}>PJ</th>
                <th style={{textAlign:'center'}}>G</th>
                <th style={{textAlign:'center'}}>E</th>
                <th style={{textAlign:'center'}}>P</th>
                <th style={{textAlign:'center'}}>GF</th>
                <th style={{textAlign:'center'}}>GC</th>
                <th style={{textAlign:'center'}}>DIF</th>
                <th style={{textAlign:'right'}}>PTS</th>
              </tr>
            </thead>
            <tbody>
              {datos.map((e, i) => {
                const dif = e.gf - e.gc;
                return (
                  <tr key={e.nombre}>
                    <td><Medalla pos={i + 1} /></td>
                    <td style={{fontWeight:600}}>{e.nombre}</td>
                    <td style={{textAlign:'center', color:'var(--texto2)'}}>{e.pj}</td>
                    <td style={{textAlign:'center', color:'var(--verde)', fontWeight:600}}>{e.pg}</td>
                    <td style={{textAlign:'center', color:'var(--texto2)'}}>{e.pe}</td>
                    <td style={{textAlign:'center', color:'#d93025'}}>{e.pp}</td>
                    <td style={{textAlign:'center'}}>{e.gf}</td>
                    <td style={{textAlign:'center'}}>{e.gc}</td>
                    <td style={{textAlign:'center'}}
                        className={dif >= 0 ? 'valor-positivo' : 'valor-negativo'}>
                      {dif >= 0 ? '+' : ''}{dif}
                    </td>
                    <td style={{textAlign:'right', fontWeight:800, fontSize:'1.05rem'}}>{e.pts}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
      }
    </div>
  );

  const global = globalRanking();

  return (
    <div>
      <div className="tabs">
        {[
          ['global',   'Liga Fantástica'],
          ['primera',  'Primera División'],
          ['segunda',  'Segunda División'],
          ['partidos', 'Partidos'],
        ].map(([key, label]) => (
          <button key={key} className={`tab ${subtab === key ? 'active' : ''}`}
                  onClick={() => setSubtab(key)}>
            {label}
          </button>
        ))}
      </div>

      {subtab === 'global' && (
        <div className="card">
          <h2>Liga Fantástica — Clasificación Global</h2>
          <p style={{color:'var(--texto2)', fontSize:'.85rem', marginBottom:'1rem'}}>
            Todos los equipos de ambas divisiones ordenados por puntos fantasy totales.
          </p>
          <table>
            <thead>
              <tr>
                <th>Pos</th>
                <th>Equipo</th>
                <th style={{textAlign:'right'}}>Puntos Fantasy</th>
              </tr>
            </thead>
            <tbody>
              {global.length === 0
                ? <tr><td colSpan={3} className="empty">Sin puntos registrados aún.</td></tr>
                : global.map((e, i) => (
                    <tr key={e.nombre}>
                      <td><Medalla pos={i + 1} /></td>
                      <td style={{fontWeight:600}}>{e.nombre}</td>
                      <td style={{textAlign:'right', fontWeight:700}}>{e.pts}</td>
                    </tr>
                  ))
              }
            </tbody>
          </table>
        </div>
      )}

      {subtab === 'primera' && (
        <TablaLiga
          datos={divPrimera ? computarTabla(divPrimera.id) : []}
          titulo="Primera División — Tabla de Liga"
        />
      )}
      {subtab === 'segunda' && (
        <TablaLiga
          datos={divSegunda ? computarTabla(divSegunda.id) : []}
          titulo="Segunda División — Tabla de Liga"
        />
      )}

      {subtab === 'partidos' && (() => {
        if (calendario.length === 0) return (
          <div className="card">
            <div className="empty">
              Sin calendario generado.<br/>
              Ejecuta: <code>python generar_calendario.py</code>
            </div>
          </div>
        );

        return (
          <div>
            {/* Selector de jornada */}
            <div className="card" style={{display:'flex', alignItems:'center', gap:'1rem', flexWrap:'wrap'}}>
              <span style={{fontWeight:600, whiteSpace:'nowrap'}}>Jornada:</span>
              <div style={{display:'flex', gap:'.35rem', flexWrap:'wrap'}}>
                {Array.from({length: maxJornada}, (_, i) => i + 1).map(j => (
                  <button key={j} onClick={() => setJornadaP(j)}
                    style={{
                      padding:'.28rem .6rem', borderRadius:'8px', fontSize:'.8rem',
                      border:'1.5px solid var(--borde)', cursor:'pointer',
                      background: jornadaP === j ? 'var(--verde)' : '#fff',
                      color:      jornadaP === j ? '#fff' : 'var(--texto)',
                      fontWeight: jornadaP === j ? 700 : 400,
                    }}>
                    {j}
                  </button>
                ))}
              </div>
            </div>

            {/* Partidos de cada división */}
            {[divPrimera, divSegunda].filter(Boolean).map(div => {
              const fixtures = calendario.filter(
                f => f.division_id === div.id && f.jornada === jornadaP
              );
              if (fixtures.length === 0) return null;

              return (
                <div className="card" key={div.id}>
                  <h2>{div.nombre} División — Jornada {jornadaP}</h2>
                  {fixtures.map(f => {
                    const ptsLRec = (clasMap[f.local_id]     || {})[jornadaP];
                    const ptsVRec = (clasMap[f.visitante_id] || {})[jornadaP];
                    const jugado  = ptsLRec !== undefined || ptsVRec !== undefined;
                    const ptsL    = ptsLRec ?? 0;
                    const ptsV    = ptsVRec ?? 0;
                    const efL     = f.es_neutral ? ptsL : ptsL + 5;
                    const gL      = ptsAGoles(efL);
                    const gV      = ptsAGoles(ptsV);
                    const nomL    = idNombre[f.local_id]     || '?';
                    const nomV    = idNombre[f.visitante_id] || '?';

                    let cL = 'var(--texto)', cV = 'var(--texto)';
                    if (jugado) {
                      if      (gL > gV) { cL = 'var(--verde)'; cV = '#d93025'; }
                      else if (gL < gV) { cL = '#d93025';      cV = 'var(--verde)'; }
                      else              { cL = cV = '#856404'; }   // empate: ocre
                    }

                    return (
                      <div key={f.id} style={{
                        display:'flex', alignItems:'center', gap:'.5rem',
                        padding:'.9rem 0', borderBottom:'1px solid var(--gris)',
                      }}>
                        {/* Local */}
                        <div style={{flex:1, textAlign:'right'}}>
                          <div style={{fontWeight:700, fontSize:'.95rem', color:cL}}>
                            {nomL}
                          </div>
                          {jugado && (
                            <div style={{fontSize:'.72rem', color:'var(--texto2)', marginTop:'.15rem'}}>
                              {f.es_neutral ? ptsL : `${ptsL}+5`} = {efL} pts
                              &nbsp;→&nbsp;<strong>{gL}</strong> {gL === 1 ? 'gol' : 'goles'}
                            </div>
                          )}
                        </div>

                        {/* Marcador */}
                        <div style={{
                          width:'80px', textAlign:'center', flexShrink:0,
                          fontWeight:800, fontSize: jugado ? '1.35rem' : '.9rem',
                          color: jugado ? 'var(--texto)' : 'var(--texto2)',
                          lineHeight:1.1,
                        }}>
                          {jugado ? `${gL} – ${gV}` : '—'}
                          {f.es_neutral && (
                            <div style={{fontSize:'.62rem', fontWeight:500,
                                         color:'var(--texto2)', marginTop:'.15rem',
                                         textTransform:'uppercase', letterSpacing:'.04em'}}>
                              neutral
                            </div>
                          )}
                        </div>

                        {/* Visitante */}
                        <div style={{flex:1}}>
                          <div style={{fontWeight:700, fontSize:'.95rem', color:cV}}>
                            {nomV}
                          </div>
                          {jugado && (
                            <div style={{fontSize:'.72rem', color:'var(--texto2)', marginTop:'.15rem'}}>
                              {ptsV} pts&nbsp;→&nbsp;<strong>{gV}</strong> {gV === 1 ? 'gol' : 'goles'}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}

            {/* Si no hay partidos en esta jornada */}
            {[divPrimera, divSegunda].filter(Boolean).every(
              div => calendario.filter(f => f.division_id === div.id && f.jornada === jornadaP).length === 0
            ) && (
              <div className="card">
                <div className="empty">No hay partidos programados para la jornada {jornadaP}.</div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// ── EQUIPOS ────────────────────────────────────────────────────
function Equipos({ participantes, miParticipanteId }) {
  const [equipoId, setEquipoId]       = useState('');
  const [jugadores, setJugadores]     = useState(null);
  const [presupuesto, setPresupuesto] = useState(null);
  const [aliJornada, setAliJornada]   = useState(1);
  const [alineacion, setAlineacion]   = useState(null); // null = cargando

  useEffect(() => {
    if (participantes.length > 0 && !equipoId) setEquipoId(participantes[0].id);
  }, [participantes]);

  useEffect(() => {
    if (!sb) return;
    sb.from('config').select('jornada_actual').single()
      .then(({ data }) => data && setAliJornada(data.jornada_actual));
  }, []);

  useEffect(() => {
    if (!equipoId || !sb) return;
    setJugadores(null);
    setPresupuesto(null);
    sb.from('plantillas')
      .select('id, precio_compra, jugadores(nombre, equipo, posicion, valor_mercado)')
      .eq('participante_id', equipoId)
      .then(({ data, error }) => setJugadores(error ? [] : (data || [])));
    sb.from('participantes').select('presupuesto').eq('id', equipoId).single()
      .then(({ data }) => setPresupuesto(data?.presupuesto ?? null));
  }, [equipoId]);

  useEffect(() => {
    if (!equipoId || !sb) return;
    setAlineacion(null);
    sb.from('alineaciones')
      .select('jugador_id, es_titular, jugadores(nombre, equipo, posicion)')
      .eq('participante_id', equipoId)
      .eq('jornada', aliJornada)
      .then(({ data }) => setAlineacion(data || []));
  }, [equipoId, aliJornada]);

  const equipo = participantes.find(p => p.id === equipoId);
  const lista = (jugadores || []).map(p => ({
    nombre:   p.jugadores?.nombre || '',
    equipo:   p.jugadores?.equipo || '',
    posicion: p.jugadores?.posicion || '',
    valor:    p.jugadores?.valor_mercado || 0,
    compra:   p.precio_compra || 0,
  }));

  const titulares  = (alineacion || []).filter(a => a.es_titular)
    .sort((a,b) => POS_ORDEN[a.jugadores?.posicion] - POS_ORDEN[b.jugadores?.posicion]);
  const suplentes  = (alineacion || []).filter(a => !a.es_titular)
    .sort((a,b) => POS_ORDEN[a.jugadores?.posicion] - POS_ORDEN[b.jugadores?.posicion]);

  return (
    <div>
      <div className="card">
        <div className="tabs" style={{marginBottom: 0}}>
          {participantes.map(p => (
            <button key={p.id}
              className={`tab ${equipoId === p.id ? 'active' : ''}`}
              onClick={() => setEquipoId(p.id)}>
              {p.nombre}{p.id === miParticipanteId ? ' (tú)' : ''}
            </button>
          ))}
        </div>
      </div>

      {equipo && (
        <div className="card" style={{display:'flex', gap:'2rem', flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.2rem'}}>Presupuesto disponible</div>
            <div style={{fontSize:'1.4rem', fontWeight:800, color:'var(--verde)'}}>
              {presupuesto !== null ? fmt(presupuesto) : '…'}
            </div>
          </div>
          <div>
            <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.2rem'}}>Jugadores fichados</div>
            <div style={{fontSize:'1.4rem', fontWeight:800}}>{jugadores ? lista.length : '…'}</div>
          </div>
        </div>
      )}

      <div className="card">
        <h2>Plantilla de {equipo?.nombre || '—'}</h2>
        {jugadores === null
          ? <Spinner />
          : lista.length === 0
          ? <div className="empty">Esta plantilla está vacía.</div>
          : <table>
              <thead>
                <tr>
                  <th>Jugador</th><th>Pos</th><th>Equipo</th>
                  <th style={{textAlign:'right'}}>Valor actual</th>
                  <th style={{textAlign:'right'}}>Dif. compra</th>
                </tr>
              </thead>
              <tbody>
                {lista.map((j, i) => {
                  const dif = (j.valor || 0) - (j.compra || 0);
                  return (
                    <tr key={i}>
                      <td style={{fontWeight:600}}>{nombreJugador(j.nombre, j.posicion, j.equipo)}</td>
                      <td><span className={`badge ${j.posicion}`}>{j.posicion}</span></td>
                      <td style={{color:'var(--texto2)'}}>{j.posicion === 'POR' ? '' : j.equipo}</td>
                      <td style={{textAlign:'right'}}>{fmt(j.valor || 0)}</td>
                      <td style={{textAlign:'right'}}
                          className={dif >= 0 ? 'valor-positivo' : 'valor-negativo'}>
                        {dif >= 0 ? '+' : ''}{fmt(dif)}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
        }
      </div>

      <div className="card">
        <div style={{display:'flex', alignItems:'center', gap:'1rem', marginBottom:'1rem', flexWrap:'wrap'}}>
          <h2 style={{margin:0}}>Alineación de {equipo?.nombre || '—'}</h2>
          <div>
            <label style={{fontSize:'.85rem', color:'var(--texto2)', marginRight:'.4rem'}}>Jornada:</label>
            <select value={aliJornada} onChange={e => setAliJornada(Number(e.target.value))}
                    style={{padding:'.3rem .6rem', borderRadius:6, border:'1.5px solid var(--borde)'}}>
              {Array.from({length:38},(_,i)=>i+1).map(j =>
                <option key={j} value={j}>J{j}</option>)}
            </select>
          </div>
        </div>

        {alineacion === null ? <Spinner /> : alineacion.length === 0
          ? <div className="empty">Sin alineación guardada para J{aliJornada}.</div>
          : <>
              {titulares.length > 0 && (
                <>
                  <div style={{fontWeight:700, fontSize:'.78rem', color:'#198754',
                               textTransform:'uppercase', letterSpacing:'.05em', marginBottom:'.35rem'}}>
                    Titulares ({titulares.length}/11)
                  </div>
                  <table style={{width:'100%', marginBottom:'1rem'}}>
                    <tbody>
                      {titulares.map((a,i) => (
                        <tr key={i}>
                          <td style={{width:48}}><span className={`badge ${a.jugadores?.posicion}`}>{a.jugadores?.posicion}</span></td>
                          <td style={{fontWeight:600}}>{nombreJugador(a.jugadores?.nombre, a.jugadores?.posicion, a.jugadores?.equipo)}</td>
                          <td style={{color:'var(--texto2)', fontSize:'.85rem'}}>{a.jugadores?.posicion === 'POR' ? '' : a.jugadores?.equipo}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </>
              )}
              {suplentes.length > 0 && (
                <>
                  <div style={{fontWeight:700, fontSize:'.78rem', color:'#fd7e14',
                               textTransform:'uppercase', letterSpacing:'.05em', marginBottom:'.35rem'}}>
                    Suplentes ({suplentes.length}/4)
                  </div>
                  <table style={{width:'100%'}}>
                    <tbody>
                      {suplentes.map((a,i) => (
                        <tr key={i}>
                          <td style={{width:48}}><span className={`badge ${a.jugadores?.posicion}`}>{a.jugadores?.posicion}</span></td>
                          <td style={{fontWeight:600}}>{nombreJugador(a.jugadores?.nombre, a.jugadores?.posicion, a.jugadores?.equipo)}</td>
                          <td style={{color:'var(--texto2)', fontSize:'.85rem'}}>{a.jugadores?.posicion === 'POR' ? '' : a.jugadores?.equipo}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </>
              )}
            </>
        }
      </div>
    </div>
  );
}

// ── COPA DE LA LIGA ────────────────────────────────────────────
function Copa({ participantes }) {
  const [grupos, setGrupos]         = useState(null);
  const [calendario, setCalendario] = useState(null);
  const [clasMap, setClasMap]       = useState(null);
  const [grupoActivo, setGrupoActivo] = useState('');

  const idNombre = useMemo(
    () => Object.fromEntries(participantes.map(p => [p.id, p.nombre])),
    [participantes]
  );

  useEffect(() => {
    if (!sb) return;
    Promise.all([
      sb.from('copa_grupos').select('grupo, participante_id').order('grupo'),
      sb.from('copa_calendario').select('*').order('jornada'),
      sb.from('clasificacion').select('participante_id, jornada, puntos_jornada'),
    ]).then(([{ data: grs }, { data: cal }, { data: clas }]) => {
      setGrupos(grs || []);
      setCalendario(cal || []);
      const mapa = {};
      (clas || []).forEach(r => {
        if (!mapa[r.participante_id]) mapa[r.participante_id] = {};
        mapa[r.participante_id][r.jornada] = r.puntos_jornada;
      });
      setClasMap(mapa);
      const nombresGrupos = [...new Set((grs || []).map(g => g.grupo))].sort();
      if (nombresGrupos.length > 0) setGrupoActivo(nombresGrupos[0]);
    });
  }, []);

  const computarGrupo = (grupo) => {
    const equiposIds = (grupos || []).filter(g => g.grupo === grupo).map(g => g.participante_id);
    const fixtures   = (calendario || []).filter(f => f.grupo === grupo);
    const tabla = {};
    equiposIds.forEach(pid => {
      tabla[pid] = { nombre: idNombre[pid] || '?', pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, pts:0 };
    });
    fixtures.forEach(f => {
      const ptsLRec = (clasMap[f.local_id]     || {})[f.jornada];
      const ptsVRec = (clasMap[f.visitante_id] || {})[f.jornada];
      if (ptsLRec === undefined && ptsVRec === undefined) return;
      const ptsL = ptsLRec ?? 0, ptsV = ptsVRec ?? 0;
      const efL  = f.es_neutral ? ptsL : ptsL + 5;
      const gL   = ptsAGoles(efL), gV = ptsAGoles(ptsV);
      if (!tabla[f.local_id] || !tabla[f.visitante_id]) return;
      tabla[f.local_id].pj++;  tabla[f.visitante_id].pj++;
      tabla[f.local_id].gf     += gL;  tabla[f.local_id].gc     += gV;
      tabla[f.visitante_id].gf += gV;  tabla[f.visitante_id].gc += gL;
      if      (gL > gV) { tabla[f.local_id].pg++;     tabla[f.local_id].pts     += 3; tabla[f.visitante_id].pp++; }
      else if (gL < gV) { tabla[f.visitante_id].pg++; tabla[f.visitante_id].pts += 3; tabla[f.local_id].pp++; }
      else { tabla[f.local_id].pe++; tabla[f.local_id].pts++; tabla[f.visitante_id].pe++; tabla[f.visitante_id].pts++; }
    });
    return Object.values(tabla).sort((a,b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      if ((b.gf-b.gc) !== (a.gf-a.gc)) return (b.gf-b.gc) - (a.gf-a.gc);
      return b.gf - a.gf;
    });
  };

  if (grupos === null || calendario === null || clasMap === null) return <Spinner />;

  const nombresGrupos = [...new Set((grupos || []).map(g => g.grupo))].sort();

  if (nombresGrupos.length === 0) return (
    <div className="card">
      <div className="empty">
        Sin grupos configurados.<br/>
        Ejecuta: <code>python generar_copa.py --grupos ejemplo_grupos_copa.csv --jornada-inicio 1</code>
      </div>
    </div>
  );

  const tablaGrupo    = computarGrupo(grupoActivo);
  const partidosGrupo = (calendario || []).filter(f => f.grupo === grupoActivo);

  return (
    <div>
      {/* Selector de grupo */}
      <div className="tabs">
        {nombresGrupos.map(g => (
          <button key={g} className={`tab ${grupoActivo === g ? 'active' : ''}`}
                  onClick={() => setGrupoActivo(g)}>
            Grupo {g}
          </button>
        ))}
      </div>

      {/* Tabla del grupo */}
      <div className="card">
        <h2>Copa de la Liga — Grupo {grupoActivo}</h2>
        <table>
          <thead>
            <tr>
              <th>Pos</th><th>Equipo</th>
              <th style={{textAlign:'center'}}>PJ</th>
              <th style={{textAlign:'center'}}>G</th>
              <th style={{textAlign:'center'}}>E</th>
              <th style={{textAlign:'center'}}>P</th>
              <th style={{textAlign:'center'}}>GF</th>
              <th style={{textAlign:'center'}}>GC</th>
              <th style={{textAlign:'center'}}>DIF</th>
              <th style={{textAlign:'right'}}>PTS</th>
            </tr>
          </thead>
          <tbody>
            {tablaGrupo.map((e, i) => {
              const dif = e.gf - e.gc;
              return (
                <tr key={e.nombre}
                    style={{background: i === 0 ? 'rgba(26,127,55,.06)' : undefined}}>
                  <td><Medalla pos={i + 1} /></td>
                  <td style={{fontWeight:600}}>{e.nombre}</td>
                  <td style={{textAlign:'center', color:'var(--texto2)'}}>{e.pj}</td>
                  <td style={{textAlign:'center', color:'var(--verde)', fontWeight:600}}>{e.pg}</td>
                  <td style={{textAlign:'center', color:'var(--texto2)'}}>{e.pe}</td>
                  <td style={{textAlign:'center', color:'#d93025'}}>{e.pp}</td>
                  <td style={{textAlign:'center'}}>{e.gf}</td>
                  <td style={{textAlign:'center'}}>{e.gc}</td>
                  <td style={{textAlign:'center'}} className={dif>=0?'valor-positivo':'valor-negativo'}>
                    {dif>=0?'+':''}{dif}
                  </td>
                  <td style={{textAlign:'right', fontWeight:800, fontSize:'1.05rem'}}>{e.pts}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Partidos del grupo */}
      {partidosGrupo.length > 0 && (
        <div className="card">
          <h2>Partidos — Grupo {grupoActivo}</h2>
          {partidosGrupo.map(f => {
            const ptsLRec = (clasMap[f.local_id]     || {})[f.jornada];
            const ptsVRec = (clasMap[f.visitante_id] || {})[f.jornada];
            const jugado  = ptsLRec !== undefined || ptsVRec !== undefined;
            const ptsL = ptsLRec ?? 0, ptsV = ptsVRec ?? 0;
            const efL  = f.es_neutral ? ptsL : ptsL + 5;
            const gL   = ptsAGoles(efL), gV = ptsAGoles(ptsV);
            const nomL = idNombre[f.local_id]     || '?';
            const nomV = idNombre[f.visitante_id] || '?';
            let cL = 'var(--texto)', cV = 'var(--texto)';
            if (jugado) {
              if      (gL > gV) { cL = 'var(--verde)'; cV = '#d93025'; }
              else if (gL < gV) { cL = '#d93025'; cV = 'var(--verde)'; }
              else              { cL = cV = '#856404'; }
            }
            return (
              <div key={f.id} style={{display:'flex', alignItems:'center', gap:'.5rem',
                                      padding:'.9rem 0', borderBottom:'1px solid var(--gris)'}}>
                <div style={{flex:1, textAlign:'right'}}>
                  <div style={{fontWeight:700, fontSize:'.95rem', color:cL}}>{nomL}</div>
                  {jugado && <div style={{fontSize:'.72rem', color:'var(--texto2)', marginTop:'.1rem'}}>
                    {f.es_neutral ? ptsL : `${ptsL}+5`}={efL} pts → <strong>{gL}</strong> {gL===1?'gol':'goles'}
                  </div>}
                </div>
                <div style={{width:'80px', textAlign:'center', flexShrink:0, lineHeight:1.1,
                             fontWeight:800, fontSize:jugado?'1.35rem':'.9rem',
                             color:jugado?'var(--texto)':'var(--texto2)'}}>
                  {jugado ? `${gL} – ${gV}` : '—'}
                  <div style={{fontSize:'.7rem', color:'var(--texto2)', fontWeight:400}}>J{f.jornada}</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700, fontSize:'.95rem', color:cV}}>{nomV}</div>
                  {jugado && <div style={{fontSize:'.72rem', color:'var(--texto2)', marginTop:'.1rem'}}>
                    {ptsV} pts → <strong>{gV}</strong> {gV===1?'gol':'goles'}
                  </div>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── LOGIN ──────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [user, setUser]       = useState('');
  const [pass, setPass]       = useState('');
  const [error, setError]     = useState('');
  const [cargando, setCargando] = useState(false);

  const entrar = async () => {
    if (!user.trim() || !pass.trim()) { setError('Introduce usuario y contraseña'); return; }
    if (!sb) { setError('Sin conexión con la base de datos'); return; }
    setCargando(true); setError('');
    const { data, error: err } = await sb.from('usuarios')
      .select('id, username, password, participante_id, is_admin')
      .ilike('username', user.trim())
      .single();
    setCargando(false);
    if (err || !data)       { setError('Usuario no encontrado'); return; }
    if (data.password !== pass) { setError('Contraseña incorrecta'); return; }
    onLogin(data);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <h1>Fantasy LaLiga</h1>
          <p>Inicia sesión con tu equipo</p>
        </div>
        {error && <div className="login-error">{error}</div>}
        <div className="campo">
          <label>Usuario</label>
          <input value={user} onChange={e => setUser(e.target.value)}
                 placeholder="Nombre de tu equipo"
                 autoFocus
                 onKeyDown={e => e.key === 'Enter' && entrar()} />
        </div>
        <div className="campo">
          <label>Contraseña</label>
          <input type="password" value={pass} onChange={e => setPass(e.target.value)}
                 placeholder="Contraseña"
                 onKeyDown={e => e.key === 'Enter' && entrar()} />
        </div>
        <button className="btn-full" onClick={entrar} disabled={cargando}>
          {cargando ? 'Entrando…' : 'Entrar'}
        </button>
      </div>
    </div>
  );
}

// ── ALINEACIÓN ─────────────────────────────────────────────────
function Alineacion({ participanteId }) {
  const [jornada, setJornada]     = useState(1);
  const [cierre, setCierre]       = useState(null);
  const [plantilla, setPlantilla] = useState(null);
  const [estado, setEstado]       = useState({});  // id → 'T'|'S'|'F'
  const [guardando, setGuardando] = useState(false);
  const [msg, setMsg]             = useState('');

  useEffect(() => {
    if (!sb) return;
    sb.from('config').select('jornada_actual').single()
      .then(({ data }) => data && setJornada(data.jornada_actual));
  }, []);

  useEffect(() => {
    if (!sb || !participanteId) return;
    sb.from('plantillas')
      .select('jugador_id, jugadores(id, nombre, equipo, posicion)')
      .eq('participante_id', participanteId)
      .then(({ data }) => {
        const jugs = (data || []).map(p => p.jugadores).filter(Boolean);
        jugs.sort((a, b) => POS_ORDEN[a.posicion] - POS_ORDEN[b.posicion]);
        setPlantilla(jugs);
      });
  }, [participanteId]);

  useEffect(() => {
    if (!sb || !participanteId || !plantilla) return;
    Promise.all([
      sb.from('alineaciones').select('jugador_id, es_titular')
        .eq('participante_id', participanteId).eq('jornada', jornada),
      sb.from('jornadas_cierre').select('cierre').eq('jornada', jornada).maybeSingle(),
    ]).then(([{ data: ali }, { data: cierreRow }]) => {
      setCierre(cierreRow?.cierre || null);
      const e = {};
      for (const j of plantilla) e[j.id] = 'F';
      for (const a of (ali || []))
        if (e.hasOwnProperty(a.jugador_id)) e[a.jugador_id] = a.es_titular ? 'T' : 'S';
      setEstado(e);
    });
  }, [participanteId, jornada, plantilla]);

  const bloqueado = !!(cierre && new Date() > new Date(cierre));
  const nT = Object.values(estado).filter(v => v === 'T').length;
  const nS = Object.values(estado).filter(v => v === 'S').length;

  const setJugadorEstado = (id, op) => {
    if (bloqueado) return;
    if (op === 'T' && nT >= 11 && estado[id] !== 'T') { alert('Ya tienes 11 titulares.'); return; }
    if (op === 'S' && nS >= 4  && estado[id] !== 'S') { alert('Máximo 4 suplentes.'); return; }
    setEstado(prev => ({ ...prev, [id]: op }));
    setMsg('');
  };

  const guardar = async () => {
    if (bloqueado || !sb) return;
    if (nT !== 11) { alert(`Necesitas exactamente 11 titulares (tienes ${nT}).`); return; }
    setGuardando(true);
    const registros = Object.entries(estado)
      .filter(([, v]) => v === 'T' || v === 'S')
      .map(([jugadorId, v]) => ({
        participante_id: participanteId, jornada,
        jugador_id: jugadorId, es_titular: v === 'T',
      }));
    await sb.from('alineaciones').delete()
      .eq('participante_id', participanteId).eq('jornada', jornada);
    if (registros.length) await sb.from('alineaciones').insert(registros);
    setGuardando(false);
    setMsg('Alineación guardada');
    setTimeout(() => setMsg(''), 3000);
  };

  if (plantilla === null) return <Spinner />;

  const seciones = [
    { key: 'T', label: `Titulares (${nT}/11)`, color: '#198754' },
    { key: 'S', label: `Suplentes (${nS}/4)`,  color: '#fd7e14' },
    { key: 'F', label: 'Sin convocar',           color: 'var(--texto2)' },
  ];

  return (
    <div className="card">
      <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'center', marginBottom:'1.2rem'}}>
        <div>
          <label style={{fontSize:'.85rem', color:'var(--texto2)', marginRight:'.4rem'}}>Jornada:</label>
          <select value={jornada} onChange={e => setJornada(Number(e.target.value))}
                  style={{padding:'.3rem .6rem', borderRadius:6, border:'1.5px solid var(--borde)'}}>
            {Array.from({length:38},(_,i)=>i+1).map(j =>
              <option key={j} value={j}>J{j}</option>)}
          </select>
        </div>
        <div style={{fontSize:'.85rem'}}>
          {cierre
            ? <span style={{color: bloqueado ? '#dc3545' : '#198754', fontWeight:600}}>
                {bloqueado ? '🔒 Cerrada' : '🟢 Abierta'} — cierre: {new Date(cierre).toLocaleString('es-ES')}
              </span>
            : <span style={{color:'#198754', fontWeight:600}}>🟢 Sin hora de cierre</span>}
        </div>
        <div style={{marginLeft:'auto', fontSize:'.9rem'}}>
          <strong style={{color: nT===11 ? '#198754' : '#dc3545'}}>{nT}/11</strong>
          <span style={{color:'var(--texto2)'}}> tit &nbsp;·&nbsp; </span>
          <strong>{nS}/4</strong>
          <span style={{color:'var(--texto2)'}}> sup</span>
        </div>
      </div>

      {seciones.map(({ key, label, color }) => {
        const jugs = plantilla.filter(j => estado[j.id] === key);
        if (!jugs.length) return null;
        return (
          <div key={key} style={{marginBottom:'1rem'}}>
            <div style={{fontWeight:700, fontSize:'.78rem', color, textTransform:'uppercase',
                         letterSpacing:'.05em', marginBottom:'.35rem'}}>
              {label}
            </div>
            <table style={{width:'100%'}}>
              <tbody>
                {jugs.map(j => (
                  <tr key={j.id}>
                    <td style={{width:48}}><span className={`badge ${j.posicion}`}>{j.posicion}</span></td>
                    <td style={{fontWeight:600}}>{nombreJugador(j.nombre, j.posicion, j.equipo)}</td>
                    <td style={{color:'var(--texto2)', fontSize:'.85rem'}}>{j.posicion === 'POR' ? '' : j.equipo}</td>
                    {!bloqueado && (
                      <td style={{textAlign:'right', whiteSpace:'nowrap'}}>
                        {[['T','Titular','#198754'],['S','Suplente','#fd7e14'],['F','Fuera','#6c757d']].map(([op, etiq, col]) => (
                          <button key={op} onClick={() => setJugadorEstado(j.id, op)}
                                  style={{marginLeft:3, padding:'.2rem .5rem', fontSize:'.75rem',
                                          border:`1.5px solid ${estado[j.id]===op ? col : 'var(--borde)'}`,
                                          borderRadius:6, cursor:'pointer',
                                          background: estado[j.id]===op ? col : '#fff',
                                          color: estado[j.id]===op ? '#fff' : 'var(--texto)'}}>
                            {etiq}
                          </button>
                        ))}
                      </td>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      })}

      {plantilla.length === 0 && (
        <div className="empty">Tu plantilla está vacía. Ficha jugadores primero.</div>
      )}

      {!bloqueado && plantilla.length > 0 && (
        <div style={{marginTop:'1rem', display:'flex', gap:'1rem', alignItems:'center'}}>
          <button className="btn-ok" onClick={guardar} disabled={guardando}>
            {guardando ? 'Guardando…' : 'Guardar alineación'}
          </button>
          {msg && <span style={{color:'#198754', fontSize:'.9rem'}}>{msg}</span>}
        </div>
      )}
      {bloqueado && (
        <p style={{color:'#dc3545', fontSize:'.9rem', marginTop:'.6rem'}}>
          La alineación de esta jornada está cerrada y no puede modificarse.
        </p>
      )}
    </div>
  );
}

// ── ADMIN — PRESUPUESTOS ───────────────────────────────────────
function AdminPresupuestos({ participantes }) {
  const [valores, setValores]   = useState({});
  const [guardado, setGuardado] = useState(null);

  useEffect(() => {
    if (!sb) return;
    sb.from('participantes').select('id, presupuesto').then(({ data }) => {
      const m = {};
      (data || []).forEach(p => { m[p.id] = String(p.presupuesto ?? 100000000); });
      setValores(m);
    });
  }, []);

  const guardar = async (pid) => {
    const val = parseFloat(valores[pid]);
    if (isNaN(val)) return;
    const { error } = await sb.from('participantes').update({ presupuesto: val }).eq('id', pid);
    if (error) { alert('Error: ' + error.message); return; }
    setGuardado(pid);
    setTimeout(() => setGuardado(null), 2000);
  };

  const Seccion = ({ lista, titulo }) => (
    <div className="card">
      <h2>{titulo}</h2>
      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th style={{textAlign:'right'}}>Presupuesto (€)</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {lista.map(p => (
            <tr key={p.id}>
              <td style={{fontWeight:600}}>{p.nombre}</td>
              <td style={{textAlign:'right'}}>
                <input type="number" value={valores[p.id] ?? ''}
                  onChange={e => setValores(prev => ({...prev, [p.id]: e.target.value}))}
                  style={{width:'150px', textAlign:'right', padding:'.3rem .5rem',
                          border:'1.5px solid var(--borde)', borderRadius:'8px', fontSize:'.9rem'}} />
              </td>
              <td style={{paddingLeft:'.5rem'}}>
                <button onClick={() => guardar(p.id)} className="btn-fichar"
                  style={{background: guardado === p.id ? 'var(--verde)' : undefined,
                          minWidth:'90px'}}>
                  {guardado === p.id ? 'Guardado ✓' : 'Guardar'}
                </button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  return (
    <div>
      <Seccion lista={participantes.filter(p => p.division_id === 1)} titulo="Primera División" />
      <Seccion lista={participantes.filter(p => p.division_id === 2)} titulo="Segunda División" />
    </div>
  );
}

// ── ADMIN — CALENDARIO ─────────────────────────────────────────
function AdminCalendario({ participantes }) {
  const [fixtures, setFixtures]     = useState(null);
  const [divisiones, setDivisiones] = useState([]);
  const [filtrDiv, setFiltrDiv]     = useState('');
  const [filtrJ, setFiltrJ]         = useState('');
  const [nuevo, setNuevo]           = useState({
    jornada:'', division_id:'', local_id:'', visitante_id:'', es_neutral: false
  });
  const [msg, setMsg] = useState('');

  const cargar = () => {
    sb.from('calendario').select('*').order('jornada').then(({ data }) => setFixtures(data || []));
    sb.from('divisiones').select('*').then(({ data }) => setDivisiones(data || []));
  };
  useEffect(() => { if (sb) cargar(); }, []);

  const eliminar = async (id) => {
    if (!confirm('¿Eliminar este partido del calendario?')) return;
    await sb.from('calendario').delete().eq('id', id);
    cargar();
  };

  const añadir = async () => {
    const { jornada, division_id, local_id, visitante_id, es_neutral } = nuevo;
    if (!jornada || !division_id || !local_id || !visitante_id) {
      setMsg('Rellena todos los campos'); return;
    }
    if (local_id === visitante_id) {
      setMsg('Local y visitante no pueden ser el mismo equipo'); return;
    }
    const { error } = await sb.from('calendario').insert({
      jornada: parseInt(jornada), division_id: parseInt(division_id),
      local_id, visitante_id, es_neutral,
    });
    if (error) { setMsg('Error: ' + error.message); return; }
    setMsg('Partido añadido correctamente');
    setNuevo({ jornada:'', division_id:'', local_id:'', visitante_id:'', es_neutral: false });
    cargar();
    setTimeout(() => setMsg(''), 3000);
  };

  if (fixtures === null) return <Spinner />;

  const idNombre = Object.fromEntries(participantes.map(p => [p.id, p.nombre]));
  const maxJ     = fixtures.length > 0 ? Math.max(...fixtures.map(f => f.jornada)) : 0;

  const lista = fixtures.filter(f => {
    if (filtrDiv && f.division_id !== parseInt(filtrDiv)) return false;
    if (filtrJ   && f.jornada    !== parseInt(filtrJ))   return false;
    return true;
  });

  const partsFiltrados = participantes.filter(p =>
    !nuevo.division_id || p.division_id === parseInt(nuevo.division_id)
  );

  return (
    <div>
      <div className="card">
        <h2>Partidos en el calendario</h2>
        <div className="filtros" style={{marginBottom:'1rem'}}>
          <select value={filtrDiv} onChange={e => setFiltrDiv(e.target.value)}>
            <option value="">Todas las divisiones</option>
            {divisiones.map(d => <option key={d.id} value={d.id}>{d.nombre}</option>)}
          </select>
          <select value={filtrJ} onChange={e => setFiltrJ(e.target.value)}>
            <option value="">Todas las jornadas</option>
            {Array.from({length: maxJ}, (_, i) => i + 1).map(j =>
              <option key={j} value={j}>Jornada {j}</option>
            )}
          </select>
        </div>
        <table>
          <thead>
            <tr>
              <th>J</th><th>División</th><th>Local</th>
              <th style={{textAlign:'center'}}>vs</th>
              <th>Visitante</th><th style={{textAlign:'center'}}>Neutral</th><th></th>
            </tr>
          </thead>
          <tbody>
            {lista.map(f => {
              const div = divisiones.find(d => d.id === f.division_id);
              return (
                <tr key={f.id}>
                  <td style={{fontWeight:600}}>{f.jornada}</td>
                  <td style={{color:'var(--texto2)', fontSize:'.82rem'}}>{div?.nombre}</td>
                  <td style={{fontWeight:600}}>{idNombre[f.local_id] || '?'}</td>
                  <td style={{textAlign:'center', color:'var(--texto2)'}}>vs</td>
                  <td style={{fontWeight:600}}>{idNombre[f.visitante_id] || '?'}</td>
                  <td style={{textAlign:'center'}}>{f.es_neutral ? '✓' : ''}</td>
                  <td>
                    <button onClick={() => eliminar(f.id)}
                      style={{background:'#d93025', color:'#fff', border:'none',
                              padding:'.25rem .6rem', borderRadius:'6px',
                              cursor:'pointer', fontSize:'.78rem', fontWeight:600}}>
                      Eliminar
                    </button>
                  </td>
                </tr>
              );
            })}
            {lista.length === 0 && (
              <tr><td colSpan={7} className="empty">Sin partidos con estos filtros</td></tr>
            )}
          </tbody>
        </table>
      </div>

      <div className="card">
        <h2>Añadir partido</h2>
        {msg && (
          <div style={{color: msg.includes('Error') ? '#d93025' : 'var(--verde)',
                       fontWeight:600, marginBottom:'.75rem'}}>
            {msg}
          </div>
        )}
        <div className="filtros" style={{flexWrap:'wrap'}}>
          <input type="number" min="1" max="99" placeholder="Jornada"
            value={nuevo.jornada}
            onChange={e => setNuevo(p => ({...p, jornada: e.target.value}))}
            style={{width:'90px'}} />
          <select value={nuevo.division_id}
            onChange={e => setNuevo(p => ({...p, division_id: e.target.value, local_id:'', visitante_id:''}))}>
            <option value="">División…</option>
            {divisiones.map(d => <option key={d.id} value={d.id}>{d.nombre}</option>)}
          </select>
          <select value={nuevo.local_id}
            onChange={e => setNuevo(p => ({...p, local_id: e.target.value}))}>
            <option value="">Local…</option>
            {partsFiltrados.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
          <select value={nuevo.visitante_id}
            onChange={e => setNuevo(p => ({...p, visitante_id: e.target.value}))}>
            <option value="">Visitante…</option>
            {partsFiltrados.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
          <label style={{display:'flex', alignItems:'center', gap:'.3rem', fontSize:'.88rem', cursor:'pointer'}}>
            <input type="checkbox" checked={nuevo.es_neutral}
              onChange={e => setNuevo(p => ({...p, es_neutral: e.target.checked}))} />
            Neutral
          </label>
          <button className="btn-fichar" onClick={añadir}>Añadir partido</button>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN — CIERRES DE JORNADA ─────────────────────────────────
function AdminCierres() {
  const [jornada, setJornada] = useState(1);
  const [cierre, setCierre]   = useState('');
  const [msg, setMsg]         = useState('');

  useEffect(() => {
    if (!sb) return;
    sb.from('config').select('jornada_actual').single()
      .then(({ data }) => data && setJornada(data.jornada_actual));
  }, []);

  const cargar = () => {
    if (!sb) return;
    sb.from('jornadas_cierre').select('cierre').eq('jornada', jornada).maybeSingle()
      .then(({ data }) => setCierre(data?.cierre ? data.cierre.slice(0, 16) : ''));
  };
  useEffect(cargar, [jornada]);

  const guardar = async () => {
    if (!sb) return;
    if (!cierre) {
      await sb.from('jornadas_cierre').delete().eq('jornada', jornada);
      setMsg('Cierre eliminado');
    } else {
      await sb.from('jornadas_cierre')
        .upsert({ jornada, cierre: new Date(cierre).toISOString() }, { onConflict: 'jornada' });
      setMsg('Cierre guardado');
    }
    setTimeout(() => setMsg(''), 3000);
  };

  return (
    <div className="card">
      <h2>Cierre de alineaciones por jornada</h2>
      <p style={{fontSize:'.9rem', color:'var(--texto2)', marginBottom:'1rem'}}>
        Establece la hora límite a partir de la cual los equipos no pueden modificar su alineación.
        Deja el campo vacío y guarda para eliminar el cierre de una jornada.
      </p>
      <div style={{display:'flex', gap:'1rem', alignItems:'flex-end', flexWrap:'wrap'}}>
        <div>
          <label style={{fontSize:'.85rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>Jornada</label>
          <select value={jornada} onChange={e => setJornada(Number(e.target.value))}
                  style={{padding:'.4rem .7rem', borderRadius:6, border:'1.5px solid var(--borde)'}}>
            {Array.from({length:38},(_,i)=>i+1).map(j =>
              <option key={j} value={j}>Jornada {j}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:'.85rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>
            Fecha y hora de cierre
          </label>
          <input type="datetime-local" value={cierre} onChange={e => setCierre(e.target.value)}
                 style={{padding:'.4rem .7rem', borderRadius:6, border:'1.5px solid var(--borde)'}} />
        </div>
        <button className="btn-ok" onClick={guardar}>Guardar</button>
        {msg && <span style={{color:'#198754', fontSize:'.9rem'}}>{msg}</span>}
      </div>
      {cierre && (
        <p style={{marginTop:'.8rem', fontSize:'.85rem', color:'var(--texto2)'}}>
          Cierre actual J{jornada}: <strong>{new Date(cierre).toLocaleString('es-ES')}</strong>
        </p>
      )}
    </div>
  );
}

// ── ADMIN — PANEL PRINCIPAL ────────────────────────────────────
function AdminPanel({ participantes }) {
  const [subtab, setSubtab] = useState('puntos');

  return (
    <div>
      <div className="tabs">
        {[
          ['puntos',       'Clasificación'],
          ['presupuestos', 'Presupuestos'],
          ['calendario',   'Calendario'],
          ['cierres',      'Cierres'],
        ].map(([k, l]) => (
          <button key={k} className={`tab ${subtab === k ? 'active' : ''}`}
                  onClick={() => setSubtab(k)}>
            {l}
          </button>
        ))}
      </div>
      {subtab === 'puntos'        && <Puntos participantes={participantes} />}
      {subtab === 'presupuestos'  && <AdminPresupuestos participantes={participantes} />}
      {subtab === 'calendario'    && <AdminCalendario participantes={participantes} />}
      {subtab === 'cierres'       && <AdminCierres />}
    </div>
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────────

function App() {
  const [vista, setVista]               = useState('Clasificacion');
  const [participantes, setParticipantes] = useState([]);
  const [participanteId, setParticipanteId] = useState('');

  // Sesión persistida en localStorage
  const [session, setSession] = useState(() => {
    try { return JSON.parse(localStorage.getItem('filfa_session') || 'null'); }
    catch { return null; }
  });

  useEffect(() => {
    if (!sb) return;
    sb.from('participantes').select('id, nombre, division_id')
      .order('nombre')
      .then(({ data }) => {
        if (data && data.length > 0) {
          setParticipantes(data);
          const pid = session?.participante_id;
          setParticipanteId(pid && data.find(p => p.id === pid) ? pid : data[0].id);
        }
      });
  }, []);

  const handleLogin = (userData) => {
    localStorage.setItem('filfa_session', JSON.stringify(userData));
    setSession(userData);
    if (userData.participante_id) setParticipanteId(userData.participante_id);
  };

  const handleLogout = () => {
    localStorage.removeItem('filfa_session');
    setSession(null);
  };

  if (!session) return <Login onLogin={handleLogin} />;

  const isAdmin  = !!session.is_admin;
  const VISTAS   = ['Mi Plantilla', 'Mercado', 'Alineación', 'Equipos', 'Liga', 'Copa',
                    ...(isAdmin ? ['Admin'] : [])];
  const participanteActual = participantes.find(p => p.id === participanteId);

  return (
    <>
      <nav>
        <h1>Fantasy LaLiga</h1>
        {VISTAS.map(v => (
          <button key={v} className={vista === v ? 'active' : ''} onClick={() => setVista(v)}>
            {v}
          </button>
        ))}

        {/* Selector de equipo: admin puede cambiar, usuario ve solo el suyo */}
        {participantes.length > 0 && (
          isAdmin
            ? <div className="nav-selector">
                <label>Ver equipo:</label>
                <select value={participanteId} onChange={e => setParticipanteId(e.target.value)}>
                  {participantes.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
                </select>
              </div>
            : <div className="nav-selector">
                <label>Equipo:</label>
                <span style={{color:'#fff', fontSize:'.85rem', fontWeight:600}}>
                  {participanteActual?.nombre || ''}
                </span>
              </div>
        )}

        {/* Usuario y botón logout */}
        <div className="nav-user">
          <span>{isAdmin ? '⚙ Admin' : session.username}</span>
          <button className="btn-logout" onClick={handleLogout}>Salir</button>
        </div>
      </nav>

      {esDemo && (
        <div className="aviso">
          Modo demo — edita <code>SUPABASE_URL</code> y <code>SUPABASE_KEY</code> en index.html
        </div>
      )}

      <main>
        {vista === 'Mi Plantilla'  && (
          <Plantilla participanteId={participanteId}
                     participanteNombre={participanteActual?.nombre} />
        )}
        {vista === 'Mercado' && (
          <Mercado participanteId={participanteId} participantes={participantes} onFichaje={() => {}} />
        )}
        {vista === 'Alineación' && (
          <Alineacion participanteId={participanteId} />
        )}
        {vista === 'Equipos' && (
          <Equipos participantes={participantes} miParticipanteId={participanteId} />
        )}
        {vista === 'Liga'  && <Liga participantes={participantes} />}
        {vista === 'Copa'  && <Copa participantes={participantes} />}
        {vista === 'Admin' && isAdmin && <AdminPanel participantes={participantes} />}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
