                                         fontSize:'.8rem', fontWeight:600, opacity: borrando===j.id?.5:1 }}>
                          {borrando === j.id ? '…' : 'Eliminar'}
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
        }
      </div>
    </div>
  );
}

function AdminPanel({ participantes, federacion, onFederacionUpdate, onParticipantesChange, isModerador }) {
  // [key, label, soloAdmin]
  const TABS_DEF = [
    ['federacion',   'Mi Federación', true],
    ['equipos',      'Equipos',       true],
    ['ptsjug',       'Pts Jugadores', false],
    ['presupuestos', 'Presupuestos',  false],
    ['pujas',        'Pujas',         false],
    ['fichajespend', 'Fich. Pend.',   false],
    ['cierres',      'Cierres',       false],
    ['mercado',      'Mercado',       true],
    ['jugadores',    'Jugadores',     true],
    ['h2h',          'Liga H2H',      true],
  ];
  // Moderadores solo ven tabs con soloAdmin=false, SALVO que la federacion tenga puntos_mod_habilitado
  const ptsMod = federacion?.puntos_mod_habilitado;
  const tabs = TABS_DEF.filter(([k,, soloAdmin]) => {
    if (!isModerador) return true;
    if (k === 'ptsjug') return ptsMod;
    return !soloAdmin;
  });
  const primera = tabs[0]?.[0] || 'federacion';
  const [subtab, setSubtab] = useState(primera);

  React.useEffect(() => {
    if (!tabs.find(([k]) => k === subtab)) setSubtab(primera);
  }, [isModerador]);

  return (
    <div>
      {isModerador && (
        <div style={{background:'var(--verde)', color:'#fff', padding:'.4rem 1rem',
                     fontSize:'.82rem', borderRadius:'var(--radio)', marginBottom:'.5rem'}}>
          Modo moderador — acceso restringido
        </div>
      )}
      <div className="tabs">
        {tabs.map(([k, l]) => (
          <button key={k} className={`tab ${subtab===k?'active':''}`} onClick={() => setSubtab(k)}>{l}</button>
        ))}
      </div>
      {subtab === 'federacion'    && <AdminFederacion federacion={federacion} onFederacionUpdate={onFederacionUpdate} participantes={participantes} onParticipantesChange={onParticipantesChange} />}
      {subtab === 'equipos'       && <AdminEquipos participantes={participantes} federacion={federacion} onParticipantesChange={onParticipantesChange} />}
      {subtab === 'ptsjug'        && <AdminPtsJugadores participantes={participantes} federacion={federacion} />}
      {subtab === 'presupuestos'  && <AdminPresupuestos participantes={participantes} />}
      {subtab === 'pujas'         && <AdminPujas participantes={participantes} federacion={federacion} />}
      {subtab === 'fichajespend'  && <AdminFichajesPendientes participantes={participantes} federacion={federacion} />}
      {subtab === 'cierres'       && <AdminCierres federacion={federacion} />}
      {subtab === 'mercado'       && <AdminMercado federacion={federacion} onFederacionUpdate={onFederacionUpdate} />}
      {subtab === 'jugadores'    && <AdminJugadores participantes={participantes} federacion={federacion} />}
      {subtab === 'h2h'          && <AdminLigaH2H federacion={federacion} participantes={participantes} onFederacionUpdate={onFederacionUpdate} />}
    </div>
  );
}

// ── SELECTOR DE FEDERACIONES ───────────────────────────────────

function SelectorFederacion({ misParticipantes, adminFeds, authUser, onSeleccionar, onNueva, onLogout }) {
  const [posiciones, setPosiciones] = useState({});
  const [cargando, setCargando]     = useState(true);

  useEffect(() => { cargarPos(); }, [misParticipantes]);

  const cargarPos = async () => {
    if (!sb || misParticipantes.length === 0) { setCargando(false); return; }
    const fedIds = [...new Set(misParticipantes.map(p => p.federacion_id).filter(Boolean))];
    const { data: allParts } = await sb.from('participantes').select('id, federacion_id').in('federacion_id', fedIds);
    const allPartIds = (allParts || []).map(p => p.id);
    const { data: clas } = allPartIds.length > 0
      ? await sb.from('clasificacion').select('participante_id, puntos_jornada').in('participante_id', allPartIds)
      : { data: [] };
    const pts = {};
    for (const r of (clas || [])) pts[r.participante_id] = (pts[r.participante_id] || 0) + (r.puntos_jornada || 0);
    const posMap = {};
    for (const fedId of fedIds) {
      const ranked = (allParts || []).filter(p => p.federacion_id === fedId)
        .map(p => ({ id: p.id, pts: pts[p.id] || 0 }))
        .sort((a, b) => b.pts - a.pts);
      ranked.forEach((r, i) => { posMap[r.id] = i + 1; });
    }
    setPosiciones(posMap);
    setCargando(false);
  };

  const fmtV = v => v >= 1e6 ? (v/1e6).toFixed(1).replace('.',',')+'M€'
                  : v >= 1e3 ? Math.round(v/1e3)+'K€' : v+'€';

  // Admin feds sin participante propio
  const adminSinEquipo = (adminFeds || []).filter(f => !misParticipantes.find(p => p.federacion_id === f.id));

  return (
    <div style={{minHeight:'100vh', background:'var(--fondo)', padding:'2rem 1rem'}}>
      <div style={{maxWidth:680, margin:'0 auto'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'2rem'}}>
          <h1 style={{margin:0, fontSize:'1.6rem', color:'var(--texto)'}}>Mis Federaciones</h1>
          <div style={{display:'flex', gap:'.5rem'}}>
            <button className="btn-ok" onClick={onNueva}>+ Unirse / Crear</button>
            <button className="btn-cancel" onClick={onLogout}>Salir</button>
          </div>
        </div>

        {cargando ? <Spinner /> :
         misParticipantes.length === 0 && adminSinEquipo.length === 0 ? (
          <div style={{textAlign:'center', padding:'3rem', color:'var(--texto2)'}}>
            <p style={{marginBottom:'1.5rem'}}>No perteneces a ninguna federación todavía.</p>
            <button className="btn-ok" onClick={onNueva}>Unirse o crear una federación</button>
          </div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:'1rem'}}>
            {misParticipantes.map(p => {
              const fed  = p.federacion;
              const pos  = posiciones[p.id];
              const esAdmin = fed?.admin_user_id === authUser?.id;
              return (
                <div key={p.id} className="card"
                     style={{display:'flex', alignItems:'center', gap:'1.25rem', cursor:'pointer',
                             transition:'box-shadow .15s', padding:'1rem 1.25rem'}}
                     onClick={() => onSeleccionar(p, fed)}>
                  <div style={{width:52, height:52, flexShrink:0, borderRadius:10, overflow:'hidden',
                               background:'var(--borde)', display:'flex', alignItems:'center', justifyContent:'center'}}>
                    {p.escudo_url
                      ? <img src={p.escudo_url} style={{width:'100%', height:'100%', objectFit:'cover'}} alt="" />
                      : <span style={{fontSize:'1.5rem'}}>⚽</span>}
                  </div>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontWeight:700, fontSize:'1rem', display:'flex', alignItems:'center', gap:'.5rem', flexWrap:'wrap'}}>
                      {fed?.nombre || 'Federación'}
                      {esAdmin && <span style={{fontSize:'.72rem', background:'var(--acento)', color:'#fff',
                                               borderRadius:6, padding:'.1rem .45rem'}}>Admin</span>}
                    </div>
                    <div style={{color:'var(--texto2)', fontSize:'.85rem', marginTop:'.15rem', overflow:'hidden',
                                 textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                      {p.nombre}
                    </div>
                    <div style={{display:'flex', gap:'1rem', marginTop:'.4rem', fontSize:'.82rem', flexWrap:'wrap'}}>
                      <span style={{color:'var(--verde)', fontWeight:700}}>{fmtV(p.presupuesto || 0)}</span>
                      <span style={{color:'var(--texto2)'}}>
                        {p.division_id === 1 ? 'Primera' : p.division_id === 2 ? 'Segunda' : `Div ${p.division_id}`}
                      </span>
                      {pos && <span style={{color: pos <= 3 ? '#d97706' : 'var(--texto2)', fontWeight: pos <= 3 ? 700 : 400}}>
                        {pos}º clasificado
                      </span>}
                    </div>
                  </div>
                  <span style={{color:'var(--acento)', fontSize:'1.4rem', flexShrink:0}}>›</span>
                </div>
              );
            })}
            {adminSinEquipo.map(f => (
              <div key={f.id} className="card"
                   style={{display:'flex', alignItems:'center', gap:'1.25rem', cursor:'pointer', padding:'1rem 1.25rem'}}
                   onClick={() => onSeleccionar(null, f)}>
                <div style={{width:52, height:52, flexShrink:0, borderRadius:10, background:'var(--borde)',
                             display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1.5rem'}}>⚙️</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700, fontSize:'1rem', display:'flex', alignItems:'center', gap:'.5rem'}}>
                    {f.nombre}
                    <span style={{fontSize:'.72rem', background:'var(--acento)', color:'#fff',
                                  borderRadius:6, padding:'.1rem .45rem'}}>Admin</span>
                  </div>
                  <div style={{color:'var(--texto2)', fontSize:'.85rem', marginTop:'.15rem'}}>Sin equipo registrado</div>
                </div>
                <span style={{color:'var(--acento)', fontSize:'1.4rem'}}>›</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────────

function App() {
  const [vista, setVista]                   = useState('Tablón');
  const [participantes, setParticipantes]   = useState([]);
  const [participanteId, setParticipanteId] = useState('');
  const [federacion, setFederacion]         = useState(null);
  const [misParticipantes, setMisParticipantes] = useState([]);
  const [adminFeds, setAdminFeds]           = useState([]);
  const [verOnboarding, setVerOnboarding]   = useState(false);

  const [authUser, setAuthUser]       = useState(null);
  const [session, setSession]         = useState(null);
  const [sesionLista, setSesionLista] = useState(false);
  const [ofertasBadge, setOfertasBadge] = useState(0);

  const seleccionarFederacion = async (part, fed, userOverride) => {
    const u = userOverride || authUser;
    let esMod = false;
    if (part?.id && part?.federacion_id) {
      const { data: modRow } = await sb.from('moderadores').select('id')
        .eq('federacion_id', part.federacion_id).eq('participante_id', part.id).maybeSingle();
      esMod = !!modRow;
    }
    setFederacion(fed || null);
    setSession({ email: u?.email || '', participante_id: part?.id || null, es_moderador: esMod });
    setVerOnboarding(false);
    setVista('Tablón');
    if (part?.id) localStorage.setItem('filfa_part_id', part.id);
  };

  const cargarPerfil = async (user) => {
    setAuthUser(user);
    // Cargar TODOS los participantes del usuario
    const [{ data: parts }, { data: adminFedData }] = await Promise.all([
      sb.from('participantes')
        .select('id, nombre, federacion_id, presupuesto, division_id, escudo_url')
        .eq('user_id', user.id).order('created_at'),
      sb.from('federaciones').select('*').eq('admin_user_id', user.id),
    ]);

    const lista = parts || [];
    const aFeds = adminFedData || [];

    // Cargar datos de las federaciones
    const fedIds = [...new Set(lista.map(p => p.federacion_id).filter(Boolean))];
    let feds = [];
    if (fedIds.length > 0) {
      const { data: fedData } = await sb.from('federaciones').select('*').in('id', fedIds);
      feds = fedData || [];
    }
    const combinado = lista.map(p => ({ ...p, federacion: feds.find(f => f.id === p.federacion_id) || null }));

    setMisParticipantes(combinado);
    setAdminFeds(aFeds);

    // Intentar restaurar última federación seleccionada
    const savedId = localStorage.getItem('filfa_part_id');
    const saved   = combinado.find(p => p.id === savedId);

    if (saved) {
      await seleccionarFederacion(saved, saved.federacion, user);
    } else if (combinado.length === 1) {
      await seleccionarFederacion(combinado[0], combinado[0].federacion, user);
    } else if (combinado.length === 0 && aFeds.length === 1) {
      await seleccionarFederacion(null, aFeds[0], user);
    } else {
      // Múltiples federaciones o ninguna → mostrar selector
      setSession({ email: user.email, participante_id: null, es_moderador: false });
      setFederacion(null);
    }
  };

  useEffect(() => {
    if (!sb) { setSesionLista(true); return; }
    sb.auth.getSession().then(async ({ data }) => {
      if (data.session) await cargarPerfil(data.session.user);
      setSesionLista(true);
    });
    const { data: sub } = sb.auth.onAuthStateChange((event, sess) => {
      if (event === 'SIGNED_OUT') { setSession(null); setAuthUser(null); setFederacion(null); }
      if (event === 'SIGNED_IN' && sess?.user) cargarPerfil(sess.user);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  const recargarParticipantes = async () => {
    if (!sb || !federacion?.id) { setParticipantes([]); return; }
    const { data } = await sb.from('participantes')
      .select('id, nombre, division_id, escudo_url, estadio, entrenador, user_id')
      .eq('federacion_id', federacion.id)
      .order('nombre');
    const lista = data || [];
    setParticipantes(lista);
    if (lista.length > 0) {
      const pid = session?.participante_id;
      setParticipanteId(prev =>
        (prev && lista.find(p => p.id === prev)) ? prev :
        (pid  && lista.find(p => p.id === pid))  ? pid  : lista[0].id
      );
    }
  };

  useEffect(() => { recargarParticipantes(); }, [federacion, session]);

  const refrescarBadge = async () => {
    const pid = session?.participante_id;
    if (!sb || !pid) { setOfertasBadge(0); return; }
    const { count } = await sb.from('ofertas_jugadores')
      .select('id', { count: 'exact', head: true })
      .eq('propietario_id', pid).eq('estado', 'pendiente');
    setOfertasBadge(count || 0);
  };
  useEffect(() => { refrescarBadge(); }, [session?.participante_id, federacion?.id]);

  const handleLogin  = (user) => cargarPerfil(user);
  const handleLogout = async () => {
    await sb.auth.signOut();
    setSession(null); setAuthUser(null); setFederacion(null);
    setMisParticipantes([]); setAdminFeds([]); setVerOnboarding(false);
    localStorage.removeItem('filfa_part_id');
  };

  if (sb && !sesionLista) return <Spinner />;
  if (!session) return <Login onLogin={handleLogin} />;

  // Sin federación activa → selector o onboarding
  if (!federacion || verOnboarding) {
    const tieneAlgo = misParticipantes.length > 0 || adminFeds.length > 0;
    if (!tieneAlgo || verOnboarding) {
      return <FederacionOnboarding user={authUser}
                                   onDone={() => { cargarPerfil(authUser); setVerOnboarding(false); }}
                                   onLogout={handleLogout} />;
    }
    return <SelectorFederacion
      misParticipantes={misParticipantes}
      adminFeds={adminFeds}
      authUser={authUser}
      onSeleccionar={(part, fed) => seleccionarFederacion(part, fed)}
      onNueva={() => setVerOnboarding(true)}
      onLogout={handleLogout} />;
  }

  // Admin sin equipo propio en esta federación → onboarding
  const isAdminCheck = federacion?.admin_user_id === authUser?.id;
  if (!session.participante_id && !isAdminCheck) {
    return <FederacionOnboarding user={authUser}
                                 onDone={() => cargarPerfil(authUser)}
                                 onLogout={handleLogout} />;
  }

  const isAdmin     = federacion?.admin_user_id === authUser?.id;
  const isModerador = !isAdmin && !!session?.es_moderador;
  const VISTAS      = ['Tablón', 'Mi Plantilla', 'Ofertas', 'Alineación', 'Mercado', 'Equipos', 'Calendario', 'Liga H2H', 'Ayuda',
                       ...(isAdmin || isModerador ? ['Admin'] : [])];
  const participanteActual = participantes.find(p => p.id === participanteId);

  return (
    <>
      <nav>
        <h1>
          {federacion?.logo_url
            ? <img src={federacion.logo_url} alt={federacion.nombre || ''}
                   style={{height:38, maxWidth:120, objectFit:'contain', display:'block'}} />
            : (federacion?.nombre || 'Fantasy LaLiga')
          }
        </h1>
        {VISTAS.map(v => (
          <button key={v} className={vista === v ? 'active' : ''} onClick={() => setVista(v)}
                  style={{position:'relative'}}>
            {v}
            {v === 'Ofertas' && ofertasBadge > 0 && (
              <span style={{
                position:'absolute', top:2, right:2,
                background:'#e53e3e', color:'#fff',
                borderRadius:'50%', width:16, height:16,
                fontSize:10, fontWeight:700,
                display:'flex', alignItems:'center', justifyContent:'center',
                lineHeight:1, pointerEvents:'none'
              }}>{ofertasBadge > 9 ? '9+' : ofertasBadge}</span>
            )}
          </button>
        ))}

        {participantes.length > 0 && (
          (isAdmin || isModerador)
            ? <div className="nav-selector">
                <label>Ver equipo:</label>
                <select value={participanteId} onChange={e => setParticipanteId(e.target.value)}>
                  {participantes.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
                </select>
              </div>
            : <div className="nav-selector">
                <label>Equipo:</label>
                <span style={{color:'#fff', fontSize:'.85rem', fontWeight:600}}>
                  {participanteActual?.nombre || ''}
                </span>
              </div>
        )}

        <div className="nav-user">
          <span>{isAdmin ? '⚙ Admin' : isModerador ? '⚙ Mod' : session.email}</span>
          {(misParticipantes.length > 0 || adminFeds.length > 0) && (
            <button className="btn-logout"
                    onClick={() => { setFederacion(null); setSession(s => ({...s, participante_id: null})); }}
                    title="Cambiar de federación">
              Federaciones
            </button>
          )}
          <button className="btn-logout" onClick={handleLogout}>Salir</button>
        </div>
      </nav>

      {esDemo && (
        <div className="aviso">
          Modo demo — edita <code>SUPABASE_URL</code> y <code>SUPABASE_KEY</code> en index.html
        </div>
      )}

      <main>
        {vista === 'Mi Plantilla' && (
          <Plantilla participanteId={participanteId}
                     participanteNombre={participanteActual?.nombre}
                     federacion={federacion}
                     isAdmin={isAdmin}
                     miParticipanteId={session?.participante_id} />
        )}
        {/* Mercado se mantiene montado para no relanzar queries al volver */}
        <div style={{display: vista === 'Mercado' ? '' : 'none'}}>
          <Mercado participanteId={participanteId} participantes={participantes}
                   isAdmin={isAdmin} onFichaje={() => {}} federacion={federacion}
                   miParticipanteId={session?.participante_id} />
        </div>
        {vista === 'Alineación' && (
          <Alineacion participanteId={participanteId}
                      jornadaActual={federacion?.jornada_actual || 1}
                      federacionId={federacion?.id} />
        )}
        {vista === 'Ofertas' && (
          <Ofertas miParticipanteId={participanteId}
                   participantes={participantes}
                   federacion={federacion}
                   isAdmin={isAdmin}
                   onBadgeChange={refrescarBadge} />
        )}
        {vista === 'Equipos' && (
          <Equipos participantes={participantes} miParticipanteId={participanteId}
                   sesionParticipanteId={session?.participante_id}
                   jornadaActual={federacion?.jornada_actual || 1}
                   isAdmin={isAdmin}
                   federacion={federacion}
                   onParticipantesChange={recargarParticipantes}
                   onOfertaEnviada={refrescarBadge} />
        )}
        {vista === 'Calendario' && (
          <CalendarioFantasy participantes={participantes} federacion={federacion} />
        )}
        {vista === 'Liga H2H' && (
          <LigaH2H federacion={federacion} participantes={participantes} />
        )}
        {vista === 'Ayuda' && (
          <Ayuda isAdmin={isAdmin} />
        )}
        {vista === 'Tablón' && (
          <Tablon federacionId={federacion?.id} isAdmin={isAdmin} />
        )}
        {vista === 'Admin' && (isAdmin || isModerador) && (
          <ErrorBoundary>
            <AdminPanel participantes={participantes}
                        federacion={federacion}
                        onFederacionUpdate={setFederacion}
                        onParticipantesChange={recargarParticipantes}
                        isModerador={isModerador} />
          </ErrorBoundary>
        )}
      </main>
    </>
  );
}

// ── LIGA H2H (usuario) ─────────────────────────────────────────
function LigaH2H({ federacion, participantes }) {
  const [tab,      setTab]      = useState('calendario');
  const [partidos, setPartidos] = useState([]);
  const [jornada,  setJornada]  = useState(1);
  const [divisiones, setDivisiones] = useState([]);

  useEffect(() => {
    if (!sb) return;
    sb.from('divisiones').select('id, nombre').order('nombre')
      .then(({ data }) => setDivisiones(data || []));
  }, []);

  useEffect(() => {
    if (!sb || !federacion?.id || !federacion?.h2h_habilitado) return;
    sb.from('h2h_partidos')
      .select('id, jornada, division_id, local_id, visitante_id, pts_local, pts_visitante')
      .eq('federacion_id', federacion.id)
      .order('jornada')
      .then(({ data }) => {
        const p = data || [];
        setPartidos(p);
        if (p.length > 0) setJornada(1);
      });
  }, [federacion?.id, federacion?.h2h_habilitado]);

  if (!federacion?.h2h_habilitado) {
    return (
      <div className="card">
        <h2>Liga H2H</h2>
        <p style={{color:'var(--texto2)', marginTop:'.5rem'}}>Liga H2H no activada.</p>
      </div>
    );
  }

  const nomMap = Object.fromEntries(participantes.map(p => [p.id, p]));
  const jornadas = [...new Set(partidos.map(p => p.jornada))].sort((a, b) => a - b);
  const divIds = [...new Set(participantes.map(p => p.division_id).filter(Boolean))];
  const hasDivs = divIds.length > 0;

  const computeClasif = (divId) => {
    const equips = divId
      ? participantes.filter(p => p.division_id === divId)
      : participantes;
    const stats = {};
    equips.forEach(p => {
      stats[p.id] = { id: p.id, nombre: p.nombre, escudo_url: p.escudo_url,
                      pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, pts:0 };
    });
    const ms = divId ? partidos.filter(m => m.division_id === divId) : partidos;
    ms.forEach(m => {
      if (m.pts_local === null || m.pts_visitante === null) return;
      const L = stats[m.local_id], V = stats[m.visitante_id];
      if (!L || !V) return;
      const gl = Number(m.pts_local), gv = Number(m.pts_visitante);
      L.pj++; V.pj++;
      L.gf += gl; L.gc += gv; V.gf += gv; V.gc += gl;
      if (gl > gv)       { L.pg++; L.pts += 3; V.pp++; }
      else if (gl === gv) { L.pe++; L.pts++;    V.pe++; V.pts++; }
      else               { V.pg++; V.pts += 3; L.pp++; }
    });
    return Object.values(stats).sort((a, b) =>
      b.pts - a.pts || (b.gf - b.gc) - (a.gf - a.gc) || b.gf - a.gf);
  };

  const PartidoFila = ({ m }) => {
    const L = nomMap[m.local_id] || {};
    const V = nomMap[m.visitante_id] || {};
    const jugado = m.pts_local !== null && m.pts_visitante !== null;
    const gl = Number(m.pts_local), gv = Number(m.pts_visitante);
    const lGana = jugado && gl > gv, vGana = jugado && gv > gl;
    return (
      <div style={{display:'grid', gridTemplateColumns:'1fr auto 1fr',
                   alignItems:'center', gap:'.75rem',
                   padding:'.5rem .75rem', borderRadius:8,
                   background:'var(--gris)', marginBottom:'.35rem'}}>
        <div style={{display:'flex', alignItems:'center', gap:'.4rem', justifyContent:'flex-end'}}>
          {L.escudo_url && <img src={L.escudo_url} alt="" style={{width:18, height:18, objectFit:'contain', borderRadius:3, flexShrink:0}} />}
          <span style={{fontWeight: lGana ? 800 : 600, fontSize:'.88rem',
                        color: lGana ? 'var(--verde)' : 'var(--texto)'}}>{L.nombre || '—'}</span>
        </div>
        <div style={{textAlign:'center', fontWeight:800, fontSize:'.95rem', minWidth:64, whiteSpace:'nowrap'}}>
          {jugado
            ? `${m.pts_local} — ${m.pts_visitante}`
            : <span style={{color:'var(--texto2)', fontWeight:400, fontSize:'.78rem'}}>Pendiente</span>}
        </div>
        <div style={{display:'flex', alignItems:'center', gap:'.4rem'}}>
          <span style={{fontWeight: vGana ? 800 : 600, fontSize:'.88rem',
                        color: vGana ? 'var(--verde)' : 'var(--texto)'}}>{V.nombre || '—'}</span>
          {V.escudo_url && <img src={V.escudo_url} alt="" style={{width:18, height:18, objectFit:'contain', borderRadius:3, flexShrink:0}} />}
        </div>
      </div>
    );
  };

  const ClasifTable = ({ divId }) => {
    const rows = computeClasif(divId);
    return (
      <div style={{overflowX:'auto'}}>
        <table>
          <thead>
            <tr>
              <th>Pos</th><th>Equipo</th>
              <th style={{textAlign:'right'}}>PJ</th>
              <th style={{textAlign:'right'}}>PG</th>
              <th style={{textAlign:'right'}}>PE</th>
              <th style={{textAlign:'right'}}>PP</th>
              <th style={{textAlign:'right'}}>GF</th>
              <th style={{textAlign:'right'}}>GC</th>
              <th style={{textAlign:'right'}}>DIF</th>
              <th style={{textAlign:'right', color:'var(--verde)'}}>PTS</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((e, i) => (
              <tr key={e.id} style={{background: i===0 ? 'rgba(26,127,55,.06)' : undefined}}>
                <td><Medalla pos={i + 1} /></td>
                <td style={{fontWeight:600}}>
                  <span style={{display:'inline-flex', alignItems:'center', gap:'.4rem'}}>
                    {e.escudo_url && <img src={e.escudo_url} alt="" style={{width:18, height:18, objectFit:'contain', borderRadius:3}} />}
                    {e.nombre}
                  </span>
                </td>
                <td style={{textAlign:'right', color:'var(--texto2)'}}>{e.pj}</td>
                <td style={{textAlign:'right'}}>{e.pg}</td>
                <td style={{textAlign:'right'}}>{e.pe}</td>
                <td style={{textAlign:'right'}}>{e.pp}</td>
                <td style={{textAlign:'right'}}>{e.gf}</td>
                <td style={{textAlign:'right'}}>{e.gc}</td>
                <td style={{textAlign:'right', color: (e.gf-e.gc) >= 0 ? 'var(--verde)' : '#dc3545', fontWeight:600}}>
                  {e.gf-e.gc >= 0 ? '+':''}{e.gf-e.gc}
                </td>
                <td style={{textAlign:'right', fontWeight:800, fontSize:'1.05rem'}}>{e.pts}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  };

  return (
    <div>
      <div className="tabs">
        <button className={`tab ${tab==='calendario'?'active':''}`}    onClick={() => setTab('calendario')}>Calendario</button>
        <button className={`tab ${tab==='clasificacion'?'active':''}`} onClick={() => setTab('clasificacion')}>Clasificación H2H</button>
      </div>

      {tab === 'calendario' && (
        jornadas.length === 0
          ? <div className="card"><p style={{color:'var(--texto2)'}}>No hay partidos generados aún.</p></div>
          : <>
              <div className="card" style={{paddingBottom:'.6rem'}}>
                <div style={{display:'flex', gap:'.25rem', flexWrap:'wrap'}}>
                  {jornadas.map(j => (
                    <button key={j} onClick={() => setJornada(j)}
                            style={{padding:'.22rem .5rem', borderRadius:6, fontSize:'.75rem',
                                    cursor:'pointer', border:'1.5px solid var(--borde)',
                                    background: jornada===j ? 'var(--verde)' : 'var(--fondo)',
                                    color: jornada===j ? '#fff' : 'var(--texto)',
                                    fontWeight: jornada===j ? 700 : 400}}>
                      J{j}
                    </button>
                  ))}
                </div>
              </div>
              <div className="card">
                <h2 style={{marginBottom:'.75rem'}}>Jornada {jornada}</h2>
                {partidos.filter(m => m.jornada === jornada).map(m => <PartidoFila key={m.id} m={m} />)}
              </div>
            </>
      )}

      {tab === 'clasificacion' && (
        hasDivs
          ? divIds.map(divId => {
              const nombre = divisiones.find(d => d.id === divId)?.nombre || 'División';
              return (
                <div key={divId} className="card" style={{marginBottom:'.75rem'}}>
                  <h2 style={{marginBottom:'.75rem'}}>{nombre}</h2>
                  <ClasifTable divId={divId} />
                </div>
              );
            })
          : <div className="card"><ClasifTable divId={null} /></div>
      )}
    </div>
  );
}


// ── ADMIN — LIGA H2H ───────────────────────────────────────────
function AdminLigaH2H({ federacion, participantes, onFederacionUpdate }) {
  const [h2hOn,     setH2hOn]     = useState(!!federacion?.h2h_habilitado);
  const [partidos,  setPartidos]  = useState([]);
  const [resultados, setResultados] = useState({});
  const [generando, setGenerando] = useState(false);
  const [guardando, setGuardando] = useState(false);
  const [msg,       setMsg]       = useState('');

  const cargar = async () => {
    if (!federacion?.id) return;
    const { data } = await sb.from('h2h_partidos')
      .select('id, jornada, division_id, local_id, visitante_id, pts_local, pts_visitante')
      .eq('federacion_id', federacion.id)
      .order('jornada');
    const p = data || [];
    setPartidos(p);
    const res = {};
    p.forEach(m => { res[m.id] = { gl: m.pts_local ?? '', gv: m.pts_visitante ?? '' }; });
    setResultados(res);
  };

  useEffect(() => { cargar(); }, [federacion?.id]);

  const toggleH2H = async (val) => {
    await sb.from('federaciones').update({ h2h_habilitado: val }).eq('id', federacion.id);
    setH2hOn(val);
    onFederacionUpdate({ ...federacion, h2h_habilitado: val });
    setMsg(val ? 'Liga H2H activada' : 'Liga H2H desactivada');
    setTimeout(() => setMsg(''), 2500);
  };

  // ── Algoritmo round-robin con segunda vuelta invertida ──────
  const generarRR = (equipos) => {
    const teams = [...equipos];
    if (teams.length % 2 !== 0) teams.push(null); // bye
    const n = teams.length;
    const rot = teams.slice(1);
    const rondas1 = [];
    for (let r = 0; r < n - 1; r++) {
      const actual = [teams[0], ...rot];
      const ronda = [];
      for (let i = 0; i < n / 2; i++) {
        const a = actual[i], b = actual[n - 1 - i];
        if (a && b) ronda.push(r % 2 === 0 ? { local: a, visitante: b } : { local: b, visitante: a });
      }
      rondas1.push(ronda);
      rot.unshift(rot.pop());
    }
    const rondas2 = rondas1
      .map(ronda => ronda.map(p => ({ local: p.visitante, visitante: p.local })));
    return [...rondas1, ...rondas2];
  };

  const generarCalendario = async () => {
    if (!confirm('¿Generar nuevo calendario? Se eliminarán todos los partidos y resultados actuales.')) return;
    setGenerando(true); setMsg('');

    // Eliminar partidos existentes
    const { error: delErr } = await sb.from('h2h_partidos')
      .delete().eq('federacion_id', federacion.id);
    if (delErr) { setMsg('Error al borrar: ' + delErr.message); setGenerando(false); return; }

    // Agrupar equipos por división (null = sin división)
    const grupos = {};
    participantes.forEach(p => {
      const k = p.division_id || '__';
      if (!grupos[k]) grupos[k] = [];
      grupos[k].push(p);
    });

    const rows = [];
    let maxJornada = 0;
    Object.entries(grupos).forEach(([key, equips]) => {
      if (equips.length < 2) return;
      const divId = key === '__' ? null : Number(key);
      const rondas = generarRR(equips);
      rondas.forEach((ronda, idx) => {
        const j = idx + 1;
        if (j > maxJornada) maxJornada = j;
        ronda.forEach(p => rows.push({
          federacion_id: federacion.id,
          division_id:   divId,
          jornada:       j,
          local_id:      p.local.id,
          visitante_id:  p.visitante.id,
        }));
      });
    });

    if (rows.length === 0) {
      setMsg('No hay equipos suficientes para generar el calendario.');
      setGenerando(false); return;
    }

    const { error } = await sb.from('h2h_partidos').insert(rows);
    if (error) { setMsg('Error al insertar: ' + error.message); setGenerando(false); return; }

    setMsg(`¡Calendario generado! ${rows.length} partidos en ${maxJornada} jornadas.`);
    setGenerando(false);
    cargar();
  };

  const guardarTodo = async () => {
    setGuardando(true);
    await Promise.all(partidos.map(m => {
      const r = resultados[m.id] || {};
      const gl = r.gl === '' ? null : (r.gl !== undefined ? Number(r.gl) : null);
      const gv = r.gv === '' ? null : (r.gv !== undefined ? Number(r.gv) : null);
      return sb.from('h2h_partidos').update({ pts_local: gl, pts_visitante: gv }).eq('id', m.id);
    }));
    setGuardando(false);
    setMsg('Resultados guardados');
    setTimeout(() => setMsg(''), 2500);
    cargar();
  };

  const nomMap = Object.fromEntries(participantes.map(p => [p.id, p.nombre]));
  const jornadas = [...new Set(partidos.map(p => p.jornada))].sort((a, b) => a - b);

  const Opcion = ({ label, desc, activo, onToggle }) => (
    <div style={{display:'flex', alignItems:'flex-start', gap:'1rem',
                 padding:'1rem 0', borderBottom:'1px solid var(--borde)'}}>
      <div style={{flex:1}}>
        <div style={{fontWeight:700, marginBottom:'.2rem'}}>{label}</div>
        <div style={{fontSize:'.85rem', color:'var(--texto2)'}}>{desc}</div>
      </div>
      <div style={{display:'flex', alignItems:'center', gap:'.6rem', flexShrink:0}}>
        <span style={{fontSize:'.85rem', fontWeight:600,
                      color: activo ? 'var(--verde)' : 'var(--texto2)'}}>
          {activo ? 'Activada' : 'Desactivada'}
        </span>
        <button className={activo ? 'btn-cancel' : 'btn-ok'} onClick={() => onToggle(!activo)}>
          {activo ? 'Desactivar' : 'Activar'}
        </button>
      </div>
    </div>
  );

  return (
    <div>
      <div className="card">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'.25rem'}}>
          <h2 style={{margin:0}}>Liga H2H</h2>
          {msg && <span style={{color:'var(--verde)', fontWeight:600, fontSize:'.88rem'}}>{msg}</span>}
        </div>

        <Opcion
          label="Liga H2H"
          desc="Activa la liga cabeza a cabeza para esta federación. Los equipos podrán ver el calendario y la clasificación H2H."
          activo={h2hOn}
          onToggle={toggleH2H}
        />

        <div style={{padding:'1rem 0'}}>
          <div style={{fontWeight:700, marginBottom:'.3rem'}}>Generar calendario</div>
          <div style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'.75rem'}}>
            Genera el calendario a doble vuelta (todos contra todos, ida y vuelta) por división.
            Cada equipo juega un máximo de 2 partidos consecutivos en casa o fuera.
            <strong style={{color:'#dc3545'}}> Se eliminarán los resultados existentes.</strong>
          </div>
          <button className="btn-ok" disabled={generando} onClick={generarCalendario}
                  style={{display:'flex', alignItems:'center', gap:'.4rem'}}>
            {generando ? 'Generando…' : '⚙ Generar calendario'}
          </button>
        </div>
      </div>

      {jornadas.length > 0 && (
        <div className="card" style={{marginTop:'.75rem'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem', flexWrap:'wrap', gap:'.5rem'}}>
            <h2 style={{margin:0}}>Resultados</h2>
            <button className="btn-ok" disabled={guardando} onClick={guardarTodo}>
              {guardando ? 'Guardando…' : 'Guardar todo'}
            </button>
          </div>
          {jornadas.map(j => {
            const ms = partidos.filter(p => p.jornada === j);
            return (
              <div key={j} style={{marginBottom:'1.25rem'}}>
                <div style={{fontWeight:700, fontSize:'.82rem', color:'var(--verde)',
                             letterSpacing:'.05em', marginBottom:'.4rem'}}>
                  JORNADA {j}
                </div>
                {ms.map(m => {
                  const r = resultados[m.id] || {};
                  return (
                    <div key={m.id}
                         style={{display:'grid', gridTemplateColumns:'1fr 48px 1rem 48px 1fr',
                                 alignItems:'center', gap:'.4rem',
                                 padding:'.4rem .6rem', borderRadius:8,
                                 background:'var(--gris)', marginBottom:'.3rem', fontSize:'.86rem'}}>
                      <span style={{textAlign:'right', fontWeight:600, overflow:'hidden',
                                    textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {nomMap[m.local_id] || '—'}
                      </span>
                      <input type="number" min={0} value={r.gl ?? ''}
                             onChange={e => setResultados(rv => ({ ...rv, [m.id]: { ...rv[m.id], gl: e.target.value } }))}
                             style={{width:'100%', textAlign:'center', padding:'.25rem',
                                     borderRadius:6, border:'1.5px solid var(--borde)', fontSize:'.88rem'}} />
                      <span style={{textAlign:'center', color:'var(--texto2)', fontWeight:700}}>—</span>
                      <input type="number" min={0} value={r.gv ?? ''}
                             onChange={e => setResultados(rv => ({ ...rv, [m.id]: { ...rv[m.id], gv: e.target.value } }))}
                             style={{width:'100%', textAlign:'center', padding:'.25rem',
                                     borderRadius:6, border:'1.5px solid var(--borde)', fontSize:'.88rem'}} />
                      <span style={{fontWeight:600, overflow:'hidden',
                                    textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {nomMap[m.visitante_id] || '—'}
                      </span>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
