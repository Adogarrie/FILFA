          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Fichar directamente</h3>
            <p>
              {modal.posicion === 'POR'
                ? <>Portería de <strong>{modal.equipo}</strong></>
                : <>Fichar a <strong>{modal.nombre}</strong> ({modal.equipo})</>
              }<br/>
              Coste: <strong>{fmt(modal.valor_mercado || 0)}</strong>
            </p>
            <div className="modal-btns">
              <button className="btn-cancel" onClick={() => setModal(null)}>Cancelar</button>
              <button className="btn-ok" onClick={confirmarFichaje}>Confirmar</button>
            </div>
          </div>
        </div>
      )}

      {/* Modal confirmar sorteo aleatorio */}
      {modalSorteo && (
        <div className="overlay" onClick={() => !sorteando && setModalSorteo(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Sorteo aleatorio</h3>
            <p>
              Se ficharán hasta <strong>{huecosRestantes}</strong> jugador(es) libres al azar,
              respetando tu presupuesto disponible y las reglas del mercado
              (máximo 1 portero, sin jugadores duplicados).
            </p>
            <div className="modal-btns">
              <button className="btn-cancel" disabled={sorteando} onClick={() => setModalSorteo(false)}>
                Cancelar
              </button>
              <button className="btn-ok" disabled={sorteando} onClick={ejecutarSorteo}>
                {sorteando ? 'Sorteando…' : 'Confirmar sorteo'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Resultado del sorteo */}
      {resultadoSorteo && (
        <div className="overlay" onClick={() => setResultadoSorteo(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Sorteo completado</h3>
            <p>
              Has fichado a {resultadoSorteo.jugadores.length} jugador(es) por un total de{' '}
              <strong>{fmt(resultadoSorteo.gastado)}</strong>:
            </p>
            <ul style={{marginBottom:'1.25rem', paddingLeft:'1.2rem', fontSize:'.88rem', color:'var(--texto2)'}}>
              {resultadoSorteo.jugadores.map(j => (
                <li key={j.id}>
                  {j.posicion === 'POR' ? `Portería ${j.equipo}` : `${j.nombre} (${j.equipo})`} — {fmt(j.valor_mercado || 0)}
                </li>
              ))}
            </ul>
            <div className="modal-btns">
              <button className="btn-ok" onClick={() => setResultadoSorteo(null)}>Cerrar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CALENDARIO FANTASY ─────────────────────────────────────────
function CalendarioFantasy({ participantes, federacion }) {
  const [clas, setClas]         = useState([]);
  const [vista, setVista]       = useState('jornada');
  const [jornada, setJornada]   = useState(1);
  const [jugadores, setJugadores] = useState([]);   // jugadores reales: { id, nombre, equipo, posicion }
  const [abierto, setAbierto]   = useState(null);   // participante_id expandido
  const [detalle, setDetalle]   = useState({});     // { [pid_jornada]: { alis, ptsMap } }

  useEffect(() => {
    if (!sb) return;
    sb.from('jugadores').select('id, nombre, equipo, posicion')
      .then(({ data }) => setJugadores(data || []));
  }, []);

  useEffect(() => {
    if (!sb || participantes.length === 0) return;
    sb.from('clasificacion')
      .select('participante_id, jornada, puntos_jornada')
      .in('participante_id', participantes.map(p => p.id))
      .then(({ data }) => setClas(data || []));
  }, [participantes]);

  const abrirEquipo = async (pid) => {
    if (abierto === pid) { setAbierto(null); return; }
    setAbierto(pid);
    const key = `${pid}_${jornada}`;
    if (detalle[key]) return;
    const [{ data: alis }, { data: pts }] = await Promise.all([
      sb.from('alineaciones').select('jugador_id, es_titular').eq('participante_id', pid).eq('jornada', jornada),
      sb.from('puntos_jugador').select('jugador_id, pts').eq('jornada', jornada).eq('federacion_id', federacion?.id),
    ]);
    const ptsMap = Object.fromEntries((pts || []).map(r => [r.jugador_id, Number(r.pts)]));
    setDetalle(d => ({ ...d, [key]: { alis: alis || [], ptsMap } }));
  };

  // Reset expanded row when jornada changes
  useEffect(() => { setAbierto(null); }, [jornada]);

  const filasJornada = [...participantes].map(p => ({
    id: p.id, nombre: p.nombre, escudo_url: p.escudo_url || null,
    pts: clas.find(r => r.participante_id === p.id && r.jornada === jornada)?.puntos_jornada ?? null,
  })).sort((a, b) => (b.pts ?? -1) - (a.pts ?? -1));

  const filasAcum = [...participantes].map(p => {
    const regs = clas.filter(r => r.participante_id === p.id);
    return { id: p.id, nombre: p.nombre, escudo_url: p.escudo_url || null, total: regs.reduce((s, r) => s + r.puntos_jornada, 0), jornadas: regs.length };
  }).sort((a, b) => b.total - a.total);

  const jornadasConDatos = [...new Set(clas.map(r => r.jornada))].sort((a, b) => a - b);

  const btnJornada = (j) => ({
    padding: '.22rem .5rem', borderRadius: 6, fontSize: '.75rem', cursor: 'pointer',
    border: '1.5px solid ' + (jornadasConDatos.includes(j) ? 'var(--verde)' : 'var(--borde)'),
    background: jornada === j ? 'var(--verde)' : jornadasConDatos.includes(j) ? '#f0fdf4' : '#fff',
    color: jornada === j ? '#fff' : jornadasConDatos.includes(j) ? '#166534' : 'var(--texto2)',
    fontWeight: jornada === j ? 700 : 400,
  });

  const DetalleEquipo = ({ pid }) => {
    const key = `${pid}_${jornada}`;
    const info = detalle[key];
    if (!info) return <tr><td colSpan={3} style={{padding:'.5rem', color:'var(--texto2)', fontSize:'.82rem'}}>Cargando…</td></tr>;
    const titulares  = info.alis.filter(a => a.es_titular).map(a => a.jugador_id);
    const suplentes  = info.alis.filter(a => !a.es_titular).map(a => a.jugador_id);
    const idJug = Object.fromEntries(jugadores.map(j => [j.id, j]));
    const filaJug = (jid, esTitular) => {
      const jug = idJug[jid];
      if (!jug) return null;
      const pts = info.ptsMap[jid];
      return (
        <tr key={jid} style={{background: esTitular ? '#f0fdf4' : '#fafafa'}}>
          <td style={{paddingLeft:'2rem', fontSize:'.8rem', color: esTitular ? 'var(--texto)' : 'var(--texto2)'}}>
            {esTitular ? '▶' : '○'} {jug.nombre}
            <span style={{marginLeft:'.4rem', fontSize:'.72rem', color:'var(--texto2)'}}>{jug.posicion}</span>
          </td>
          <td style={{fontSize:'.75rem', color:'var(--texto2)'}}>{jug.equipo}</td>
          <td style={{textAlign:'right', fontWeight: pts !== undefined ? 700 : 400,
                      color: pts !== undefined ? 'var(--texto)' : 'var(--texto2)', fontSize:'.85rem'}}>
            {pts !== undefined ? pts : '—'}
          </td>
        </tr>
      );
    };
    return (
      <>
        {titulares.length === 0 && suplentes.length === 0
          ? <tr><td colSpan={3} style={{padding:'.4rem .4rem .4rem 2rem', color:'var(--texto2)', fontSize:'.8rem'}}>Sin alineación registrada esta jornada.</td></tr>
          : <>
              {titulares.length > 0 && <tr><td colSpan={3} style={{paddingLeft:'2rem', paddingTop:'.3rem', fontSize:'.72rem', fontWeight:700, color:'var(--verde)', letterSpacing:'.04em'}}>TITULARES</td></tr>}
              {titulares.map(jid => filaJug(jid, true))}
              {suplentes.length > 0 && <tr><td colSpan={3} style={{paddingLeft:'2rem', paddingTop:'.3rem', fontSize:'.72rem', fontWeight:700, color:'var(--texto2)', letterSpacing:'.04em'}}>SUPLENTES</td></tr>}
              {suplentes.map(jid => filaJug(jid, false))}
            </>
        }
      </>
    );
  };

  return (
    <div>
      <div className="tabs">
        <button className={`tab ${vista==='jornada'?'active':''}`} onClick={() => setVista('jornada')}>Por jornada</button>
        <button className={`tab ${vista==='acumulado'?'active':''}`} onClick={() => setVista('acumulado')}>Acumulado</button>
      </div>

      {vista === 'jornada' && (
        <div>
          <div className="card" style={{paddingBottom:'.6rem'}}>
            <div style={{display:'flex', gap:'.25rem', flexWrap:'wrap'}}>
              {Array.from({length:38}, (_, i) => i + 1).map(j => (
                <button key={j} onClick={() => setJornada(j)} style={btnJornada(j)}>J{j}</button>
              ))}
            </div>
          </div>
          <div className="card">
            <h2>Jornada {jornada}{!jornadasConDatos.includes(jornada) && <span style={{fontWeight:400, color:'var(--texto2)', fontSize:'.8rem', marginLeft:'.5rem'}}>(sin datos)</span>}</h2>
            <p style={{fontSize:'.78rem', color:'var(--texto2)', marginBottom:'.6rem'}}>Pincha en un equipo para ver su alineación y puntos de cada jugador.</p>
            <table>
              <thead>
                <tr><th>Pos</th><th>Equipo</th><th style={{textAlign:'right'}}>Puntos</th></tr>
              </thead>
              <tbody>
                {filasJornada.map((e, i) => (
                  <React.Fragment key={e.id}>
                    <tr onClick={() => abrirEquipo(e.id)}
                        style={{cursor:'pointer', background: abierto===e.id ? '#eff6ff' : i===0 ? 'rgba(26,127,55,.05)' : undefined,
                                borderBottom: abierto===e.id ? 'none' : undefined}}>
                      <td><Medalla pos={i + 1} /></td>
                      <td style={{fontWeight:600}}>
                        <span style={{display:'inline-flex', alignItems:'center', gap:'.4rem'}}>
                          {e.escudo_url && <img src={e.escudo_url} alt="" style={{width:20, height:20, objectFit:'contain', borderRadius:3, flexShrink:0}} />}
                          {abierto===e.id ? '▾ ' : '▸ '}{e.nombre}
                        </span>
                      </td>
                      <td style={{textAlign:'right', fontWeight: e.pts!==null?800:400, fontSize: e.pts!==null?'1.08rem':'1rem',
                                  color: e.pts!==null?'var(--texto)':'var(--texto2)'}}>
                        {e.pts !== null ? e.pts : '—'}
                      </td>
                    </tr>
                    {abierto === e.id && <DetalleEquipo pid={e.id} />}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {vista === 'acumulado' && (
        <div className="card">
          <h2>Clasificación acumulada</h2>
          {filasAcum.every(e => e.total === 0)
            ? <div className="empty">Aún no hay puntuaciones introducidas.</div>
            : <table>
                <thead>
                  <tr>
                    <th>Pos</th><th>Equipo</th>
                    <th style={{textAlign:'right'}}>Total pts</th>
                    <th style={{textAlign:'right'}}>Jornadas</th>
                    <th style={{textAlign:'right'}}>Media</th>
                  </tr>
                </thead>
                <tbody>
                  {filasAcum.map((e, i) => (
                    <tr key={e.id} style={{background: i===0?'rgba(26,127,55,.06)':undefined}}>
                      <td><Medalla pos={i + 1} /></td>
                      <td style={{fontWeight:600}}>
                        <span style={{display:'inline-flex', alignItems:'center', gap:'.4rem'}}>
                          {e.escudo_url && <img src={e.escudo_url} alt="" style={{width:20, height:20, objectFit:'contain', borderRadius:3, flexShrink:0}} />}
                          {e.nombre}
                        </span>
                      </td>
                      <td style={{textAlign:'right', fontWeight:800, fontSize:'1.05rem'}}>{e.total}</td>
                      <td style={{textAlign:'right', color:'var(--texto2)'}}>{e.jornadas}</td>
                      <td style={{textAlign:'right', color:'var(--texto2)'}}>
                        {e.jornadas > 0 ? (e.total / e.jornadas).toFixed(1) : '—'}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
        </div>
      )}
    </div>
  );
}


// ── ADMIN PTS JUGADORES — entrada por jugador por jornada ──────
function AdminPtsJugadores({ participantes, federacion }) {
  const [jornada, setJornada] = useState(1);
  const [jugadores, setJugadores] = useState([]);
  const [ptsJug, setPtsJug]   = useState({});
  const [guardando, setGuardando] = useState(false);
  const [msg, setMsg]         = useState('');
  const [equipoSel, setEquipoSel] = useState('');

  useEffect(() => {
    if (!sb) return;
    sb.from('jugadores').select('id, nombre, equipo, posicion').order('equipo').order('posicion')
      .then(({ data }) => setJugadores(data || []));
  }, []);

  useEffect(() => {
    if (!sb || jugadores.length === 0) return;
    sb.from('puntos_jugador').select('jugador_id, pts')
      .eq('jornada', jornada).eq('federacion_id', federacion?.id)
      .then(({ data }) => {
        const m = {};
        (data || []).forEach(r => { m[r.jugador_id] = String(r.pts); });
        setPtsJug(m);
      });
  }, [jornada, jugadores]);

  const guardar = async () => {
    if (!sb) return;
    setGuardando(true);

    // 1. Guardar pts por jugador
    const rows = Object.entries(ptsJug)
      .filter(([, v]) => v !== '' && v !== undefined)
      .map(([jid, v]) => ({ jugador_id: jid, jornada, federacion_id: federacion?.id, pts: Number(v) || 0 }));
    if (rows.length > 0) {
      const { error } = await sb.from('puntos_jugador').upsert(rows, { onConflict: 'jugador_id,jornada,federacion_id' });
      if (error) { alert('Error: ' + error.message); setGuardando(false); return; }
    }

    // 2. Recalcular totales de cada equipo fantasy desde sus titulares
    if (participantes && participantes.length > 0) {
      const partIds = participantes.map(p => p.id);
      const { data: alis } = await sb.from('alineaciones')
        .select('participante_id, jugador_id')
        .eq('jornada', jornada)
        .eq('es_titular', true)
        .in('participante_id', partIds);

      const ptsMapa = Object.fromEntries(rows.map(r => [r.jugador_id, r.pts]));
      const alisPorEquipo = {};
      (alis || []).forEach(a => {
        if (!alisPorEquipo[a.participante_id]) alisPorEquipo[a.participante_id] = [];
        alisPorEquipo[a.participante_id].push(a.jugador_id);
      });

      const clasRows = participantes.map(p => ({
        participante_id: p.id,
        jornada,
        puntos_jornada: (alisPorEquipo[p.id] || []).reduce((s, jid) => s + (ptsMapa[jid] ?? 0), 0),
      }));
      await sb.from('clasificacion').upsert(clasRows, { onConflict: 'participante_id,jornada' });
    }

    setGuardando(false);
    publicar(federacion?.id, 'puntos', `Puntos de jornada ${jornada} introducidos por el administrador`);
    setMsg(`J${jornada} guardada y totales de equipo actualizados.`);
    setTimeout(() => setMsg(''), 4000);
  };

  const equiposReales = [...new Set(jugadores.map(j => j.equipo))].sort();
  const equipoActual  = (equipoSel && equiposReales.includes(equipoSel)) ? equipoSel : (equiposReales[0] || '');
  const jugsEq        = jugadores.filter(j => j.equipo === equipoActual);
  const iS = { width:72, textAlign:'right', padding:'.25rem .4rem',
               border:'1.5px solid var(--borde)', borderRadius:7, fontSize:'.88rem', fontWeight:600 };

  return (
    <div>
      <div className="card" style={{display:'flex', alignItems:'center', gap:'.75rem', flexWrap:'wrap'}}>
        <span style={{fontWeight:600}}>Jornada:</span>
        <div style={{display:'flex', gap:'.28rem', flexWrap:'wrap'}}>
          {Array.from({length:38}, (_, i) => i+1).map(j => (
            <button key={j} onClick={() => { setJornada(j); setMsg(''); }}
                    style={{padding:'.22rem .48rem', borderRadius:6, fontSize:'.75rem',
                            border:'1.5px solid var(--borde)', cursor:'pointer',
                            background: jornada===j?'var(--verde)':'#fff',
                            color: jornada===j?'#fff':'var(--texto)', fontWeight: jornada===j?700:400}}>
              {j}
            </button>
          ))}
        </div>
      </div>

      {jugadores.length === 0
        ? <div className="card"><div className="empty">No hay jugadores en la base de datos.</div></div>
        : <>
            <div className="tabs" style={{flexWrap:'wrap', marginBottom:'.5rem'}}>
              {equiposReales.map(eq => (
                <button key={eq} className={`tab ${equipoActual===eq?'active':''}`}
                        onClick={() => setEquipoSel(eq)}>
                  <Escudo equipo={eq} size={ESCUDO_SIZE} />{' '}{eq}
                </button>
              ))}
            </div>
            <div className="card" style={{paddingBottom:'.75rem'}}>
              <h2 style={{fontSize:'.95rem', marginBottom:'.75rem', display:'flex', alignItems:'center', gap:6}}>
                <Escudo equipo={equipoActual} size={ESCUDO_SIZE} />{equipoActual}
              </h2>
              <table>
                <thead><tr><th>Jugador</th><th>Pos</th><th style={{textAlign:'right'}}>Pts J{jornada}</th></tr></thead>
                <tbody>
                  {jugsEq.map(j => (
                    <tr key={j.id}>
                      <td style={{fontWeight:600}}>{j.nombre}</td>
                      <td style={{color:'var(--texto2)', fontSize:'.8rem'}}>{j.posicion}</td>
                      <td style={{textAlign:'right'}}>
                        <input type="number" min="0" value={ptsJug[j.id] ?? ''}
                               onChange={e => { setPtsJug(p => ({...p, [j.id]: e.target.value})); setMsg(''); }}
                               placeholder="0" style={iS} />
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
      }

      <div style={{display:'flex', justifyContent:'flex-end', gap:'1rem', alignItems:'center', marginBottom:'1.5rem'}}>
        {msg && <span style={{color:'var(--verde)', fontWeight:600}}>{msg}</span>}
        <button onClick={guardar} disabled={guardando}
                style={{background:'var(--verde)', color:'#fff', border:'none',
                        padding:'.55rem 1.5rem', borderRadius:9, fontSize:'1rem',
                        fontWeight:700, cursor: guardando?'wait':'pointer', opacity: guardando?.7:1}}>
          {guardando ? 'Guardando…' : `Guardar J${jornada}`}
        </button>
      </div>
    </div>
  );
}

// ── EQUIPOS ────────────────────────────────────────────────────
function Equipos({ participantes, miParticipanteId, sesionParticipanteId, jornadaActual, isAdmin, federacion, onParticipantesChange, onOfertaEnviada }) {
  const [equipoId, setEquipoId]       = useState('');
  const [jugadores, setJugadores]     = useState(null);
  const [presupuesto, setPresupuesto] = useState(null);
  const [aliJornada, setAliJornada]   = useState(jornadaActual || 1);
  const [alineacion, setAlineacion]   = useState(null);
  const [editModal, setEditModal]     = useState(false);
  const [editForm, setEditForm]       = useState({});
  const [editMsg, setEditMsg]         = useState('');
  const [subiendoEscudo, setSubiendoEscudo] = useState(false);
  const [modalOferta, setModalOferta] = useState(null); // { jugador_id, nombre, posicion, equipo, valor }
  const [cantOferta, setCantOferta]   = useState('');
  const [enviandoOf, setEnviandoOf]   = useState(false);
  const [msgOferta, setMsgOferta]     = useState('');

  useEffect(() => {
    if (participantes.length > 0 && !equipoId) setEquipoId(participantes[0].id);
  }, [participantes]);

  useEffect(() => {
    if (!equipoId || !sb) return;
    setJugadores(null);
    setPresupuesto(null);
    sb.from('plantillas')
      .select('id, jugador_id, precio_compra, jugadores(nombre, equipo, posicion, valor_mercado)')
      .eq('participante_id', equipoId)
      .then(({ data, error }) => setJugadores(error ? [] : (data || [])));
    sb.from('participantes').select('presupuesto').eq('id', equipoId).single()
      .then(({ data }) => setPresupuesto(data?.presupuesto ?? null));
  }, [equipoId]);

  useEffect(() => {
    if (!equipoId || !sb) return;
    setAlineacion(null);
    const cargarAli = async () => {
      const { data: ali } = await sb.from('alineaciones')
        .select('jugador_id, es_titular, jugadores(nombre, equipo, posicion)')
        .eq('participante_id', equipoId)
        .eq('jornada', aliJornada);
      if (ali && ali.length > 0) { setAlineacion(ali); return; }
      // Fallback: última jornada guardada <= aliJornada (no mostrar jornadas futuras)
      const { data: ref } = await sb.from('alineaciones')
        .select('jornada')
        .eq('participante_id', equipoId)
        .lte('jornada', aliJornada)
        .order('jornada', { ascending: false })
        .limit(1);
      if (ref?.length > 0) {
        const { data: ultima } = await sb.from('alineaciones')
          .select('jugador_id, es_titular, jugadores(nombre, equipo, posicion)')
          .eq('participante_id', equipoId)
          .eq('jornada', ref[0].jornada);
        setAlineacion(ultima || []);
      } else {
        setAlineacion([]);
      }
    };
    cargarAli();
  }, [equipoId, aliJornada]);

  const equipo = participantes.find(p => p.id === equipoId);

  const abrirEditar = () => {
    setEditForm({ nombre: equipo?.nombre || '', estadio: equipo?.estadio || '', entrenador: equipo?.entrenador || '', escudo_url: equipo?.escudo_url || '' });
    setEditMsg('');
    setEditModal(true);
  };

  const subirEscudoEquipo = async (file) => {
    setSubiendoEscudo(true);
    const ext  = file.name.split('.').pop();
    const path = `${equipoId}/${Date.now()}.${ext}`;
    const { error: upErr } = await sb.storage
      .from('escudos-participantes')
      .upload(path, file, { upsert: true, contentType: file.type });
    if (upErr) { alert('Error subiendo escudo: ' + upErr.message); setSubiendoEscudo(false); return; }
    const { data: { publicUrl } } = sb.storage.from('escudos-participantes').getPublicUrl(path);
    await sb.from('participantes').update({ escudo_url: publicUrl }).eq('id', equipoId);
    setEditForm(f => ({ ...f, escudo_url: publicUrl }));
    setSubiendoEscudo(false);
    onParticipantesChange && onParticipantesChange();
  };

  const guardarPerfil = async () => {
    if (!sb || !equipoId) return;
    const oldEnt  = equipo?.entrenador?.trim() || '';
    const newEnt  = editForm.entrenador.trim();
    const oldNom  = equipo?.nombre?.trim() || '';
    const newNom  = editForm.nombre.trim();
    const { data, error } = await sb.from('participantes')
      .update({ nombre: newNom, estadio: editForm.estadio.trim(), entrenador: newEnt, escudo_url: editForm.escudo_url.trim() })
      .eq('id', equipoId).select().single();
    if (error) { setEditMsg('Error: ' + error.message); return; }
    onParticipantesChange && onParticipantesChange();
    if (newEnt && newEnt !== oldEnt)
      publicar(federacion?.id, 'admin', `${newNom || oldNom} nombra nuevo entrenador: ${newEnt}`);
    if (newNom && newNom !== oldNom)
      publicar(federacion?.id, 'admin', `El equipo "${oldNom}" pasa a llamarse "${newNom}"`);
    setEditMsg('Guardado');
    setTimeout(() => { setEditModal(false); setEditMsg(''); }, 1200);
  };

  const lista = (jugadores || []).map(p => ({
    jugador_id: p.jugador_id,
    nombre:     p.jugadores?.nombre || '',
    equipo:     p.jugadores?.equipo || '',
    posicion:   p.jugadores?.posicion || '',
    valor:      p.jugadores?.valor_mercado || 0,
    compra:     p.precio_compra || 0,
  }));

  const puedeOfrecer = !!(sesionParticipanteId && equipoId !== sesionParticipanteId && federacion?.ventas_habilitadas);

  const enviarOferta = async () => {
    const cant = Number(cantOferta);
    if (!cant || cant <= 0) { setMsgOferta('Introduce una cantidad válida.'); return; }
    setEnviandoOf(true); setMsgOferta('');
    const { error } = await sb.from('ofertas_jugadores').insert({
      federacion_id:  federacion.id,
      jugador_id:     modalOferta.jugador_id,
      ofertante_id:   sesionParticipanteId,
      propietario_id: equipoId,
      cantidad:       cant,
    });
    setEnviandoOf(false);
    if (error) { setMsgOferta('Error: ' + error.message); return; }
    const nomJug = modalOferta.posicion === 'POR' ? 'Portería ' + modalOferta.equipo : modalOferta.nombre;
    const miNom  = participantes.find(p => p.id === sesionParticipanteId)?.nombre || '';
    const suNom  = participantes.find(p => p.id === equipoId)?.nombre || '';
    publicar(federacion.id, 'oferta', `${miNom} hace una oferta a ${suNom} por ${nomJug}`);
    setModalOferta(null); setCantOferta(''); setMsgOferta('');
    onOfertaEnviada && onOfertaEnviada();
  };

  const titulares  = (alineacion || []).filter(a => a.es_titular)
    .sort((a,b) => POS_ORDEN[a.jugadores?.posicion] - POS_ORDEN[b.jugadores?.posicion]);
  const suplentes  = (alineacion || []).filter(a => !a.es_titular)
    .sort((a,b) => POS_ORDEN[a.jugadores?.posicion] - POS_ORDEN[b.jugadores?.posicion]);

  return (
    <div>
      <div className="card">
        <div className="tabs" style={{marginBottom: 0}}>
          {participantes.map(p => (
            <button key={p.id}
              className={`tab ${equipoId === p.id ? 'active' : ''}`}
              onClick={() => setEquipoId(p.id)}>
              <span style={{display:'inline-flex', alignItems:'center', gap:'.3rem'}}>
                {p.escudo_url && <img src={p.escudo_url} alt="" style={{width:18, height:18, objectFit:'contain', borderRadius:3, flexShrink:0}} />}
                {p.nombre}{p.id === miParticipanteId ? ' (tú)' : ''}
              </span>
            </button>
          ))}
        </div>
      </div>

      {equipo && (
        <div className="card" style={{display:'flex', gap:'1.5rem', flexWrap:'wrap', alignItems:'flex-start'}}>
          {equipo.escudo_url && (
            <img src={equipo.escudo_url} alt="Escudo"
                 style={{width:72, height:72, borderRadius:10, objectFit:'cover',
                         border:'1.5px solid var(--borde)', flexShrink:0}} />
          )}
          <div style={{flex:1, display:'flex', gap:'2rem', flexWrap:'wrap', alignItems:'flex-end'}}>
            <div>
              <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.2rem'}}>Presupuesto disponible</div>
              <div style={{fontSize:'1.4rem', fontWeight:800, color:'var(--verde)'}}>
                {presupuesto !== null ? fmt(presupuesto) : '…'}
              </div>
            </div>
            <div>
              <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.2rem'}}>Jugadores fichados</div>
              <div style={{fontSize:'1.4rem', fontWeight:800}}>{jugadores ? lista.length : '…'}</div>
            </div>
            {equipo.estadio && (
              <div>
                <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.2rem'}}>Estadio</div>
                <div style={{fontSize:'1rem', fontWeight:600}}>{equipo.estadio}</div>
              </div>
            )}
            {equipo.entrenador && (
              <div>
                <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.2rem'}}>Entrenador</div>
                <div style={{fontSize:'1rem', fontWeight:600}}>{equipo.entrenador}</div>
              </div>
            )}
            {(isAdmin || equipoId === miParticipanteId) && (
              <button onClick={abrirEditar}
                      style={{marginLeft:'auto', padding:'.4rem .9rem', fontSize:'.82rem',
                              borderRadius:8, border:'1.5px solid var(--borde)',
                              background:'var(--gris)', cursor:'pointer', fontWeight:600}}>
                Editar perfil
              </button>
            )}
          </div>
        </div>
      )}

      {editModal && (
        <div className="overlay" onClick={() => setEditModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Editar perfil del equipo</h3>
            {['nombre','estadio','entrenador'].map(campo => (
              <div key={campo} className="campo">
                <label style={{textTransform:'capitalize'}}>{campo}</label>
                <input value={editForm[campo] || ''}
                       onChange={e => setEditForm(f => ({...f, [campo]: e.target.value}))} />
              </div>
            ))}
            <div className="campo">
              <label>Escudo del equipo</label>
              <div style={{display:'flex', alignItems:'center', gap:'.75rem', marginTop:'.25rem'}}>
                {editForm.escudo_url
                  ? <img src={editForm.escudo_url} alt="Escudo"
                         style={{width:52, height:52, objectFit:'contain', borderRadius:7,
                                 border:'1.5px solid var(--borde)', flexShrink:0}} />
                  : <div style={{width:52, height:52, borderRadius:7, border:'2px dashed var(--borde)',
                                 display:'flex', alignItems:'center', justifyContent:'center',
                                 color:'var(--texto2)', fontSize:'.6rem', textAlign:'center',
                                 lineHeight:1.2, flexShrink:0}}>
                      Sin<br/>escudo
                    </div>
                }
                <div style={{display:'flex', flexDirection:'column', gap:'.3rem'}}>
                  <label style={{cursor: subiendoEscudo ? 'wait' : 'pointer',
                                 padding:'.3rem .75rem', borderRadius:7,
                                 border:'1.5px solid var(--borde)', background:'var(--fondo)',
                                 fontSize:'.8rem', fontWeight:600, textAlign:'center'}}>
                    {subiendoEscudo ? 'Subiendo…' : editForm.escudo_url ? 'Cambiar imagen' : 'Subir imagen'}
                    <input type="file" accept="image/*" style={{display:'none'}}
                           disabled={subiendoEscudo}
                           onChange={e => { if (e.target.files[0]) subirEscudoEquipo(e.target.files[0]); e.target.value=''; }} />
                  </label>
                  {editForm.escudo_url && (
                    <button onClick={() => setEditForm(f => ({...f, escudo_url: ''}))}
                            style={{padding:'.3rem .75rem', borderRadius:7,
                                    border:'1.5px solid #dc3545', background:'var(--fondo)',
                                    color:'#dc3545', cursor:'pointer', fontSize:'.8rem', fontWeight:600}}>
                      Quitar
                    </button>
                  )}
                </div>
              </div>
            </div>
            {editMsg && <div style={{color: editMsg.startsWith('Error') ? '#dc3545' : '#198754', fontSize:'.85rem', marginBottom:'.5rem'}}>{editMsg}</div>}
            <div style={{display:'flex', gap:'.75rem', marginTop:'.5rem'}}>
              <button className="btn-cancel" onClick={() => setEditModal(false)}>Cancelar</button>
              <button className="btn-ok" onClick={guardarPerfil}>Guardar</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Modal oferta ── */}
      {modalOferta && (
        <div className="overlay" onClick={() => setModalOferta(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Hacer oferta</h3>
            <p style={{fontSize:'.9rem', color:'var(--texto2)', marginBottom:'1rem'}}>
              {modalOferta.posicion === 'POR' ? `Portería ${modalOferta.equipo}` : modalOferta.nombre}
              {' — '}<strong>{equipo?.nombre}</strong>
            </p>
            <div className="campo">
              <label>Tu oferta (€)</label>
              <input type="number" min="1" value={cantOferta}
                     onChange={e => { setCantOferta(e.target.value); setMsgOferta(''); }}
                     placeholder={`Valor: ${fmt(modalOferta.valor || 0)}`}
                     style={{width:'100%'}} />
            </div>
            {msgOferta && <div style={{color:'#dc3545', fontSize:'.85rem', marginBottom:'.5rem'}}>{msgOferta}</div>}
            <div style={{display:'flex', gap:'.75rem', marginTop:'.75rem'}}>
              <button className="btn-cancel" onClick={() => setModalOferta(null)}>Cancelar</button>
              <button className="btn-ok" onClick={enviarOferta} disabled={enviandoOf}
                      style={{opacity: enviandoOf?.6:1}}>
                {enviandoOf ? 'Enviando…' : 'Enviar oferta'}
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        <h2>Plantilla de {equipo?.nombre || '—'}</h2>
        {jugadores === null
          ? <Spinner />
          : lista.length === 0
          ? <div className="empty">Esta plantilla está vacía.</div>
          : <table>
              <thead>
                <tr>
                  <th>Jugador</th><th>Pos</th><th>Equipo</th>
                  <th style={{textAlign:'right'}}>Valor actual</th>
                  <th style={{textAlign:'right'}}>Dif. compra</th>
                  {puedeOfrecer && <th></th>}
                </tr>
              </thead>
              <tbody>
                {lista.map((j, i) => {
                  const dif = (j.valor || 0) - (j.compra || 0);
                  return (
                    <tr key={i}>
                      <td style={{fontWeight:600}}>{nombreJugador(j.nombre, j.posicion, j.equipo)}</td>
                      <td><span className={`badge ${j.posicion}`}>{j.posicion}</span></td>
                      <td style={{color:'var(--texto2)'}}>
                        {j.posicion === 'POR' ? null
                          : <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                              <Escudo equipo={j.equipo} size={ESCUDO_SIZE}/>{j.equipo}
                            </span>}
                      </td>
                      <td style={{textAlign:'right'}}>{fmt(j.valor || 0)}</td>
                      <td style={{textAlign:'right'}}
                          className={dif >= 0 ? 'valor-positivo' : 'valor-negativo'}>
                        {dif >= 0 ? '+' : ''}{fmt(dif)}
                      </td>
                      {puedeOfrecer && (
                        <td style={{textAlign:'right'}}>
                          <button onClick={() => { setModalOferta(j); setCantOferta(String(j.valor || '')); setMsgOferta(''); }}
                                  style={{background:'#0d6efd', color:'#fff', border:'none',
                                          padding:'.25rem .65rem', borderRadius:7,
                                          cursor:'pointer', fontSize:'.8rem', fontWeight:600}}>
                            Ofrecer
                          </button>
                        </td>
                      )}
                    </tr>
                  );
                })}
              </tbody>
            </table>
        }
      </div>

      <div className="card">
        <div style={{display:'flex', alignItems:'center', gap:'1rem', marginBottom:'1rem', flexWrap:'wrap'}}>
          <h2 style={{margin:0}}>Alineación de {equipo?.nombre || '—'}</h2>
          <div>
            <label style={{fontSize:'.85rem', color:'var(--texto2)', marginRight:'.4rem'}}>Jornada:</label>
            <select value={aliJornada} onChange={e => setAliJornada(Number(e.target.value))}
                    style={{padding:'.3rem .6rem', borderRadius:6, border:'1.5px solid var(--borde)'}}>
              {Array.from({length:38},(_,i)=>i+1).map(j =>
                <option key={j} value={j}>J{j}</option>)}
            </select>
          </div>
        </div>

        {alineacion === null ? <Spinner /> : alineacion.length === 0
          ? <div className="empty">Sin alineación guardada para J{aliJornada}.</div>
          : <>
              {titulares.length > 0 && (
                <>
                  <div style={{fontWeight:700, fontSize:'.78rem', color:'#198754',
                               textTransform:'uppercase', letterSpacing:'.05em', marginBottom:'.35rem'}}>
                    Titulares ({titulares.length}/11)
                  </div>
                  <table style={{width:'100%', marginBottom:'1rem'}}>
                    <tbody>
                      {titulares.map((a,i) => (
                        <tr key={i}>
                          <td style={{width:48}}><span className={`badge ${a.jugadores?.posicion}`}>{a.jugadores?.posicion}</span></td>
                          <td style={{fontWeight:600}}>{nombreJugador(a.jugadores?.nombre, a.jugadores?.posicion, a.jugadores?.equipo)}</td>
                          <td style={{color:'var(--texto2)', fontSize:'.85rem'}}>
                            {a.jugadores?.posicion === 'POR' ? null
                              : <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                                  <Escudo equipo={a.jugadores?.equipo} size={ESCUDO_SIZE}/>{a.jugadores?.equipo}
                                </span>}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </>
              )}
              {suplentes.length > 0 && (
                <>
                  <div style={{fontWeight:700, fontSize:'.78rem', color:'#fd7e14',
                               textTransform:'uppercase', letterSpacing:'.05em', marginBottom:'.35rem'}}>
                    Suplentes ({suplentes.length}/4)
                  </div>
                  <table style={{width:'100%'}}>
                    <tbody>
                      {suplentes.map((a,i) => (
                        <tr key={i}>
                          <td style={{width:48}}><span className={`badge ${a.jugadores?.posicion}`}>{a.jugadores?.posicion}</span></td>
                          <td style={{fontWeight:600}}>{nombreJugador(a.jugadores?.nombre, a.jugadores?.posicion, a.jugadores?.equipo)}</td>
                          <td style={{color:'var(--texto2)', fontSize:'.85rem'}}>
                            {a.jugadores?.posicion === 'POR' ? null
                              : <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                                  <Escudo equipo={a.jugadores?.equipo} size={ESCUDO_SIZE}/>{a.jugadores?.equipo}
                                </span>}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </>
              )}
            </>
        }
      </div>
    </div>
  );
}

// ── TABLÓN DE ANUNCIOS ─────────────────────────────────────────
// Función utilitaria global para registrar acciones
async function publicar(federacionId, tipo, texto, actorNombre) {
  if (!sb || !federacionId) return;
  const { error } = await sb.from('anuncios').insert({ federacion_id: federacionId, tipo, texto, actor_nombre: actorNombre || null });
  if (error) console.error('[Tablón] Error al publicar:', error.message, { tipo, texto });
}

function Tablon({ federacionId, isAdmin }) {
  const [anuncios, setAnuncios] = useState(null);
  const [pagina, setPagina]    = useState(0);
  const POR_PAG = 20;

  // Composición de mensaje (solo admin)
  const [texto, setTexto]       = useState('');
  const [enviando, setEnviando] = useState(false);
  const [msgOk, setMsgOk]       = useState('');

  const cargar = async () => {
    if (!sb || !federacionId) return;
    const { data } = await sb.from('anuncios')
      .select('id, tipo, texto, actor_nombre, created_at')
      .eq('federacion_id', federacionId)
      .order('created_at', { ascending: false })
      .range(pagina * POR_PAG, (pagina + 1) * POR_PAG - 1);
    setAnuncios(prev => pagina === 0 ? (data || []) : [...(prev || []), ...(data || [])]);
  };

  useEffect(() => { setPagina(0); setAnuncios(null); }, [federacionId]);
  useEffect(() => { cargar(); }, [federacionId, pagina]);

  const enviar = async () => {
    if (!texto.trim()) return;
    setEnviando(true);
    await publicar(federacionId, 'mensaje_admin', texto.trim());
    setTexto('');
    setEnviando(false);
    setMsgOk('Mensaje publicado');
    setTimeout(() => setMsgOk(''), 2500);
    setPagina(0); setAnuncios(null);
  };

  const borrarAnuncio = async (id) => {
    await sb.from('anuncios').delete().eq('id', id);
    setAnuncios(prev => (prev || []).filter(a => a.id !== id));
  };

  const ICONOS = {
    fichaje: '⚽', venta: '💸', sorteo: '🎲', alineacion: '📋',
    puntos: '📊', moderador: '🛡️', penalizacion: '🚫', oferta: '💰',
    admin: '⚙️', mensaje_admin: '📣',
  };

  const fmtFecha = ts => {
    const d = new Date(ts);
    return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }) + ' ' +
           d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  };

  return (
    <div>
      {/* ── Composición admin ── */}
      {isAdmin && (
        <div className="card" style={{marginBottom:'.75rem'}}>
          <h2 style={{margin:'0 0 .75rem'}}>Publicar mensaje</h2>
          <textarea
            value={texto}
            onChange={e => setTexto(e.target.value)}
            placeholder="Escribe un mensaje para todos los participantes…"
            rows={3}
            style={{width:'100%', padding:'.55rem .75rem', borderRadius:8,
                    border:'1.5px solid var(--borde)', fontSize:'.92rem',
                    resize:'vertical', boxSizing:'border-box', fontFamily:'inherit'}}
          />
          <div style={{display:'flex', alignItems:'center', gap:'1rem', marginTop:'.6rem'}}>
            <button onClick={enviar} disabled={enviando || !texto.trim()}
                    style={{background:'var(--verde)', color:'#fff', border:'none',
                            padding:'.48rem 1.3rem', borderRadius:8, fontWeight:700,
                            fontSize:'.9rem', cursor: enviando||!texto.trim() ? 'default':'pointer',
                            opacity: enviando||!texto.trim() ? .5 : 1}}>
              {enviando ? 'Publicando…' : 'Publicar'}
            </button>
            {msgOk && <span style={{color:'var(--verde)', fontWeight:600, fontSize:'.88rem'}}>{msgOk}</span>}
          </div>
        </div>
      )}

      {/* ── Lista de anuncios ── */}
      <div className="card">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem'}}>
          <h2 style={{margin:0}}>Tablón de anuncios</h2>
          <button onClick={() => { setPagina(0); setAnuncios(null); }}
                  style={{padding:'.3rem .8rem', borderRadius:6, border:'1.5px solid var(--borde)',
                          background:'#fff', cursor:'pointer', fontSize:'.85rem'}}>
            Actualizar
          </button>
        </div>
        {anuncios === null ? <Spinner /> : anuncios.length === 0
          ? <div className="empty">Sin actividad todavía.</div>
          : <>
              <div style={{display:'flex', flexDirection:'column', gap:'.6rem'}}>
                {anuncios.map(a => (
                  <div key={a.id} style={{display:'flex', gap:'.75rem', alignItems:'flex-start',
                                          padding:'.65rem .9rem',
                                          background: a.tipo === 'mensaje_admin' ? '#eaf4ea' : 'var(--gris)',
                                          border: a.tipo === 'mensaje_admin' ? '1.5px solid var(--verde)' : 'none',
                                          borderRadius:10, fontSize:'.88rem'}}>
                    <span style={{fontSize:'1.15rem', flexShrink:0, lineHeight:1.3}}>{ICONOS[a.tipo] || '📌'}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight: a.tipo === 'mensaje_admin' ? 600 : 500,
                                   whiteSpace:'pre-wrap'}}>{a.texto}</div>
                      {a.actor_nombre && (
                        <div style={{fontSize:'.78rem', color:'var(--texto2)', marginTop:'.2rem'}}>por {a.actor_nombre}</div>
                      )}
                    </div>
                    <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:'.35rem', flexShrink:0}}>
                      <div style={{fontSize:'.75rem', color:'var(--texto2)', whiteSpace:'nowrap'}}>
                        {fmtFecha(a.created_at)}
                      </div>
                      {isAdmin && (
                        <button onClick={() => borrarAnuncio(a.id)}
                                title="Eliminar mensaje"
                                style={{background:'none', border:'none', cursor:'pointer',
                                        color:'#aaa', fontSize:'.8rem', padding:0, lineHeight:1}}
                                onMouseEnter={e => e.currentTarget.style.color='#dc3545'}
                                onMouseLeave={e => e.currentTarget.style.color='#aaa'}>
                          ✕
                        </button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={() => setPagina(p => p + 1)}
                      style={{marginTop:'.9rem', width:'100%', padding:'.5rem',
                              borderRadius:8, border:'1.5px solid var(--borde)',
                              background:'#fff', cursor:'pointer', fontSize:'.85rem'}}>
                Cargar más
              </button>
            </>
        }
      </div>
    </div>
  );
}

// ── LOGIN ──────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [modo, setModo]       = useState('entrar'); // 'entrar' | 'crear'
  const [email, setEmail]     = useState('');
  const [pass, setPass]       = useState('');
  const [pass2, setPass2]     = useState('');
  const [error, setError]     = useState('');
  const [info, setInfo]       = useState('');
  const [cargando, setCargando] = useState(false);

  const entrar = async () => {
    if (!email.trim() || !pass.trim()) { setError('Introduce tu email y contraseña'); return; }
    if (!sb) { setError('Sin conexión con la base de datos'); return; }
    setCargando(true); setError(''); setInfo('');
    const { data, error: err } = await sb.auth.signInWithPassword({
      email: email.trim(), password: pass,
    });
    setCargando(false);
    if (err || !data?.user) { setError('Email o contraseña incorrectos'); return; }
    onLogin(data.user);
  };

  const crearCuenta = async () => {
    if (!email.trim() || !pass.trim()) { setError('Introduce tu email y contraseña'); return; }
    if (pass !== pass2) { setError('Las contraseñas no coinciden'); return; }
    if (pass.length < 6) { setError('La contraseña debe tener al menos 6 caracteres'); return; }
    if (!sb) { setError('Sin conexión con la base de datos'); return; }
    setCargando(true); setError(''); setInfo('');
    const { data, error: err } = await sb.auth.signUp({
      email: email.trim(), password: pass,
    });
    setCargando(false);
    if (err) { setError(err.message); return; }
    if (data.session) { onLogin(data.user); return; }
    setInfo('Cuenta creada. Revisa tu email para confirmarla y vuelve a entrar.');
  };

  const conGoogle = async () => {
    if (!sb) { setError('Sin conexión con la base de datos'); return; }
    setError(''); setInfo('');
    await sb.auth.signInWithOAuth({ provider: 'google' });
  };

  const confirmar = () => (modo === 'entrar' ? entrar() : crearCuenta());

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <h1>Fantasy LaLiga</h1>
          <p>{modo === 'entrar' ? 'Inicia sesión con tu cuenta' : 'Crea tu cuenta'}</p>
        </div>
        {error && <div className="login-error">{error}</div>}
        {info && <div className="login-error" style={{background:'#e6f4ea', color:'#1a7f37'}}>{info}</div>}

        <button type="button" onClick={conGoogle}
                style={{width:'100%', padding:'.65rem', marginBottom:'1.1rem',
                        background:'#fff', color:'var(--texto)', fontWeight:600,

          Continuar con Google

        <div className="campo">
          <label>Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                 placeholder="tu@email.com"
                 autoFocus
                 onKeyDown={e => e.key === 'Enter' && confirmar()} />
        </div>
        <div className="campo">
          <label>Contraseña</label>
          <input type="password" value={pass} onChange={e => setPass(e.target.value)}
                 placeholder="Contraseña"
                 onKeyDown={e => e.key === 'Enter' && confirmar()} />
        </div>
        {modo === 'crear' && (
          <div className="campo">
            <label>Repite la contraseña</label>
            <input type="password" value={pass2} onChange={e => setPass2(e.target.value)}
                   placeholder="Repite la contraseña"
                   onKeyDown={e => e.key === 'Enter' && confirmar()} />
          </div>
        )}

        <button className="btn-full" onClick={confirmar} disabled={cargando}>
          {cargando ? 'Un momento…' : modo === 'entrar' ? 'Entrar' : 'Crear cuenta'}
        </button>

        <button type="button"
                onClick={() => { setModo(modo === 'entrar' ? 'crear' : 'entrar'); setError(''); setInfo(''); }}
                style={{marginTop:'.9rem', width:'100%', background:'none', border:'none',
                        color:'var(--verde)', fontSize:'.85rem', cursor:'pointer', fontWeight:600}}>
          {modo === 'entrar' ? '¿No tienes cuenta? Crea una' : '¿Ya tienes cuenta? Inicia sesión'}
        </button>
      </div>
    </div>
  );
}

// ── ONBOARDING — unirse o crear federación + configurar equipo ─
function FederacionOnboarding({ user, onDone, onLogout }) {
  const [paso, setPaso]             = useState('selector'); // 'selector' | 'equipo'
  const [modo, setModo]             = useState('crear');    // 'crear' | 'unirse'
  const [fedNombre, setFedNombre]   = useState('');
  const [fedCodigo, setFedCodigo]   = useState('');
  const [fedActual, setFedActual]   = useState(null);       // federacion elegida/creada
  const [codigoGenerado, setCodigoGenerado] = useState(''); // para mostrar al admin

  // Datos del equipo
  const [nombreEquipo, setNombreEquipo] = useState('');
  const [estadio, setEstadio]           = useState('');
  const [entrenador, setEntrenador]     = useState('');
  const [divisionId, setDivisionId]     = useState('');
  const [divisiones, setDivisiones]     = useState([]);
  const [escudoFile, setEscudoFile]     = useState(null);
  const [escudoPreview, setEscudoPreview] = useState(null);

  const [error, setError]     = useState('');
  const [cargando, setCargando] = useState(false);

  useEffect(() => {
    if (!sb) return;
    sb.from('divisiones').select('id, nombre').order('nombre')
      .then(({ data }) => setDivisiones(data || []));
  }, []);

  const generarCodigo = () => Math.random().toString(36).substring(2, 8).toUpperCase();

  const crearFederacion = async () => {
    if (!fedNombre.trim()) { setError('Introduce un nombre para la federación'); return; }
    setCargando(true); setError('');
    const codigo = generarCodigo();
    const { data, error: err } = await sb.from('federaciones').insert({
      nombre: fedNombre.trim(), codigo, admin_user_id: user.id,
    }).select().single();
    setCargando(false);
    if (err) { setError('Error al crear la federación: ' + err.message); return; }
    setFedActual(data);
    setCodigoGenerado(codigo);
    setPaso('equipo');
  };

  const unirseAFederacion = async () => {
    if (!fedNombre.trim() || !fedCodigo.trim()) {
      setError('Introduce el nombre y el código de la federación'); return;
    }
    setCargando(true); setError('');
    const { data, error: err } = await sb.from('federaciones')
      .select('*')
      .ilike('nombre', fedNombre.trim())
      .eq('codigo', fedCodigo.trim().toUpperCase())
      .maybeSingle();
    setCargando(false);
    if (err || !data) { setError('Federación no encontrada. Comprueba el nombre y el código.'); return; }
    setFedActual(data);
    setPaso('equipo');
  };

  const crearEquipo = async () => {
    if (!nombreEquipo.trim()) { setError('Introduce el nombre de tu equipo'); return; }
    if (!divisionId)          { setError('Selecciona una división'); return; }
    if (!fedActual)           return;
    setCargando(true); setError('');

    let escudo_url = null;
    if (escudoFile) {
      const path = `${fedActual.id}/${user.id}`;
      const { error: errUp } = await sb.storage
        .from('escudos').upload(path, escudoFile, { upsert: true, contentType: escudoFile.type });
      if (!errUp) {
        const { data: urlData } = sb.storage.from('escudos').getPublicUrl(path);
        escudo_url = urlData.publicUrl;
      }
    }

    const { error: errPart } = await sb.from('participantes').insert({
      nombre:       nombreEquipo.trim(),
      division_id:  Number(divisionId),
      user_id:      user.id,
      federacion_id: fedActual.id,
      presupuesto:  fedActual.presupuesto_inicial ?? 100000000,
      escudo_url,
      estadio:      estadio.trim()    || null,
      entrenador:   entrenador.trim() || null,
    });
    setCargando(false);
    if (errPart) { setError('Error al crear el equipo: ' + errPart.message); return; }
    publicar(fedActual.id, 'admin', `${nombreEquipo.trim()} se une a la federación`);
    onDone();
  };

  const copiarCodigo = () => {
    navigator.clipboard.writeText(codigoGenerado).catch(() => {});
  };

  // ── Paso 1: selector ────────────────────────────────────────
  if (paso === 'selector') {
    return (
      <div className="login-wrap">
        <div className="login-card" style={{maxWidth:440}}>
          <div className="login-logo">
            <h1>Fantasy LaLiga</h1>
            <p>Crea una federación o únete a la de un amigo</p>
          </div>
          {error && <div className="login-error">{error}</div>}

          <div className="tabs" style={{marginBottom:'1.25rem'}}>
            <button type="button" className={`tab ${modo==='crear'?'active':''}`}
                    onClick={() => { setModo('crear'); setError(''); }}>
              Crear federación
            </button>
            <button type="button" className={`tab ${modo==='unirse'?'active':''}`}
                    onClick={() => { setModo('unirse'); setError(''); }}>
              Unirme a una federación
            </button>
          </div>

          {modo === 'crear' ? (
            <>
              <div className="campo">
                <label>Nombre de la federación</label>
                <input value={fedNombre} onChange={e => setFedNombre(e.target.value)}
                       placeholder="Ej: Fantasy Amigos 2025"
                       onKeyDown={e => e.key === 'Enter' && crearFederacion()} />
              </div>
              <button className="btn-full" onClick={crearFederacion} disabled={cargando}>
                {cargando ? 'Creando…' : 'Crear federación y continuar'}
              </button>
            </>
          ) : (
            <>
              <div className="campo">
                <label>Nombre de la federación</label>
                <input value={fedNombre} onChange={e => setFedNombre(e.target.value)}
                       placeholder="Nombre exacto de la federación" />
              </div>
              <div className="campo">
                <label>Código de invitación</label>
                <input value={fedCodigo}
                       onChange={e => setFedCodigo(e.target.value.toUpperCase())}
                       placeholder="Ej: AB12CD"
                       style={{letterSpacing:'0.12em', fontWeight:700, textTransform:'uppercase'}}
                       onKeyDown={e => e.key === 'Enter' && unirseAFederacion()} />
              </div>
              <button className="btn-full" onClick={unirseAFederacion} disabled={cargando}>
                {cargando ? 'Verificando…' : 'Unirme a la federación'}
              </button>
            </>
          )}

          <button type="button" onClick={onLogout}
                  style={{marginTop:'.9rem', width:'100%', background:'none', border:'none',
                          color:'var(--texto2)', fontSize:'.85rem', cursor:'pointer'}}>
            Salir
          </button>
        </div>
      </div>
    );
  }

  // ── Paso 2: configurar equipo ───────────────────────────────
  return (
    <div className="login-wrap">
      <div className="login-card" style={{maxWidth:460}}>
        <div className="login-logo">
          <h1>Tu equipo</h1>
          <p>Federación: <strong>{fedActual?.nombre}</strong></p>
        </div>

        {codigoGenerado && (
          <div style={{background:'#f0fdf4', border:'1.5px solid var(--verde)', borderRadius:10,
                       padding:'.9rem 1rem', marginBottom:'1.25rem'}}>
            <div style={{fontSize:'.82rem', color:'var(--verde)', fontWeight:700, marginBottom:'.4rem'}}>
              ¡Federación creada! Comparte este código con tus amigos:
            </div>
            <div style={{display:'flex', alignItems:'center', gap:'.75rem'}}>
              <span style={{fontSize:'1.5rem', fontWeight:800, letterSpacing:'.15em', color:'var(--texto)'}}>
                {codigoGenerado}
              </span>
              <button onClick={copiarCodigo}
                      style={{padding:'.3rem .7rem', borderRadius:6, border:'1.5px solid var(--verde)',
                              background:'#fff', color:'var(--verde)', cursor:'pointer', fontSize:'.82rem', fontWeight:600}}>
                Copiar
              </button>
            </div>
          </div>
        )}

        {error && <div className="login-error">{error}</div>}

        <div className="campo">
          <label>Nombre del equipo *</label>
          <input value={nombreEquipo} onChange={e => setNombreEquipo(e.target.value)}
                 placeholder="Ej: Los Galácticos" autoFocus />
        </div>

        <div className="campo">
          <label>Escudo del equipo</label>
          <div style={{display:'flex', alignItems:'center', gap:'1rem'}}>
            {escudoPreview
              ? <img src={escudoPreview} alt="Escudo"
                     style={{width:56, height:56, borderRadius:8, objectFit:'cover',
                             border:'1.5px solid var(--borde)', flexShrink:0}} />
              : <div style={{width:56, height:56, borderRadius:8, background:'var(--gris)',
                             border:'1.5px dashed var(--borde)', flexShrink:0}} />
            }
            <input type="file" accept="image/*"
                   onChange={e => {
                     const f = e.target.files[0];
                     if (!f) return;
                     setEscudoFile(f);
                     setEscudoPreview(URL.createObjectURL(f));
                   }}
                   style={{fontSize:'.85rem'}} />
          </div>
        </div>

        <div className="campo">
          <label>Estadio</label>
          <input value={estadio} onChange={e => setEstadio(e.target.value)}
                 placeholder="Ej: Estadio Municipal" />
        </div>

        <div className="campo">
          <label>Entrenador</label>
          <input value={entrenador} onChange={e => setEntrenador(e.target.value)}
                 placeholder="Ej: José García" />
        </div>

        <div className="campo">
          <label>División *</label>
          <select value={divisionId} onChange={e => setDivisionId(e.target.value)}
                  style={{width:'100%', padding:'.55rem .85rem',
                          border:'1.5px solid var(--borde)', borderRadius:8, fontSize:'.95rem'}}>
            <option value="">Selecciona división…</option>
            {divisiones.map(d => <option key={d.id} value={d.id}>{d.nombre}</option>)}
          </select>
        </div>

        <button className="btn-full" onClick={crearEquipo} disabled={cargando}>
          {cargando ? 'Creando equipo…' : 'Crear mi equipo'}
        </button>
      </div>
    </div>
  );
}

// ── ALINEACIÓN ─────────────────────────────────────────────────
function Alineacion({ participanteId, jornadaActual, federacionId }) {
  const [jornada, setJornada]     = useState(jornadaActual || 1);
  const [cierre, setCierre]       = useState(null);
  const [plantilla, setPlantilla] = useState(null);
  const [estado, setEstado]       = useState({});      // id → 'T'|'S'|'F'
  const [ordenSup, setOrdenSup]   = useState({});      // id → 1|2|3|4
  const [jugadoresHistoricos, setJugadoresHistoricos] = useState([]); // en alineación histórica pero ya no en plantilla
  const [cargandoAli, setCargandoAli] = useState(false);
  const [guardando, setGuardando]     = useState(false);
  const [msg, setMsg]                 = useState('');

  useEffect(() => {
    if (!sb || !participanteId) return;
    sb.from('plantillas')
      .select('jugador_id, jugadores(id, nombre, equipo, posicion)')
      .eq('participante_id', participanteId)
      .then(({ data }) => {
        const jugs = (data || []).map(p => p.jugadores).filter(Boolean);
        jugs.sort((a, b) => POS_ORDEN[a.posicion] - POS_ORDEN[b.posicion]);
        setPlantilla(jugs);
      });
  }, [participanteId]);

  useEffect(() => {
    if (!sb || !participanteId || !plantilla) return;
    const cargar = async () => {
      setCargandoAli(true);
      const [{ data: ali }, { data: cierreRow }] = await Promise.all([
        sb.from('alineaciones').select('jugador_id, es_titular, orden_suplente')
          .eq('participante_id', participanteId).eq('jornada', jornada),
        sb.from('jornadas_cierre').select('cierre')
          .eq('federacion_id', federacionId).eq('jornada', jornada).maybeSingle(),
      ]);
      setCierre(cierreRow?.cierre || null);

      const e = {};
      for (const j of plantilla) e[j.id] = 'F';

      let fuente = ali || [];
      if (fuente.length === 0) {
        // Sin alineación para esta jornada → usar la última guardada (solo jornadas anteriores)
        const { data: ref } = await sb.from('alineaciones')
          .select('jornada')
          .eq('participante_id', participanteId)
          .lt('jornada', jornada)
          .order('jornada', { ascending: false })
          .limit(1);
        if (ref?.length > 0) {
          const { data: ultima } = await sb.from('alineaciones')
            .select('jugador_id, es_titular, orden_suplente')
            .eq('participante_id', participanteId)
            .eq('jornada', ref[0].jornada);
          fuente = ultima || [];
        }
      }

      const ord = {};
      for (const a of fuente) {
        if (Object.prototype.hasOwnProperty.call(e, a.jugador_id)) {
          e[a.jugador_id] = a.es_titular ? 'T' : 'S';
          if (!a.es_titular && a.orden_suplente != null) ord[a.jugador_id] = a.orden_suplente;
        }
      }

      // Jugadores vendidos: en alineación guardada pero ya no en plantilla
      const idsActuales = new Set(plantilla.map(j => j.id));
      const idsVendidos = [...new Set(fuente.filter(a => !idsActuales.has(a.jugador_id)).map(a => a.jugador_id))];

      const esJornadaPasada = jornada < jornadaActual;

      if (esJornadaPasada && idsVendidos.length > 0) {
        // Jornada pasada → mostrar vendidos como histórico (solo lectura, sin botones)
        const { data: jugsHist } = await sb.from('jugadores').select('id, nombre, equipo, posicion').in('id', idsVendidos);
        for (const a of fuente) {
          if (idsVendidos.includes(a.jugador_id)) {
            e[a.jugador_id] = a.es_titular ? 'T' : 'S';
            if (!a.es_titular && a.orden_suplente != null) ord[a.jugador_id] = a.orden_suplente;
          }
        }
        setJugadoresHistoricos(jugsHist || []);
      } else {
        // Jornada actual/futura → ignorar vendidos por completo
        // Si estaban guardados en DB para esta jornada, limpiarlos silenciosamente
        if (!esJornadaPasada && idsVendidos.length > 0) {
          await sb.from('alineaciones')
            .delete()
            .eq('participante_id', participanteId)
            .eq('jornada', jornada)
            .in('jugador_id', idsVendidos);
        }
        setJugadoresHistoricos([]);
      }

      setEstado(e);
      setOrdenSup(ord);
      setCargandoAli(false);
    };
    cargar();
  }, [participanteId, jornada, plantilla]);

  const FORMACIONES = [[5,4,1],[5,3,2],[5,2,3],[4,5,1],[4,4,2],[4,3,3],[4,2,4],[3,5,2],[3,6,1],[3,4,3],[3,3,4]];

  const bloqueado = !!(cierre && new Date() > new Date(cierre));
  const nT = Object.values(estado).filter(v => v === 'T').length;
  const nS = Object.values(estado).filter(v => v === 'S').length;

  const titPos = { POR: 0, DEF: 0, MED: 0, DEL: 0 };
  for (const j of [...(plantilla || []), ...jugadoresHistoricos]) if (estado[j.id] === 'T') titPos[j.posicion]++;
  const formActual  = [titPos.DEF, titPos.MED, titPos.DEL];
  const formStr     = formActual.join('-');
  const formCompleta = nT === 11 && titPos.POR === 1;
  const formValida  = formCompleta && FORMACIONES.some(f => f[0]===formActual[0] && f[1]===formActual[1] && f[2]===formActual[2]);

  const setJugadorEstado = (id, op) => {
    if (bloqueado) return;
    const prev = estado[id];
    if (op === 'T' && nT >= 11 && prev !== 'T') { alert('Ya tienes 11 titulares.'); return; }
    if (op === 'S' && nS >= 4  && prev !== 'S') { alert('Máximo 4 suplentes.'); return; }
    setEstado(e => ({ ...e, [id]: op }));
    if (op === 'S' && prev !== 'S') {
      // Asignar siguiente posición disponible
      setOrdenSup(o => {
        const max = Object.values(o).reduce((m, v) => Math.max(m, v), 0);
        return { ...o, [id]: max + 1 };
      });
    } else if (op !== 'S' && prev === 'S') {
      // Eliminar y compactar
      setOrdenSup(o => {
        const quitado = o[id];
        const nuevo = { ...o };
        delete nuevo[id];
        for (const k of Object.keys(nuevo)) if (nuevo[k] > quitado) nuevo[k]--;
        return nuevo;
      });
    }
    setMsg('');
  };

  const moverSuplente = (id, dir) => { // dir: -1 sube, +1 baja
    const pos = ordenSup[id];
    const nueva = pos + dir;
    if (nueva < 1 || nueva > nS) return;
    const otro = Object.entries(ordenSup).find(([, v]) => v === nueva)?.[0];
    if (!otro) return;
    setOrdenSup(o => ({ ...o, [id]: nueva, [otro]: pos }));
  };

  const guardar = async () => {
    if (bloqueado || !sb) return;
    if (nT === 11 && !formValida) {
      alert(`Formación ${formStr} no válida.\nFormaciones permitidas: ${FORMACIONES.map(f => f.join('-')).join(', ')}`);
      return;
    }
    setGuardando(true);
    const registros = Object.entries(estado)
      .filter(([, v]) => v === 'T' || v === 'S')
      .map(([jugadorId, v]) => ({
        participante_id: participanteId, jornada,
        jugador_id: jugadorId, es_titular: v === 'T',
        orden_suplente: v === 'S' ? (ordenSup[jugadorId] ?? null) : null,
      }));
    const { error: errDel } = await sb.from('alineaciones').delete()
      .eq('participante_id', participanteId).eq('jornada', jornada);
    if (errDel) { alert('Error al borrar alineación anterior: ' + errDel.message); setGuardando(false); return; }
    if (registros.length) {
      const { error: errIns } = await sb.from('alineaciones').insert(registros);
      if (errIns) { alert('Error al guardar: ' + errIns.message); setGuardando(false); return; }
    }
    setGuardando(false);
    setMsg('✓ Alineación guardada');
    setTimeout(() => setMsg(''), 3000);
  };

  if (plantilla === null) return <Spinner />;

  const incompleta = nT > 0 && nT !== 11;

  const secciones = [
    { key: 'T', label: `Titulares (${nT}/11)`, color: '#198754' },
    { key: 'S', label: `Suplentes (${nS}/4)`,  color: '#fd7e14' },
    { key: 'F', label: 'Sin convocar',           color: 'var(--texto2)' },
  ];
  const supsOrdenados = [...(plantilla || []), ...jugadoresHistoricos]
    .filter(j => estado[j.id] === 'S')
    .sort((a, b) => (ordenSup[a.id] ?? 99) - (ordenSup[b.id] ?? 99));

  return (
    <div className="card">
      <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'center', marginBottom:'1.2rem'}}>
        <div>
          <label style={{fontSize:'.85rem', color:'var(--texto2)', marginRight:'.4rem'}}>Jornada:</label>
          <select value={jornada} onChange={e => setJornada(Number(e.target.value))}
                  style={{padding:'.3rem .6rem', borderRadius:6, border:'1.5px solid var(--borde)'}}>
            {Array.from({length:38},(_,i)=>i+1).map(j =>
              <option key={j} value={j}>J{j}</option>)}
          </select>
        </div>
        <div style={{fontSize:'.85rem'}}>
          {cierre
            ? <span style={{color: bloqueado ? '#dc3545' : '#198754', fontWeight:600}}>
                {bloqueado ? '🔒 Cerrada' : '🟢 Abierta'} — cierre: {new Date(cierre).toLocaleString('es-ES')}
              </span>
            : <span style={{color:'#198754', fontWeight:600}}>🟢 Sin hora de cierre</span>}
        </div>
        <div style={{marginLeft:'auto', fontSize:'.9rem', display:'flex', gap:'.75rem', alignItems:'center', flexWrap:'wrap'}}>
          {nT > 0 && (
            <span style={{fontWeight:700, padding:'.2rem .55rem', borderRadius:7,
                          background: formValida ? '#d1e7dd' : formCompleta ? '#f8d7da' : '#fff3cd',
                          color:      formValida ? '#0a3622' : formCompleta ? '#842029' : '#664d03'}}>
              {titPos.POR > 0 ? `1-${formStr}` : formStr}
              {formCompleta && !formValida && ' ✗'}
              {formValida && ' ✓'}
            </span>
          )}
          <span>
            <strong style={{color: nT===11 ? '#198754' : 'inherit'}}>{nT}/11</strong>
            <span style={{color:'var(--texto2)'}}> tit &nbsp;·&nbsp; </span>
            <strong>{nS}/4</strong>
            <span style={{color:'var(--texto2)'}}> sup</span>
          </span>
        </div>
      </div>

      {cargandoAli
        ? <Spinner />
        : <>
            {plantilla.length === 0 && (
              <div className="empty">Tu plantilla está vacía. Ficha jugadores primero.</div>
            )}

            {secciones.map(({ key, label, color }) => {
              const idsHist = new Set(jugadoresHistoricos.map(j => j.id));
              const jugs = key === 'S'
                ? supsOrdenados
                : key === 'F'
                  ? plantilla.filter(j => estado[j.id] === key)
                  : [...plantilla.filter(j => estado[j.id] === key),
                     ...jugadoresHistoricos.filter(j => estado[j.id] === key)];
              if (!jugs.length) return null;
              return (
                <div key={key} style={{marginBottom:'1rem'}}>
                  <div style={{fontWeight:700, fontSize:'.78rem', color, textTransform:'uppercase',
                               letterSpacing:'.05em', marginBottom:'.35rem'}}>
                    {label}
                  </div>
                  <table style={{width:'100%'}}>
                    <tbody>
                      {jugs.map(j => {
                        const esHistorico = idsHist.has(j.id);
                        return (
                          <tr key={j.id} style={esHistorico ? {opacity:.6} : {}}>
                            {key === 'S' && (
                              <td style={{width:28, textAlign:'center', fontWeight:700, fontSize:'.85rem', color}}>
                                {ordenSup[j.id]}°
                              </td>
                            )}
                            <td style={{width:48}}><span className={`badge ${j.posicion}`}>{j.posicion}</span></td>
                            <td style={{fontWeight:600}}>{nombreJugador(j.nombre, j.posicion, j.equipo)}</td>
                            <td style={{color:'var(--texto2)', fontSize:'.85rem'}}>
                              {j.posicion === 'POR' ? null
                                : <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                                    <Escudo equipo={j.equipo} size={ESCUDO_SIZE}/>{j.equipo}
                                  </span>}
                            </td>
                            {esHistorico
                              ? <td style={{textAlign:'right'}}>
                                  <span style={{fontSize:'.72rem', color:'var(--texto2)', fontStyle:'italic'}}>vendido</span>
                                </td>
                              : !bloqueado && (
                                <td style={{textAlign:'right', whiteSpace:'nowrap'}}>
                                  {key === 'S' && (
                                    <>
                                      <button onClick={() => moverSuplente(j.id, -1)}
                                              disabled={ordenSup[j.id] === 1}
                                              style={{marginLeft:3, padding:'.2rem .45rem', fontSize:'.75rem',
                                                      border:'1.5px solid var(--borde)', borderRadius:6,
                                                      cursor: ordenSup[j.id] === 1 ? 'default' : 'pointer',
                                                      background:'#fff', opacity: ordenSup[j.id] === 1 ? .35 : 1}}>▲</button>
                                      <button onClick={() => moverSuplente(j.id, +1)}
                                              disabled={ordenSup[j.id] === nS}
                                              style={{marginLeft:2, padding:'.2rem .45rem', fontSize:'.75rem',
                                                      border:'1.5px solid var(--borde)', borderRadius:6,
                                                      cursor: ordenSup[j.id] === nS ? 'default' : 'pointer',
                                                      background:'#fff', opacity: ordenSup[j.id] === nS ? .35 : 1}}>▼</button>
                                    </>
                                  )}
                                  {[['T','Titular','#198754'],['S','Suplente','#fd7e14'],['F','Fuera','#6c757d']].map(([op, etiq, col]) => (
                                    <button key={op} onClick={() => setJugadorEstado(j.id, op)}
                                            style={{marginLeft:3, padding:'.2rem .5rem', fontSize:'.75rem',
                                                    border:`1.5px solid ${estado[j.id]===op ? col : 'var(--borde)'}`,
                                                    borderRadius:6, cursor:'pointer',
                                                    background: estado[j.id]===op ? col : '#fff',
                                                    color: estado[j.id]===op ? '#fff' : 'var(--texto)'}}>
                                      {etiq}
                                    </button>
                                  ))}
                                </td>
                              )
                            }
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              );
            })}

            {!bloqueado && plantilla.length > 0 && (
              <div style={{marginTop:'1rem', display:'flex', gap:'1rem', alignItems:'center', flexWrap:'wrap'}}>
                <button className="btn-ok" onClick={guardar} disabled={guardando}>
                  {guardando ? 'Guardando…' : 'Guardar alineación'}
                </button>
                {incompleta && (
                  <span style={{color:'#856404', fontSize:'.85rem'}}>
                    ⚠ Faltan titulares ({nT}/11)
                  </span>
                )}
                {formCompleta && !formValida && (
                  <span style={{color:'#dc3545', fontSize:'.85rem'}}>
                    ✗ Formación {formStr} no válida
                  </span>
                )}
                {msg && <span style={{color:'#198754', fontSize:'.9rem'}}>{msg}</span>}
              </div>
            )}
            {bloqueado && (
              <p style={{color:'#dc3545', fontSize:'.9rem', marginTop:'.6rem'}}>
                La alineación de esta jornada está cerrada y no puede modificarse.
              </p>
            )}
          </>
      }
    </div>
  );
}

// ── ADMIN — PRESUPUESTOS ───────────────────────────────────────
function AdminPresupuestos({ participantes }) {
  const [valores, setValores]   = useState({});
  const [guardado, setGuardado] = useState(null);

  useEffect(() => {
    if (!sb || participantes.length === 0) return;
    const ids = participantes.map(p => p.id);
    sb.from('participantes').select('id, presupuesto').in('id', ids).then(({ data }) => {
      const m = {};
      (data || []).forEach(p => { m[p.id] = String(p.presupuesto ?? 100000000); });
      setValores(m);
    });
  }, [participantes]);

  const guardar = async (pid) => {
    const val = parseFloat(valores[pid]);
    if (isNaN(val)) return;
    const { error } = await sb.from('participantes').update({ presupuesto: val }).eq('id', pid);
    if (error) { alert('Error: ' + error.message); return; }
    setGuardado(pid);
    setTimeout(() => setGuardado(null), 2000);
  };

  const Seccion = ({ lista, titulo }) => (
    <div className="card">
      <h2>{titulo}</h2>
      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th style={{textAlign:'right'}}>Presupuesto (€)</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {lista.map(p => (
            <tr key={p.id}>
              <td style={{fontWeight:600}}>{p.nombre}</td>
              <td style={{textAlign:'right'}}>
                <input type="number" value={valores[p.id] ?? ''}
                  onChange={e => setValores(prev => ({...prev, [p.id]: e.target.value}))}
                  style={{width:'150px', textAlign:'right', padding:'.3rem .5rem',
                          border:'1.5px solid var(--borde)', borderRadius:'8px', fontSize:'.9rem'}} />
              </td>
              <td style={{paddingLeft:'.5rem'}}>
                <button onClick={() => guardar(p.id)} className="btn-fichar"
                  style={{background: guardado === p.id ? 'var(--verde)' : undefined,
                          minWidth:'90px'}}>
                  {guardado === p.id ? 'Guardado ✓' : 'Guardar'}
                </button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  return (
    <div>
      <Seccion lista={participantes.filter(p => p.division_id === 1)} titulo="Primera División" />
      <Seccion lista={participantes.filter(p => p.division_id === 2)} titulo="Segunda División" />
    </div>
  );
}

// ── ADMIN — FICHAJES PENDIENTES ────────────────────────────────
function AdminFichajesPendientes({ participantes, federacion }) {
  const [pendientes, setPendientes]   = useState(null);
  const [plantillasMap, setPlantillasMap] = useState({}); // participante_id → [{jugador_id, nombre, posicion, equipo}]
  const [liberarSel, setLiberarSel]   = useState({});     // pendiente_id → jugador_id a liberar
  const [procesando, setProcesando]   = useState(null);

  const cargar = async () => {
    if (!sb) return;
    const partIds = participantes.map(p => p.id);
    if (!partIds.length) { setPendientes([]); return; }
    const [{ data: pends }, { data: plants }] = await Promise.all([
      sb.from('fichajes_pendientes')
        .select('id, participante_id, jugador_id, precio_compra, traspaso_de_id, participantes(nombre), jugadores(nombre, equipo, posicion), origen:traspaso_de_id(nombre)')
