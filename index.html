        .in('participante_id', partIds)
        .order('id', { ascending: true }),
      sb.from('plantillas')
        .select('participante_id, jugador_id, jugadores(nombre, equipo, posicion)')
        .in('participante_id', partIds),
    ]);
    const pm = {};
    for (const p of (plants || [])) {
      if (!pm[p.participante_id]) pm[p.participante_id] = [];
      pm[p.participante_id].push({ jugador_id: p.jugador_id, nombre: p.jugadores?.nombre || '', posicion: p.jugadores?.posicion || '', equipo: p.jugadores?.equipo || '' });
    }
    setPendientes(pends || []);
    setPlantillasMap(pm);
  };

  useEffect(() => { cargar(); }, []);

  const activar = async (pend) => {
    const plantilla = plantillasMap[pend.participante_id] || [];
    const liberar   = plantilla.length >= 14 ? (liberarSel[pend.id] || '') : null;
    if (plantilla.length >= 14 && !liberar) {
      alert('El equipo tiene la plantilla llena (14). Selecciona qué jugador liberar primero.');
      return;
    }
    setProcesando(pend.id);
    const { error } = await sb.rpc('activar_fichaje_pendiente', {
      p_pendiente_id:       pend.id,
      p_liberar_jugador_id: liberar || null,
      p_federacion_id:      federacion?.id,
    });
    setProcesando(null);
    if (error) {
      const msgs = {
        plantilla_llena_indica_baja:      'El equipo está lleno. Selecciona quién sale.',
        jugador_a_liberar_no_encontrado:  'El jugador a liberar no está en la plantilla.',
        fichaje_no_encontrado:            'Este fichaje pendiente ya no existe.',
        no_autorizado:                    'No tienes permiso para realizar esta acción.',
      };
      alert(msgs[error.message] || 'Error: ' + error.message);
      return;
    }
    const jug = pend.jugadores;
    const nom = jug?.posicion === 'POR' ? `Portería ${jug?.equipo}` : jug?.nombre;
    publicar(federacion?.id, 'fichaje', `${pend.participantes?.nombre} incorpora a ${nom} a su plantilla`);
    cargar();
  };

  const anular = async (pend) => {
    const jug = pend.jugadores;
    const nom = jug?.posicion === 'POR' ? `Portería ${jug?.equipo}` : jug?.nombre;
    const esTraspaso = !!pend.traspaso_de_id;
    const pct    = federacion?.pct_venta_mercado ?? 100;
    const refund = fmt(Math.round(pend.precio_compra * pct / 100));
    const msg = esTraspaso
      ? `¿Descartar el traspaso de ${nom} para ${pend.participantes?.nombre}?\n` +
        `Se reembolsará el ${pct}% del traspaso (${refund}).\n` +
        `El jugador volverá a ${pend.origen?.nombre || 'su equipo de origen'} si tiene plaza libre, o quedará libre.`
      : `¿Anular el fichaje pendiente de ${nom} para ${pend.participantes?.nombre}?\nSe reembolsará el ${pct}% del precio pagado (${refund}).`;
    if (!confirm(msg)) return;
    setProcesando(pend.id);
    if (esTraspaso) {
      const { data, error } = await sb.rpc('anular_traspaso_pendiente', {
        p_pendiente_id:  pend.id,
        p_federacion_id: federacion?.id,
      });
      setProcesando(null);
      if (error || !data?.ok) { alert('Error: ' + (error?.message || data?.error || 'desconocido')); return; }
    } else {
      const { error } = await sb.rpc('anular_fichaje_pendiente', {
        p_pendiente_id:  pend.id,
        p_federacion_id: federacion?.id,
      });
      setProcesando(null);
      if (error) { alert('Error: ' + error.message); return; }
    }
    cargar();
  };

  if (pendientes === null) return <Spinner />;

  return (
    <div className="card">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center',
                   marginBottom:'1rem', flexWrap:'wrap', gap:'.5rem'}}>
        <h2 style={{margin:0}}>Fichajes pendientes de plaza ({pendientes.length})</h2>
        <button onClick={cargar}
                style={{padding:'.3rem .8rem', borderRadius:6, border:'1.5px solid var(--borde)',
                        background:'var(--fondo)', cursor:'pointer', fontSize:'.85rem'}}>
          Actualizar
        </button>
      </div>

      {pendientes.length === 0 ? (
        <div className="empty">No hay fichajes pendientes de plaza.</div>
      ) : pendientes.map(pend => {
        const jug      = pend.jugadores || {};
        const nomJug   = jug.posicion === 'POR' ? `Portería ${jug.equipo}` : jug.nombre;
        const plantilla = plantillasMap[pend.participante_id] || [];
        const llena     = plantilla.length >= 14;
        const sel       = liberarSel[pend.id] || '';
        const enProceso = procesando === pend.id;

        return (
          <div key={pend.id}
               style={{display:'flex', flexWrap:'wrap', gap:'.75rem', alignItems:'flex-start',
                       padding:'.9rem 0', borderBottom:'1px solid var(--borde)'}}>

            {/* Equipo */}
            <div style={{minWidth:130, flex:'0 0 auto'}}>
              <div style={{fontSize:'.75rem', color:'var(--texto2)', marginBottom:'.1rem'}}>Equipo</div>
              <div style={{fontWeight:700}}>{pend.participantes?.nombre || '—'}</div>
            </div>

            {/* Jugador */}
            <div style={{flex:'1 1 160px'}}>
              <div style={{fontSize:'.75rem', color:'var(--texto2)', marginBottom:'.1rem'}}>Jugador</div>
              <div style={{fontWeight:600}}>{nomJug || '—'}</div>
              <div style={{fontSize:'.8rem', color:'var(--texto2)'}}>{jug.posicion} · {jug.equipo}</div>
            </div>

            {/* Precio / origen */}
            <div style={{minWidth:110, flex:'0 0 auto'}}>
              <div style={{fontSize:'.75rem', color:'var(--texto2)', marginBottom:'.1rem'}}>
                {pend.traspaso_de_id ? 'Traspaso de' : 'Precio'}
              </div>
              {pend.traspaso_de_id
                ? <><div style={{fontWeight:600, fontSize:'.85rem'}}>{pend.origen?.nombre || '—'}</div>
                    <div style={{fontSize:'.8rem', color:'var(--texto2)'}}>{fmt(pend.precio_compra)}</div></>
                : <div style={{fontWeight:600}}>{fmt(pend.precio_compra)}</div>
              }
            </div>

            {/* Plantilla */}
            <div style={{minWidth:80, flex:'0 0 auto'}}>
              <div style={{fontSize:'.75rem', color:'var(--texto2)', marginBottom:'.1rem'}}>Plantilla</div>
              <div style={{fontWeight:600, color: llena ? '#dc3545' : '#198754'}}>
                {plantilla.length}/14 {llena ? '(llena)' : ''}
              </div>
            </div>

            {/* Acciones */}
            <div style={{display:'flex', flexWrap:'wrap', gap:'.5rem', alignItems:'center', flex:'1 1 220px'}}>
              {llena && (
                <select value={sel}
                        onChange={e => setLiberarSel(s => ({...s, [pend.id]: e.target.value}))}
                        style={{padding:'.3rem .6rem', borderRadius:7, border:'1.5px solid var(--borde)',
                                fontSize:'.82rem', maxWidth:200}}>
                  <option value="">— Quién sale —</option>
                  {plantilla.map(p => (
                    <option key={p.jugador_id} value={p.jugador_id}>
                      {p.posicion === 'POR' ? `POR ${p.equipo}` : p.nombre} ({p.posicion})
                    </option>
                  ))}
                </select>
              )}
              <button className="btn-fichar"
                      disabled={enProceso || (llena && !sel)}
                      onClick={() => activar(pend)}>
                {enProceso ? '…' : 'Activar'}
              </button>
              <button disabled={enProceso}
                      onClick={() => anular(pend)}
                      style={{padding:'.3rem .7rem', borderRadius:7, border:'1.5px solid #dc3545',
                              background:'var(--fondo)', color:'#dc3545', cursor:'pointer',
                              fontSize:'.82rem', fontWeight:600}}>
                {pend.traspaso_de_id ? 'Descartar (80%)' : 'Anular'}
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── ADMIN — PUJAS ──────────────────────────────────────────────
function AdminPujas({ participantes, federacion }) {
  const [pujas, setPujas]           = useState(null);
  const [resolviendo, setResolviendo] = useState(null);
  const [resueltos, setResueltos]   = useState(new Set()); // jugador_ids ya adjudicados esta sesión
  const [historial, setHistorial]   = useState([]);
  const [verHistorial, setVerHistorial] = useState(false);

  const cargar = () => {
    if (!sb) return;
    const partIds = participantes.map(p => p.id);
    if (!partIds.length) { setPujas([]); return; }
    sb.from('pujas')
      .select('id, participante_id, jugador_id, cantidad, created_at, jugadores(id, nombre, equipo, posicion, valor_mercado), participantes(nombre)')
      .eq('resuelta', false)
      .in('participante_id', partIds)
      .order('cantidad', { ascending: false })
      .then(({ data }) => setPujas(data || []));
  };

  const cargarHistorial = () => {
    if (!sb) return;
    const partIds = participantes.map(p => p.id);
    if (!partIds.length) { setHistorial([]); return; }
    sb.from('pujas')
      .select('id, participante_id, cantidad, ganadora, created_at, jugadores(nombre, equipo, posicion), participantes(nombre)')
      .eq('resuelta', true)
      .eq('ganadora', true)
      .in('participante_id', partIds)
      .order('created_at', { ascending: false })
      .limit(50)
      .then(({ data }) => setHistorial(data || []));
  };

  useEffect(cargar, []);

  // Agrupar por jugador, bids ordenadas de mayor a menor
  const porJugador = useMemo(() => {
    if (!pujas) return [];
    const m = {};
    for (const p of pujas) {
      const jid = p.jugador_id;
      if (resueltos.has(jid)) continue; // ya adjudicado en esta sesión, no mostrar
      if (!m[jid]) m[jid] = { jugador: p.jugadores, bids: [] };
      m[jid].bids.push({ ...p, equipo: p.participantes?.nombre });
    }
    for (const jid in m) m[jid].bids.sort((a,b) => b.cantidad - a.cantidad);
    return Object.values(m).sort((a,b) =>
      (POS_ORDEN[a.jugador?.posicion]||9) - (POS_ORDEN[b.jugador?.posicion]||9));
  }, [pujas, resueltos]);

  const resolver = async (jugadorId, ganador) => {
    setResolviendo(jugadorId);

    const { data: rpcData, error } = await sb.rpc('resolver_puja', {
      p_jugador_id:    jugadorId,
      p_puja_id:       ganador.id,
      p_federacion_id: federacion?.id,
    });

    if (error) {
      const msgs = {
        puja_ya_resuelta:        'Esta puja ya fue adjudicada por otro administrador.',
        presupuesto_insuficiente: `${ganador.equipo} no tiene presupuesto suficiente.`,
        porteria_ocupada:        'Esta portería ya está en otro equipo de la misma división.',
        no_autorizado:           'No tienes permisos para resolver pujas en esta federación.',
      };
      alert(msgs[error.message] || 'Error al resolver la puja: ' + error.message);
      setResolviendo(null);
      return;
    }

    const grupo  = porJugador.find(g => g.jugador?.id === jugadorId);
    const jug    = grupo?.jugador;
    const nomJug = jug?.posicion === 'POR' ? `Portería ${jug?.equipo}` : jug?.nombre;
    const resto  = (grupo?.bids || [])
      .filter(b => b.id !== ganador.id)
      .sort((a, b) => b.cantidad - a.cantidad)
      .map(b => `- ${b.equipo} pujó ${fmt(b.cantidad)}`)
      .join('\n');
    const lineaPrincipal = rpcData?.pendiente
      ? `${ganador.equipo} ficha a ${nomJug} por ${fmt(ganador.cantidad)} (pendiente de plaza).`
      : `${ganador.equipo} ficha a ${nomJug} por ${fmt(ganador.cantidad)}.`;
    const texto = resto ? `${lineaPrincipal}\nResto de pujas:\n${resto}` : lineaPrincipal;
    publicar(federacion?.id, 'fichaje', texto);
    setResueltos(prev => new Set([...prev, jugadorId]));
    setResolviendo(null);
    cargar();
    cargarHistorial();
  };

  const descartarPujas = async (jugadorId) => {
    const { error } = await sb.from('pujas').update({ resuelta: true, ganadora: false }).eq('jugador_id', jugadorId);
    if (error) { alert('Error al descartar pujas: ' + error.message); return; }
    setResueltos(prev => new Set([...prev, jugadorId]));
    cargar();
    cargarHistorial();
  };

  if (pujas === null) return <Spinner />;

  return (
    <div className="card">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem', flexWrap:'wrap', gap:'.5rem'}}>
        <h2 style={{margin:0}}>Pujas pendientes</h2>
        <div style={{display:'flex', gap:'.5rem'}}>
          <button onClick={cargar} style={{padding:'.3rem .8rem', borderRadius:6,
                  border:'1.5px solid var(--borde)', background:'#fff', cursor:'pointer', fontSize:'.85rem'}}>
            Actualizar
          </button>
          <button onClick={() => { setVerHistorial(v => !v); if (!verHistorial) cargarHistorial(); }}
                  style={{padding:'.3rem .8rem', borderRadius:6, border:'1.5px solid var(--borde)',
                          background: verHistorial ? 'var(--verde)' : '#fff', color: verHistorial ? '#fff' : 'inherit',
                          cursor:'pointer', fontSize:'.85rem'}}>
            {verHistorial ? 'Ocultar historial' : 'Ver historial'}
          </button>
        </div>
      </div>

      {verHistorial && (
        <div style={{marginBottom:'1.5rem'}}>
          <h3 style={{fontSize:'1rem', marginBottom:'.75rem'}}>Historial de pujas adjudicadas</h3>
          {historial.length === 0
            ? <div className="empty">Sin pujas resueltas aún.</div>
            : <table style={{width:'100%', fontSize:'.85rem'}}>
                <thead>
                  <tr>
                    <th style={{textAlign:'left'}}>Jugador</th>
                    <th style={{textAlign:'left'}}>Equipo adjudicado</th>
                    <th style={{textAlign:'right'}}>Cantidad</th>
                    <th style={{textAlign:'left', color:'var(--texto2)'}}>Fecha</th>
                  </tr>
                </thead>
                <tbody>
                  {historial.map(p => (
                    <tr key={p.id}>
                      <td style={{fontWeight:600}}>
                        <span className={`badge ${p.jugadores?.posicion}`} style={{marginRight:6}}>{p.jugadores?.posicion}</span>
                        {p.jugadores?.posicion === 'POR' ? `Portería ${p.jugadores?.equipo}` : p.jugadores?.nombre}
                      </td>
                      <td>{p.participantes?.nombre}</td>
                      <td style={{textAlign:'right', fontWeight:700, color:'var(--verde)'}}>{fmt(p.cantidad)}</td>
                      <td style={{color:'var(--texto2)', fontSize:'.78rem'}}>{new Date(p.created_at).toLocaleDateString('es-ES')}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
          <hr style={{margin:'1rem 0', borderColor:'var(--borde)'}} />
        </div>
      )}


      {porJugador.length === 0 && (
        <div className="empty">No hay pujas pendientes.</div>
      )}

      {porJugador.map(({ jugador, bids }) => (
        <div key={jugador?.id} style={{marginBottom:'1.5rem', borderBottom:'1px solid var(--borde)', paddingBottom:'1rem'}}>
          <div style={{display:'flex', alignItems:'center', gap:'.6rem', marginBottom:'.5rem'}}>
            <span className={`badge ${jugador?.posicion}`}>{jugador?.posicion}</span>
            <strong>{jugador?.posicion === 'POR' ? `Portería ${jugador?.equipo}` : jugador?.nombre}</strong>
            {jugador?.posicion !== 'POR' && <span style={{color:'var(--texto2)', fontSize:'.85rem'}}>{jugador?.equipo}</span>}
            <span style={{color:'var(--texto2)', fontSize:'.8rem', marginLeft:'auto'}}>{bids.length} puja{bids.length !== 1 ? 's' : ''}</span>
          </div>
          <table style={{width:'100%', marginBottom:'.5rem'}}>
            <thead>
              <tr>
                <th style={{textAlign:'left', fontSize:'.8rem', color:'var(--texto2)', fontWeight:600, paddingBottom:'.2rem'}}>Equipo</th>
                <th style={{textAlign:'right', fontSize:'.8rem', color:'var(--texto2)', fontWeight:600, paddingBottom:'.2rem'}}>Puja</th>
                <th style={{textAlign:'right', fontSize:'.8rem', color:'var(--texto2)', fontWeight:600, paddingBottom:'.2rem'}}>Dif. VM</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {bids.map((b, i) => {
                const dif = b.cantidad - (jugador?.valor_mercado || 0);
                return (
                  <tr key={b.id} style={{background: i === 0 ? '#f0fdf4' : ''}}>
                    <td style={{fontWeight: i===0 ? 700 : 400}}>
                      {i === 0 && <span style={{color:'#198754', marginRight:4}}>👑</span>}
                      {b.equipo}
                    </td>
                    <td style={{textAlign:'right', fontWeight: i===0 ? 700 : 400}}>{fmt(b.cantidad)}</td>
                    <td style={{textAlign:'right', fontSize:'.85rem',
                                color: dif >= 0 ? '#198754' : '#dc3545'}}>
                      {dif > 0 ? '+' : ''}{fmt(dif)}
                    </td>
                    <td style={{textAlign:'right'}}>
                      {i === 0 && (
                        <button onClick={() => resolver(jugador.id, b)}
                                disabled={resolviendo === jugador.id}
                                style={{padding:'.25rem .6rem', fontSize:'.8rem', borderRadius:6,
                                        border:'none', background:'#198754', color:'#fff',
                                        cursor:'pointer', fontWeight:600}}>
                          {resolviendo === jugador.id ? '…' : 'Adjudicar'}
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <button onClick={() => descartarPujas(jugador.id)}
                  style={{fontSize:'.78rem', color:'#dc3545', background:'none', border:'none',
                          cursor:'pointer', padding:0}}>
            Descartar todas las pujas de este jugador
          </button>
        </div>
      ))}
    </div>
  );
}

// ── ADMIN — CIERRES DE JORNADA ─────────────────────────────────
function AdminCierres({ federacion }) {
  const [jornada, setJornada] = useState(federacion?.jornada_actual || 1);
  const [cierre, setCierre]   = useState('');
  const [msg, setMsg]         = useState('');

  const fedId = federacion?.id;

  const cargar = () => {
    if (!sb || !fedId) return;
    sb.from('jornadas_cierre').select('cierre')
      .eq('federacion_id', fedId).eq('jornada', jornada).maybeSingle()
      .then(({ data }) => setCierre(data?.cierre ? data.cierre.slice(0, 16) : ''));
  };
  useEffect(cargar, [jornada, fedId]);

  const guardar = async () => {
    if (!sb || !fedId) return;
    if (!cierre) {
      await sb.from('jornadas_cierre').delete()
        .eq('federacion_id', fedId).eq('jornada', jornada);
      setMsg('Cierre eliminado');
    } else {
      await sb.from('jornadas_cierre')
        .upsert({ federacion_id: fedId, jornada, cierre: new Date(cierre).toISOString() },
                { onConflict: 'federacion_id,jornada' });
      setMsg('Cierre guardado');
    }
    setTimeout(() => setMsg(''), 3000);
  };

  return (
    <div className="card">
      <h2>Cierre de alineaciones por jornada</h2>
      <p style={{fontSize:'.9rem', color:'var(--texto2)', marginBottom:'1rem'}}>
        Establece la hora límite a partir de la cual los equipos no pueden modificar su alineación.
        Deja el campo vacío y guarda para eliminar el cierre de una jornada.
      </p>
      <div style={{display:'flex', gap:'1rem', alignItems:'flex-end', flexWrap:'wrap'}}>
        <div>
          <label style={{fontSize:'.85rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>Jornada</label>
          <select value={jornada} onChange={e => setJornada(Number(e.target.value))}
                  style={{padding:'.4rem .7rem', borderRadius:6, border:'1.5px solid var(--borde)'}}>
            {Array.from({length:38},(_,i)=>i+1).map(j =>
              <option key={j} value={j}>Jornada {j}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:'.85rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>
            Fecha y hora de cierre
          </label>
          <input type="datetime-local" value={cierre} onChange={e => setCierre(e.target.value)}
                 style={{padding:'.4rem .7rem', borderRadius:6, border:'1.5px solid var(--borde)'}} />
        </div>
        <button className="btn-ok" onClick={guardar}>Guardar</button>
        {msg && <span style={{color:'#198754', fontSize:'.9rem'}}>{msg}</span>}
      </div>
      {cierre && (
        <p style={{marginTop:'.8rem', fontSize:'.85rem', color:'var(--texto2)'}}>
          Cierre actual J{jornada}: <strong>{new Date(cierre).toLocaleString('es-ES')}</strong>
        </p>
      )}
    </div>
  );
}

// ── ADMIN — MERCADO (ventas + sorteo) ─────────────────────────
function AdminMercado({ federacion, onFederacionUpdate }) {
  const [ventas,     setVentas]     = useState(!!federacion?.ventas_habilitadas);
  const [sorteo,     setSorteo]     = useState(!!federacion?.sorteo_habilitado);
  const [ptsMod,     setPtsMod]     = useState(!!federacion?.puntos_mod_habilitado);
  const [horaCierre, setHoraCierre] = useState(federacion?.hora_cierre_pujas?.slice(0,5) || '');
  const [pctVenta,   setPctVenta]   = useState(federacion?.pct_venta_mercado ?? 100);
  const [msg, setMsg]               = useState('');

  const cambiar = async (campo, valor, setEstado) => {
    if (!sb || !federacion) return;
    const { error } = await sb.from('federaciones')
      .update({ [campo]: valor }).eq('id', federacion.id);
    if (error) { alert('Error al guardar: ' + error.message); return; }
    setEstado(valor);
    onFederacionUpdate({ ...federacion, [campo]: valor });
    setMsg('Guardado');
    setTimeout(() => setMsg(''), 2500);
  };

  const guardarHora = async () => {
    if (!sb || !federacion) return;
    const val = horaCierre || null;
    const { error } = await sb.from('federaciones')
      .update({ hora_cierre_pujas: val }).eq('id', federacion.id);
    if (error) { alert('Error al guardar: ' + error.message); return; }
    onFederacionUpdate({ ...federacion, hora_cierre_pujas: val });
    setMsg('Guardado');
    setTimeout(() => setMsg(''), 2500);
  };

  const guardarPctVenta = async () => {
    if (!sb || !federacion) return;
    const val = Math.max(1, Math.min(100, Number(pctVenta) || 100));
    setPctVenta(val);
    const { error } = await sb.from('federaciones')
      .update({ pct_venta_mercado: val }).eq('id', federacion.id);
    if (error) { alert('Error al guardar: ' + error.message); return; }
    onFederacionUpdate({ ...federacion, pct_venta_mercado: val });
    setMsg('Guardado');
    setTimeout(() => setMsg(''), 2500);
  };


  const Opcion = ({ label, desc, activo, onChange }) => (
    <div style={{display:'flex', alignItems:'flex-start', gap:'1rem',
                 padding:'1rem 0', borderBottom:'1px solid var(--borde)'}}>
      <div style={{flex:1}}>
        <div style={{fontWeight:700, marginBottom:'.2rem'}}>{label}</div>
        <div style={{fontSize:'.85rem', color:'var(--texto2)'}}>{desc}</div>
      </div>
      <div style={{display:'flex', alignItems:'center', gap:'.6rem', flexShrink:0}}>
        <span style={{fontSize:'.85rem', fontWeight:600,
                      color: activo ? 'var(--verde)' : 'var(--texto2)'}}>
          {activo ? 'Activado' : 'Desactivado'}
        </span>
        <button className={activo ? 'btn-cancel' : 'btn-ok'} onClick={() => onChange(!activo)}>
          {activo ? 'Desactivar' : 'Activar'}
        </button>
      </div>
    </div>
  );

  return (
    <div className="card">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'.25rem'}}>
        <h2 style={{margin:0}}>Mercado</h2>
        {msg && <span style={{color:'var(--verde)', fontSize:'.88rem', fontWeight:600}}>{msg}</span>}
      </div>
      <Opcion
        label="Venta de jugadores"
        desc="Permite a los equipos vender jugadores de su plantilla y recibir su valor de mercado."
        activo={ventas}
        onChange={v => cambiar('ventas_habilitadas', v, setVentas)}
      />
      <Opcion
        label="Sorteo aleatorio"
        desc="Permite a cada equipo rellenar su plantilla con jugadores libres elegidos al azar, pagando su valor de mercado."
        activo={sorteo}
        onChange={v => cambiar('sorteo_habilitado', v, setSorteo)}
      />
      <Opcion
        label="Moderadores pueden introducir puntos"
        desc="Permite a los moderadores acceder a la pestaña 'Pts Jugadores' en Admin."
        activo={ptsMod}
        onChange={v => cambiar('puntos_mod_habilitado', v, setPtsMod)}
      />
      <div style={{display:'flex', alignItems:'center', gap:'1rem',
                   padding:'1rem 0', flexWrap:'wrap'}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700, marginBottom:'.2rem'}}>Hora de cierre automático de pujas</div>
          <div style={{fontSize:'.85rem', color:'var(--texto2)'}}>
            Cada día a esta hora se resuelven automáticamente todas las pujas: el equipo que más
            dinero haya pujado se lleva al jugador. Solo activo cuando el mercado está habilitado.
            Deja en blanco para desactivar.
          </div>
        </div>
        <div style={{display:'flex', gap:'.5rem', alignItems:'center', flexShrink:0}}>
          <input type="time" value={horaCierre} onChange={e => setHoraCierre(e.target.value)}
                 style={{padding:'.45rem .7rem', borderRadius:8,
                         border:'1.5px solid var(--borde)', fontSize:'.95rem'}} />
          <button className="btn-ok" onClick={guardarHora}>Guardar</button>
        </div>
      </div>

      <div style={{display:'flex', alignItems:'center', gap:'1rem',
                   padding:'1rem 0', flexWrap:'wrap'}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700, marginBottom:'.2rem'}}>Porcentaje de recuperación al vender</div>
          <div style={{fontSize:'.85rem', color:'var(--texto2)'}}>
            Porcentaje del valor de mercado que recibe el equipo al vender un jugador al mercado.
            100 % = recupera el valor íntegro. Valores inferiores suponen una penalización por venta.
          </div>
        </div>
        <div style={{display:'flex', gap:'.5rem', alignItems:'center', flexShrink:0}}>
          <div style={{display:'flex', alignItems:'center', gap:'.3rem'}}>
            <input type="number" min={1} max={100} value={pctVenta}
                   onChange={e => setPctVenta(e.target.value)}
                   style={{width:70, padding:'.45rem .7rem', borderRadius:8,
                           border:'1.5px solid var(--borde)', fontSize:'.95rem',
                           textAlign:'center'}} />
            <span style={{fontWeight:700, fontSize:'.95rem'}}>%</span>
          </div>
          <button className="btn-ok" onClick={guardarPctVenta}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN — MI FEDERACIÓN ──────────────────────────────────────
function AdminFederacion({ federacion, onFederacionUpdate, participantes = [], onParticipantesChange }) {
  const [nombre, setNombre]       = useState(federacion?.nombre || '');
  const [presup, setPresup]       = useState(String(federacion?.presupuesto_inicial ?? 100000000));
  const [jornada, setJornada]     = useState(String(federacion?.jornada_actual ?? 1));
  const [msg, setMsg]             = useState('');
  const [copiado, setCopiado]     = useState(false);
  const [nuevoEq, setNuevoEq]     = useState({ nombre:'', estadio:'', entrenador:'' });
  const [msgEq, setMsgEq]         = useState('');
  const [eliminando, setEliminando] = useState(null);
  const [subiendo, setSubiendo]   = useState(false);

  const [mods, setMods]       = useState([]);   // [{id, participante_id}]
  const [selMod, setSelMod]   = useState('');
  const [msgMod, setMsgMod]   = useState('');

  const cargarMods = async () => {
    if (!federacion) return;
    const { data } = await sb.from('moderadores').select('id, participante_id')
      .eq('federacion_id', federacion.id);
    setMods(data || []);
  };

  useEffect(() => { cargarMods(); }, [federacion?.id]);

  const añadirModerador = async () => {
    if (!selMod) { setMsgMod('Selecciona un equipo'); return; }
    const { error } = await sb.from('moderadores')
      .insert({ federacion_id: federacion.id, participante_id: selMod });
    if (error) { setMsgMod('Error: ' + error.message); return; }
    setSelMod('');
    setMsgMod('Moderador añadido');
    setTimeout(() => setMsgMod(''), 2500);
    cargarMods();
  };

  const quitarModerador = async (modId) => {
    await sb.from('moderadores').delete().eq('id', modId);
    cargarMods();
  };

  const modPids  = new Set(mods.map(m => m.participante_id));
  // Candidatos: equipos de la federación que tienen usuario, no son admin, y no son ya moderadores
  const candidatos = participantes.filter(p => p.user_id && p.user_id !== federacion?.admin_user_id && !modPids.has(p.id));

  const copiar = () => {
    navigator.clipboard.writeText(federacion?.codigo || '').then(() => {
      setCopiado(true);
      setTimeout(() => setCopiado(false), 2000);
    }).catch(() => {});
  };

  const guardar = async () => {
    if (!sb || !federacion) return;
    const { error, data } = await sb.from('federaciones')
      .update({
        nombre:              nombre.trim() || federacion.nombre,
        presupuesto_inicial: parseFloat(presup) || federacion.presupuesto_inicial,
        jornada_actual:      parseInt(jornada)  || federacion.jornada_actual,
      })
      .eq('id', federacion.id)
      .select().single();
    if (error) { alert('Error: ' + error.message); return; }
    onFederacionUpdate(data);
    setMsg('Guardado correctamente');
    setTimeout(() => setMsg(''), 3000);
  };

  const subirLogo = async (file) => {
    if (!file || !sb || !federacion) return;
    setSubiendo(true);
    const ext  = file.name.split('.').pop().toLowerCase();
    const path = `${federacion.id}/logo.${ext}`;
    const { error: upErr } = await sb.storage
      .from('logos-federacion')
      .upload(path, file, { upsert: true, contentType: file.type });
    if (upErr) { alert('Error al subir imagen: ' + upErr.message); setSubiendo(false); return; }
    const { data: { publicUrl } } = sb.storage.from('logos-federacion').getPublicUrl(path);
    // Añadir timestamp para forzar refresco de caché del navegador
    const urlFinal = publicUrl + '?t=' + Date.now();
    const { error, data } = await sb.from('federaciones')
      .update({ logo_url: urlFinal })
      .eq('id', federacion.id).select().single();
    if (error) { alert('Error: ' + error.message); setSubiendo(false); return; }
    onFederacionUpdate(data);
    setSubiendo(false);
    setMsg('Logo actualizado');
    setTimeout(() => setMsg(''), 3000);
  };

  const quitarLogo = async () => {
    if (!sb || !federacion) return;
    const { error, data } = await sb.from('federaciones')
      .update({ logo_url: null })
      .eq('id', federacion.id).select().single();
    if (error) { alert('Error: ' + error.message); return; }
    onFederacionUpdate(data);
    setMsg('Logo eliminado');
    setTimeout(() => setMsg(''), 3000);
  };

  return (
    <>
    <div className="card">
      <h2>Mi Federación</h2>

      {/* ── Logo de la federación ── */}
      <div style={{marginBottom:'1.25rem'}}>
        <div style={{fontSize:'.82rem', color:'var(--texto2)', marginBottom:'.5rem', fontWeight:600}}>
          Logo de la liga
        </div>
        <div style={{display:'flex', alignItems:'center', gap:'1rem', flexWrap:'wrap'}}>
          {federacion?.logo_url
            ? <img src={federacion.logo_url} alt="Logo"
                   style={{height:56, maxWidth:120, objectFit:'contain',
                           border:'1.5px solid var(--borde)', borderRadius:8, padding:4, background:'#fff'}} />
            : <div style={{height:56, width:56, borderRadius:8, border:'1.5px dashed var(--borde)',
                           display:'flex', alignItems:'center', justifyContent:'center',
                           fontSize:'.75rem', color:'var(--texto2)'}}>Sin logo</div>
          }
          <div style={{display:'flex', flexDirection:'column', gap:'.4rem'}}>
            <label style={{display:'inline-block', padding:'.35rem .9rem', borderRadius:8,
                           border:'1.5px solid var(--verde)', background:'#fff', color:'var(--verde)',
                           cursor: subiendo ? 'wait' : 'pointer', fontWeight:600, fontSize:'.85rem',
                           opacity: subiendo ? .6 : 1}}>
              {subiendo ? 'Subiendo…' : 'Subir imagen'}
              <input type="file" accept="image/*" style={{display:'none'}} disabled={subiendo}
                     onChange={e => { if (e.target.files[0]) subirLogo(e.target.files[0]); e.target.value = ''; }} />
            </label>
            {federacion?.logo_url && (
              <button onClick={quitarLogo}
                      style={{padding:'.3rem .75rem', borderRadius:8, border:'1.5px solid #d93025',
                              background:'#fff', color:'#d93025', cursor:'pointer', fontSize:'.82rem', fontWeight:600}}>
                Quitar logo
              </button>
            )}
          </div>
          <div style={{fontSize:'.78rem', color:'var(--texto2)'}}>
            Se mostrará en la esquina superior izquierda.<br/>
            Formatos: PNG, JPG, SVG. Recomendado: fondo transparente.
          </div>
        </div>
      </div>

      <div style={{background:'var(--gris)', borderRadius:10, padding:'1rem 1.25rem', marginBottom:'1.25rem'}}>
        <div style={{fontSize:'.82rem', color:'var(--texto2)', marginBottom:'.35rem', fontWeight:600}}>
          Código de invitación — compártelo con tus amigos
        </div>
        <div style={{display:'flex', alignItems:'center', gap:'1rem'}}>
          <span style={{fontSize:'1.8rem', fontWeight:800, letterSpacing:'.18em', color:'var(--verde)'}}>
            {federacion?.codigo}
          </span>
          <button onClick={copiar}
                  style={{padding:'.35rem .9rem', borderRadius:8, border:'1.5px solid var(--verde)',
                          background:'#fff', color:'var(--verde)', cursor:'pointer', fontWeight:600, fontSize:'.85rem'}}>
            {copiado ? '✓ Copiado' : 'Copiar'}
          </button>
        </div>
        <div style={{fontSize:'.8rem', color:'var(--texto2)', marginTop:'.4rem'}}>
          Para unirse: nombre de la federación + este código
        </div>
      </div>

      <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'flex-end'}}>
        <div style={{flex:2, minWidth:180}}>
          <label style={{fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>
            Nombre de la federación
          </label>
          <input value={nombre} onChange={e => setNombre(e.target.value)}
                 style={{width:'100%', padding:'.45rem .7rem', borderRadius:8,
                         border:'1.5px solid var(--borde)', fontSize:'.95rem'}} />
        </div>
        <div style={{minWidth:140}}>
          <label style={{fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>
            Presupuesto inicial (€)
          </label>
          <input type="number" value={presup} onChange={e => setPresup(e.target.value)}
                 style={{width:'100%', padding:'.45rem .7rem', borderRadius:8,
                         border:'1.5px solid var(--borde)', fontSize:'.95rem'}} />
        </div>
        <div style={{minWidth:100}}>
          <label style={{fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>
            Jornada actual
          </label>
          <input type="number" min="1" max="38" value={jornada} onChange={e => setJornada(e.target.value)}
                 style={{width:'100%', padding:'.45rem .7rem', borderRadius:8,
                         border:'1.5px solid var(--borde)', fontSize:'.95rem'}} />
        </div>
        <button className="btn-ok" onClick={guardar}>Guardar</button>
        {msg && <span style={{color:'var(--verde)', fontWeight:600, fontSize:'.9rem'}}>{msg}</span>}
      </div>
    </div>

    {/* ── Equipos de la federación ── */}
    <div className="card">
      <h2>Equipos de la federación</h2>
      {participantes.length > 0 && (
        <table style={{marginBottom:'1rem'}}>
          <thead>
            <tr><th>Equipo</th><th>Usuario</th><th></th></tr>
          </thead>
          <tbody>
            {participantes.map(p => (
              <tr key={p.id}>
                <td style={{fontWeight:600}}>{p.nombre}</td>
                <td style={{color:'var(--texto2)', fontSize:'.85rem'}}>
                  {p.user_id ? 'Registrado' : 'Sin usuario'}
                </td>
                <td style={{textAlign:'right'}}>
                  <button disabled={eliminando === p.id}
                          onClick={async () => {
                            if (!confirm(`¿Eliminar "${p.nombre}"? Se borrará también su plantilla, alineaciones, pujas e historial de puntos.`)) return;
                            setEliminando(p.id);
                            const { error, count } = await sb.from('participantes')
                              .delete({ count: 'exact' }).eq('id', p.id);
                            setEliminando(null);
                            if (error) {
                              alert('Error al eliminar: ' + error.message);
                              return;
                            }
                            if (!count) {
                              alert('No se ha podido eliminar el equipo. Puede que falten permisos (RLS) en Supabase — revisa que se haya ejecutado supabase_admin_liga.sql.');
                              return;
                            }
                            onParticipantesChange?.();
                          }}
                          style={{background:'none', border:'none', color:'#dc3545',
                                  cursor:'pointer', fontSize:'.82rem'}}>
                    Eliminar
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
      <p style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'.75rem'}}>
        Añade un equipo sin usuario (para completar la liga, bots, etc.).
      </p>
      {msgEq && (
        <div style={{color: msgEq.includes('Error') ? '#dc3545' : 'var(--verde)',
                     fontWeight:600, marginBottom:'.75rem', fontSize:'.88rem'}}>
          {msgEq}
        </div>
      )}
      <div style={{display:'flex', gap:'.5rem', flexWrap:'wrap'}}>
        <input placeholder="Nombre del equipo *" value={nuevoEq.nombre}
               onChange={e => setNuevoEq(p => ({...p, nombre: e.target.value}))}
               style={{flex:1, minWidth:150, padding:'.4rem .7rem',
                       border:'1.5px solid var(--borde)', borderRadius:8}} />
        <input placeholder="Estadio" value={nuevoEq.estadio}
               onChange={e => setNuevoEq(p => ({...p, estadio: e.target.value}))}
               style={{flex:1, minWidth:120, padding:'.4rem .7rem',
                       border:'1.5px solid var(--borde)', borderRadius:8}} />
        <input placeholder="Entrenador" value={nuevoEq.entrenador}
               onChange={e => setNuevoEq(p => ({...p, entrenador: e.target.value}))}
               style={{flex:1, minWidth:120, padding:'.4rem .7rem',
                       border:'1.5px solid var(--borde)', borderRadius:8}} />
        <button className="btn-ok" onClick={async () => {
          if (!nuevoEq.nombre.trim()) { setMsgEq('El nombre es obligatorio'); return; }
          const { error } = await sb.from('participantes').insert({
            nombre:        nuevoEq.nombre.trim(),
            federacion_id: federacion.id,
            presupuesto:   federacion.presupuesto_inicial ?? 100000000,
            estadio:       nuevoEq.estadio.trim()    || null,
            entrenador:    nuevoEq.entrenador.trim() || null,
          });
          if (error) { setMsgEq('Error: ' + error.message); return; }
          publicar(federacion.id, 'admin', `Nuevo equipo creado: ${nuevoEq.nombre.trim()}`);
          setNuevoEq({ nombre:'', estadio:'', entrenador:'' });
          setMsgEq('Equipo creado');
          setTimeout(() => setMsgEq(''), 2500);
          onParticipantesChange?.();
        }}>Crear equipo</button>
      </div>
    </div>

    {/* ── Moderadores ── */}
    <div className="card">
      <h2>Moderadores</h2>
      <p style={{fontSize:'.84rem', color:'var(--texto2)', marginBottom:'1rem'}}>
        Los moderadores pueden gestionar clasificaciones, presupuestos, pujas, cierres y competiciones, pero no la configuración de la federación ni el mercado.
      </p>

      {mods.length > 0 && (
        <table style={{marginBottom:'1rem'}}>
          <thead><tr><th>Equipo</th><th></th></tr></thead>
          <tbody>
            {mods.map(m => {
              const p = participantes.find(x => x.id === m.participante_id);
              return (
                <tr key={m.id}>
                  <td style={{fontWeight:600}}>{p?.nombre || '?'}</td>
                  <td style={{textAlign:'right'}}>
                    <button onClick={() => quitarModerador(m.id)}
                            style={{background:'none', border:'none', color:'#dc3545',
                                    cursor:'pointer', fontSize:'.82rem'}}>
                      Quitar
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
      {mods.length === 0 && (
        <p style={{fontSize:'.85rem', color:'var(--texto2)', marginBottom:'1rem'}}>
          Sin moderadores asignados.
        </p>
      )}
      {msgMod && (
        <div style={{color: msgMod.includes('Error') ? '#dc3545' : 'var(--verde)',
                     fontWeight:600, marginBottom:'.75rem', fontSize:'.88rem'}}>
          {msgMod}
        </div>
      )}
      <div style={{display:'flex', gap:'.5rem', alignItems:'center', flexWrap:'wrap'}}>
        <select value={selMod} onChange={e => setSelMod(e.target.value)}
                style={{flex:1, minWidth:180, padding:'.4rem .7rem',
                        border:'1.5px solid var(--borde)', borderRadius:8, fontSize:'.9rem'}}>
          <option value="">Seleccionar equipo…</option>
          {candidatos.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
        </select>
        <button className="btn-ok" onClick={añadirModerador} disabled={!selMod}>
          Añadir moderador
        </button>
      </div>
      {candidatos.length === 0 && participantes.filter(p => p.user_id).length === 0 && (
        <p style={{fontSize:'.8rem', color:'var(--texto2)', marginTop:'.5rem'}}>
          Solo equipos con usuario registrado pueden ser moderadores.
        </p>
      )}
    </div>
    </>
  );
}

// ── ADMIN — PANEL PRINCIPAL ────────────────────────────────────
// ── ADMIN EQUIPOS — editar plantilla, pts y penalizaciones ─────
function AdminEquipos({ participantes, federacion, onParticipantesChange }) {
  const [selId, setSelId]         = useState(participantes[0]?.id || '');
  const [subtab, setSubtab]       = useState('plantilla');
  const [plantilla, setPlantilla] = useState(null);
  const [presupuesto, setPresupuesto] = useState(null);
  const [clas, setClas]           = useState([]);
  const [editPrecios, setEditPrecios] = useState({});
  const [jornadaEdit, setJornadaEdit] = useState(1);
  const [ptsEdit, setPtsEdit]     = useState('');
  const [penTipo, setPenTipo]     = useState('presupuesto');
  const [penCantidad, setPenCantidad] = useState('');
  const [penMotivo, setPenMotivo] = useState('');
  const [msg, setMsg]             = useState('');
  const [divisiones, setDivisiones] = useState([]);

  const flash = txt => { setMsg(txt); setTimeout(() => setMsg(''), 3000); };

  useEffect(() => {
    if (!sb) return;
    sb.from('divisiones').select('id, nombre').order('id')
      .then(({ data }) => setDivisiones(data || []));
  }, []);

  const cambiarDivision = async (nuevoId) => {
    await sb.from('participantes').update({ division_id: Number(nuevoId) }).eq('id', selId);
    onParticipantesChange?.();
    flash('División actualizada');
  };

  const cargar = async () => {
    if (!sb || !selId) return;
    setPlantilla(null);
    const [{ data: pl }, { data: pd }, { data: cl }] = await Promise.all([
      sb.from('plantillas').select('id, precio_compra, jugadores(id, nombre, equipo, posicion, valor_mercado)').eq('participante_id', selId).order('jugadores(posicion)'),
      sb.from('participantes').select('presupuesto').eq('id', selId).single(),
      sb.from('clasificacion').select('jornada, puntos_jornada').eq('participante_id', selId).order('jornada'),
    ]);
    setPlantilla(pl || []);
    setPresupuesto(pd?.presupuesto ?? null);
    setClas(cl || []);
    const precios = {};
    (pl || []).forEach(r => { precios[r.id] = String(r.precio_compra || 0); });
    setEditPrecios(precios);
  };

  useEffect(() => { cargar(); }, [selId]);

  // Guardar precio de compra de todos los jugadores
  const guardarPrecios = async () => {
    for (const [rowId, val] of Object.entries(editPrecios)) {
      await sb.from('plantillas').update({ precio_compra: Number(val) || 0 }).eq('id', rowId);
    }
    flash('Precios guardados');
  };

  // Liberar jugador (eliminar de plantilla)
  const liberarJugador = async (rowId, nombreJug) => {
    if (!confirm(`¿Liberar a ${nombreJug}?`)) return;
    const row = plantilla.find(r => r.id === rowId);
    const valor = row?.precio_compra || 0;
    const posicion = row?.jugadores?.posicion || '';
    const equipoReal = row?.jugadores?.equipo || '';
    await sb.from('plantillas').delete().eq('id', rowId);
    await sb.from('participantes').update({ presupuesto: (presupuesto || 0) + valor }).eq('id', selId);
    // Tablón
    const textoJug = posicion === 'POR' ? `Portería ${equipoReal}` : `${nombreJug} (${equipoReal})`;
    publicar(
      federacion?.id,
      'venta',
      `${equipo?.nombre} libera a ${textoJug} al mercado — precio de compra: ${fmt(valor)} (acción del administrador)`
    );
    onParticipantesChange?.();
    cargar();
    flash('Jugador liberado');
  };

  // Modificar puntos de una jornada
  const guardarPts = async () => {
    if (ptsEdit === '') return;
    const pts = Number(ptsEdit);
    await sb.from('clasificacion').upsert({ participante_id: selId, jornada: jornadaEdit, puntos_jornada: pts }, { onConflict: 'participante_id,jornada' });
    cargar();
    flash(`Jornada ${jornadaEdit} → ${pts} pts guardado`);
  };

  // Eliminar fila de jornada
  const borrarPts = async (jornada) => {
    await sb.from('clasificacion').delete().eq('participante_id', selId).eq('jornada', jornada);
    cargar();
  };

  // Añadir penalización
  const aplicarPenalizacion = async () => {
    const cant = Number(penCantidad);
    if (!cant) { flash('Introduce una cantidad válida'); return; }
    if (penTipo === 'presupuesto') {
      const nuevo = (presupuesto || 0) - cant;
      await sb.from('participantes').update({ presupuesto: nuevo }).eq('id', selId);
      onParticipantesChange?.();
      cargar();
      publicar(federacion?.id, 'penalizacion', `${equipo?.nombre} recibe penalización de presupuesto: -${fmt(cant)}${penMotivo ? ` (${penMotivo})` : ''}`);
      flash(`Penalización de ${fmt(cant)} aplicada al presupuesto`);
    } else {
      const jornadaActual = clas.length > 0 ? Math.max(...clas.map(r => r.jornada)) : 1;
      const actual = clas.find(r => r.jornada === jornadaActual)?.puntos_jornada || 0;
      await sb.from('clasificacion').upsert({ participante_id: selId, jornada: jornadaActual, puntos_jornada: actual - cant }, { onConflict: 'participante_id,jornada' });
      cargar();
      publicar(federacion?.id, 'penalizacion', `${equipo?.nombre} recibe penalización de puntos: -${cant} pts${penMotivo ? ` (${penMotivo})` : ''}`);
      flash(`Penalización de ${cant} pts aplicada en jornada ${jornadaActual}`);
    }
    setPenCantidad(''); setPenMotivo('');
  };

  const equipo = participantes.find(p => p.id === selId);
  const totalPts = clas.reduce((s, r) => s + (r.puntos_jornada || 0), 0);

  return (
    <div>
      <div className="card">
        <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'center', marginBottom:'1rem'}}>
          <label style={{fontWeight:600}}>Equipo:</label>
          <select value={selId} onChange={e => setSelId(e.target.value)}
                  style={{padding:'.35rem .6rem', borderRadius:8, border:'1.5px solid var(--borde)'}}>
            {participantes.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
          {divisiones.length > 0 && (
            <div style={{display:'flex', gap:'.4rem', alignItems:'center'}}>
              <label style={{fontWeight:600, fontSize:'.9rem'}}>División:</label>
              <select value={equipo?.division_id || ''}
                      onChange={e => cambiarDivision(e.target.value)}
                      style={{padding:'.3rem .5rem', borderRadius:8, border:'1.5px solid var(--borde)', fontSize:'.85rem'}}>
                {divisiones.map(d => <option key={d.id} value={d.id}>{d.nombre}</option>)}
              </select>
            </div>
          )}
          {presupuesto !== null && (
            <span style={{fontSize:'.9rem', color:'var(--verde)', fontWeight:700}}>
              Presupuesto: {fmt(presupuesto)}
            </span>
          )}
          {clas.length > 0 && (
            <span style={{fontSize:'.9rem', fontWeight:700}}>
              Pts totales: {totalPts}
            </span>
          )}
        </div>
        <div className="tabs" style={{marginBottom:0}}>
          {[['plantilla','Plantilla'],['puntos','Puntos por jornada'],['penalizaciones','Penalizaciones']].map(([k,l]) => (
            <button key={k} className={`tab ${subtab===k?'active':''}`} onClick={() => setSubtab(k)}>{l}</button>
          ))}
        </div>
      </div>

      {msg && <div style={{background:'#d1e7dd', color:'#0a3622', padding:'.5rem 1rem', borderRadius:8, marginBottom:'.5rem', fontSize:'.85rem'}}>{msg}</div>}

      {subtab === 'plantilla' && (
        <div className="card">
          <h3 style={{marginBottom:'1rem'}}>Plantilla — {equipo?.nombre}</h3>
          {plantilla === null ? <Spinner /> : plantilla.length === 0
            ? <div className="empty">Plantilla vacía.</div>
            : <>
                <table>
                  <thead><tr><th>Jugador</th><th>Pos</th><th>Equipo real</th><th style={{textAlign:'right'}}>Precio compra</th><th></th></tr></thead>
                  <tbody>
                    {plantilla.map(r => (
                      <tr key={r.id}>
                        <td style={{fontWeight:600}}>{r.jugadores?.posicion === 'POR' ? r.jugadores?.equipo : r.jugadores?.nombre}</td>
                        <td><span className={`badge ${r.jugadores?.posicion}`}>{r.jugadores?.posicion}</span></td>
                        <td style={{color:'var(--texto2)'}}>{r.jugadores?.posicion !== 'POR' ? r.jugadores?.equipo : ''}</td>
                        <td style={{textAlign:'right'}}>
                          <input type="number" value={editPrecios[r.id] ?? ''} min="0"
                                 onChange={e => setEditPrecios(p => ({...p, [r.id]: e.target.value}))}
                                 style={{width:100, padding:'.25rem .4rem', borderRadius:6, border:'1.5px solid var(--borde)', textAlign:'right'}} />
                        </td>
                        <td>
                          <button onClick={() => liberarJugador(r.id, r.jugadores?.posicion === 'POR' ? r.jugadores?.equipo : r.jugadores?.nombre)}
                                  style={{padding:'.25rem .6rem', borderRadius:6, border:'1.5px solid #dc3545', background:'#fff', color:'#dc3545', cursor:'pointer', fontSize:'.8rem'}}>
                            Liberar
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <button className="btn-ok" style={{marginTop:'1rem'}} onClick={guardarPrecios}>Guardar precios</button>
              </>
          }
        </div>
      )}

      {subtab === 'puntos' && (
        <div className="card">
          <h3 style={{marginBottom:'1rem'}}>Puntos por jornada — {equipo?.nombre}</h3>
          <div style={{display:'flex', gap:'1rem', alignItems:'center', marginBottom:'1.25rem', flexWrap:'wrap'}}>
            <div style={{display:'flex', gap:'.5rem', alignItems:'center'}}>
              <label>Jornada:</label>
              <select value={jornadaEdit} onChange={e => setJornadaEdit(Number(e.target.value))}
                      style={{padding:'.3rem .5rem', borderRadius:8, border:'1.5px solid var(--borde)'}}>
                {Array.from({length:38},(_,i)=>i+1).map(j => <option key={j} value={j}>J{j}</option>)}
              </select>
            </div>
            <div style={{display:'flex', gap:'.5rem', alignItems:'center'}}>
              <label>Pts:</label>
              <input type="number" value={ptsEdit} onChange={e => setPtsEdit(e.target.value)}
                     style={{width:80, padding:'.3rem .5rem', borderRadius:8, border:'1.5px solid var(--borde)', textAlign:'right'}} />
            </div>
            <button className="btn-ok" onClick={guardarPts}>Guardar</button>
          </div>
          {clas.length === 0
            ? <div className="empty">Sin datos de clasificación.</div>
            : <table>
                <thead><tr><th>Jornada</th><th style={{textAlign:'right'}}>Pts</th><th></th></tr></thead>
                <tbody>
                  {clas.map(r => (
                    <tr key={r.jornada}>
                      <td>J{r.jornada}</td>
                      <td style={{textAlign:'right', fontWeight:600}}>{r.puntos_jornada}</td>
                      <td>
                        <button onClick={() => borrarPts(r.jornada)}
                                style={{padding:'.2rem .5rem', borderRadius:6, border:'1.5px solid #dc3545', background:'#fff', color:'#dc3545', cursor:'pointer', fontSize:'.8rem'}}>
                          Borrar
                        </button>
                      </td>
                    </tr>
                  ))}
                  <tr style={{fontWeight:700, borderTop:'2px solid var(--borde)'}}>
                    <td>Total</td>
                    <td style={{textAlign:'right'}}>{totalPts}</td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
          }
        </div>
      )}

      {subtab === 'penalizaciones' && (
        <div className="card">
          <h3 style={{marginBottom:'1rem'}}>Añadir penalización — {equipo?.nombre}</h3>
          <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'flex-end'}}>
            <div>
              <label style={{fontSize:'.82rem', display:'block', marginBottom:'.3rem'}}>Tipo</label>
              <select value={penTipo} onChange={e => setPenTipo(e.target.value)}
                      style={{padding:'.35rem .6rem', borderRadius:8, border:'1.5px solid var(--borde)'}}>
                <option value="presupuesto">Presupuesto</option>
                <option value="puntos">Puntos</option>
              </select>
            </div>
            <div>
              <label style={{fontSize:'.82rem', display:'block', marginBottom:'.3rem'}}>
                Cantidad ({penTipo === 'presupuesto' ? '€' : 'pts'})
              </label>
              <input type="number" min="0" value={penCantidad} onChange={e => setPenCantidad(e.target.value)}
                     style={{width:100, padding:'.35rem .5rem', borderRadius:8, border:'1.5px solid var(--borde)'}} />
            </div>
            <div style={{flex:1, minWidth:160}}>
              <label style={{fontSize:'.82rem', display:'block', marginBottom:'.3rem'}}>Motivo (opcional)</label>
              <input value={penMotivo} onChange={e => setPenMotivo(e.target.value)}
                     style={{width:'100%', padding:'.35rem .5rem', borderRadius:8, border:'1.5px solid var(--borde)'}} />
            </div>
            <button className="btn-ok" style={{background:'#dc3545'}} onClick={aplicarPenalizacion}>
              Aplicar penalización
            </button>
          </div>
          <p style={{fontSize:'.8rem', color:'var(--texto2)', marginTop:'1rem'}}>
            La penalización de presupuesto reduce directamente el presupuesto disponible del equipo.<br/>
            La penalización de puntos se descuenta de la última jornada con datos.
          </p>
        </div>
      )}
    </div>
  );
}

// ── OFERTAS ENTRE EQUIPOS ──────────────────────────────────────
function Ofertas({ miParticipanteId, participantes, federacion, isAdmin, onBadgeChange }) {
  const [subtab, setSubtab]         = useState('recibidas');
  const [recibidas, setRecibidas]   = useState(null);
  const [enviadas, setEnviadas]     = useState(null);
  const [rechazModal, setRechazModal] = useState(null);
  const [msgRechazo, setMsgRechazo] = useState('');
  const [editModal, setEditModal]   = useState(null);
  const [editCant, setEditCant]     = useState('');
  const [procesando, setProcesando] = useState(null);
  const [msg, setMsg]               = useState('');

  const cargar = async () => {
    if (!sb || !miParticipanteId) return;
    const [{ data: rec }, { data: env }] = await Promise.all([
      sb.from('ofertas_jugadores')
        .select('id, cantidad, estado, mensaje, leida, created_at, jugadores(id,nombre,equipo,posicion,valor_mercado), ofertante:ofertante_id(id,nombre,presupuesto)')
        .eq('propietario_id', miParticipanteId)
        .order('created_at', { ascending: false }),
      sb.from('ofertas_jugadores')
        .select('id, cantidad, estado, mensaje, leida, created_at, jugadores(id,nombre,equipo,posicion,valor_mercado), propietario:propietario_id(id,nombre)')
        .eq('ofertante_id', miParticipanteId)
        .order('created_at', { ascending: false }),
    ]);
    setRecibidas(rec || []);
    setEnviadas(env || []);
    // Marcar recibidas pendientes como leídas
    const sinLeer = (rec || []).filter(o => !o.leida && o.estado === 'pendiente').map(o => o.id);
    if (sinLeer.length > 0) {
      await sb.from('ofertas_jugadores').update({ leida: true }).in('id', sinLeer);
      onBadgeChange && onBadgeChange();
    }
  };

  useEffect(() => { cargar(); }, [miParticipanteId]);

  const ERR_MSGS = {
    presupuesto_insuficiente: 'El equipo ofertante no tiene presupuesto suficiente.',
    sin_permiso:              'No tienes permiso para aceptar esta oferta.',
    oferta_no_pendiente:      'Esta oferta ya no está pendiente.',
    oferta_no_encontrada:     'Oferta no encontrada.',
  };

  const aceptar = async (oferta) => {
    setProcesando(oferta.id); setMsg('');
    const { data, error } = await sb.rpc('aceptar_oferta', { p_oferta_id: oferta.id });
    if (error || !data?.ok) {
      setMsg(ERR_MSGS[data?.error] || error?.message || 'Error al aceptar la oferta.');
      setProcesando(null);
      return;
    }
    setProcesando(null);
    cargar();
    onBadgeChange && onBadgeChange();
  };

  const rechazar = async () => {
    if (!rechazModal) return;
    setProcesando(rechazModal.id);
    await sb.from('ofertas_jugadores')
      .update({ estado: 'rechazada', mensaje: msgRechazo.trim() || null })
      .eq('id', rechazModal.id);
    setProcesando(null);
    setRechazModal(null); setMsgRechazo('');
    cargar();
    onBadgeChange && onBadgeChange();
  };

  const editar = async () => {
    if (!editModal) return;
    const cant = Number(editCant);
    if (!cant || cant <= 0) { setMsg('Introduce una cantidad válida.'); return; }
    setProcesando(editModal.id);
    await sb.from('ofertas_jugadores')
      .update({ cantidad: cant, leida: false })
      .eq('id', editModal.id);
    setProcesando(null);
    setEditModal(null);
    cargar();
  };

  const retirar = async (id) => {
    if (!window.confirm('¿Retirar esta oferta?')) return;
    await sb.from('ofertas_jugadores').delete().eq('id', id);
    cargar();
  };

  const fmtFecha = ts => new Date(ts).toLocaleDateString('es-ES', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });

  const ESTADO_BADGE = {
    pendiente:  { label: 'Pendiente', color: '#fd7e14' },
    aceptada:   { label: 'Aceptada',  color: '#198754' },
    rechazada:  { label: 'Rechazada', color: '#dc3545' },
  };

  const renderOferta = (o, esRecibida) => {
    const jug      = o.jugadores || {};
    const nomJug   = jug.posicion === 'POR' ? `Portería ${jug.equipo}` : jug.nombre;
    const contraparte = esRecibida ? o.ofertante : o.propietario;
    const est      = ESTADO_BADGE[o.estado] || {};
    return (
      <div key={o.id} style={{padding:'.8rem 1rem', borderRadius:10, background:'var(--gris)',
                               border: o.estado==='pendiente'&&esRecibida ? '1.5px solid #fd7e14':'none',
                               display:'flex', flexDirection:'column', gap:'.5rem'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:'.5rem'}}>
          <div>
            <div style={{fontWeight:700, fontSize:'.95rem', display:'flex', alignItems:'center', gap:6}}>
              <Escudo equipo={jug.equipo} size={ESCUDO_SIZE}/>
              {nomJug}
              <span className={`badge ${jug.posicion}`} style={{marginLeft:4}}>{jug.posicion}</span>
            </div>
            <div style={{fontSize:'.82rem', color:'var(--texto2)', marginTop:'.2rem'}}>
              {esRecibida ? 'Oferta de' : 'Oferta a'}: <strong>{contraparte?.nombre || '—'}</strong>
              {' · '}{fmtFecha(o.created_at)}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontWeight:800, fontSize:'1.1rem'}}>{fmt(o.cantidad)}</div>
            <span style={{fontSize:'.75rem', fontWeight:700, color: est.color}}>{est.label}</span>
          </div>
        </div>

        {o.mensaje && (
          <div style={{background:'#fff3cd', border:'1px solid #ffc107', borderRadius:7,
                       padding:'.45rem .75rem', fontSize:'.85rem', color:'#664d03'}}>
            <strong>Mensaje:</strong> {o.mensaje}
          </div>
        )}

        {esRecibida && o.estado === 'pendiente' && (
          <div style={{display:'flex', gap:'.6rem', flexWrap:'wrap'}}>
            <button onClick={() => aceptar(o)} disabled={procesando === o.id}
                    style={{background:'#198754', color:'#fff', border:'none', padding:'.35rem .9rem',
                            borderRadius:7, cursor:'pointer', fontWeight:600, fontSize:'.85rem',
                            opacity: procesando===o.id?.5:1}}>
              {procesando === o.id ? '…' : 'Aceptar'}
            </button>
            <button onClick={() => { setRechazModal(o); setMsgRechazo(''); }}
                    style={{background:'#dc3545', color:'#fff', border:'none', padding:'.35rem .9rem',
                            borderRadius:7, cursor:'pointer', fontWeight:600, fontSize:'.85rem'}}>
              Rechazar
            </button>
          </div>
        )}
        {!esRecibida && o.estado === 'pendiente' && (
          <div style={{display:'flex', gap:'.6rem', flexWrap:'wrap'}}>
            <button onClick={() => { setEditModal(o); setEditCant(String(o.cantidad)); setMsg(''); }}
                    style={{background:'#0d6efd', color:'#fff', border:'none', padding:'.35rem .9rem',
                            borderRadius:7, cursor:'pointer', fontWeight:600, fontSize:'.85rem'}}>
              Editar importe
            </button>
            <button onClick={() => retirar(o.id)} disabled={procesando === o.id}
                    style={{background:'#6c757d', color:'#fff', border:'none', padding:'.35rem .9rem',
                            borderRadius:7, cursor:'pointer', fontWeight:600, fontSize:'.85rem'}}>
              Retirar
            </button>
          </div>
        )}
      </div>
    );
  };

  const pendientes = (recibidas || []).filter(o => o.estado === 'pendiente');
  const resueltas  = (recibidas || []).filter(o => o.estado !== 'pendiente');

  return (
    <div>
      <div className="tabs">
        <button className={`tab ${subtab==='recibidas'?'active':''}`} onClick={() => setSubtab('recibidas')}>
          Recibidas {pendientes.length > 0 && <span style={{background:'#dc3545',color:'#fff',borderRadius:'50%',padding:'0 5px',fontSize:'.75rem',marginLeft:4}}>{pendientes.length}</span>}
        </button>
        <button className={`tab ${subtab==='enviadas'?'active':''}`} onClick={() => setSubtab('enviadas')}>Enviadas</button>
      </div>

      {msg && <div style={{background:'#f8d7da', color:'#58151c', padding:'.6rem 1rem', borderRadius:8, marginBottom:'.75rem', fontSize:'.88rem'}}>{msg}</div>}

      {subtab === 'recibidas' && (
        <>
          {recibidas === null ? <Spinner /> : recibidas.length === 0
            ? <div className="card"><div className="empty">No has recibido ofertas.</div></div>
            : <>
                {pendientes.length > 0 && (
                  <div className="card">
                    <h2 style={{marginBottom:'.75rem'}}>Pendientes de respuesta</h2>
                    <div style={{display:'flex', flexDirection:'column', gap:'.6rem'}}>
                      {pendientes.map(o => renderOferta(o, true))}
                    </div>
                  </div>
                )}
                {resueltas.length > 0 && (
                  <div className="card">
                    <h2 style={{marginBottom:'.75rem'}}>Historial</h2>
                    <div style={{display:'flex', flexDirection:'column', gap:'.6rem'}}>
                      {resueltas.map(o => renderOferta(o, true))}
                    </div>
                  </div>
                )}
              </>
          }
        </>
      )}

      {subtab === 'enviadas' && (
        <div className="card">
          {enviadas === null ? <Spinner /> : enviadas.length === 0
            ? <div className="empty">No has enviado ofertas.</div>
            : <div style={{display:'flex', flexDirection:'column', gap:'.6rem'}}>
                {enviadas.map(o => renderOferta(o, false))}
              </div>
          }
        </div>
      )}

      {/* ── Modal rechazo ── */}
      {rechazModal && (
        <div className="overlay" onClick={() => setRechazModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Rechazar oferta</h3>
            <p style={{fontSize:'.88rem', color:'var(--texto2)', marginBottom:'1rem'}}>
              Puedes enviar un mensaje al equipo ofertante explicando el motivo o indicando el precio que pides.
            </p>
            <div className="campo">
              <label>Mensaje (opcional)</label>
              <textarea value={msgRechazo} onChange={e => setMsgRechazo(e.target.value)}
                        rows={3} placeholder="Ej: El jugador no está a la venta / Pido mínimo 8.000.000 €"
                        style={{width:'100%', padding:'.5rem .7rem', borderRadius:8,
                                border:'1.5px solid var(--borde)', fontSize:'.9rem',
                                resize:'vertical', fontFamily:'inherit', boxSizing:'border-box'}} />
            </div>
            <div style={{display:'flex', gap:'.75rem', marginTop:'.75rem'}}>
              <button className="btn-cancel" onClick={() => setRechazModal(null)}>Cancelar</button>
              <button onClick={rechazar} disabled={procesando === rechazModal?.id}
                      style={{background:'#dc3545', color:'#fff', border:'none', padding:'.45rem 1.1rem',
                              borderRadius:8, cursor:'pointer', fontWeight:700, fontSize:'.9rem'}}>
                {procesando === rechazModal?.id ? 'Enviando…' : 'Rechazar oferta'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Modal editar importe ── */}
      {editModal && (
        <div className="overlay" onClick={() => setEditModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Editar oferta</h3>
            <p style={{fontSize:'.88rem', color:'var(--texto2)', marginBottom:'1rem'}}>
              Cambia el importe de tu oferta por <strong>
                {editModal.jugadores?.posicion === 'POR'
                  ? `Portería ${editModal.jugadores?.equipo}`
                  : editModal.jugadores?.nombre || 'el jugador'}
              </strong>.
            </p>
            <div className="campo">
              <label>Nuevo importe (€)</label>
              <input type="number" value={editCant} onChange={e => setEditCant(e.target.value)}
                     min={1} autoFocus
                     style={{width:'100%', padding:'.5rem .7rem', borderRadius:8,
                             border:'1.5px solid var(--borde)', fontSize:'.9rem', boxSizing:'border-box'}} />
            </div>
            {msg && <div style={{color:'#dc3545', fontSize:'.85rem', marginTop:'.3rem'}}>{msg}</div>}
            <div style={{display:'flex', gap:'.75rem', marginTop:'.75rem'}}>
              <button className="btn-cancel" onClick={() => setEditModal(null)}>Cancelar</button>
              <button onClick={editar} disabled={procesando === editModal?.id}
                      style={{background:'#0d6efd', color:'#fff', border:'none', padding:'.45rem 1.1rem',
                              borderRadius:8, cursor:'pointer', fontWeight:700, fontSize:'.9rem'}}>
                {procesando === editModal?.id ? 'Guardando…' : 'Guardar cambios'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ADMIN JUGADORES — añadir / borrar jugadores ────────────────
function AdminJugadores({ participantes, federacion }) {
  const POSICIONES = ['POR', 'DEF', 'MED', 'DEL'];

  // ── Equipos reales conocidos (del mapa de escudos + los de la BD)
  const EQUIPOS_CONOCIDOS = [
    'FC Barcelona','Real Madrid CF','Atlético de Madrid','Athletic Club',
    'Villarreal CF','Real Sociedad','Real Betis','Sevilla FC','Valencia CF',
    'RC Celta de Vigo','CA Osasuna','Getafe CF','Rayo Vallecano','RCD Espanyol',
    'Deportivo Alavés','Málaga CF','Real Zaragoza','CD Tenerife','SD Huesca',
    'Elche CF','Levante UD','Granada CF','RC Deportivo de La Coruña',
    'Burgos CF','Racing de Santander','SD Ponferradina','FC Andorra',
    'CD Castellón','AD Alcorcón',
  ].sort();

  const vacioForm = { nombre: '', equipo: '', posicion: 'DEF', valor: '', destino: 'mercado', participante_id: '' };
  const [form, setForm]         = useState(vacioForm);
  const [guardando, setGuardando] = useState(false);
  const [msg, setMsg]           = useState('');

  // Lista de jugadores para borrar
  const [jugadores, setJugadores]   = useState(null);
  const [filtroNom, setFiltroNom]   = useState('');
  const [filtroEq, setFiltroEq]     = useState('');
  const [borrando, setBorrando]     = useState(null);

  const cargarJugadores = async () => {
    const { data } = await sb.from('jugadores').select('id, nombre, equipo, posicion, valor_mercado').order('equipo').order('nombre');
    setJugadores(data || []);
  };

  useEffect(() => { if (sb) cargarJugadores(); }, []);

  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const añadir = async () => {
    if (!form.nombre.trim()) { setMsg('Introduce el nombre del jugador.'); return; }
    if (!form.equipo.trim()) { setMsg('Introduce el equipo real.'); return; }
    if (!form.valor || isNaN(Number(form.valor)) || Number(form.valor) < 0) { setMsg('Valor de mercado no válido.'); return; }
    if (form.destino === 'equipo' && !form.participante_id) { setMsg('Selecciona el equipo de la federación.'); return; }
    setGuardando(true); setMsg('');

    // 1. Insertar en jugadores
    const { data: jug, error: errJug } = await sb.from('jugadores').insert({
      nombre:        form.nombre.trim(),
      equipo:        form.equipo.trim(),
      posicion:      form.posicion,
      valor_mercado: Number(form.valor),
    }).select().single();
    if (errJug) { setMsg('Error: ' + errJug.message); setGuardando(false); return; }

    // 2. Si destino es un equipo, añadir a plantillas
    if (form.destino === 'equipo') {
      const { error: errPl } = await sb.from('plantillas').insert({
        participante_id: form.participante_id,
        jugador_id:      jug.id,
        precio_compra:   Number(form.valor),
      });
      if (errPl) { setMsg('Jugador creado pero error al asignar equipo: ' + errPl.message); setGuardando(false); return; }

      // Descontar presupuesto
      const part = participantes.find(p => p.id === form.participante_id);
      if (part) {
        await sb.from('participantes').update({ presupuesto: part.presupuesto - Number(form.valor) }).eq('id', form.participante_id);
      }
    }

    setMsg(`✓ ${form.posicion === 'POR' ? 'Portería de ' + form.equipo.trim() : form.nombre.trim()} añadido${form.destino === 'equipo' ? ' a la plantilla' : ' al mercado'}.`);
    setForm(vacioForm);
    setGuardando(false);
    cargarJugadores();
  };

  const borrar = async (j) => {
    if (!confirm(`¿Eliminar a "${j.posicion === 'POR' ? 'Portería ' + j.equipo : j.nombre}" (${j.equipo})?\nSe borrará también de plantillas, alineaciones y pujas.`)) return;
    setBorrando(j.id);
    const { error } = await sb.from('jugadores').delete().eq('id', j.id);
    setBorrando(null);
    if (error) { alert('Error: ' + error.message); return; }
    cargarJugadores();
  };

  const listaFiltrada = (jugadores || []).filter(j => {
    const nom = (j.posicion === 'POR' ? 'Portería ' + j.equipo : j.nombre).toLowerCase();
    return nom.includes(filtroNom.toLowerCase()) && j.equipo.toLowerCase().includes(filtroEq.toLowerCase());
  });

  const iS = { width: '100%', padding: '.45rem .7rem', borderRadius: 8,
               border: '1.5px solid var(--borde)', fontSize: '.92rem' };

  return (
    <div>
      {/* ── Formulario alta ── */}
      <div className="card">
        <h2>Añadir jugador</h2>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:'1rem', marginBottom:'1rem' }}>
          <div>
            <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Nombre</label>
            <input value={form.nombre} onChange={e => f('nombre', e.target.value)} placeholder="Nombre del jugador" style={iS} />
          </div>
          <div>
            <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Equipo real</label>
            <input list="equipos-lista" value={form.equipo} onChange={e => f('equipo', e.target.value)} placeholder="Ej: Málaga CF" style={iS} />
            <datalist id="equipos-lista">
              {EQUIPOS_CONOCIDOS.map(eq => <option key={eq} value={eq} />)}
            </datalist>
          </div>
          <div>
            <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Posición</label>
            <select value={form.posicion} onChange={e => f('posicion', e.target.value)} style={iS}>
              {POSICIONES.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Valor de mercado (€)</label>
            <input type="number" min="0" value={form.valor} onChange={e => f('valor', e.target.value)} placeholder="Ej: 5000000" style={iS} />
          </div>
          <div>
            <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Destino</label>
            <select value={form.destino} onChange={e => f('destino', e.target.value)} style={iS}>
              <option value="mercado">Mercado libre</option>
              <option value="equipo">Equipo de la federación</option>
            </select>
          </div>
          {form.destino === 'equipo' && (
            <div>
              <label style={{ fontSize:'.82rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem' }}>Equipo de la federación</label>
              <select value={form.participante_id} onChange={e => f('participante_id', e.target.value)} style={iS}>
                <option value="">— Selecciona —</option>
                {participantes.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
              </select>
            </div>
          )}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:'1rem', flexWrap:'wrap' }}>
          <button onClick={añadir} disabled={guardando} className="btn-ok"
                  style={{ opacity: guardando ? .6 : 1, cursor: guardando ? 'wait' : 'pointer' }}>
            {guardando ? 'Añadiendo…' : 'Añadir jugador'}
          </button>
          {msg && <span style={{ color: msg.startsWith('✓') ? 'var(--verde)' : '#dc3545', fontWeight: 600, fontSize: '.9rem' }}>{msg}</span>}
        </div>
      </div>

      {/* ── Lista para borrar ── */}
      <div className="card">
        <h2>Eliminar jugador</h2>
        <div style={{ display:'flex', gap:'.75rem', flexWrap:'wrap', marginBottom:'1rem' }}>
          <input value={filtroNom} onChange={e => setFiltroNom(e.target.value)}
                 placeholder="Buscar por nombre…"
                 style={{ flex:2, minWidth:160, padding:'.4rem .7rem', borderRadius:8, border:'1.5px solid var(--borde)', fontSize:'.88rem' }} />
          <input value={filtroEq} onChange={e => setFiltroEq(e.target.value)}
                 placeholder="Filtrar por equipo real…"
                 style={{ flex:1, minWidth:140, padding:'.4rem .7rem', borderRadius:8, border:'1.5px solid var(--borde)', fontSize:'.88rem' }} />
        </div>
        {jugadores === null
          ? <Spinner />
          : listaFiltrada.length === 0
            ? <div className="empty">No hay jugadores que coincidan.</div>
            : <table>
                <thead>
                  <tr><th>Jugador</th><th>Equipo</th><th>Pos</th><th style={{ textAlign:'right' }}>Valor</th><th></th></tr>
                </thead>
                <tbody>
                  {listaFiltrada.map(j => (
                    <tr key={j.id}>
                      <td style={{ fontWeight:600 }}>
                        {j.posicion === 'POR' ? <em style={{ color:'var(--texto2)' }}>Portería</em> : j.nombre}
                      </td>
                      <td style={{ display:'flex', alignItems:'center', gap:6 }}>
                        <Escudo equipo={j.equipo} size={ESCUDO_SIZE}/>{j.equipo}
                      </td>
                      <td><span className={`badge ${j.posicion}`}>{j.posicion}</span></td>
                      <td style={{ textAlign:'right', fontVariantNumeric:'tabular-nums' }}>{fmt(j.valor_mercado ?? 0)}</td>
                      <td style={{ textAlign:'right' }}>
                        <button onClick={() => borrar(j)} disabled={borrando === j.id}
                                style={{ background:'#dc3545', color:'#fff', border:'none',
                                         padding:'.28rem .7rem', borderRadius:7, cursor:'pointer',
