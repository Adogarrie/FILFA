                  {(isActingAsAdmin || federacion?.ventas_habilitadas) && <th></th>}
                </tr>
              </thead>
              <tbody>
                {lista.map((j, i) => {
                  const dif = (j.valor || 0) - (j.compra || 0);
                  return (
                    <tr key={i}>
                      <td style={{fontWeight:600}}>{nombreJugador(j.nombre, j.posicion, j.equipo)}</td>
                      <td><span className={`badge ${j.posicion}`}>{j.posicion}</span></td>
                      <td style={{color:'var(--texto2)'}}>
                        {j.posicion === 'POR' ? null
                          : <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                              <Escudo equipo={j.equipo} size={16}/>{j.equipo}
                            </span>}
                      </td>
                      <td style={{textAlign:'right'}}>{fmt(j.valor || 0)}</td>
                      <td style={{textAlign:'right'}}
                          className={dif >= 0 ? 'valor-positivo' : 'valor-negativo'}>
                        {dif >= 0 ? '+' : ''}{fmt(dif)}
                      </td>
                      {(isActingAsAdmin || federacion?.ventas_habilitadas) && (
                        <td>
                          <button onClick={() => setModalVenta(j)}
                            style={{background:'#d93025', color:'#fff', border:'none',
                                    padding:'.3rem .7rem', borderRadius:'8px',
                                    cursor:'pointer', fontSize:'.8rem', fontWeight:600}}>
                            Vender
                          </button>
                        </td>
                      )}
                    </tr>
                  );
                })}
              </tbody>
            </table>
        }

        {modalVenta && (
          <div className="overlay" onClick={() => setModalVenta(null)}>
            <div className="modal" onClick={e => e.stopPropagation()}>
              <h3>Vender al mercado</h3>
              <p>
                Vendes a <strong>{nombreJugador(modalVenta.nombre, modalVenta.posicion, modalVenta.equipo)}</strong><br/>
                Precio de compra: <strong>{fmt(modalVenta.compra || 0)}</strong><br/>
                Valor actual de mercado: <strong>{fmt(modalVenta.valor || 0)}</strong><br/>
                {(() => {
                  const dif = (modalVenta.valor || 0) - (modalVenta.compra || 0);
                  return <span className={dif >= 0 ? 'valor-positivo' : 'valor-negativo'}>
                    {dif >= 0 ? 'Ganancia: +' : 'Pérdida: '}{fmt(Math.abs(dif))}
                  </span>;
                })()}
              </p>
              <div className="modal-btns">
                <button className="btn-cancel" onClick={() => setModalVenta(null)}>Cancelar</button>
                <button className="btn-ok"
                  style={{background:'#d93025'}}
                  onClick={confirmarVenta}>
                  Confirmar venta
                </button>
              </div>
            </div>
          </div>
        )}

        {modalVentaTodo && (
          <div className="overlay" onClick={() => !vendiendoTodo && setModalVentaTodo(false)}>
            <div className="modal" onClick={e => e.stopPropagation()}>
              <h3>Vender toda la plantilla</h3>
              <p>
                Se venderán al mercado los <strong>{lista.length}</strong> jugadores de{' '}
                <strong>{participanteNombre}</strong>, devolviendo un total de{' '}
                <strong>{fmt(lista.reduce((s, j) => s + (j.valor || 0), 0))}</strong> a su presupuesto.<br/>
                Esta acción no se puede deshacer.
              </p>
              <div className="modal-btns">
                <button className="btn-cancel" disabled={vendiendoTodo}
                        onClick={() => setModalVentaTodo(false)}>
                  Cancelar
                </button>
                <button className="btn-ok" style={{background:'#d93025'}}
                        disabled={vendiendoTodo} onClick={confirmarVentaTodo}>
                  {vendiendoTodo ? 'Vendiendo…' : 'Confirmar venta total'}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── COUNTDOWN cierre de pujas (componente aislado) ─────────────
// Vive fuera de Mercado para que su setInterval no cause re-renders
// en el componente padre y no interfiera con los <select> del mercado.
function CountdownCierre({ horaCierre, habilitado }) {
  const [txt, setTxt] = useState('');
  useEffect(() => {
    if (!horaCierre || !habilitado) { setTxt(''); return; }
    const [h, m] = horaCierre.split(':').map(Number);
    const next = () => {
      const n = new Date(), d = new Date();
      d.setHours(h, m, 0, 0);
      if (d <= n) d.setDate(d.getDate() + 1);
      return d;
    };
    const tick = () => {
      const diff = next() - new Date();
      const hh = Math.floor(diff / 3600000);
      const mm = Math.floor((diff % 3600000) / 60000);
      const ss = Math.floor((diff % 60000) / 1000);
      setTxt(`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`);
    };
    tick();
    const iv = setInterval(tick, 1000);
    return () => clearInterval(iv);
  }, [horaCierre, habilitado]);
  if (!txt) return null;
  return (
    <div style={{fontSize:'.78rem', color:'var(--texto2)', marginTop:'.2rem'}}>
      Próximo cierre{' '}
      <span style={{fontVariantNumeric:'tabular-nums', fontWeight:700,
                    color: txt.startsWith('00:') ? '#dc3545' : 'var(--texto)'}}>
        {txt}
      </span>
    </div>
  );
}

// ── MERCADO ────────────────────────────────────────────────────
function Mercado({ participanteId, participantes, isAdmin, onFichaje, federacion, miParticipanteId }) {
  const [jugadores, setJugadores]           = useState(null);
  const [todasPlantillas, setTodasPlantillas] = useState([]);
  const [misPujas, setMisPujas]             = useState({}); // jugador_id → {id, cantidad}
  const [conteosPujas, setConteosPujas]     = useState({}); // jugador_id → count
  const [busqueda, setBusqueda]             = useState('');
  const [filtroPOS, setFiltroPOS]           = useState('');
  const [filtroEquipo, setFiltroEquipo]     = useState('');
  const [modal, setModal]                   = useState(null); // admin: fichar directo
  const [modalPuja, setModalPuja]           = useState(null); // usuario: pujar
  const [cantidadPuja, setCantidadPuja]     = useState('');
  const [sorteoHabilitado, setSorteoHabilitado] = useState(false);
  const [modalSorteo, setModalSorteo]       = useState(false);
  const [sorteando, setSorteando]           = useState(false);
  const [resultadoSorteo, setResultadoSorteo] = useState(null);
  const [todasPendientes, setTodasPendientes] = useState([]);
  const [liberarSel, setLiberarSel]         = useState({}); // pendiente_id → jugador_id a liberar
  const [subtabMercado, setSubtabMercado]   = useState('jugadores');

  // Ref siempre apunta a la cargar más reciente (evita stale closures en el intervalo)
  const cargarRef = useRef(null);

  // Sondeo periódico de cierre — cada 60 s el RPC comprueba si la hora llegó.
  // La función SQL es idempotente (log_cierres_pujas), así que llamarla 1440 veces
  // al día es seguro: 1439 retornan "ya_procesado" o "sin_cierre_pendiente" de inmediato.
  useEffect(() => {
    if (!sb || !federacion?.hora_cierre_pujas || !federacion?.ventas_habilitadas) return;

    const fedId = federacion.id;

    const poll = () => {
      sb.rpc('procesar_cierre_pujas', { p_federacion_id: fedId })
        .then(({ data, error }) => {
          if (error) {
            console.error('[FILFA cierre] Error RPC:', error.message, error);
            return;
          }
          console.log('[FILFA cierre] RPC resultado:', data);
          if (data?.firmados > 0) {
            cargarRef.current?.(); // refresca el mercado con la cargar más actual
          }
        });
    };

    poll(); // comprobación inmediata al montar o cuando cambia hora/mercado
    const iv = setInterval(poll, 60_000); // sondeo cada minuto
    return () => clearInterval(iv);
  }, [federacion?.hora_cierre_pujas, federacion?.ventas_habilitadas, sb]);

  const cargar = async () => {
    if (!sb) { setJugadores([]); setTodasPlantillas([]); setTodasPendientes([]); return; }

    const partIds = participantes.map(p => p.id);
    const [{ data: jugs }, { data: plants }, { data: allPujas }, { data: pends }] = await Promise.all([
      sb.from('jugadores').select('id,nombre,equipo,posicion,valor_mercado').eq('activo', true),
      partIds.length
        ? sb.from('plantillas').select('participante_id, jugador_id, precio_compra').in('participante_id', partIds)
        : Promise.resolve({ data: [] }),
      partIds.length
        ? sb.from('pujas').select('id, participante_id, jugador_id, cantidad').eq('resuelta', false).in('participante_id', partIds)
        : Promise.resolve({ data: [] }),
      partIds.length
        ? sb.from('fichajes_pendientes').select('id, participante_id, jugador_id, precio_compra').in('participante_id', partIds)
        : Promise.resolve({ data: [] }),
    ]);
    setJugadores(jugs || []);
    setTodasPlantillas(plants || []);
    setTodasPendientes(pends || []);
    setSorteoHabilitado(!!federacion?.sorteo_habilitado);
    const mp = {}, cp = {};
    for (const p of (allPujas || [])) {
      cp[p.jugador_id] = (cp[p.jugador_id] || 0) + 1;
      if (p.participante_id === participanteId)
        mp[p.jugador_id] = { id: p.id, cantidad: p.cantidad };
    }
    setMisPujas(mp);
    setConteosPujas(cp);
  };
  cargarRef.current = cargar; // siempre actualizado al último render

  useEffect(() => { cargar(); }, []);
  useEffect(() => { setSubtabMercado('jugadores'); }, [participanteId]);

  // Lookup O(1) por jugador_id — evita joins embebidas en plantillas/pendientes
  const jugadoresMap = useMemo(() => {
    const m = new Map();
    for (const j of (jugadores || [])) m.set(j.id, j);
    return m;
  }, [jugadores]);

  // IDs de jugadores no-POR en alguna plantilla o fichaje pendiente
  const noPorterosOcupados = useMemo(() => {
    const s = new Set();
    for (const p of todasPlantillas)
      if (jugadoresMap.get(p.jugador_id)?.posicion !== 'POR') s.add(p.jugador_id);
    for (const p of todasPendientes)
      if (jugadoresMap.get(p.jugador_id)?.posicion !== 'POR') s.add(p.jugador_id);
    return s;
  }, [todasPlantillas, todasPendientes, jugadoresMap]);

  // IDs de jugadores que ya tiene MI equipo (plantilla activa + pendientes ganados)
  const misJugadoresIds = useMemo(() => {
    const s = new Set();
    for (const p of todasPlantillas)
      if (p.participante_id === participanteId) s.add(p.jugador_id);
    for (const p of todasPendientes)
      if (p.participante_id === participanteId) s.add(p.jugador_id);
    return s;
  }, [todasPlantillas, todasPendientes, participanteId]);

  const miPlantillaLlena = misJugadoresIds.size >= 14;

  // Equipos LaLiga cuya portería ya está cogida (plantilla o pendiente) en MI división
  const porteríasBloqueadas = useMemo(() => {
    const miDiv = participantes.find(p => p.id === participanteId)?.division_id;
    const s = new Set();
    for (const p of [...todasPlantillas, ...todasPendientes]) {
      const jug = jugadoresMap.get(p.jugador_id);
      if (jug?.posicion !== 'POR') continue;
      const fantasia = participantes.find(x => x.id === p.participante_id);
      if (fantasia?.division_id === miDiv) s.add(jug.equipo);
    }
    return s;
  }, [todasPlantillas, todasPendientes, participanteId, participantes, jugadoresMap]);

  const equiposLista = useMemo(() => {
    if (!jugadores) return [];
    return [...new Set(jugadores.map(j => j.equipo).filter(Boolean))].sort();
  }, [jugadores]);

  const lista = useMemo(() => {
    if (!jugadores) return [];
    const filtrada = jugadores.filter(j => {
      if (misJugadoresIds.has(j.id)) return false;
      if (j.posicion !== 'POR' && noPorterosOcupados.has(j.id)) return false;
      if (j.posicion === 'POR' && porteríasBloqueadas.has(j.equipo)) return false; // portería de mi división
      const okPos    = !filtroPOS    || j.posicion === filtroPOS;
      const okEquipo = !filtroEquipo || j.equipo   === filtroEquipo;
      const okBus    = !busqueda ||
        (j.nombre||'').toLowerCase().includes(busqueda.toLowerCase()) ||
        (j.equipo||'').toLowerCase().includes(busqueda.toLowerCase());
      return okPos && okEquipo && okBus;
    });
    // Porteros: colapsar por equipo, mostrar solo el más caro
    const porEquipo = {};
    const resto = [];
    for (const j of filtrada) {
      if (j.posicion === 'POR') {
        const vm = j.valor_mercado || 0;
        if (!porEquipo[j.equipo] || vm > (porEquipo[j.equipo].valor_mercado || 0))
          porEquipo[j.equipo] = j;
      } else {
        resto.push(j);
      }
    }
    return [...Object.values(porEquipo), ...resto];
  }, [jugadores, busqueda, filtroPOS, filtroEquipo, misJugadoresIds, noPorterosOcupados, porteríasBloqueadas]);

  // ── Pujar (usuarios) ──────────────────────────────────────────
  const confirmarPuja = async () => {
    if (!sb || !participanteId || !modalPuja) return;
    // Verificar que el jugador no está ya fichado (plantilla activa o pendiente) en esta federación
    const fedPartIds = (participantes || []).map(p => p.id);
    if (fedPartIds.length > 0) {
      const [{ data: enPlantilla, error: e1 }, { data: enPendiente, error: e2 }] = await Promise.all([
        sb.from('plantillas').select('id').eq('jugador_id', modalPuja.id).in('participante_id', fedPartIds).limit(1),
        sb.from('fichajes_pendientes').select('id').eq('jugador_id', modalPuja.id).in('participante_id', fedPartIds).limit(1),
      ]);
      if ((!e1 && enPlantilla?.length > 0) || (!e2 && enPendiente?.length > 0)) {
        alert('Este jugador ya ha sido fichado por otro equipo.');
        setModalPuja(null); cargar(); return;
      }
    }
    const cantidad = parseFloat(String(cantidadPuja).replace(',', '.'));
    const minimo   = modalPuja.valor_mercado || 0;
    if (isNaN(cantidad) || cantidad < minimo) {
      alert(`La puja mínima es ${fmt(minimo)}.`); return;
    }
    const { data: partData } = await sb.from('participantes')
      .select('presupuesto').eq('id', participanteId).single();
    if (cantidad > (partData?.presupuesto || 0)) {
      alert(`Presupuesto insuficiente. Disponible: ${fmt(partData?.presupuesto || 0)}`); return;
    }
    const { error: errPuja } = await sb.from('pujas').upsert(
      { participante_id: participanteId, jugador_id: modalPuja.id,
        cantidad, resuelta: false, ganadora: null },
      { onConflict: 'participante_id,jugador_id' }
    );
    if (errPuja) { alert('Error al registrar la puja: ' + errPuja.message); return; }
    setModalPuja(null); setCantidadPuja(''); cargar();
  };

  const cancelarPuja = async (jugadorId) => {
    if (!sb) return;
    await sb.from('pujas').delete()
      .eq('participante_id', participanteId).eq('jugador_id', jugadorId);
    cargar();
  };

  // ── Fichar directo (solo admin) ────────────────────────────────
  const confirmarFichaje = async () => {
    if (!sb || !participanteId || !modal) { setModal(null); return; }

    // Comprobar presupuesto disponible
    const { data: partData } = await sb.from('participantes')
      .select('presupuesto').eq('id', participanteId).single();
    const presupuestoActual = partData?.presupuesto ?? 0;
    const coste = modal.valor_mercado || 0;
    if (coste > presupuestoActual) {
      alert(`Presupuesto insuficiente.\nDisponible: ${fmt(presupuestoActual)}\nCoste: ${fmt(coste)}`);
      setModal(null);
      return;
    }

    // Obtener plantilla actualizada para validar
    const { data: miPlantilla } = await sb.from('plantillas')
      .select('id, jugadores(posicion)').eq('participante_id', participanteId);

    // Límite 14 jugadores
    if ((miPlantilla?.length || 0) >= 14) {
      alert('Tu equipo ya tiene 14 jugadores (máximo permitido).');
      setModal(null);
      return;
    }

    if (modal.posicion === 'POR') {
      // Máximo 1 portero por equipo
      if ((miPlantilla || []).some(p => p.jugadores?.posicion === 'POR')) {
        alert('Ya tienes un portero en tu equipo.');
        setModal(null);
        return;
      }
      // La portería del equipo LaLiga no puede estar en otro equipo de la misma división
      const miDivision = participantes.find(p => p.id === participanteId)?.division_id;
      const conflicto = todasPlantillas.some(p => {
        if (p.jugadores?.posicion !== 'POR') return false;
        if (p.jugadores?.equipo !== modal.equipo) return false;
        if (p.participante_id === participanteId) return false;
        return participantes.find(x => x.id === p.participante_id)?.division_id === miDivision;
      });
      if (conflicto) {
        alert('La portería de este equipo ya está fichada por otro equipo de tu misma división.');
        setModal(null);
        return;
      }
    }

    // Insertar solo el portero más caro como representante de la portería del equipo
    const { error } = await sb.from('plantillas').insert({
      participante_id: participanteId,
      jugador_id:      modal.id,
      precio_compra:   coste,
    });
    if (error) {
      alert('Error al fichar: ' + error.message);
    } else {
      const { error: errPres } = await sb.from('participantes')
        .update({ presupuesto: presupuestoActual - coste })
        .eq('id', participanteId);
      if (errPres) console.error('Error actualizando presupuesto:', errPres);
      onFichaje && onFichaje();
      cargar();
    }
    setModal(null);
  };

  // ── Sorteo aleatorio (usuario, en su propio equipo) ────────────
  const ejecutarSorteo = async () => {
    if (!sb || !participanteId) return;
    setSorteando(true);

    const { data: partData } = await sb.from('participantes')
      .select('presupuesto').eq('id', participanteId).single();
    let presupuestoRestante = partData?.presupuesto ?? 0;

    const { data: miPlantilla } = await sb.from('plantillas')
      .select('id, jugadores(posicion)').eq('participante_id', participanteId);
    const TARGET = 14;
    const huecos = TARGET - (miPlantilla?.length || 0);

    if (huecos <= 0) {
      alert('Tu plantilla ya tiene 14 jugadores.');
      setSorteando(false); setModalSorteo(false); return;
    }

    // Composición actual del equipo
    const conteo = { POR: 0, DEF: 0, MED: 0, DEL: 0 };
    (miPlantilla || []).forEach(p => { const pos = p.jugadores?.posicion; if (pos) conteo[pos] = (conteo[pos]||0) + 1; });

    const MAX_POS = { POR: 1, DEF: 5, MED: 4, DEL: 4 };
    const MIN_POS = { POR: 1, DEF: 4, MED: 3, DEL: 2 };

    const necesarios = {};
    const cupoMax    = {};
    for (const pos of ['POR','DEF','MED','DEL']) {
      necesarios[pos] = Math.max(0, MIN_POS[pos] - (conteo[pos]||0));
      cupoMax[pos]    = Math.max(0, MAX_POS[pos] - (conteo[pos]||0));
    }

    // Pool por posición mezclado aleatoriamente
    const shuffle = arr => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const r = Math.floor(Math.random() * (i + 1));
        [a[i], a[r]] = [a[r], a[i]];
      }
      return a;
    };
    const poolPOS = {};
    for (const pos of ['POR','DEF','MED','DEL']) {
      poolPOS[pos] = shuffle(lista.filter(j => j.posicion === pos));
    }

    // Coste mínimo para rellenar `n` huecos más dado el estado actual de cupos y pools
    // Devuelve Infinity si no hay suficientes jugadores disponibles
    const minCostToFill = (n, ceActual) => {
      if (n <= 0) return 0;
      const candidatos = [];
      for (const pos of ['POR','DEF','MED','DEL']) {
        const cap = cupoMax[pos] - (ceActual[pos] || 0);
        if (cap <= 0) continue;
        [...poolPOS[pos]]
          .sort((a, b) => (a.valor_mercado || 0) - (b.valor_mercado || 0))
          .slice(0, cap)
          .forEach(j => candidatos.push(j.valor_mercado || 0));
      }
      candidatos.sort((a, b) => a - b);
      if (candidatos.length < n) return Infinity;
      return candidatos.slice(0, n).reduce((s, v) => s + v, 0);
    };

    const elegidos   = [];
    const conteoEleg = { POR: 0, DEF: 0, MED: 0, DEL: 0 };

    // Intenta fichar un jugador de `pos` garantizando que queden fondos para los siguientes huecos
    const pickOne = (pos, slotsAfter) => {
      const idx = poolPOS[pos].findIndex(j => {
        const cost = j.valor_mercado || 0;
        if (cost > presupuestoRestante) return false;
        const ce2 = { ...conteoEleg, [pos]: (conteoEleg[pos] || 0) + 1 };
        return presupuestoRestante - cost >= minCostToFill(slotsAfter, ce2);
      });
      if (idx === -1) return false;
      const j = poolPOS[pos].splice(idx, 1)[0];
      elegidos.push(j);
      presupuestoRestante -= j.valor_mercado || 0;
      conteoEleg[pos] = (conteoEleg[pos] || 0) + 1;
      return true;
    };

    // Fase 1: cubrir mínimos
    for (const pos of ['POR','DEF','MED','DEL']) {
      for (let i = 0; i < necesarios[pos]; i++) {
        const slotsAfter = huecos - elegidos.length - 1;
        if (!pickOne(pos, slotsAfter)) {
          alert(`Presupuesto insuficiente para completar la plantilla de ${TARGET} jugadores (falta ${pos}).`);
          setSorteando(false); setModalSorteo(false); return;
        }
      }
    }

    // Fase 2: rellenar huecos restantes de forma aleatoria con look-ahead de presupuesto
    const restantes = huecos - elegidos.length;
    for (let i = 0; i < restantes; i++) {
      const slotsAfter = restantes - i - 1;
      const posDisp = ['POR','DEF','MED','DEL'].filter(pos => {
        if (conteoEleg[pos] >= cupoMax[pos]) return false;
        return poolPOS[pos].some(j => {
          const cost = j.valor_mercado || 0;
          if (cost > presupuestoRestante) return false;
          const ce2 = { ...conteoEleg, [pos]: (conteoEleg[pos] || 0) + 1 };
          return presupuestoRestante - cost >= minCostToFill(slotsAfter, ce2);
        });
      });
      if (posDisp.length === 0) {
        alert(`Presupuesto insuficiente para completar la plantilla de ${TARGET} jugadores.`);
        setSorteando(false); setModalSorteo(false); return;
      }
      const pos = posDisp[Math.floor(Math.random() * posDisp.length)];
      pickOne(pos, slotsAfter);
    }

    if (elegidos.length < huecos) {
      alert(`No fue posible completar la plantilla de ${TARGET} jugadores con el presupuesto disponible.`);
      setSorteando(false); setModalSorteo(false); return;
    }

    const { error } = await sb.from('plantillas').insert(
      elegidos.map(j => ({
        participante_id: participanteId,
        jugador_id:      j.id,
        precio_compra:   j.valor_mercado || 0,
      }))
    );
    if (error) {
      alert('Error al fichar: ' + error.message);
    } else {
      const gastado = elegidos.reduce((s, j) => s + (j.valor_mercado || 0), 0);
      await sb.from('participantes').update({ presupuesto: presupuestoRestante }).eq('id', participanteId);
      setResultadoSorteo({ jugadores: elegidos, gastado });
      const miEquipo = participantes.find(p => p.id === participanteId);
      publicar(federacion?.id, 'sorteo', `${miEquipo?.nombre || 'Un equipo'} ha rellenado su plantilla por sorteo (${elegidos.length} jugadores, ${fmt(gastado)})`);
      onFichaje && onFichaje();
      cargar();
    }
    setSorteando(false);
    setModalSorteo(false);
  };

  if (jugadores === null) return <Spinner />;

  // Admin viendo equipo ajeno → poderes de admin; su propio equipo → actúa como presidente
  const isActingAsAdmin = isAdmin && participanteId !== miParticipanteId;

  // Fichajes pendientes del equipo actual
  const misFichajes = todasPendientes.filter(p => p.participante_id === participanteId);

  // Jugadores del equipo actual (con nombre para el selector de baja)
  const miPlantilla = todasPlantillas
    .filter(p => p.participante_id === participanteId)
    .map(p => {
      const jug = jugadoresMap.get(p.jugador_id);
      return { jugador_id: p.jugador_id, nombre: jug?.nombre || '', posicion: jug?.posicion || '', equipo: jug?.equipo || '' };
    });

  const activarFichaje = async (fichajeId, liberarJugadorId) => {
    const { error } = await sb.rpc('activar_fichaje_pendiente', {
      p_pendiente_id:       fichajeId,
      p_liberar_jugador_id: liberarJugadorId || null,
      p_federacion_id:      federacion?.id,
    });
    if (error) {
      const msgs = {
        plantilla_llena_indica_baja:    'El equipo está lleno. Selecciona qué jugador liberas.',
        jugador_a_liberar_no_encontrado:'El jugador a liberar no está en la plantilla.',
        no_autorizado:                  'No tienes permisos para esta acción.',
      };
      alert(msgs[error.message] || 'Error: ' + error.message);
      return;
    }
    const fp    = todasPendientes.find(p => p.id === fichajeId);
    const jug   = jugadoresMap.get(fp?.jugador_id);
    const miEq  = participantes.find(p => p.id === participanteId);
    const nomJug = jug?.posicion === 'POR' ? `Portería ${jug?.equipo}` : jug?.nombre;
    if (liberarJugadorId) {
      const baja = miPlantilla.find(p => p.jugador_id === liberarJugadorId);
      const nomBaja = baja?.posicion === 'POR' ? `Portería ${baja?.equipo}` : baja?.nombre;
      publicar(federacion?.id, 'fichaje', `${miEq?.nombre} incorpora a ${nomJug} y libera a ${nomBaja}`);
    } else {
      publicar(federacion?.id, 'fichaje', `${miEq?.nombre} incorpora a ${nomJug}`);
    }
    setLiberarSel(s => { const n = {...s}; delete n[fichajeId]; return n; });
    cargar();
  };

  const anularFichaje = async (fichajeId) => {
    if (!confirm('¿Anular este fichaje? El equipo recuperará el presupuesto y el jugador volverá al mercado libre.')) return;
    const { error } = await sb.rpc('anular_fichaje_pendiente', {
      p_pendiente_id:  fichajeId,
      p_federacion_id: federacion?.id,
    });
    if (error) { alert('Error al anular: ' + error.message); return; }
    cargar();
  };

  const plantillaActivaCnt = todasPlantillas.filter(p => p.participante_id === participanteId).length;
  const huecosRestantes = 14 - plantillaActivaCnt;

  return (
    <div>
      {/* ── Subtabs: Jugadores / Liberar jugadores ── */}
      {misFichajes.length > 0 && (
        <div className="tabs" style={{marginBottom:'1rem'}}>
          <button className={`tab ${subtabMercado==='jugadores'?'active':''}`}
                  onClick={() => setSubtabMercado('jugadores')}>Jugadores</button>
          <button className={`tab ${subtabMercado==='pendientes'?'active':''}`}
                  onClick={() => setSubtabMercado('pendientes')}>
            Liberar jugadores ({misFichajes.length})
          </button>
        </div>
      )}

      {/* ── Sección: Liberar jugadores ── */}
      {subtabMercado === 'pendientes' && misFichajes.length > 0 && (
        <div className="card">
          <h2 style={{marginBottom:'.75rem'}}>Liberar jugadores</h2>
          <p style={{color:'var(--texto2)', fontSize:'.88rem', marginBottom:'1.25rem'}}>
            {miPlantilla.length >= 14
              ? 'Tu plantilla está llena. Para cada fichaje pendiente selecciona qué jugador liberas para hacerle hueco.'
              : `Tienes ${14 - miPlantilla.length} plaza(s) libre(s). Puedes incorporar jugadores directamente.`}
          </p>
          {misFichajes.map(f => {
            const jug = jugadoresMap.get(f.jugador_id);
            const plazasLibres = 14 - miPlantilla.length;
            const sel = liberarSel[f.id] || '';
            return (
              <div key={f.id} style={{display:'flex', flexWrap:'wrap', alignItems:'flex-start',
                                      gap:'.75rem', padding:'.9rem 0',
                                      borderBottom:'1px solid var(--borde)'}}>
                {/* Info jugador */}
                <div style={{flex:'1 1 200px'}}>
                  <div style={{fontWeight:700, fontSize:'.95rem'}}>
                    {jug?.posicion === 'POR' ? `Portería ${jug?.equipo}` : jug?.nombre}
                  </div>
                  <div style={{fontSize:'.8rem', color:'var(--texto2)'}}>
                    {jug?.posicion} · {jug?.equipo}
                  </div>
                  <div style={{fontSize:'.8rem', color:'var(--texto2)'}}>
                    Fichado por: <strong>{fmt(f.precio_compra)}</strong>
                  </div>
                </div>

                {/* Acción */}
                <div style={{display:'flex', flexWrap:'wrap', gap:'.5rem', alignItems:'center'}}>
                  {plazasLibres > 0 ? (
                    <span style={{fontSize:'.8rem', color:'#198754'}}>
                      ✓ {plazasLibres} plaza(s) libre(s)
                    </span>
                  ) : (
                    <select value={sel}
                            onChange={e => setLiberarSel(s => ({...s, [f.id]: e.target.value}))}
                            style={{padding:'.3rem .6rem', borderRadius:7, border:'1.5px solid var(--borde)',
                                    fontSize:'.85rem', maxWidth:220}}>
                      <option value="">— Seleccionar quién sale —</option>
                      {miPlantilla.map(p => (
                        <option key={p.jugador_id} value={p.jugador_id}>
                          {p.posicion === 'POR' ? `Portería ${p.equipo}` : p.nombre} ({p.posicion})
                        </option>
                      ))}
                    </select>
                  )}
                  <button className="btn-fichar"
                          disabled={plazasLibres === 0 && !sel}
                          onClick={() => activarFichaje(f.id, plazasLibres > 0 ? null : sel)}>
                    Incorporar
                  </button>
                  {isAdmin && (
                    <button onClick={() => anularFichaje(f.id)}
                            style={{padding:'.3rem .7rem', borderRadius:7, border:'1.5px solid #dc3545',
                                    background:'#fff', color:'#dc3545', cursor:'pointer',
                                    fontSize:'.82rem', fontWeight:600}}>
                      Anular
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Lista de jugadores (oculta cuando se muestra Liberar) ── */}
      {subtabMercado === 'jugadores' && <div className="card">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:'.5rem', marginBottom:'1rem'}}>
          <div>
            <h2 style={{margin:0}}>Mercado de jugadores</h2>
            <CountdownCierre
              horaCierre={federacion?.hora_cierre_pujas}
              habilitado={!!federacion?.ventas_habilitadas}
            />
          </div>
          {sorteoHabilitado && participanteId && federacion?.ventas_habilitadas && (
            <button className="btn-fichar" disabled={huecosRestantes <= 0}
                    title={huecosRestantes <= 0 ? 'Tu plantilla ya tiene 14 jugadores' : ''}
                    onClick={() => setModalSorteo(true)}>
              🎲 Sorteo aleatorio
            </button>
          )}
        </div>
        {!isActingAsAdmin && !federacion?.ventas_habilitadas && (
          <div style={{background:'#fff3cd', color:'#856404', padding:'.5rem .85rem',
                       borderRadius:8, fontSize:'.85rem', marginBottom:'1rem',
                       border:'1px solid #ffc107'}}>
            El mercado está cerrado. El administrador debe activarlo en Admin → Mercado.
          </div>
        )}
        <div className="filtros">
          <input placeholder="Buscar jugador o equipo..."
                 value={busqueda} onChange={e => setBusqueda(e.target.value)} />
          <select value={filtroPOS} onChange={e => setFiltroPOS(e.target.value)}>
            <option value="">Todas las posiciones</option>
            <option value="POR">Portero</option>
            <option value="DEF">Defensa</option>
            <option value="MED">Centrocampista</option>
            <option value="DEL">Delantero</option>
          </select>
          <select value={filtroEquipo} onChange={e => setFiltroEquipo(e.target.value)}>
            <option value="">Todos los equipos</option>
            {equiposLista.map(eq => <option key={eq} value={eq}>{eq}</option>)}
          </select>
        </div>
        <table>
          <thead>
            <tr>
              <th>Jugador</th><th>Pos</th><th>Equipo</th>
              <th style={{textAlign:'right'}}>Valor mín.</th>
              <th>Pujas</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {lista.map(j => {
              const nPujas   = conteosPujas[j.id] || 0;
              const miPuja   = misPujas[j.id];
              return (
                <tr key={j.id}>
                  <td style={{fontWeight:600}}>
                    {j.posicion === 'POR'
                      ? <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                          <Escudo equipo={j.equipo} size={16}/>{j.equipo.toUpperCase()}
                        </span>
                      : j.nombre}
                  </td>
                  <td><span className={`badge ${j.posicion}`}>{j.posicion}</span></td>
                  <td style={{color:'var(--texto2)'}}>
                    {j.posicion === 'POR' ? null
                      : <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                          <Escudo equipo={j.equipo} size={16}/>{j.equipo}
                        </span>}
                  </td>
                  <td style={{textAlign:'right'}}>{fmt(j.valor_mercado || 0)}</td>
                  <td style={{textAlign:'center', fontSize:'.85rem', color: nPujas > 0 ? '#d97706' : 'var(--texto2)'}}>
                    {nPujas > 0 ? `🔥 ${nPujas}` : '—'}
                  </td>
                  <td style={{whiteSpace:'nowrap'}}>
                    {isActingAsAdmin ? (
                      /* Admin viendo equipo ajeno: pujas + fichaje directo */
                      <span style={{display:'flex', gap:4, alignItems:'center', flexWrap:'wrap'}}>
                        {miPuja ? (
                          <>
                            <span style={{fontSize:'.8rem', color:'#198754', fontWeight:600}}>
                              {fmt(miPuja.cantidad)}
                            </span>
                            <button onClick={() => { setModalPuja(j); setCantidadPuja(String(miPuja.cantidad)); }}
                                    style={{padding:'.2rem .5rem', fontSize:'.75rem', borderRadius:6,
                                            border:'1.5px solid #198754', background:'#fff',
                                            color:'#198754', cursor:'pointer'}}>
                              Editar
                            </button>
                            <button onClick={() => cancelarPuja(j.id)}
                                    style={{padding:'.2rem .5rem', fontSize:'.75rem', borderRadius:6,
                                            border:'1.5px solid #dc3545', background:'#fff',
                                            color:'#dc3545', cursor:'pointer'}}>
                              ✕
                            </button>
                          </>
                        ) : (
                          <button className="btn-fichar"
                                  onClick={() => { setModalPuja(j); setCantidadPuja(String(j.valor_mercado || 0)); }}>
                            Pujar
                          </button>
                        )}
                        <button onClick={() => setModal(j)}
                                style={{padding:'.3rem .6rem', fontSize:'.78rem', borderRadius:7,
                                        border:'1.5px solid var(--borde)', background:'var(--fondo)',
                                        color:'var(--texto)', cursor:'pointer', fontWeight:600}}>
                          Fichar
                        </button>
                      </span>
                    ) : !federacion?.ventas_habilitadas ? (
                      miPuja ? (
                        <span style={{display:'flex', gap:4, alignItems:'center'}}>
                          <span style={{fontSize:'.8rem', color:'#198754', fontWeight:600}}>
                            {fmt(miPuja.cantidad)}
                          </span>
                          <button onClick={() => cancelarPuja(j.id)}
                                  style={{padding:'.2rem .5rem', fontSize:'.75rem', borderRadius:6,
                                          border:'1.5px solid #dc3545', background:'#fff',
                                          color:'#dc3545', cursor:'pointer'}}>
                            ✕
                          </button>
                        </span>
                      ) : (
                        <span style={{fontSize:'.8rem', color:'var(--texto2)'}}>🔒</span>
                      )
                    ) : miPuja ? (
                      <span style={{display:'flex', gap:4, alignItems:'center'}}>
                        <span style={{fontSize:'.8rem', color:'#198754', fontWeight:600}}>
                          {fmt(miPuja.cantidad)}
                        </span>
                        <button onClick={() => { setModalPuja(j); setCantidadPuja(String(miPuja.cantidad)); }}
                                style={{padding:'.2rem .5rem', fontSize:'.75rem', borderRadius:6,
                                        border:'1.5px solid #198754', background:'#fff',
                                        color:'#198754', cursor:'pointer'}}>
                          Editar
                        </button>
                        <button onClick={() => cancelarPuja(j.id)}
                                style={{padding:'.2rem .5rem', fontSize:'.75rem', borderRadius:6,
                                        border:'1.5px solid #dc3545', background:'#fff',
                                        color:'#dc3545', cursor:'pointer'}}>
                          ✕
                        </button>
                      </span>
                    ) : (
                      <button className="btn-fichar"
                              onClick={() => { setModalPuja(j); setCantidadPuja(String(j.valor_mercado || 0)); }}
                              disabled={!participanteId}>
                        Pujar
                      </button>
                    )}
                  </td>
                </tr>
              );
            })}
            {lista.length === 0 && (
              <tr><td colSpan={6} className="empty">
                {jugadores.length === 0
                  ? 'No hay jugadores en la base de datos. Ejecuta actualizar_temporada.py'
                  : 'No hay jugadores disponibles con esos filtros'}
              </td></tr>
            )}
          </tbody>
        </table>
      </div>}

      {/* Modal puja (usuarios) */}
      {modalPuja && (
        <div className="overlay" onClick={() => setModalPuja(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Realizar puja</h3>
            <p style={{marginBottom:'.8rem'}}>
              {modalPuja.posicion === 'POR'
                ? <>Portería de <strong>{modalPuja.equipo}</strong></>
                : <><strong>{modalPuja.nombre}</strong> ({modalPuja.equipo})</>
              }<br/>
              <span style={{fontSize:'.85rem', color:'var(--texto2)'}}>
                Valor de mercado: {fmt(modalPuja.valor_mercado || 0)} (puja mínima)
              </span>
            </p>
            <div style={{marginBottom:'1rem'}}>
              <label style={{fontSize:'.85rem', color:'var(--texto2)', display:'block', marginBottom:'.3rem'}}>
                Tu puja (€)
              </label>
              <input type="number" min={modalPuja.valor_mercado || 0} step="100000"
                     value={cantidadPuja}
                     onChange={e => setCantidadPuja(e.target.value)}
                     style={{width:'100%', padding:'.45rem .7rem', borderRadius:8,
                             border:'1.5px solid var(--borde)', fontSize:'1rem'}}
                     placeholder={`Mínimo: ${fmt(modalPuja.valor_mercado || 0)}`} />
            </div>
            <div className="modal-btns">
              <button className="btn-cancel" onClick={() => setModalPuja(null)}>Cancelar</button>
              <button className="btn-ok" onClick={confirmarPuja}>Confirmar puja</button>
            </div>
          </div>
        </div>
      )}

      {/* Modal fichar directo (admin) */}
      {modal && (
        <div className="overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Fichar directamente</h3>
            <p>
              {modal.posicion === 'POR'
                ? <>Portería de <strong>{modal.equipo}</strong></>
                : <>Fichar a <strong>{modal.nombre}</strong> ({modal.equipo})</>
              }<br/>
              Coste: <strong>{fmt(modal.valor_mercado || 0)}</strong>
            </p>
            <div className="modal-btns">
              <button className="btn-cancel" onClick={() => setModal(null)}>Cancelar</button>
              <button className="btn-ok" onClick={confirmarFichaje}>Confirmar</button>
            </div>
          </div>
        </div>
      )}

      {/* Modal confirmar sorteo aleatorio */}
      {modalSorteo && (
        <div className="overlay" onClick={() => !sorteando && setModalSorteo(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Sorteo aleatorio</h3>
            <p>
              Se ficharán hasta <strong>{huecosRestantes}</strong> jugador(es) libres al azar,
              respetando tu presupuesto disponible y las reglas del mercado
              (máximo 1 portero, sin jugadores duplicados).
            </p>
            <div className="modal-btns">
              <button className="btn-cancel" disabled={sorteando} onClick={() => setModalSorteo(false)}>
                Cancelar
              </button>
              <button className="btn-ok" disabled={sorteando} onClick={ejecutarSorteo}>
                {sorteando ? 'Sorteando…' : 'Confirmar sorteo'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Resultado del sorteo */}
      {resultadoSorteo && (
        <div className="overlay" onClick={() => setResultadoSorteo(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Sorteo completado</h3>
            <p>
              Has fichado a {resultadoSorteo.jugadores.length} jugador(es) por un total de{' '}
              <strong>{fmt(resultadoSorteo.gastado)}</strong>:
            </p>
            <ul style={{marginBottom:'1.25rem', paddingLeft:'1.2rem', fontSize:'.88rem', color:'var(--texto2)'}}>
              {resultadoSorteo.jugadores.map(j => (
                <li key={j.id}>
                  {j.posicion === 'POR' ? `Portería ${j.equipo}` : `${j.nombre} (${j.equipo})`} — {fmt(j.valor_mercado || 0)}
                </li>
              ))}
            </ul>
            <div className="modal-btns">
              <button className="btn-ok" onClick={() => setResultadoSorteo(null)}>Cerrar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CALENDARIO FANTASY ─────────────────────────────────────────
function CalendarioFantasy({ participantes, federacion }) {
  const [clas, setClas]         = useState([]);
  const [vista, setVista]       = useState('jornada');
  const [jornada, setJornada]   = useState(1);
  const [jugadores, setJugadores] = useState([]);   // jugadores reales: { id, nombre, equipo, posicion }
  const [abierto, setAbierto]   = useState(null);   // participante_id expandido
  const [detalle, setDetalle]   = useState({});     // { [pid_jornada]: { alis, ptsMap } }

  useEffect(() => {
    if (!sb) return;
    sb.from('jugadores').select('id, nombre, equipo, posicion')
      .then(({ data }) => setJugadores(data || []));
  }, []);

  useEffect(() => {
    if (!sb || participantes.length === 0) return;
    sb.from('clasificacion')
      .select('participante_id, jornada, puntos_jornada')
      .in('participante_id', participantes.map(p => p.id))
      .then(({ data }) => setClas(data || []));
  }, [participantes]);

  const abrirEquipo = async (pid) => {
    if (abierto === pid) { setAbierto(null); return; }
    setAbierto(pid);
    const key = `${pid}_${jornada}`;
    if (detalle[key]) return;
    const [{ data: alis }, { data: pts }] = await Promise.all([
      sb.from('alineaciones').select('jugador_id, es_titular').eq('participante_id', pid).eq('jornada', jornada),
      sb.from('puntos_jugador').select('jugador_id, pts').eq('jornada', jornada).eq('federacion_id', federacion?.id),
    ]);
    const ptsMap = Object.fromEntries((pts || []).map(r => [r.jugador_id, Number(r.pts)]));
    setDetalle(d => ({ ...d, [key]: { alis: alis || [], ptsMap } }));
  };

  // Reset expanded row when jornada changes
  useEffect(() => { setAbierto(null); }, [jornada]);

  const filasJornada = [...participantes].map(p => ({
    id: p.id, nombre: p.nombre,
    pts: clas.find(r => r.participante_id === p.id && r.jornada === jornada)?.puntos_jornada ?? null,
  })).sort((a, b) => (b.pts ?? -1) - (a.pts ?? -1));

  const filasAcum = [...participantes].map(p => {
    const regs = clas.filter(r => r.participante_id === p.id);
    return { id: p.id, nombre: p.nombre, total: regs.reduce((s, r) => s + r.puntos_jornada, 0), jornadas: regs.length };
  }).sort((a, b) => b.total - a.total);

  const jornadasConDatos = [...new Set(clas.map(r => r.jornada))].sort((a, b) => a - b);

  const btnJornada = (j) => ({
    padding: '.22rem .5rem', borderRadius: 6, fontSize: '.75rem', cursor: 'pointer',
    border: '1.5px solid ' + (jornadasConDatos.includes(j) ? 'var(--verde)' : 'var(--borde)'),
    background: jornada === j ? 'var(--verde)' : jornadasConDatos.includes(j) ? '#f0fdf4' : '#fff',
    color: jornada === j ? '#fff' : jornadasConDatos.includes(j) ? '#166534' : 'var(--texto2)',
    fontWeight: jornada === j ? 700 : 400,
  });

  const DetalleEquipo = ({ pid }) => {
    const key = `${pid}_${jornada}`;
    const info = detalle[key];
    if (!info) return <tr><td colSpan={3} style={{padding:'.5rem', color:'var(--texto2)', fontSize:'.82rem'}}>Cargando…</td></tr>;
    const titulares  = info.alis.filter(a => a.es_titular).map(a => a.jugador_id);
    const suplentes  = info.alis.filter(a => !a.es_titular).map(a => a.jugador_id);
    const idJug = Object.fromEntries(jugadores.map(j => [j.id, j]));
    const filaJug = (jid, esTitular) => {
      const jug = idJug[jid];
      if (!jug) return null;
      const pts = info.ptsMap[jid];
      return (
        <tr key={jid} style={{background: esTitular ? '#f0fdf4' : '#fafafa'}}>
          <td style={{paddingLeft:'2rem', fontSize:'.8rem', color: esTitular ? 'var(--texto)' : 'var(--texto2)'}}>
            {esTitular ? '▶' : '○'} {jug.nombre}
            <span style={{marginLeft:'.4rem', fontSize:'.72rem', color:'var(--texto2)'}}>{jug.posicion}</span>
          </td>
          <td style={{fontSize:'.75rem', color:'var(--texto2)'}}>{jug.equipo}</td>
          <td style={{textAlign:'right', fontWeight: pts !== undefined ? 700 : 400,
                      color: pts !== undefined ? 'var(--texto)' : 'var(--texto2)', fontSize:'.85rem'}}>
            {pts !== undefined ? pts : '—'}
          </td>
        </tr>
      );
    };
    return (
      <>
        {titulares.length === 0 && suplentes.length === 0
          ? <tr><td colSpan={3} style={{padding:'.4rem .4rem .4rem 2rem', color:'var(--texto2)', fontSize:'.8rem'}}>Sin alineación registrada esta jornada.</td></tr>
          : <>
              {titulares.length > 0 && <tr><td colSpan={3} style={{paddingLeft:'2rem', paddingTop:'.3rem', fontSize:'.72rem', fontWeight:700, color:'var(--verde)', letterSpacing:'.04em'}}>TITULARES</td></tr>}
              {titulares.map(jid => filaJug(jid, true))}
              {suplentes.length > 0 && <tr><td colSpan={3} style={{paddingLeft:'2rem', paddingTop:'.3rem', fontSize:'.72rem', fontWeight:700, color:'var(--texto2)', letterSpacing:'.04em'}}>SUPLENTES</td></tr>}
              {suplentes.map(jid => filaJug(jid, false))}
            </>
        }
      </>
    );
  };

  return (
    <div>
      <div className="tabs">
        <button className={`tab ${vista==='jornada'?'active':''}`} onClick={() => setVista('jornada')}>Por jornada</button>
        <button className={`tab ${vista==='acumulado'?'active':''}`} onClick={() => setVista('acumulado')}>Acumulado</button>
      </div>

      {vista === 'jornada' && (
        <div>
          <div className="card" style={{paddingBottom:'.6rem'}}>
            <div style={{display:'flex', gap:'.25rem', flexWrap:'wrap'}}>
              {Array.from({length:38}, (_, i) => i + 1).map(j => (
                <button key={j} onClick={() => setJornada(j)} style={btnJornada(j)}>J{j}</button>
              ))}
            </div>
          </div>
          <div className="card">
            <h2>Jornada {jornada}{!jornadasConDatos.includes(jornada) && <span style={{fontWeight:400, color:'var(--texto2)', fontSize:'.8rem', marginLeft:'.5rem'}}>(sin datos)</span>}</h2>
            <p style={{fontSize:'.78rem', color:'var(--texto2)', marginBottom:'.6rem'}}>Pincha en un equipo para ver su alineación y puntos de cada jugador.</p>
            <table>
              <thead>
                <tr><th>Pos</th><th>Equipo</th><th style={{textAlign:'right'}}>Puntos</th></tr>
              </thead>
              <tbody>
                {filasJornada.map((e, i) => (
                  <React.Fragment key={e.id}>
                    <tr onClick={() => abrirEquipo(e.id)}
                        style={{cursor:'pointer', background: abierto===e.id ? '#eff6ff' : i===0 ? 'rgba(26,127,55,.05)' : undefined,
                                borderBottom: abierto===e.id ? 'none' : undefined}}>
                      <td><Medalla pos={i + 1} /></td>
                      <td style={{fontWeight:600}}>
                        {abierto===e.id ? '▾ ' : '▸ '}{e.nombre}
                      </td>
                      <td style={{textAlign:'right', fontWeight: e.pts!==null?800:400, fontSize: e.pts!==null?'1.08rem':'1rem',
                                  color: e.pts!==null?'var(--texto)':'var(--texto2)'}}>
                        {e.pts !== null ? e.pts : '—'}
                      </td>
                    </tr>
                    {abierto === e.id && <DetalleEquipo pid={e.id} />}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {vista === 'acumulado' && (
        <div className="card">
          <h2>Clasificación acumulada</h2>
          {filasAcum.every(e => e.total === 0)
            ? <div className="empty">Aún no hay puntuaciones introducidas.</div>
            : <table>
                <thead>
                  <tr>
                    <th>Pos</th><th>Equipo</th>
                    <th style={{textAlign:'right'}}>Total pts</th>
                    <th style={{textAlign:'right'}}>Jornadas</th>
                    <th style={{textAlign:'right'}}>Media</th>
                  </tr>
                </thead>
                <tbody>
                  {filasAcum.map((e, i) => (
                    <tr key={e.id} style={{background: i===0?'rgba(26,127,55,.06)':undefined}}>
                      <td><Medalla pos={i + 1} /></td>
                      <td style={{fontWeight:600}}>{e.nombre}</td>
                      <td style={{textAlign:'right', fontWeight:800, fontSize:'1.05rem'}}>{e.total}</td>
                      <td style={{textAlign:'right', color:'var(--texto2)'}}>{e.jornadas}</td>
                      <td style={{textAlign:'right', color:'var(--texto2)'}}>
                        {e.jornadas > 0 ? (e.total / e.jornadas).toFixed(1) : '—'}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
        </div>
      )}
    </div>
  );
}


// ── ADMIN PTS JUGADORES — entrada por jugador por jornada ──────
function AdminPtsJugadores({ participantes, federacion }) {
  const [jornada, setJornada] = useState(1);
  const [jugadores, setJugadores] = useState([]);
  const [ptsJug, setPtsJug]   = useState({});
  const [guardando, setGuardando] = useState(false);
  const [msg, setMsg]         = useState('');
  const [equipoSel, setEquipoSel] = useState('');

  useEffect(() => {
    if (!sb) return;
    sb.from('jugadores').select('id, nombre, equipo, posicion').order('equipo').order('posicion')
      .then(({ data }) => setJugadores(data || []));
  }, []);

  useEffect(() => {
    if (!sb || jugadores.length === 0) return;
    sb.from('puntos_jugador').select('jugador_id, pts')
      .eq('jornada', jornada).eq('federacion_id', federacion?.id)
      .then(({ data }) => {
        const m = {};
        (data || []).forEach(r => { m[r.jugador_id] = String(r.pts); });
        setPtsJug(m);
      });
  }, [jornada, jugadores]);

  const guardar = async () => {
    if (!sb) return;
    setGuardando(true);

    // 1. Guardar pts por jugador
    const rows = Object.entries(ptsJug)
      .filter(([, v]) => v !== '' && v !== undefined)
      .map(([jid, v]) => ({ jugador_id: jid, jornada, federacion_id: federacion?.id, pts: Number(v) || 0 }));
    if (rows.length > 0) {
      const { error } = await sb.from('puntos_jugador').upsert(rows, { onConflict: 'jugador_id,jornada,federacion_id' });
      if (error) { alert('Error: ' + error.message); setGuardando(false); return; }
    }

    // 2. Recalcular totales de cada equipo fantasy desde sus titulares
    if (participantes && participantes.length > 0) {
      const partIds = participantes.map(p => p.id);
      const { data: alis } = await sb.from('alineaciones')
        .select('participante_id, jugador_id')
        .eq('jornada', jornada)
        .eq('es_titular', true)
        .in('participante_id', partIds);

      const ptsMapa = Object.fromEntries(rows.map(r => [r.jugador_id, r.pts]));
      const alisPorEquipo = {};
      (alis || []).forEach(a => {
        if (!alisPorEquipo[a.participante_id]) alisPorEquipo[a.participante_id] = [];
        alisPorEquipo[a.participante_id].push(a.jugador_id);
      });

      const clasRows = participantes.map(p => ({
        participante_id: p.id,
        jornada,
        puntos_jornada: (alisPorEquipo[p.id] || []).reduce((s, jid) => s + (ptsMapa[jid] ?? 0), 0),
      }));
      await sb.from('clasificacion').upsert(clasRows, { onConflict: 'participante_id,jornada' });
    }

    setGuardando(false);
    publicar(federacion?.id, 'puntos', `Puntos de jornada ${jornada} introducidos por el administrador`);
    setMsg(`J${jornada} guardada y totales de equipo actualizados.`);
    setTimeout(() => setMsg(''), 4000);
  };

  const equiposReales = [...new Set(jugadores.map(j => j.equipo))].sort();
  const equipoActual  = (equipoSel && equiposReales.includes(equipoSel)) ? equipoSel : (equiposReales[0] || '');
  const jugsEq        = jugadores.filter(j => j.equipo === equipoActual);
  const iS = { width:72, textAlign:'right', padding:'.25rem .4rem',
               border:'1.5px solid var(--borde)', borderRadius:7, fontSize:'.88rem', fontWeight:600 };

  return (
    <div>
      <div className="card" style={{display:'flex', alignItems:'center', gap:'.75rem', flexWrap:'wrap'}}>
        <span style={{fontWeight:600}}>Jornada:</span>
        <div style={{display:'flex', gap:'.28rem', flexWrap:'wrap'}}>
          {Array.from({length:38}, (_, i) => i+1).map(j => (
            <button key={j} onClick={() => { setJornada(j); setMsg(''); }}
                    style={{padding:'.22rem .48rem', borderRadius:6, fontSize:'.75rem',
                            border:'1.5px solid var(--borde)', cursor:'pointer',
                            background: jornada===j?'var(--verde)':'#fff',
                            color: jornada===j?'#fff':'var(--texto)', fontWeight: jornada===j?700:400}}>
              {j}
            </button>
          ))}
        </div>
      </div>

      {jugadores.length === 0
        ? <div className="card"><div className="empty">No hay jugadores en la base de datos.</div></div>
        : <>
            <div className="tabs" style={{flexWrap:'wrap', marginBottom:'.5rem'}}>
              {equiposReales.map(eq => (
                <button key={eq} className={`tab ${equipoActual===eq?'active':''}`}
                        onClick={() => setEquipoSel(eq)}>
                  <Escudo equipo={eq} size={14} />{' '}{eq}
                </button>
              ))}
            </div>
            <div className="card" style={{paddingBottom:'.75rem'}}>
              <h2 style={{fontSize:'.95rem', marginBottom:'.75rem', display:'flex', alignItems:'center', gap:6}}>
                <Escudo equipo={equipoActual} size={18} />{equipoActual}
              </h2>
              <table>
                <thead><tr><th>Jugador</th><th>Pos</th><th style={{textAlign:'right'}}>Pts J{jornada}</th></tr></thead>
                <tbody>
                  {jugsEq.map(j => (
                    <tr key={j.id}>
                      <td style={{fontWeight:600}}>{j.nombre}</td>
                      <td style={{color:'var(--texto2)', fontSize:'.8rem'}}>{j.posicion}</td>
                      <td style={{textAlign:'right'}}>
                        <input type="number" min="0" value={ptsJug[j.id] ?? ''}
                               onChange={e => { setPtsJug(p => ({...p, [j.id]: e.target.value})); setMsg(''); }}
                               placeholder="0" style={iS} />
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
      }

      <div style={{display:'flex', justifyContent:'flex-end', gap:'1rem', alignItems:'center', marginBottom:'1.5rem'}}>
        {msg && <span style={{color:'var(--verde)', fontWeight:600}}>{msg}</span>}
        <button onClick={guardar} disabled={guardando}
                style={{background:'var(--verde)', color:'#fff', border:'none',
                        padding:'.55rem 1.5rem', borderRadius:9, fontSize:'1rem',
                        fontWeight:700, cursor: guardando?'wait':'pointer', opacity: guardando?.7:1}}>
          {guardando ? 'Guardando…' : `Guardar J${jornada}`}
        </button>
      </div>
    </div>
  );
}

// ── EQUIPOS ────────────────────────────────────────────────────
function Equipos({ participantes, miParticipanteId, jornadaActual, isAdmin, onParticipantesChange }) {
  const [equipoId, setEquipoId]       = useState('');
  const [jugadores, setJugadores]     = useState(null);
  const [presupuesto, setPresupuesto] = useState(null);
  const [aliJornada, setAliJornada]   = useState(jornadaActual || 1);
  const [alineacion, setAlineacion]   = useState(null);
  const [editModal, setEditModal]     = useState(false);
  const [editForm, setEditForm]       = useState({});
  const [editMsg, setEditMsg]         = useState('');

  useEffect(() => {
    if (participantes.length > 0 && !equipoId) setEquipoId(participantes[0].id);
  }, [participantes]);

  useEffect(() => {
    if (!equipoId || !sb) return;
    setJugadores(null);
    setPresupuesto(null);
    sb.from('plantillas')
      .select('id, precio_compra, jugadores(nombre, equipo, posicion, valor_mercado)')
      .eq('participante_id', equipoId)
      .then(({ data, error }) => setJugadores(error ? [] : (data || [])));
    sb.from('participantes').select('presupuesto').eq('id', equipoId).single()
      .then(({ data }) => setPresupuesto(data?.presupuesto ?? null));
  }, [equipoId]);

  useEffect(() => {
    if (!equipoId || !sb) return;
    setAlineacion(null);
    const cargarAli = async () => {
      const { data: ali } = await sb.from('alineaciones')
        .select('jugador_id, es_titular, jugadores(nombre, equipo, posicion)')
        .eq('participante_id', equipoId)
        .eq('jornada', aliJornada);
      if (ali && ali.length > 0) { setAlineacion(ali); return; }
      // Fallback: última jornada guardada <= aliJornada (no mostrar jornadas futuras)
      const { data: ref } = await sb.from('alineaciones')
        .select('jornada')
        .eq('participante_id', equipoId)
        .lte('jornada', aliJornada)
        .order('jornada', { ascending: false })
        .limit(1);
      if (ref?.length > 0) {
        const { data: ultima } = await sb.from('alineaciones')
          .select('jugador_id, es_titular, jugadores(nombre, equipo, posicion)')
          .eq('participante_id', equipoId)
          .eq('jornada', ref[0].jornada);
        setAlineacion(ultima || []);
      } else {
        setAlineacion([]);
      }
    };
    cargarAli();
  }, [equipoId, aliJornada]);

  const equipo = participantes.find(p => p.id === equipoId);

  const abrirEditar = () => {
    setEditForm({ nombre: equipo?.nombre || '', estadio: equipo?.estadio || '', entrenador: equipo?.entrenador || '', escudo_url: equipo?.escudo_url || '' });
    setEditMsg('');
    setEditModal(true);
  };

  const guardarPerfil = async () => {
    if (!sb || !equipoId) return;
    const oldEnt  = equipo?.entrenador?.trim() || '';
    const newEnt  = editForm.entrenador.trim();
    const oldNom  = equipo?.nombre?.trim() || '';
    const newNom  = editForm.nombre.trim();
    const { data, error } = await sb.from('participantes')
      .update({ nombre: newNom, estadio: editForm.estadio.trim(), entrenador: newEnt, escudo_url: editForm.escudo_url.trim() })
      .eq('id', equipoId).select().single();
    if (error) { setEditMsg('Error: ' + error.message); return; }
    onParticipantesChange && onParticipantesChange();
    if (newEnt && newEnt !== oldEnt)
      publicar(federacion?.id, 'admin', `${newNom || oldNom} nombra nuevo entrenador: ${newEnt}`);
    if (newNom && newNom !== oldNom)
      publicar(federacion?.id, 'admin', `El equipo "${oldNom}" pasa a llamarse "${newNom}"`);
    setEditMsg('Guardado');
    setTimeout(() => { setEditModal(false); setEditMsg(''); }, 1200);
  };

  const lista = (jugadores || []).map(p => ({
    nombre:   p.jugadores?.nombre || '',
    equipo:   p.jugadores?.equipo || '',
    posicion: p.jugadores?.posicion || '',
    valor:    p.jugadores?.valor_mercado || 0,
    compra:   p.precio_compra || 0,
  }));

  const titulares  = (alineacion || []).filter(a => a.es_titular)
    .sort((a,b) => POS_ORDEN[a.jugadores?.posicion] - POS_ORDEN[b.jugadores?.posicion]);
  const suplentes  = (alineacion || []).filter(a => !a.es_titular)
    .sort((a,b) => POS_ORDEN[a.jugadores?.posicion] - POS_ORDEN[b.jugadores?.posicion]);

  return (
    <div>
      <div className="card">
        <div className="tabs" style={{marginBottom: 0}}>
          {participantes.map(p => (
            <button key={p.id}
              className={`tab ${equipoId === p.id ? 'active' : ''}`}
              onClick={() => setEquipoId(p.id)}>
              {p.nombre}{p.id === miParticipanteId ? ' (tú)' : ''}
            </button>
          ))}
        </div>
      </div>

      {equipo && (
        <div className="card" style={{display:'flex', gap:'1.5rem', flexWrap:'wrap', alignItems:'flex-start'}}>
          {equipo.escudo_url && (
            <img src={equipo.escudo_url} alt="Escudo"
                 style={{width:72, height:72, borderRadius:10, objectFit:'cover',
                         border:'1.5px solid var(--borde)', flexShrink:0}} />
          )}
          <div style={{flex:1, display:'flex', gap:'2rem', flexWrap:'wrap', alignItems:'flex-end'}}>
            <div>
              <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.2rem'}}>Presupuesto disponible</div>
              <div style={{fontSize:'1.4rem', fontWeight:800, color:'var(--verde)'}}>
                {presupuesto !== null ? fmt(presupuesto) : '…'}
              </div>
            </div>
            <div>
              <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.2rem'}}>Jugadores fichados</div>
              <div style={{fontSize:'1.4rem', fontWeight:800}}>{jugadores ? lista.length : '…'}</div>
            </div>
            {equipo.estadio && (
              <div>
                <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.2rem'}}>Estadio</div>
                <div style={{fontSize:'1rem', fontWeight:600}}>{equipo.estadio}</div>
              </div>
            )}
            {equipo.entrenador && (
              <div>
                <div style={{fontSize:'.8rem', color:'var(--texto2)', marginBottom:'.2rem'}}>Entrenador</div>
                <div style={{fontSize:'1rem', fontWeight:600}}>{equipo.entrenador}</div>
              </div>
            )}
            {(isAdmin || equipoId === miParticipanteId) && (
              <button onClick={abrirEditar}
                      style={{marginLeft:'auto', padding:'.4rem .9rem', fontSize:'.82rem',
                              borderRadius:8, border:'1.5px solid var(--borde)',
                              background:'var(--gris)', cursor:'pointer', fontWeight:600}}>
                Editar perfil
              </button>
            )}
          </div>
        </div>
      )}

      {editModal && (
        <div className="overlay" onClick={() => setEditModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Editar perfil del equipo</h3>
            {['nombre','estadio','entrenador'].map(campo => (
              <div key={campo} className="campo">
                <label style={{textTransform:'capitalize'}}>{campo}</label>
                <input value={editForm[campo] || ''}
                       onChange={e => setEditForm(f => ({...f, [campo]: e.target.value}))} />
              </div>
            ))}
            <div className="campo">
              <label>URL del escudo</label>
              <input placeholder="https://..." value={editForm.escudo_url || ''}
                     onChange={e => setEditForm(f => ({...f, escudo_url: e.target.value}))} />
            </div>
            {editMsg && <div style={{color: editMsg.startsWith('Error') ? '#dc3545' : '#198754', fontSize:'.85rem', marginBottom:'.5rem'}}>{editMsg}</div>}
            <div style={{display:'flex', gap:'.75rem', marginTop:'.5rem'}}>
              <button className="btn-cancel" onClick={() => setEditModal(false)}>Cancelar</button>
              <button className="btn-ok" onClick={guardarPerfil}>Guardar</button>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        <h2>Plantilla de {equipo?.nombre || '—'}</h2>
        {jugadores === null
          ? <Spinner />
          : lista.length === 0
          ? <div className="empty">Esta plantilla está vacía.</div>
          : <table>
              <thead>
                <tr>
                  <th>Jugador</th><th>Pos</th><th>Equipo</th>
                  <th style={{textAlign:'right'}}>Valor actual</th>
                  <th style={{textAlign:'right'}}>Dif. compra</th>
                </tr>
              </thead>
              <tbody>
                {lista.map((j, i) => {
                  const dif = (j.valor || 0) - (j.compra || 0);
                  return (
                    <tr key={i}>
                      <td style={{fontWeight:600}}>{nombreJugador(j.nombre, j.posicion, j.equipo)}</td>
                      <td><span className={`badge ${j.posicion}`}>{j.posicion}</span></td>
                      <td style={{color:'var(--texto2)'}}>
                        {j.posicion === 'POR' ? null
                          : <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                              <Escudo equipo={j.equipo} size={16}/>{j.equipo}
                            </span>}
                      </td>
                      <td style={{textAlign:'right'}}>{fmt(j.valor || 0)}</td>
                      <td style={{textAlign:'right'}}
                          className={dif >= 0 ? 'valor-positivo' : 'valor-negativo'}>
                        {dif >= 0 ? '+' : ''}{fmt(dif)}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
        }
      </div>

      <div className="card">
        <div style={{display:'flex', alignItems:'center', gap:'1rem', marginBottom:'1rem', flexWrap:'wrap'}}>
          <h2 style={{margin:0}}>Alineación de {equipo?.nombre || '—'}</h2>
          <div>
            <label style={{fontSize:'.85rem', color:'var(--texto2)', marginRight:'.4rem'}}>Jornada:</label>
            <select value={aliJornada} onChange={e => setAliJornada(Number(e.target.value))}
                    style={{padding:'.3rem .6rem', borderRadius:6, border:'1.5px solid var(--borde)'}}>
              {Array.from({length:38},(_,i)=>i+1).map(j =>
                <option key={j} value={j}>J{j}</option>)}
            </select>
          </div>
        </div>

        {alineacion === null ? <Spinner /> : alineacion.length === 0
          ? <div className="empty">Sin alineación guardada para J{aliJornada}.</div>
          : <>
              {titulares.length > 0 && (
                <>
                  <div style={{fontWeight:700, fontSize:'.78rem', color:'#198754',
                               textTransform:'uppercase', letterSpacing:'.05em', marginBottom:'.35rem'}}>
                    Titulares ({titulares.length}/11)
                  </div>
                  <table style={{width:'100%', marginBottom:'1rem'}}>
                    <tbody>
                      {titulares.map((a,i) => (
                        <tr key={i}>
                          <td style={{width:48}}><span className={`badge ${a.jugadores?.posicion}`}>{a.jugadores?.posicion}</span></td>
                          <td style={{fontWeight:600}}>{nombreJugador(a.jugadores?.nombre, a.jugadores?.posicion, a.jugadores?.equipo)}</td>
                          <td style={{color:'var(--texto2)', fontSize:'.85rem'}}>
                            {a.jugadores?.posicion === 'POR' ? null
                              : <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                                  <Escudo equipo={a.jugadores?.equipo} size={15}/>{a.jugadores?.equipo}
                                </span>}

                          </td>

                      ))}
                    </tbody>
                  </table>
                </>
              )}
            </>
        }
      </div>
    </div>
  );
}

async function publicar(federacionId, tipo, texto, actorNombre) {

  const { error } = await sb.from('anuncios').insert({ federacion_id: federacionId, tipo, texto, actor_nombre: actorNombre || null });

function Tablon({ federacionId }) {
  const [anuncios, setAnuncios] = useState(null);
  const [pagina, setPagina]    = useState(0);
  const POR_PAG = 20;

  const cargar = async () => {
    if (!sb || !federacionId) return;
    const { data } = await sb.from('anuncios')
      .select('id, tipo, texto, actor_nombre, created_at')
      .eq('federacion_id', federacionId)
      .order('created_at', { ascending: false })
      .range(pagina * POR_PAG, (pagina + 1) * POR_PAG - 1);
    setAnuncios(prev => pagina === 0 ? (data || []) : [...(prev || []), ...(data || [])]);
  };

  useEffect(() => { setPagina(0); setAnuncios(null); }, [federacionId]);
  useEffect(() => { cargar(); }, [federacionId, pagina]);

  const ICONOS = { fichaje: '⚽', venta: '💸', sorteo: '🎲', alineacion: '📋', puntos: '📊', moderador: '🛡️', penalizacion: '🚫', oferta: '💰', admin: '⚙️' };

  const fmtFecha = ts => {
    const d = new Date(ts);
    return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }) + ' ' +
           d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  };

  return (
    <div className="card">
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem'}}>
        <h2 style={{margin:0}}>Tablón de anuncios</h2>
        <button onClick={() => { setPagina(0); setAnuncios(null); }}
                style={{padding:'.3rem .8rem', borderRadius:6, border:'1.5px solid var(--borde)',
                        background:'#fff', cursor:'pointer', fontSize:'.85rem'}}>
          Actualizar
        </button>
      </div>
      {anuncios === null ? <Spinner /> : anuncios.length === 0
        ? <div className="empty">Sin actividad todavía.</div>
        : <>
            <div style={{display:'flex', flexDirection:'column', gap:'.6rem'}}>
              {anuncios.map(a => (
                <div key={a.id} style={{display:'flex', gap:'.75rem', alignItems:'flex-start',
                                        padding:'.65rem .9rem', background:'var(--gris)',
                                        borderRadius:10, fontSize:'.88rem'}}>
                  <span style={{fontSize:'1.15rem', flexShrink:0, lineHeight:1.3}}>{ICONOS[a.tipo] || '📌'}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:500}}>{a.texto}</div>
                    {a.actor_nombre && (
                      <div style={{fontSize:'.78rem', color:'var(--texto2)', marginTop:'.2rem'}}>por {a.actor_nombre}</div>
                    )}
                  </div>
                  <div style={{fontSize:'.75rem', color:'var(--texto2)', flexShrink:0, whiteSpace:'nowrap'}}>
                    {fmtFecha(a.created_at)}
                  </div>
                </div>
              ))}
            </div>
            <button onClick={() => setPagina(p => p + 1)}
                    style={{marginTop:'.9rem', width:'100%', padding:'.5rem',
                            borderRadius:8, border:'1.5px solid var(--borde)',
                            background:'#fff', cursor:'pointer', fontSize:'.85rem'}}>
              Cargar más
            </button>
          </>
      }
    </div>
  );
}

// ── LOGIN ──────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [modo, setModo]       = useState('entrar'); // 'entrar' | 'crear'
  const [email, setEmail]     = useState('');
  const [pass, setPass]       = useState('');
  const [pass2, setPass2]     = useState('');
  const [error, setError]     = useState('');
  const [info, setInfo]       = useState('');
  const [cargando, setCargando] = useState(false);

  const entrar = async () => {
    if (!email.trim() || !pass.trim()) { setError('Introduce tu email y contraseña'); return; }
    if (!sb) { setError('Sin conexión con la base de datos'); return; }
    setCargando(true); setError(''); setInfo('');
    const { data, error: err } = await sb.auth.signInWithPassword({
      email: email.trim(), password: pass,
    });
    setCargando(false);
    if (err || !data?.user) { setError('Email o contraseña incorrectos'); return; }
    onLogin(data.user);
  };

  const crearCuenta = async () => {
    if (!email.trim() || !pass.trim()) { setError('Introduce tu email y contraseña'); return; }
    if (pass !== pass2) { setError('Las contraseñas no coinciden'); return; }
    if (pass.length < 6) { setError('La contraseña debe tener al menos 6 caracteres'); return; }
    if (!sb) { setError('Sin conexión con la base de datos'); return; }
    setCargando(true); setError(''); setInfo('');
    const { data, error: err } = await sb.auth.signUp({
      email: email.trim(), password: pass,
    });
    setCargando(false);
    if (err) { setError(err.message); return; }
    if (data.session) { onLogin(data.user); return; }
    setInfo('Cuenta creada. Revisa tu email para confirmarla y vuelve a entrar.');
  };

  const conGoogle = async () => {
    if (!sb) { setError('Sin conexión con la base de datos'); return; }
    setError(''); setInfo('');
    await sb.auth.signInWithOAuth({ provider: 'google' });
  };

  const confirmar = () => (modo === 'entrar' ? entrar() : crearCuenta());

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <h1>Fantasy LaLiga</h1>
          <p>{modo === 'entrar' ? 'Inicia sesión con tu cuenta' : 'Crea tu cuenta'}</p>
        </div>
        {error && <div className="login-error">{error}</div>}
        {info && <div className="login-error" style={{background:'#e6f4ea', color:'#1a7f37'}}>{info}</div>}

        <button type="button" onClick={conGoogle}
                style={{width:'100%', padding:'.65rem', marginBottom:'1.1rem',
                        background:'#fff', color:'var(--texto)', fontWeight:600,
                        border:'1.5px solid var(--borde)', borderRadius:10, cursor:'pointer'}}>
          Continuar con Google
        </button>

        <div className="campo">
          <label>Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                 placeholder="tu@email.com"
                 autoFocus
                 onKeyDown={e => e.key === 'Enter' && confirmar()} />
        </div>
        <div className="campo">
          <label>Contraseña</label>
          <input type="password" value={pass} onChange={e => setPass(e.target.value)}
                 placeholder="Contraseña"
                 onKeyDown={e => e.key === 'Enter' && confirmar()} />
        </div>
        {modo === 'crear' && (
          <div className="campo">
            <label>Repite la contraseña</label>
            <input type="password" value={pass2} onChange={e => setPass2(e.target.value)}
                   placeholder="Repite la contraseña"
                   onKeyDown={e => e.key === 'Enter' && confirmar()} />
          </div>
        )}

        <button className="btn-full" onClick={confirmar} disabled={cargando}>
          {cargando ? 'Un momento…' : modo === 'entrar' ? 'Entrar' : 'Crear cuenta'}
        </button>

        <button type="button"
                onClick={() => { setModo(modo === 'entrar' ? 'crear' : 'entrar'); setError(''); setInfo(''); }}
                style={{marginTop:'.9rem', width:'100%', background:'none', border:'none',
                        color:'var(--verde)', fontSize:'.85rem', cursor:'pointer', fontWeight:600}}>
          {modo === 'entrar' ? '¿No tienes cuenta? Crea una' : '¿Ya tienes cuenta? Inicia sesión'}
        </button>
      </div>
    </div>
  );
}

// ── ONBOARDING — unirse o crear federación + configurar equipo ─
function FederacionOnboarding({ user, onDone, onLogout }) {
  const [paso, setPaso]             = useState('selector'); // 'selector' | 'equipo'
  const [modo, setModo]             = useState('crear');    // 'crear' | 'unirse'
  const [fedNombre, setFedNombre]   = useState('');
  const [fedCodigo, setFedCodigo]   = useState('');
  const [fedActual, setFedActual]   = useState(null);       // federacion elegida/creada
  const [codigoGenerado, setCodigoGenerado] = useState(''); // para mostrar al admin

  // Datos del equipo
  const [nombreEquipo, setNombreEquipo] = useState('');
  const [estadio, setEstadio]           = useState('');
  const [entrenador, setEntrenador]     = useState('');
  const [divisionId, setDivisionId]     = useState('');
  const [divisiones, setDivisiones]     = useState([]);
  const [escudoFile, setEscudoFile]     = useState(null);
  const [escudoPreview, setEscudoPreview] = useState(null);

  const [error, setError]     = useState('');
  const [cargando, setCargando] = useState(false);

  useEffect(() => {
    if (!sb) return;
    sb.from('divisiones').select('id, nombre').order('nombre')
      .then(({ data }) => setDivisiones(data || []));
  }, []);
